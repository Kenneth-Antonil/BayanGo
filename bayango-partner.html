<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BayanGo Partner App</title>
  <meta name="theme-color" content="#166534" />
  <link rel="manifest" href="bayango-partner-manifest.json" />
  <link rel="icon" href="https://i.imgur.com/wL8wcBB.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAF8; color: #111827; }
    button { font-family: inherit; border: none; cursor: pointer; }
    input, textarea, select { font-family: inherit; }
    @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .slide-up { animation: slideUp .28s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const Ic = ({ n, size=14, style }) => <i className={`fa-solid fa-${n}`} style={{ fontSize:size, lineHeight:1, ...style }} />;
    const fmt = v => "₱" + Number(v||0).toLocaleString("en-PH", { minimumFractionDigits:0, maximumFractionDigits:2 });

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",
      authDomain: "bayango-315c6.firebaseapp.com",
      projectId: "bayango-315c6",
      storageBucket: "bayango-315c6.firebasestorage.app",
      messagingSenderId: "199013441811",
      appId: "1:199013441811:web:315a38f03ddc9b676e3ae6",
      databaseURL: "https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app",
    };

    let _db=null, _fns=null, _auth=null, _authFns=null, _initPromise=null;
    async function initFirebase() {
      if (_db && _auth) return { db:_db, fns:_fns, auth:_auth, authFns:_authFns };
      if (_initPromise) return _initPromise;
      _initPromise = (async () => {
        const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
        const { getDatabase, ref, push, set, update, remove, onValue, off, get, query: rtdbQuery, orderByChild, equalTo } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
        const { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
        const app = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
        _db = getDatabase(app, FIREBASE_CONFIG.databaseURL);
        _auth = getAuth(app);
        _fns = { ref, push, set, update, remove, onValue, off, get, rtdbQuery, orderByChild, equalTo };
        _authFns = { signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut };
        return { db:_db, fns:_fns, auth:_auth, authFns:_authFns };
      })();
      return _initPromise;
    }

    const ORDER_STATUS_LABELS = {
      pending:   { label:"Pending",   bg:"#F3F4F6", color:"#555",    icon:"hourglass-half" },
      accepted:  { label:"Accepted",  bg:"#DBEAFE", color:"#1D4ED8", icon:"thumbs-up" },
      preparing: { label:"Preparing", bg:"#FEF3C7", color:"#92400E", icon:"fire-burner" },
      prepared:  { label:"Handa Na",  bg:"#DCFCE7", color:"#166534", icon:"bag-shopping" },
      delivered: { label:"Delivered", bg:"#F0FDF4", color:"#15803D", icon:"circle-check" },
      cancelled: { label:"Cancelled", bg:"#FEE2E2", color:"#B91C1C", icon:"ban" },
    };

    function App() {
      const [ready, setReady]           = useState(false);
      const [user, setUser]             = useState(null);
      const [store, setStore]           = useState(null);
      const [tab, setTab]               = useState("orders");
      const [products, setProducts]     = useState([]);
      const [orders, setOrders]         = useState([]);
      const [notification, setNotification] = useState(null);
      const [form, setForm]             = useState({ name:"", price:"", stock:"", description:"", imgUrl:"" });
      const [editingProduct, setEditingProduct] = useState(null);
      const [savingProduct, setSavingProduct]   = useState(false);
      const [deletingId, setDeletingId] = useState(null);
      const [ordersFilter, setOrdersFilter]     = useState("active");

      useEffect(() => {
        let unsubAuth, unsubStore, unsubProducts, unsubOrders, unsubNotif;
        (async () => {
          const { db, fns, auth, authFns } = await initFirebase();
          unsubAuth = authFns.onAuthStateChanged(auth, async (cu) => {
            setUser(cu); setReady(true);
            unsubStore?.(); unsubProducts?.(); unsubOrders?.(); unsubNotif?.();
            setStore(null); setProducts([]); setOrders([]); setNotification(null);
            if (!cu) return;

            const storesRef = fns.rtdbQuery(fns.ref(db, "partner_stores"), fns.orderByChild("ownerUid"), fns.equalTo(cu.uid));
            unsubStore = fns.onValue(storesRef, (snap) => {
              let found = null;
              snap.forEach((child) => { if (!found) found = { id: child.key, ...child.val() }; });
              setStore(found);
            }, err => console.error("Store listener:", err.code));

            const productsRef = fns.rtdbQuery(fns.ref(db, "partner_products"), fns.orderByChild("ownerUid"), fns.equalTo(cu.uid));
            fns.onValue(productsRef, (snap) => {
              const list = [];
              snap.forEach((c) => list.push({ id:c.key, ...c.val() }));
              list.sort((a,b) => Number(b.createdAt||0) - Number(a.createdAt||0));
              setProducts(list);
            }, err => console.error("Products listener:", err.code));
            unsubProducts = () => fns.off(productsRef);

            const ordersRef = fns.rtdbQuery(fns.ref(db, "partner_orders"), fns.orderByChild("ownerUid"), fns.equalTo(cu.uid));
            fns.onValue(ordersRef, (snap) => {
              const list = [];
              snap.forEach((c) => list.push({ id:c.key, ...c.val() }));
              list.sort((a,b) => Number(b.createdAt||0) - Number(a.createdAt||0));
              setOrders(list);
            }, err => console.error("Orders listener:", err.code));
            unsubOrders = () => fns.off(ordersRef);

            const notifRef = fns.ref(db, "notifications/" + cu.uid + "/partner_approval");
            unsubNotif = fns.onValue(notifRef, (snap) => {
              if (snap.exists()) {
                const v = snap.val();
                if (v && !v.read) setNotification(v);
              }
            }, err => console.error("Notif listener:", err.code));
          });
        })();
        return () => { unsubAuth?.(); };
      }, []);

      const dismissNotification = async () => {
        setNotification(null);
        const { db, fns } = await initFirebase();
        const uid = _auth?.currentUser?.uid;
        if (uid) await fns.update(fns.ref(db, "notifications/" + uid + "/partner_approval"), { read: true });
      };

      const login = async () => {
        const { auth, authFns } = await initFirebase();
        try { await authFns.signInWithPopup(auth, new authFns.GoogleAuthProvider()); }
        catch(err) { alert("Error sa login: " + (err.message || err.code)); }
      };
      const logout = async () => {
        const { auth, authFns } = await initFirebase();
        await authFns.signOut(auth);
      };

      const saveProduct = async () => {
        if (!store?.id || !form.name.trim()) { alert("Ilagay ang pangalan ng produkto."); return; }
        if (!form.price || Number(form.price) <= 0) { alert("Ilagay ang tamang presyo."); return; }
        setSavingProduct(true);
        try {
          const { db, fns } = await initFirebase();
          const payload = {
            ownerUid: user.uid,
            partnerStoreId: store.id,
            name: form.name.trim(),
            price: Number(form.price || 0),
            stock: Number(form.stock || 0),
            description: form.description.trim(),
            imgUrl: form.imgUrl.trim(),
            active: true,
            updatedAt: Date.now(),
          };
          if (editingProduct) {
            await fns.update(fns.ref(db, "partner_products/" + editingProduct.id), payload);
          } else {
            await fns.push(fns.ref(db, "partner_products"), { ...payload, createdAt: Date.now() });
          }
          setForm({ name:"", price:"", stock:"", description:"", imgUrl:"" });
          setEditingProduct(null);
        } catch(err) {
          alert("Error: " + (err.message || err.code));
        } finally {
          setSavingProduct(false);
        }
      };

      const startEditProduct = (p) => {
        setEditingProduct(p);
        setForm({ name:p.name||"", price:String(p.price||""), stock:String(p.stock||""), description:p.description||"", imgUrl:p.imgUrl||"" });
        setTab("products");
        window.scrollTo({ top:0, behavior:"smooth" });
      };

      const deleteProduct = async (p) => {
        if (!window.confirm(`Burahin ang "${p.name}"?`)) return;
        setDeletingId(p.id);
        try {
          const { db, fns } = await initFirebase();
          await fns.remove(fns.ref(db, "partner_products/" + p.id));
        } catch(err) {
          alert("Error: " + (err.message || err.code));
        } finally {
          setDeletingId(null);
        }
      };

      const setOrderStatus = async (order, status) => {
        try {
          const { db, fns } = await initFirebase();
          const updates = { status, updatedAt: Date.now() };
          if (status === "prepared") updates.preparedAt = Date.now();
          await fns.update(fns.ref(db, "partner_orders/" + order.id), updates);
        } catch(err) {
          alert("Error: " + (err.message || err.code));
        }
      };

      if (!ready) return (
        <div style={{minHeight:"100vh", display:"grid", placeItems:"center", background:"#F0FDF4"}}>
          <div style={{textAlign:"center"}}>
            <Ic n="store" size={36} style={{color:"#166534", marginBottom:12, display:"block"}} />
            <div style={{fontSize:14, color:"#6B7280", fontWeight:600}}>Loading...</div>
          </div>
        </div>
      );

      if (!user) return (
        <div style={{minHeight:"100vh", display:"grid", placeItems:"center", padding:20, background:"#F0FDF4"}}>
          <div style={{textAlign:"center", maxWidth:320}}>
            <Ic n="store" size={48} style={{color:"#166534", marginBottom:16, display:"block"}} />
            <div style={{fontSize:22, fontWeight:800, color:"#166534", marginBottom:8}}>BayanGo Partner</div>
            <div style={{fontSize:13, color:"#6B7280", marginBottom:24, lineHeight:1.6}}>
              I-sign in gamit ang Google account na ginamit mo sa partner application.
            </div>
            <button onClick={login} style={{
              width:"100%", padding:"14px 20px", borderRadius:16,
              background:"#fff", border:"1.5px solid #E5E7EB", fontWeight:800, fontSize:15,
              display:"flex", alignItems:"center", justifyContent:"center", gap:12,
              boxShadow:"0 4px 14px rgba(0,0,0,.08)",
            }}>
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style={{width:22,height:22}} />
              Sign in with Google
            </button>
          </div>
        </div>
      );

      if (!store) return (
        <div style={{maxWidth:480, margin:"0 auto", minHeight:"100vh", padding:20, background:"#F0FDF4", display:"grid", placeItems:"center"}}>
          <div style={{background:"#fff", border:"1px solid #E5E7EB", borderRadius:20, padding:24, textAlign:"center"}}>
            <Ic n="hourglass-half" size={36} style={{color:"#F59E0B", marginBottom:12, display:"block"}} />
            <div style={{fontSize:17, fontWeight:800, color:"#166534", marginBottom:8}}>Wala pang approved store</div>
            <div style={{fontSize:13, color:"#6B7280", lineHeight:1.6, marginBottom:16}}>
              Hintayin muna ang admin approval ng iyong Partner Application bago ma-activate ang app na ito.
            </div>
            <div style={{fontSize:12, color:"#9CA3AF", marginBottom:20}}>Naka-login bilang: {user.email}</div>
            <button onClick={logout} style={{padding:"10px 20px", borderRadius:12, background:"#F3F4F6", fontWeight:700, fontSize:13}}>
              <Ic n="right-from-bracket" style={{marginRight:6}} />Sign out
            </button>
          </div>
        </div>
      );

      const activeOrders = orders.filter(o => o.status !== "delivered" && o.status !== "cancelled");
      const doneOrders   = orders.filter(o => o.status === "delivered" || o.status === "cancelled");
      const shownOrders  = ordersFilter === "active" ? activeOrders : doneOrders;
      const pendingCount = orders.filter(o => o.status === "pending").length;

      return (
        <div style={{maxWidth:480, margin:"0 auto", minHeight:"100vh", paddingBottom:80, background:"#F8FAF8"}}>

          {/* ── Approval notification banner ── */}
          {notification && (
            <div className="slide-up" style={{
              background:"linear-gradient(135deg,#166534,#22C55E)", color:"#fff",
              padding:"14px 16px", display:"flex", gap:12, alignItems:"flex-start",
            }}>
              <Ic n="circle-check" size={22} style={{marginTop:2, flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{fontWeight:800, fontSize:14, marginBottom:3}}>Na-approve na ang iyong store!</div>
                <div style={{fontSize:12, opacity:.9, lineHeight:1.5}}>{notification.message}</div>
                {notification.adminNotes ? <div style={{fontSize:11, opacity:.8, marginTop:4}}>Note: {notification.adminNotes}</div> : null}
              </div>
              <button onClick={dismissNotification} style={{background:"rgba(255,255,255,.25)", color:"#fff", borderRadius:8, padding:"4px 8px", fontSize:11, fontWeight:700, flexShrink:0}}>OK</button>
            </div>
          )}

          {/* ── Header ── */}
          <div style={{
            background:"linear-gradient(135deg,#166534,#14532D)", color:"#fff",
            padding:"14px 16px", display:"flex", justifyContent:"space-between", alignItems:"center",
            boxShadow:"0 4px 14px rgba(22,101,52,.3)",
          }}>
            <div>
              <div style={{fontWeight:800, fontSize:16}}>{store.storeName || "Partner Store"}</div>
              <div style={{fontSize:11, opacity:.85, marginTop:2}}>
                <Ic n="tag" style={{marginRight:4}} />{store.category || "General"}
                <span style={{marginLeft:10}}><Ic n="location-dot" style={{marginRight:4}} />{store.location || ""}</span>
              </div>
            </div>
            <button onClick={logout} style={{background:"rgba(255,255,255,.18)", color:"#fff", borderRadius:10, padding:"8px 12px", fontSize:12, fontWeight:700}}>
              <Ic n="right-from-bracket" style={{marginRight:5}} />Logout
            </button>
          </div>

          {/* ── Bottom Tab Nav ── */}
          <div style={{
            position:"fixed", bottom:0, left:0, right:0, maxWidth:480, margin:"0 auto",
            background:"#fff", borderTop:"1px solid #E5E7EB",
            display:"flex", paddingBottom:"env(safe-area-inset-bottom,0px)",
            boxShadow:"0 -4px 20px rgba(0,0,0,.07)", zIndex:150,
          }}>
            {[
              { key:"orders",   icon:"receipt", label:"Orders",   badge: pendingCount },
              { key:"products", icon:"box",     label:"Products", badge: 0 },
            ].map(t => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                flex:1, padding:"11px 0 9px", display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                color: tab===t.key ? "#166534" : "#94A3B8",
                borderTop: tab===t.key ? "2px solid #166534" : "2px solid transparent",
                position:"relative",
              }}>
                <Ic n={t.icon} size={20} />
                <span style={{fontSize:10, fontWeight:700}}>{t.label}</span>
                {t.badge > 0 && (
                  <span style={{
                    position:"absolute", top:6, right:"calc(50% - 16px)",
                    background:"#EF4444", color:"#fff", borderRadius:10,
                    fontSize:10, fontWeight:800, padding:"1px 5px", minWidth:16, textAlign:"center",
                  }}>{t.badge}</span>
                )}
              </button>
            ))}
          </div>

          {/* ══ PRODUCTS TAB ══ */}
          {tab === "products" && (
            <div style={{padding:"14px 16px"}}>
              <div style={{background:"#fff", border:"1px solid #E5E7EB", borderRadius:16, padding:16, marginBottom:14}}>
                <div style={{fontSize:14, fontWeight:800, marginBottom:12, color:"#166534"}}>
                  <Ic n={editingProduct ? "pen" : "plus"} style={{marginRight:6}} />
                  {editingProduct ? `I-edit: ${editingProduct.name}` : "Magdagdag ng Product"}
                </div>
                <input
                  placeholder="Pangalan ng produkto *"
                  value={form.name}
                  onChange={e => setForm(f => ({...f, name:e.target.value}))}
                  style={{width:"100%", marginBottom:8, padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:14}}
                />
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8}}>
                  <input
                    placeholder="Presyo (₱) *"
                    type="number"
                    value={form.price}
                    onChange={e => setForm(f => ({...f, price:e.target.value}))}
                    style={{padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:14}}
                  />
                  <input
                    placeholder="Stock"
                    type="number"
                    value={form.stock}
                    onChange={e => setForm(f => ({...f, stock:e.target.value}))}
                    style={{padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:14}}
                  />
                </div>
                <textarea
                  placeholder="Deskripsyon (optional)"
                  value={form.description}
                  onChange={e => setForm(f => ({...f, description:e.target.value}))}
                  rows={2}
                  style={{width:"100%", marginBottom:8, padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:13, resize:"vertical"}}
                />
                <input
                  placeholder="Image URL (optional)"
                  value={form.imgUrl}
                  onChange={e => setForm(f => ({...f, imgUrl:e.target.value}))}
                  style={{width:"100%", marginBottom:10, padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:13}}
                />
                <div style={{display:"grid", gridTemplateColumns: editingProduct ? "1fr 1fr" : "1fr", gap:8}}>
                  <button onClick={saveProduct} disabled={savingProduct} style={{
                    padding:"11px", borderRadius:12, background:"#166534", color:"#fff", fontWeight:800, fontSize:13,
                    opacity: savingProduct ? .6 : 1,
                  }}>
                    <Ic n={editingProduct ? "floppy-disk" : "plus"} style={{marginRight:6}} />
                    {savingProduct ? "Sine-save..." : editingProduct ? "I-save ang Pagbabago" : "Idagdag"}
                  </button>
                  {editingProduct && (
                    <button onClick={() => { setEditingProduct(null); setForm({ name:"", price:"", stock:"", description:"", imgUrl:"" }); }} style={{
                      padding:"11px", borderRadius:12, background:"#F3F4F6", color:"#374151", fontWeight:700, fontSize:13,
                    }}>
                      <Ic n="xmark" style={{marginRight:6}} />Kanselahin
                    </button>
                  )}
                </div>
              </div>

              {products.length === 0 ? (
                <div style={{textAlign:"center", padding:"40px 0"}}>
                  <Ic n="box-open" size={36} style={{display:"block", marginBottom:10, color:"#D1D5DB"}} />
                  <div style={{fontSize:14, fontWeight:700, color:"#555"}}>Wala pang products</div>
                  <div style={{fontSize:12, color:"#aaa", marginTop:4}}>Idagdag ang unang produkto mo gamit ang form sa itaas.</div>
                </div>
              ) : products.map(p => (
                <div key={p.id} style={{
                  background:"#fff", border:"1px solid #E5E7EB", borderRadius:14,
                  padding:12, marginBottom:10, display:"flex", gap:12, alignItems:"flex-start",
                  opacity: deletingId === p.id ? .5 : 1,
                }}>
                  {p.imgUrl && (
                    <img src={p.imgUrl} alt={p.name} style={{width:52, height:52, borderRadius:10, objectFit:"cover", flexShrink:0}} />
                  )}
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontWeight:800, fontSize:14}}>{p.name}</div>
                    {p.description && <div style={{fontSize:11, color:"#6B7280", marginTop:2, lineHeight:1.4}}>{p.description}</div>}
                    <div style={{fontSize:13, fontWeight:800, color:"#166534", marginTop:4}}>{fmt(p.price)}</div>
                    <div style={{fontSize:11, color: p.stock > 0 ? "#059669" : "#EF4444", fontWeight:700, marginTop:2}}>
                      {p.stock > 0 ? `Stock: ${p.stock}` : "Wala nang stock"}
                    </div>
                  </div>
                  <div style={{display:"flex", flexDirection:"column", gap:6, flexShrink:0}}>
                    <button onClick={() => startEditProduct(p)} style={{
                      padding:"6px 10px", borderRadius:8, background:"#DBEAFE", color:"#1D4ED8", fontSize:11, fontWeight:700,
                    }}><Ic n="pen" style={{marginRight:4}} />Edit</button>
                    <button onClick={() => deleteProduct(p)} disabled={deletingId === p.id} style={{
                      padding:"6px 10px", borderRadius:8, background:"#FEE2E2", color:"#B91C1C", fontSize:11, fontWeight:700,
                    }}><Ic n="trash" style={{marginRight:4}} />Burahin</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ══ ORDERS TAB ══ */}
          {tab === "orders" && (
            <div style={{padding:"14px 16px"}}>
              <div style={{display:"flex", gap:8, marginBottom:14, background:"#F1F5F9", borderRadius:12, padding:4}}>
                {[
                  { key:"active", label:`Active (${activeOrders.length})` },
                  { key:"done",   label:`Done (${doneOrders.length})` },
                ].map(f => (
                  <button key={f.key} onClick={() => setOrdersFilter(f.key)} style={{
                    flex:1, padding:"9px 8px", borderRadius:9, fontSize:12, fontWeight:800,
                    background: ordersFilter===f.key ? "#166534" : "transparent",
                    color: ordersFilter===f.key ? "#fff" : "#475569",
                    boxShadow: ordersFilter===f.key ? "0 2px 8px rgba(22,101,52,.28)" : "none",
                  }}>{f.label}</button>
                ))}
              </div>

              {shownOrders.length === 0 ? (
                <div style={{textAlign:"center", padding:"50px 0"}}>
                  <Ic n="receipt" size={36} style={{display:"block", marginBottom:10, color:"#D1D5DB"}} />
                  <div style={{fontSize:14, fontWeight:700, color:"#555"}}>Walang orders dito</div>
                </div>
              ) : shownOrders.map(o => {
                const st = ORDER_STATUS_LABELS[o.status] || ORDER_STATUS_LABELS.pending;
                const ts = o.createdAt ? new Date(o.createdAt) : new Date();
                const orderTotal = (o.items||[]).reduce((s,i) => s + Number(i.price||0)*Number(i.qty||1), 0);
                return (
                  <div key={o.id} style={{background:"#fff", border:"1px solid #E5E7EB", borderRadius:14, padding:14, marginBottom:12}}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10}}>
                      <div>
                        <div style={{fontWeight:800, fontSize:14}}>{o.customerName || "Customer"}</div>
                        {o.customerPhone && (
                          <div style={{fontSize:12, color:"#6B7280", marginTop:2}}>
                            <Ic n="phone" style={{marginRight:4}} />{o.customerPhone}
                          </div>
                        )}
                        {o.customerAddr && (
                          <div style={{fontSize:11, color:"#9CA3AF", marginTop:2}}>
                            <Ic n="location-dot" style={{marginRight:4}} />{o.customerAddr}
                          </div>
                        )}
                      </div>
                      <div style={{textAlign:"right", flexShrink:0, marginLeft:8}}>
                        <div style={{fontSize:11, padding:"3px 9px", borderRadius:16, background:st.bg, color:st.color, fontWeight:700, display:"inline-flex", alignItems:"center", gap:4}}>
                          <Ic n={st.icon} />{st.label}
                        </div>
                        <div style={{fontSize:10, color:"#9CA3AF", marginTop:4}}>
                          {ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                        </div>
                      </div>
                    </div>

                    <div style={{background:"#F8FAF8", borderRadius:10, padding:"8px 10px", marginBottom:10}}>
                      {(o.items||[]).map((item, idx) => (
                        <div key={idx} style={{display:"flex", justifyContent:"space-between", fontSize:12, marginBottom: idx < (o.items||[]).length-1 ? 4 : 0}}>
                          <span style={{color:"#374151"}}>{item.name} x{item.qty||1}</span>
                          <span style={{fontWeight:700}}>{fmt(Number(item.price||0)*Number(item.qty||1))}</span>
                        </div>
                      ))}
                      <div style={{borderTop:"1px dashed #E5E7EB", marginTop:6, paddingTop:6, display:"flex", justifyContent:"space-between", fontWeight:800, fontSize:13}}>
                        <span>Total</span>
                        <span style={{color:"#166534"}}>{fmt(o.total || orderTotal)}</span>
                      </div>
                    </div>

                    {o.status !== "delivered" && o.status !== "cancelled" && (
                      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6}}>
                        <button
                          onClick={() => setOrderStatus(o, "accepted")}
                          style={{padding:"9px 6px", borderRadius:10, background:o.status==="accepted"?"#1D4ED8":"#DBEAFE", color:o.status==="accepted"?"#fff":"#1D4ED8", fontWeight:800, fontSize:11}}
                        ><Ic n="thumbs-up" style={{marginRight:4}} />Accept</button>
                        <button
                          onClick={() => setOrderStatus(o, "preparing")}
                          style={{padding:"9px 6px", borderRadius:10, background:o.status==="preparing"?"#92400E":"#FEF3C7", color:o.status==="preparing"?"#fff":"#92400E", fontWeight:800, fontSize:11}}
                        ><Ic n="fire-burner" style={{marginRight:4}} />Preparing</button>
                        <button
                          onClick={() => setOrderStatus(o, "prepared")}
                          style={{padding:"9px 6px", borderRadius:10, background:o.status==="prepared"?"#166534":"#DCFCE7", color:o.status==="prepared"?"#fff":"#166534", fontWeight:800, fontSize:11}}
                        ><Ic n="bag-shopping" style={{marginRight:4}} />Handa Na</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
