    const BASE_DELIVERY_FEE = 49;
    const ORDER_CANCEL_WINDOW_MS = 15 * 60 * 1000;
    const KM_RATE_2_TO_10 = 6;
    const KM_RATE_BEYOND_10 = 5;

    const toRad = (deg) => (deg * Math.PI) / 180;
    const haversineKm = (lat1, lng1, lat2, lng2) => {
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    };
    const computeDeliveryFee = (distanceKm) => {
      if (!Number.isFinite(distanceKm) || distanceKm <= 2) return BASE_DELIVERY_FEE;
      if (distanceKm <= 10) return BASE_DELIVERY_FEE + Math.ceil(distanceKm - 2) * KM_RATE_2_TO_10;
      return BASE_DELIVERY_FEE + (8 * KM_RATE_2_TO_10) + Math.ceil(distanceKm - 10) * KM_RATE_BEYOND_10;
    };

    const fmt = n => "₱" + Number(n).toLocaleString("en-PH", { minimumFractionDigits:0 });
    const DEFAULT_MARKET_FACTOR = 1;
    const roundPrice = (n) => Math.max(0, Math.round(Number(n) || 0));
    const computeLivePrice = (product, marketPricing = {}) => {
      const base = Number(product?.basePrice ?? product?.price ?? 0);
      if (product?.autoPriceEnabled === false) return roundPrice(base);
      const factor = Number(marketPricing?.[product?.cat]) || DEFAULT_MARKET_FACTOR;
      return roundPrice(base * factor);
    };
    const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    async function getPushVapidKey() {
      try {
        const snap = await _fbDb.ref("settings/pushVapidKey").once("value");
        return String(snap.val() || "").trim();
      } catch (err) {
        console.error("Unable to read push vapid key:", err);
        return "";
      }
    }

    const sanitizeTokenKey = (token) => encodeURIComponent(String(token || "")).replace(/\./g, "%2E");
    const ACTIVE_USER_WINDOW_MS = 5 * 60 * 1000;

    const isStandaloneMode = () =>
      window.matchMedia("(display-mode: standalone)").matches ||
      window.navigator.standalone === true;

    async function trackUserAppUsage(user, { markInstalled = false } = {}) {
      if (!user?.uid || !_fbDb) return;
      const now = Date.now();
      const usageRef = _fbDb.ref(`app_usage/${user.uid}`);
      const updates = {
        uid: user.uid,
        email: user.email || null,
        name: user.displayName || null,
        lastActiveAt: now,
        activeWindowUntil: now + ACTIVE_USER_WINDOW_MS,
        platform: navigator.userAgent || "web",
      };
      if (markInstalled || isStandaloneMode()) {
        const installedSnap = await usageRef.child("installedAt").once("value");
        if (!installedSnap.exists()) updates.installedAt = now;
      }
      await usageRef.update(updates);
    }

    async function enablePushForUser(user, { requestPermission = true } = {}) {
      if (!user?.uid) return;
      if (!("serviceWorker" in navigator) || !("Notification" in window) || !firebase.messaging) return;
      try {
        let permission = Notification.permission;
        if (permission !== "granted" && requestPermission) {
          permission = await Notification.requestPermission();
        }
        if (permission !== "granted") return;

        const swReg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        await navigator.serviceWorker.ready;
        const messaging = firebase.messaging(_fbApp);
        const vapidKey = await getPushVapidKey();
        if (!vapidKey) return;
        const token = await messaging.getToken({ vapidKey, serviceWorkerRegistration: swReg });
        if (!token) return;

        const tokenKey = sanitizeTokenKey(token);
        await _fbDb.ref(`push_tokens/${user.uid}/${tokenKey}`).set({
          token,
          uid: user.uid,
          userEmail: user.email || null,
          userName: user.displayName || null,
          platform: navigator.userAgent || "web",
          updatedAt: Date.now(),
          enabled: true,
        });

        messaging.onMessage((payload) => {
          const title = payload?.notification?.title || "BayanGo";
          const body = payload?.notification?.body || "May bagong update ka.";

            new Notification(title, {
              body,
              icon: "https://i.imgur.com/wL8wcBB.jpeg",
              data: payload?.data || {},
            });
          }
        });
      } catch (err) {
        console.error("Push notification setup error:", err);
      }
    }

    /* ══════════════════ MAIN APP ══════════════════ */
    function App() {
      const [products,    setProducts]    = useState([]);
      const [orders,      setOrders]      = useState([]);
      const [user,        setUser]        = useState(null);
      const [loading,     setLoading]     = useState(true);
      const [isStandalone, setIsStandalone] = useState(isStandaloneMode());
      const [authMode,      setAuthMode]      = useState("options");
      const [authEmail,     setAuthEmail]     = useState("");
      const [authPassword,  setAuthPassword]  = useState("");
      const [authConfirm,   setAuthConfirm]   = useState("");
      const [authError,     setAuthError]     = useState("");
      const [authLoading,   setAuthLoading]   = useState(false);
      const [syncError,     setSyncError]     = useState(null);
      const [pushPermission, setPushPermission] = useState(typeof Notification !== "undefined" ? Notification.permission : "default");
      const [pushBusy, setPushBusy] = useState(false);
      const [pushError, setPushError] = useState("");
      const [gcashSettings, setGcashSettings] = useState({ number:"09618280589", name:"Kenneth Antonil", qrUrl:"" });

      useEffect(() => {
        const syncStandalone = () => setIsStandalone(isStandaloneMode());
        syncStandalone();
        window.addEventListener("appinstalled", syncStandalone);
        document.addEventListener("visibilitychange", syncStandalone);
        return () => {
          window.removeEventListener("appinstalled", syncStandalone);
          document.removeEventListener("visibilitychange", syncStandalone);
        };
      }, []);

      useEffect(() => {
        if (!_fbDb) return;
        _fbDb.ref("settings/gcash").once("value", snap => {
          if (snap.exists()) setGcashSettings({ number:"09618280589", name:"Kenneth Antonil", qrUrl:"", ...snap.val() });
        });
      }, []);

      useEffect(() => {
        let unsubAuth, unsubOrders, unsubProducts, unsubMarketPricing;
        let activityIntervalId = null;
        let visibilityHandler = null;
        let usingOrdersFallback = false;
        let currentMarketPricing = {};
        const timeout = setTimeout(() => setLoading(false), 8000);

        const bindProducts = () => {
          if (!_fbDb) return;
          _fbDb.ref("products").off();
          unsubProducts = _fbDb.ref("products").on("value", snap => {
            const prods = [];
            snap.forEach(child => {
              const raw = child.val() || {};
              if (raw.active === false) return;
              const normalized = { id: child.key, ...raw };
              prods.push({
                ...normalized,
                basePrice: Number.isFinite(Number(raw.basePrice)) ? Number(raw.basePrice) : Number(raw.price || 0),
                autoPriceEnabled: raw.autoPriceEnabled !== false,
                price: computeLivePrice(normalized, currentMarketPricing),
              });
            });
            setProducts(prods);
          }, err => {
            console.error("Products listener error:", err.code);
          });
        };

        const bindMarketPricing = () => {
          if (!_fbDb) return;
          _fbDb.ref("settings/marketPricing").off();
          unsubMarketPricing = _fbDb.ref("settings/marketPricing").on("value", snap => {
            const raw = snap.val() || {};
            const next = {};
            CATEGORIES.forEach(c => {
              const val = Number(raw?.[c.id]);
              next[c.id] = Number.isFinite(val) && val > 0 ? val : DEFAULT_MARKET_FACTOR;
            });
            currentMarketPricing = next;
            bindProducts();
          });
        };

        try {
          bindMarketPricing();
          bindProducts();
          _fbAuth.getRedirectResult().catch(err => console.error("Redirect result error:", err));
          unsubAuth = _fbAuth.onAuthStateChanged(currentUser => {
            clearTimeout(timeout);
            setUser(currentUser);
            setLoading(false);

            // Rebind products after auth changes (important when products read requires auth)
            bindProducts();

            // Clean up previous order listener
            if (unsubOrders) {
              _fbDb.ref("orders").off();
              unsubOrders = null;
            }
            if (activityIntervalId) {
              clearInterval(activityIntervalId);
              activityIntervalId = null;
            }
            if (visibilityHandler) {
              document.removeEventListener("visibilitychange", visibilityHandler);
              visibilityHandler = null;
            }
            usingOrdersFallback = false;

            if (currentUser && _fbDb) {
              setPushPermission(typeof Notification !== "undefined" ? Notification.permission : "default");
              enablePushForUser(currentUser, { requestPermission: false });
              trackUserAppUsage(currentUser).catch(err => console.error("Usage tracking error:", err));

              visibilityHandler = () => {
                if (document.visibilityState === "visible") {
                  trackUserAppUsage(currentUser).catch(err => console.error("Usage visibility sync error:", err));
                }
              };
              document.addEventListener("visibilitychange", visibilityHandler);
              // Listen for this user's orders in RTDB
              const mapAndSort = (snap) => {
                const list = [];
                snap.forEach(child => {
                  const order = { id: child.key, ...child.val() };
                  const ownerUid = order?.uid || order?.userId || null;
                  if (usingOrdersFallback) {
                    if (ownerUid === currentUser.uid) list.push(order);
                  } else {
                    list.push(order);
                  }
                });
                setOrders(list.sort((a,b) => (b?.createdAt || 0) - (a?.createdAt || 0))); // newest first
              };

              const ordersQueryRef = _fbDb.ref("orders").orderByChild("uid").equalTo(currentUser.uid);
              const ordersPlainRef = _fbDb.ref("orders");

              unsubOrders = ordersQueryRef.on("value", mapAndSort, err => {
                console.error("Orders listener error:", err.code);
                if (usingOrdersFallback) return;
                usingOrdersFallback = true;
                _fbDb.ref("orders").off();
                unsubOrders = ordersPlainRef.on("value", mapAndSort, fullErr => {
                  console.error("Orders fallback listener error:", fullErr.code);
                });
              });

              activityIntervalId = setInterval(() => {
                if (document.visibilityState === "visible") {
                  trackUserAppUsage(currentUser).catch(err => console.error("Usage interval sync error:", err));
                }
              }, 60 * 1000);
            } else {
              setOrders([]);
              setPushError("");
              setPushBusy(false);
            }
          });
        } catch (err) {
          console.error("Firebase error:", err);
          clearTimeout(timeout);
          setLoading(false);
        }

        return () => {
          unsubAuth?.();
          if (_fbDb) {
            _fbDb.ref("orders").off();
            _fbDb.ref("products").off();
            _fbDb.ref("settings/marketPricing").off();
          }
          if (activityIntervalId) clearInterval(activityIntervalId);
          if (visibilityHandler) document.removeEventListener("visibilitychange", visibilityHandler);
          if (unsubMarketPricing && typeof unsubMarketPricing.off === "function") unsubMarketPricing.off();
        };
      }, []);

      const addOrder = useCallback(async (order) => {
        setSyncError(null);
        try {
          if (!_fbDb) throw new Error("RTDB not initialized");
          const uid = _fbAuth.currentUser?.uid || null;
          await _fbDb.ref("orders").push({
            ...order,
            uid,
            userId: uid,
            userEmail: _fbAuth.currentUser?.email || null,
            status: order?.status || "pending",
            createdAt: order?.createdAt || Date.now(),
          });
        } catch (err) {
          console.error("RTDB write failed:", err.code, err.message);
          setSyncError(err.code || err.message || "sync-failed");
        }
      }, []);

      const getFriendlyError = (code) => {
        const map = {
          'auth/user-not-found':     'Walang account na may email na ito.',
          'auth/wrong-password':     'Mali ang password.',
          'auth/invalid-credential': 'Mali ang email o password.',
          'auth/email-already-in-use': 'Ginagamit na ang email na ito.',
          'auth/weak-password':      'Masyadong mahina ang password (min. 6 characters).',
          'auth/invalid-email':      'Hindi valid ang email address.',
          'auth/too-many-requests':  'Napakaraming pagtatangka. Subukan ulit mamaya.',
          'auth/popup-blocked':      'Nablock ang popup. Subukan ulit.',
        };
        return map[code] || 'May error. Subukan ulit.';
      };

      const handleGoogleLogin = async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await _fbAuth.signInWithPopup(provider);
        } catch (error) {
          if (
            error.code === 'auth/popup-blocked' ||
            error.code === 'auth/popup-closed-by-user' ||
            error.code === 'auth/cancelled-popup-request'
          ) {
            try {
              const provider = new firebase.auth.GoogleAuthProvider();
              await _fbAuth.signInWithRedirect(provider);
            } catch (err2) {
              alert("Error sa pag-login: " + err2.message);
            }
          } else {
            alert("Error sa pag-login: " + error.message);
          }
        }
      };

      const handleEmailSignIn = async () => {
        setAuthError("");
        setAuthLoading(true);
        try {
          await _fbAuth.signInWithEmailAndPassword(authEmail, authPassword);
        } catch (error) {
          setAuthError(getFriendlyError(error.code));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleEmailSignUp = async () => {
        setAuthError("");
        if (authPassword !== authConfirm) {
          setAuthError("Hindi magkaparehong password.");
          return;
        }
        setAuthLoading(true);
        try {
          await _fbAuth.createUserWithEmailAndPassword(authEmail, authPassword);
        } catch (error) {
          setAuthError(getFriendlyError(error.code));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = async () => {
        await _fbAuth.signOut();
      };

      const handleEnablePush = async () => {
        if (!user) return;
        setPushBusy(true);
        setPushError("");
        try {
          await enablePushForUser(user, { requestPermission: true });
          setPushPermission(typeof Notification !== "undefined" ? Notification.permission : "default");
          if (typeof Notification !== "undefined" && Notification.permission !== "granted") {
            setPushError("Hindi na-allow ang notifications. I-check ang browser/site settings.");
          }

          setPushError(err?.message || "Hindi ma-enable ang push notifications.");
        } finally {
          setPushBusy(false);
        }
      };

      if (loading) return <SplashScreen message="Ina-activate ang iyong app..." />;

      if (!isStandalone) {
        return <InstallGate />;

      if (!user) {

                <button onClick={handleGoogleLogin} style={{

                  fontSize:15, fontWeight:700, color:"#333", display:"flex", alignItems:"center", justifyContent:"center", gap:12,
                  boxShadow:"0 4px 12px rgba(0,0,0,0.05)",
                }}>
                  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style={{width:22, height:22}} />

                <button onClick={() => { setAuthMode("email-signin"); setAuthError(""); }} style={{

                  boxShadow:"0 4px 16px rgba(22,101,52,0.3)",

                  <Ic n="envelope" style={{marginRight:8}} />Sign in with Email

                <div style={{ textAlign:"center", fontSize:13, color:"#888", marginTop:4 }}>

              </div>

            {(authMode === "email-signin" || authMode === "email-signup") && (
              <div className="fade-up" style={{ width:"100%", maxWidth:360, display:"flex", flexDirection:"column", gap:12 }}>

    /* ══════════════════ BATCH HELPERS ══════════════════ */
    function getDeliveryBatch() {
      const now = new Date();
      const phNow = new Date(now.getTime() + 8 * 60 * 60 * 1000); // UTC+8
      const h = phNow.getUTCHours(), m = phNow.getUTCMinutes(), s = phNow.getUTCSeconds();
      const totalSecs = h * 3600 + m * 60 + s;
      const pad = n => String(n).padStart(2, "0");
      const fmtDate = d => `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
      const todayStr    = fmtDate(phNow);
      const tomorrowStr = fmtDate(new Date(phNow.getTime() + 24 * 60 * 60 * 1000));
      const AM_CUTOFF = 10 * 3600;  // 10:00 AM
      const PM_CUTOFF = 15 * 3600;  // 3:00 PM
      if (totalSecs < AM_CUTOFF) {
        return { batch:"AM", date:todayStr, cutoffLabel:"10:00 AM", deliveryLabel:"11:00 AM", timeLabel:"11:00 AM Ngayon", secsToDeadline: AM_CUTOFF - totalSecs };
      } else if (totalSecs < PM_CUTOFF) {
        return { batch:"PM", date:todayStr, cutoffLabel:"3:00 PM",  deliveryLabel:"4:00 PM",  timeLabel:"4:00 PM Ngayon",  secsToDeadline: PM_CUTOFF - totalSecs };
      } else {
        return { batch:"AM", date:tomorrowStr, cutoffLabel:"10:00 AM", deliveryLabel:"11:00 AM", timeLabel:"11:00 AM Bukas", secsToDeadline: (24 * 3600 - totalSecs) + AM_CUTOFF };
      }
    }

    function BatchTimerBanner() {
      const [info, setInfo] = React.useState(getDeliveryBatch);
      React.useEffect(() => {
        const t = setInterval(() => setInfo(getDeliveryBatch()), 1000);
        return () => clearInterval(t);
      }, []);
      const { batch, cutoffLabel, deliveryLabel, secsToDeadline } = info;
      const hh  = Math.floor(secsToDeadline / 3600);
      const mm  = Math.floor((secsToDeadline % 3600) / 60);
      const ss  = secsToDeadline % 60;
      const pad = n => String(n).padStart(2, "0");
      const isAM     = batch === "AM";
      const isUrgent = secsToDeadline < 30 * 60; // last 30 mins
      const accent   = isAM ? "#1D4ED8" : "#D97706";
      const bgColor  = isUrgent ? "#FEF2F2" : (isAM ? "#EFF6FF" : "#FFFBEB");
      const bdColor  = isUrgent ? "#FCA5A5" : (isAM ? "#BFDBFE" : "#FDE68A");
      return (
        <div style={{ margin:"12px 20px 0", borderRadius:16, background:bgColor, border:`1.5px solid ${bdColor}`, padding:"12px 16px", display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:44, height:44, borderRadius:12, flexShrink:0, background: isUrgent ? "#EF4444" : accent, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", color:"#fff" }}>
            <Ic n={isUrgent ? "fire" : (isAM ? "sun" : "cloud-sun")} size={18} />
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:11, fontWeight:700, color: isUrgent ? "#B91C1C" : accent, textTransform:"uppercase", letterSpacing:".06em", marginBottom:2 }}>
              {isUrgent ? "⚠ Malapit nang mag-cut-off!" : `${batch} Batch — Order ngayon`}
            </div>
            <div style={{ fontSize:13, color:"#374151", fontWeight:600, lineHeight:1.4 }}>
              Delivery: <strong>{deliveryLabel}</strong> &nbsp;·&nbsp; Cut-off: <strong style={{color: isUrgent ? "#EF4444" : accent}}>{cutoffLabel}</strong>
            </div>
          </div>
          <div style={{ textAlign:"center", flexShrink:0 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#9CA3AF", marginBottom:1 }}>NATITIRANG ORAS</div>
            <div style={{
              fontSize: hh > 0 ? 17 : 20, fontWeight:800, letterSpacing:".04em",
              color: isUrgent ? "#EF4444" : accent,
              fontVariantNumeric:"tabular-nums",
            }}>
              {hh > 0 ? `${pad(hh)}:${pad(mm)}:${pad(ss)}` : `${pad(mm)}:${pad(ss)}`}
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ USER APP ══════════════════ */
    function UserApp({ products, orders, onOrder, user, onLogout, gcashSettings }) {
      const [activeCat,      setActiveCat]      = useState("isda");
      const [cart,           setCart]           = useState({});
      const [showCart,       setShowCart]       = useState(false);
      const [showCheckout,   setShowCheckout]   = useState(false);
      const [showTracker,    setShowTracker]    = useState(null);
      const [showRiderMap,   setShowRiderMap]   = useState(null);
      const [proofPreviewUrl,setProofPreviewUrl]= useState("");
      const [name,           setName]           = useState("");
      const [phone,          setPhone]          = useState("");
      const [addr,           setAddr]           = useState("");
      const [customerLat,    setCustomerLat]    = useState(null);
      const [customerLng,    setCustomerLng]    = useState(null);

      // Load profile from RTDB when user logs in
      useEffect(() => {
        if (!user?.uid || !_fbDb) return;
        _fbDb.ref("users/" + user.uid + "/profile").once("value").then(snap => {
          const p = snap.val() || {};
          if (p.name)  setName(p.name);
          if (p.phone) setPhone(p.phone);
          if (p.addr)  setAddr(p.addr);
          if (p.lat)   setCustomerLat(p.lat);
          if (p.lng)   setCustomerLng(p.lng);
        }).catch(err => console.error("Profile load error:", err.code));
      }, [user?.uid]);
      const [searchQ,        setSearchQ]        = useState("");
      const [orderPlaced,    setOrderPlaced]    = useState(false);
      const getInitialPage = () => {
        try {
          const url = new URL(window.location.href);
          const section = (url.searchParams.get("section") || "").toLowerCase();
          const hash = (url.hash || "").replace("#", "").toLowerCase();
          if (section === "rider-tracker" || section === "orders" || hash === "rider-tracker" || hash === "orders") {
            return "orders";
          }
        } catch {}
        return "shop";
      };
      const [activePage,     setActivePage]     = useState(getInitialPage);
      const [customItems,    setCustomItems]    = useState([]);
      const [showCustomList, setShowCustomList] = useState(false);
      const [newItemName,    setNewItemName]    = useState("");
      const [newItemQty,     setNewItemQty]     = useState("");
      const [newItemPrice,   setNewItemPrice]   = useState("");
      const [showLocPicker,  setShowLocPicker]  = useState(false);
      const [vouchers,       setVouchers]       = useState([]);
      const [voucherCode,    setVoucherCode]    = useState("");
      const [appliedVoucher, setAppliedVoucher] = useState(null);
      const [voucherMsg,     setVoucherMsg]     = useState("");
      const [showVoucherList,setShowVoucherList]= useState(false);
      const [locationType,   setLocationType]  = useState("Mainland");
      const [cartWeightUnit, setCartWeightUnit] = useState({});

      const cartCount = Object.values(cart).reduce((s,v) => s+v, 0);
      const cartItems = Object.entries(cart)
        .filter(([,q]) => q > 0)
        .map(([id,qty]) => {
          const prod = products.find(p => p.id === id || p.id === +id);
          const weightUnit = prod?.unit === "kg" ? (cartWeightUnit[id] || 1) : 1;
          return { ...prod, qty, weightUnit };
        })
        .filter(i => i.name);

      const myOrders         = orders;
      const customEstTotal   = customItems.reduce((s,i) => s + (i.estPrice || 0), 0);
      const subtotal         = cartItems.reduce((s,i) => s + i.price * i.weightUnit * i.qty, 0);
      const itemsTotal       = subtotal + customEstTotal;
      const hasPinnedLocation = customerLat !== null && customerLng !== null &&
        Number.isFinite(Number(customerLat)) && Number.isFinite(Number(customerLng));
      const distanceKm = hasPinnedLocation
        ? haversineKm(
            BINANGONAN_PUBLIC_MARKET.lat,
            BINANGONAN_PUBLIC_MARKET.lng,
            Number(customerLat),
            Number(customerLng)
          )
        : null;
      const deliveryFee      = computeDeliveryFee(distanceKm);
      const deliveryMetaLabel = hasPinnedLocation
        ? `${distanceKm.toFixed(2)} km from ${BINANGONAN_PUBLIC_MARKET.label}`
        : `Base fee only (${fmt(BASE_DELIVERY_FEE)}) until location is pinned`;
      const serviceFee       = Math.round(itemsTotal * 0.02);
      const smallOrderFee    = itemsTotal < 100 ? Math.round(itemsTotal * 0.05) : 0;
      const isFirstTimeUser  = myOrders.length === 0;
      const freeShipDiscount = isFirstTimeUser ? deliveryFee : 0;

      const computeVoucherDiscount = useCallback((voucher) => {
        if (!voucher || voucher.active === false) return 0;
        if (voucher.minOrder > 0 && itemsTotal < voucher.minOrder) return 0;
        if (voucher.expiresAt && Date.now() > voucher.expiresAt) return 0;
        if (voucher.type === "percent") return Math.round(itemsTotal * ((voucher.value || 0) / 100));
        if (voucher.type === "free_shipping") return deliveryFee;
        return Math.max(0, Number(voucher.value || 0));
      }, [deliveryFee, itemsTotal]);
      const getVoucherAvailability = useCallback((voucher) => {
        if (!voucher || voucher.active === false) return { canUse:false, reason:"Inactive" };
        if (voucher.expiresAt && Date.now() > voucher.expiresAt) return { canUse:false, reason:"Expired" };
        if (voucher.minOrder > 0 && itemsTotal < voucher.minOrder) {
          return { canUse:false, reason:`Need ${fmt(voucher.minOrder)} minimum order` };
        }
        const discount = computeVoucherDiscount(voucher);
        if (discount <= 0) return { canUse:false, reason:"Not applicable sa cart mo" };
        return { canUse:true, reason:`Pwede gamitin ngayon • save ${fmt(discount)}` };
      }, [computeVoucherDiscount, fmt, itemsTotal]);
      const describeVoucher = (voucher) => {
        if (!voucher) return "";
        if (voucher.type === "percent") return `${voucher.value || 0}% off`;
        if (voucher.type === "free_shipping") return "Free shipping";
        return `${fmt(voucher.value || 0)} off`;
      };

      const voucherDiscount = Math.min(computeVoucherDiscount(appliedVoucher), itemsTotal + deliveryFee);
      const totalDiscount   = freeShipDiscount + voucherDiscount;
      const total            = Math.max(0, itemsTotal + deliveryFee + serviceFee + smallOrderFee - totalDiscount);
      const totalItemCount = cartCount + customItems.length;

      const add = id => setCart(c => ({ ...c, [id]:(c[id]||0)+1 }));
      const rem = id => setCart(c => {
        const n = { ...c };
        if (n[id] > 1) n[id]--; else delete n[id];
        return n;
      });

      const addCustom = () => {
        if (!newItemName.trim()) return;
        setCustomItems(prev => [...prev, {
          id: "cust_" + genId(),
          name: newItemName.trim(),
          qty: 1,
          unit: newItemQty.trim() || "pc",
          estPrice: parseFloat(newItemPrice) || 0,
          isCustom: true,
          img: null,
        }]);
        setNewItemName(""); setNewItemQty(""); setNewItemPrice("");
      };
      const removeCustom = id => setCustomItems(prev => prev.filter(i => i.id !== id));

      const filtered = products.filter(p =>
        p.cat === activeCat && (searchQ === "" || p.name.toLowerCase().includes(searchQ.toLowerCase()))
      );

      useEffect(() => {
        if (!_fbDb) return;
        const ref = _fbDb.ref("vouchers");
        const onSnap = snap => {
          const list = [];
          snap.forEach(c => {
            const v = c.val() || {};
            list.push({
              id: c.key,
              code: String(v.code || "").toUpperCase(),
              type: v.type || "fixed",
              value: Number(v.value || 0),
              minOrder: Number(v.minOrder || 0),
              active: v.active !== false,
              expiresAt: Number(v.expiresAt || 0),
            });
          });
          setVouchers(list);
        };
        ref.on("value", onSnap, err => console.error("Vouchers load error:", err.code));
        return () => ref.off("value", onSnap);
      }, []);

      useEffect(() => {
        if (!appliedVoucher) return;
        const latest = vouchers.find(v => v.id === appliedVoucher.id);
        if (!latest || computeVoucherDiscount(latest) <= 0) {
          setAppliedVoucher(null);
          setVoucherMsg("Tinanggal ang voucher dahil hindi na valid.");
          return;
        }
        setAppliedVoucher(latest);
      }, [appliedVoucher, vouchers, computeVoucherDiscount]);

      const applyVoucher = () => {
        const code = voucherCode.trim().toUpperCase();
        if (!code) {
          setVoucherMsg("Ilagay muna ang voucher code.");
          return;
        }
        const found = vouchers.find(v => v.code === code);
        if (!found || found.active === false) {
          setVoucherMsg("Invalid o inactive ang voucher code.");
          setAppliedVoucher(null);
          return;
        }
        if (found.expiresAt && Date.now() > found.expiresAt) {
          setVoucherMsg("Expired na ang voucher na ito.");
          setAppliedVoucher(null);
          return;
        }
        if (found.minOrder > 0 && itemsTotal < found.minOrder) {
          setVoucherMsg(`Kulang pa ang order para ma-apply ito. Minimum: ${fmt(found.minOrder)}.`);
          setAppliedVoucher(null);
          return;
        }
        const discount = computeVoucherDiscount(found);
        if (discount <= 0) {
          setVoucherMsg("Hindi applicable ang voucher sa current cart.");
          setAppliedVoucher(null);
          return;
        }
        setAppliedVoucher(found);
        setVoucherMsg(`Voucher applied: ${found.code}`);
      };

      const placeOrder = () => {
        if (!name || !phone || !addr) return;
        const allItems = [
          ...cartItems.map(i => ({
            ...i,
            // For kg products, store the effective total kg ordered and adjusted price
            qty: i.unit === "kg" ? i.qty : i.qty,
            weightUnit: i.unit === "kg" ? i.weightUnit : undefined,
            totalKg: i.unit === "kg" ? +(i.qty * i.weightUnit).toFixed(2) : undefined,
            price: i.unit === "kg" ? i.price : i.price,
          })),
          ...customItems.map(i => ({ ...i, price: i.estPrice })),
        ];
        const batchInfo = getDeliveryBatch();
        onOrder({
          items: allItems,
          subtotal, customEstimate: customEstTotal, deliveryFee,
          serviceFee, smallOrderFee,
          firstTimeFreeShipping: isFirstTimeUser,
          freeShipDiscount,
          voucher: appliedVoucher ? {
            id: appliedVoucher.id,
            code: appliedVoucher.code,
            type: appliedVoucher.type,
            value: appliedVoucher.value,
            minOrder: appliedVoucher.minOrder || 0,
            discount: voucherDiscount,
          } : null,
          totalDiscount,
          total,
          zone: deliveryMetaLabel,
          customer: { name, phone, address: addr, lat: customerLat, lng: customerLng },
          status: "pending",
          hasCustomItems: customItems.length > 0,
          deliveryBatch: batchInfo.batch,
          deliveryDate:  batchInfo.date,
          locationType,
        });
        setCart({});
        setCartWeightUnit({});
        setCustomItems([]);
        setVoucherCode("");
        setAppliedVoucher(null);
        setVoucherMsg("");
        setShowCheckout(false);
        setShowCart(false);
        setOrderPlaced(true);
        setTimeout(() => setOrderPlaced(false), 3500);
      };

      const isOrderClosed = (order) => order?.status === "delivered" || order?.status === "cancelled";
      const getOrderCreatedAtMs = (order) => {
        const rawTs = order?.createdAt;
        if (!rawTs) return 0;
        if (typeof rawTs?.toDate === "function") return rawTs.toDate().getTime();
        const ts = Number(rawTs);
        return Number.isFinite(ts) ? ts : 0;
      };
      const canCancelOrder = (order) => {
        if (!order || order.status !== "pending" || order.riderId) return false;
        const createdAtMs = getOrderCreatedAtMs(order);
        if (!createdAtMs) return false;
        return (Date.now() - createdAtMs) >= ORDER_CANCEL_WINDOW_MS;
      };
      const getCancelCountdownText = (order) => {
        if (!order || order.status !== "pending" || order.riderId) return "";
        const createdAtMs = getOrderCreatedAtMs(order);
        if (!createdAtMs) return "";
        const remainingMs = ORDER_CANCEL_WINDOW_MS - (Date.now() - createdAtMs);
        if (remainingMs <= 0) return "Pwede mo nang i-cancel ang order na ito.";
        const mins = Math.ceil(remainingMs / 60000);
        return `Pwede mo i-cancel kapag lampas 15 minuto (${mins} min pa).`;
      };
      const handleCancelOrder = async (order) => {
        if (!order?.id || !_fbDb) return;
        if (!canCancelOrder(order)) {
          alert("Hindi pa puwedeng i-cancel. Hintayin muna ang 15 minutes na walang rider.");
          return;
        }
        const sure = window.confirm("Sigurado ka bang gusto mong i-cancel ang order na ito?");
        if (!sure) return;
        try {
          await _fbDb.ref(`orders/${order.id}`).update({
            status: "cancelled",
            cancelledBy: user?.uid || null,
            cancelledAt: Date.now(),
            updatedAt: Date.now(),
          });
        } catch (err) {
          alert("Hindi ma-cancel ang order: " + (err.message || err.code || "Unknown error"));
        }
      };

      const activeOrders = myOrders.filter(o => !isOrderClosed(o));

      useEffect(() => {
        let url;
        try {
          url = new URL(window.location.href);
        } catch {
          return;
        }
        const section = (url.searchParams.get("section") || "").toLowerCase();
        const hash = (url.hash || "").replace("#", "").toLowerCase();
        const wantsRiderTracker = section === "rider-tracker" || hash === "rider-tracker";
        if (!wantsRiderTracker || showRiderMap || showTracker) return;

        const latestTrackable = myOrders.find(o => o.status === "buying" || o.status === "otw");
        const latestActive = myOrders.find(o => o.status !== "delivered");
        const targetOrder = latestTrackable || latestActive;

        setActivePage("orders");
        if (targetOrder) {
          if (targetOrder.status === "buying" || targetOrder.status === "otw") {
            setShowRiderMap(targetOrder);
          } else {
            setShowTracker(targetOrder);
          }
        }
      }, [myOrders, showRiderMap, showTracker]);

      return (
        <div style={{ maxWidth:480, margin:"0 auto", paddingBottom:80, background:"#F8FAF8", minHeight:"100vh", paddingTop:"calc(60px + env(safe-area-inset-top,0px))" }}>

          {/* ── Slim Header ── */}
          <div style={{
            position:"fixed", top:0, left:0, right:0, zIndex:200,
            maxWidth:480, margin:"0 auto",
            background:"linear-gradient(180deg, #166534 0%, #14532D 100%)",
            borderBottom:"1px solid rgba(255,255,255,.14)",
            paddingTop:"env(safe-area-inset-top,0px)",
            paddingLeft:16, paddingRight:16,
            display:"flex", alignItems:"center", justifyContent:"space-between",
            height:"calc(60px + env(safe-area-inset-top,0px))",
            boxShadow:"0 4px 14px rgba(22,101,52,.28)",
          }}>
            <img src="https://i.imgur.com/tMk73Mg.png" style={{ height:40, objectFit:"contain" }} />
            <button onClick={() => setActivePage("account")} style={{
              width:38, height:38, borderRadius:"50%", overflow:"hidden",
              border: activePage==="account" ? "2.5px solid #166534" : "2.5px solid #E5E7EB",
              padding:0, flexShrink:0, background:"#F0FDF4",
              display:"flex", alignItems:"center", justifyContent:"center",
            }}>
              {user?.photoURL
                ? <img src={user.photoURL} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                : <span style={{ fontSize:15, fontWeight:800, color:"#166534" }}>
                    {(name||user?.displayName||"U").charAt(0).toUpperCase()}
                  </span>
              }
            </button>
          </div>

          {/* ── SHOP PAGE ── */}
          {activePage === "shop" && <>



          {/* ── Search ── */}
          <div style={{ padding:"16px 20px 0" }}>
            <div style={{ background:"#fff", borderRadius:16, padding:"12px 16px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 1px 4px rgba(0,0,0,.07)", border:"1px solid #E9ECEF" }}>
              <Ic n="magnifying-glass" size={17} style={{ opacity:.35 }} />
              <input placeholder="Maghanap ng produkto..." value={searchQ}
                onChange={e => setSearchQ(e.target.value)}
                style={{ flex:1, border:"none", outline:"none", fontSize:15, fontWeight:500, background:"transparent", color:"#111" }} />
              {searchQ && <button onClick={() => setSearchQ("")} style={{ opacity:.4, fontSize:16 }}><Ic n="xmark" /></button>}
            </div>
          </div>

          {/* ── Batch Timer ── */}
          <BatchTimerBanner />

          {/* ── Categories ── */}
          <div style={{ display:"flex", gap:8, padding:"14px 20px", overflowX:"auto", scrollbarWidth:"none" }}>
            {CATEGORIES.map(cat => (
              <button key={cat.id} onClick={() => setActiveCat(cat.id)} style={{
                padding:"10px 18px", borderRadius:30, whiteSpace:"nowrap",
                fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:6,
                background: activeCat===cat.id ? cat.color : "#fff",
                color: activeCat===cat.id ? "#fff" : "#555",
                boxShadow: activeCat===cat.id ? `0 4px 14px ${cat.color}40` : "0 1px 3px rgba(0,0,0,.06)",
                border: activeCat===cat.id ? "none" : "1px solid #E5E7EB",
                transition:"all .22s ease",
                transform: activeCat===cat.id ? "scale(1.04)" : "scale(1)"
              }}>
                <Ic n={cat.icon} size={14} />{cat.label}
              </button>
            ))}
          </div>

          {/* ── Custom List Entry ── */}
          <div style={{ padding:"0 20px 14px" }}>
            <button onClick={() => setShowCustomList(true)} style={{
              width:"100%", background:"#F0FDF4", border:"2px dashed #86EFAC", borderRadius:16,
              padding:"13px 16px", display:"flex", alignItems:"center", gap:12,
            }}>
              <Ic n="list-check" size={26} style={{ color:"#22C55E" }} />
              <div style={{ flex:1, textAlign:"left" }}>
                <div style={{ fontSize:14, fontWeight:700, color:"#166534" }}>Custom List</div>
                <div style={{ fontSize:12, color:"#6B7280" }}>
                  {customItems.length === 0
                    ? "Dagdag ng items na hindi nasa listahan"
                    : `${customItems.length} custom item${customItems.length>1?"s":""} • ~${fmt(customEstTotal)}`}
                </div>
              </div>
              <span style={{ fontSize:18, color:"#22C55E", fontWeight:800 }}>
                {customItems.length > 0 && (
                  <span style={{ background:"#22C55E", color:"#fff", borderRadius:20, fontSize:11, fontWeight:800, padding:"2px 8px", marginRight:6 }}>{customItems.length}</span>
                )}
                ›
              </span>
            </button>
          </div>

          {/* ── Section Label ── */}
          <div style={{ padding:"0 20px 10px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, color:"#111", display:"flex", alignItems:"center", gap:6 }}>
              <Ic n={CATEGORIES.find(c=>c.id===activeCat)?.icon} style={{color:CATEGORIES.find(c=>c.id===activeCat)?.color}} />
              {CATEGORIES.find(c=>c.id===activeCat)?.label}
            </h2>
            <span style={{ fontSize:12, color:"#999", fontWeight:500 }}>{filtered.length} items</span>
          </div>

          <div style={{ padding:"0 20px 12px" }}>
            <div style={{ background:"#FFFBEB", border:"1px solid #FDE68A", borderRadius:12, padding:"10px 12px", color:"#92400E", fontSize:12, fontWeight:600, display:"flex", alignItems:"flex-start", gap:8 }}>
              <Ic n="triangle-exclamation" style={{ marginTop:1 }} />
              <span>Paalala: Ang mga prices na naka-post ay maaaring magbago depende sa presyo sa palengke.</span>
            </div>
          </div>

          {/* ── Products Grid ── */}
          <div style={{ padding:`0 20px ${totalItemCount > 0 && !showCart ? "138px" : "16px"}` }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {filtered.map((p, i) => (
                <div key={p.id} className="fade-up" style={{
                  animationDelay:`${i*.05}s`,
                  background:"#fff", borderRadius:18, overflow:"hidden",
                  border:"1px solid #F0F0F0", boxShadow:"0 2px 8px rgba(0,0,0,.04)",
                  opacity:p.stock?1:.5, position:"relative"
                }}>
                  {!p.stock && (
                    <div style={{
                      position:"absolute", top:10, right:10, background:"#EF4444",
                      color:"#fff", fontSize:9, fontWeight:800, padding:"3px 8px",
                      borderRadius:6, zIndex:2, letterSpacing:".04em"
                    }}>SOLD OUT</div>
                  )}
                  <div style={{
                    height:96, overflow:"hidden",
                    background:`linear-gradient(135deg,${CATEGORIES.find(c=>c.id===p.cat)?.color}12,${CATEGORIES.find(c=>c.id===p.cat)?.color}06)`,
                    display:"flex", alignItems:"center", justifyContent:"center"
                  }}>
                    {p.img && p.img.startsWith("http")
                      ? <img src={p.img} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}} />
                      : null}
                    <div style={{display:p.img&&p.img.startsWith("http")?"none":"flex",alignItems:"center",justifyContent:"center",width:"100%",height:"100%"}}>
                      <Ic n={CATEGORIES.find(c=>c.id===p.cat)?.icon} size={40} style={{color:CATEGORIES.find(c=>c.id===p.cat)?.color,opacity:.5}} />
                    </div>
                  </div>
                  <div style={{ padding:"11px 14px 14px" }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#111", marginBottom:2, lineHeight:1.25 }}>{p.name}</div>
                    <div style={{ fontSize:11, color:"#aaa", marginBottom:8 }}>per {p.unit}</div>
                    {p.unit === "kg" && (
                      <div style={{ display:"flex", gap:4, marginBottom:10 }}>
                        {[{w:0.25,l:"¼kg"},{w:0.5,l:"½kg"},{w:1,l:"1kg"}].map(({w,l}) => {
                          const sel = (cartWeightUnit[p.id] || 1) === w;
                          return (
                            <button key={w} onClick={() => setCartWeightUnit(u => ({...u,[p.id]:w}))} style={{
                              flex:1, padding:"5px 0", borderRadius:8, fontSize:11, fontWeight:800,
                              background: sel ? "#166534" : "#F3F4F6",
                              color: sel ? "#fff" : "#6B7280",
                              border: sel ? "none" : "1px solid #E5E7EB",
                              transition:"all .15s",
                            }}>{l}</button>
                          );
                        })}
                      </div>
                    )}
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <div>
                        <span style={{ fontSize:17, fontWeight:800, color:"#166534" }}>
                          {p.unit === "kg" ? fmt(p.price * (cartWeightUnit[p.id] || 1)) : fmt(p.price)}
                        </span>
                        {p.unit === "kg" && (
                          <span style={{ fontSize:10, color:"#9CA3AF", marginLeft:3 }}>
                            / {cartWeightUnit[p.id] === 0.25 ? "¼kg" : cartWeightUnit[p.id] === 0.5 ? "½kg" : "1kg"}
                          </span>
                        )}
                      </div>
                      {p.stock && (
                        cart[p.id] ? (
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <button onClick={() => rem(p.id)} style={{ width:28, height:28, borderRadius:8, background:"#F3F4F6", fontSize:16, fontWeight:700, color:"#555", display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                            <span style={{ fontSize:14, fontWeight:800, minWidth:16, textAlign:"center" }}>{cart[p.id]}</span>

                  const hh = Math.floor(secs / 3600);
                  const mm = Math.floor((secs % 3600) / 60);
                  const ss = secs % 60;
                  const pad2 = n => String(n).padStart(2, "0");
                  const isUrgent = secs < 30 * 60;
                  const accent = isUrgent ? "#EF4444" : (isAM ? "#1E40AF" : "#92400E");
                  const bg     = isUrgent ? "#FEF2F2"  : (isAM ? "#EFF6FF"  : "#FFFBEB");

                  return (
                    <div style={{ borderRadius:12, padding:"12px 14px", marginBottom:14, background:bg, border:`1.5px solid ${bd}`, display:"flex", gap:10, alignItems:"center" }}>

    /* ══════════════════ ACCOUNT PAGE ══════════════════ */
    function AccountPage({ user, orders, name, phone, addr, setName, setPhone, setAddr, onLogout, customerLat, customerLng }) {
      const [editMode,      setEditMode]      = useState(false);
      const [localName,     setLocalName]     = useState(name);
      const [localPhone,    setLocalPhone]    = useState(phone);
      const [localAddr,     setLocalAddr]     = useState(addr);
      const [activeSection, setActiveSection] = useState("info");

      // Support
      const [myTickets,     setMyTickets]     = useState([]);
      const [openTicket,    setOpenTicket]    = useState(null);
      const [threadMsgs,    setThreadMsgs]    = useState([]);
      const [ticketSubject, setTicketSubject] = useState("");
      const [ticketMsg,     setTicketMsg]     = useState("");
      const [ticketSending, setTicketSending] = useState(false);
      const [showNewForm,   setShowNewForm]   = useState(false);
      const [replyText,     setReplyText]     = useState("");
      const [replySending,  setReplySending]  = useState(false);

      // Listen to user's own tickets
      useEffect(() => {
        if (!user?.uid) return;
        const ticketsRef = _fbDb.ref("support_tickets").orderByChild("uid").equalTo(user.uid);
        ticketsRef.on("value", snap => {
          const list = [];
          snap.forEach(child => list.push({ id: child.key, ...child.val() }));
          setMyTickets(list.reverse());
        }, err => console.error("Tickets listener:", err.code));
        return () => ticketsRef.off();
      }, [user?.uid]);

      // Listen to messages of selected ticket
      useEffect(() => {
        if (!openTicket) { setThreadMsgs([]); return; }
        const msgsRef = _fbDb.ref("support_messages/" + openTicket.id).orderByChild("createdAt");
        msgsRef.on("value", snap => {
          const list = [];
          snap.forEach(child => list.push({ id: child.key, ...child.val() }));
          setThreadMsgs(list);
        }, err => console.error("Messages listener:", err.code));
        return () => msgsRef.off();

      const saveProfile = () => {
        setName(localName); setPhone(localPhone); setAddr(localAddr);
        setEditMode(false);
        if (user?.uid && _fbDb) {
          _fbDb.ref("users/" + user.uid + "/profile").set({
            name: localName, phone: localPhone, addr: localAddr,

            updatedAt: Date.now(),
          }).catch(err => console.error("Profile save error:", err.code));

      };

      const sendTicket = async () => {
        if (!ticketSubject.trim() || !ticketMsg.trim()) return;
        setTicketSending(true);
        try {
          const senderName = name || user?.displayName || user?.email || "User";
          const newTicketRef = _fbDb.ref("support_tickets").push();
          const ticketId = newTicketRef.key;
          await newTicketRef.set({
            uid:       user?.uid || null,
            name:      senderName,
            email:     user?.email || null,
            phone:     phone || null,
            subject:   ticketSubject.trim(),
            status:    "open",
            createdAt: Date.now(),

          const msgsRef = _fbDb.ref("support_messages/" + ticketId);

    /* ══════════════════ ORDERS PAGE ══════════════════ */
    /* ══════════════════ LOCATION PICKER ══════════════════ */
    function LocationPicker({ lat, lng, onPick, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markerRef = useRef(null);
      const [detecting, setDetecting] = useState(false);

      const BINANG_CENTER = [14.4584, 121.1971];
      const initialPos = (lat && lng) ? [lat, lng] : BINANG_CENTER;

      const pinIcon = L.divIcon({
        html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#166534,#22C55E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 4px 16px rgba(22,101,52,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div><div style="width:3px;height:10px;background:#166534;margin-top:-2px;border-radius:0 0 2px 2px;"></div></div>',
        className: '',
        iconSize: [36, 48],
        iconAnchor: [18, 48],
      });

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;

        const map = L.map(mapRef.current, {
          center: initialPos,
          zoom: (lat && lng) ? 17 : 15,
          zoomControl: false,
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);

        const marker = L.marker(initialPos, { icon: pinIcon, draggable: true }).addTo(map);
        marker.bindPopup("I-drag ako sa tamang lokasyon!").openPopup();
        markerRef.current = marker;
        mapInstanceRef.current = map;

        // Tap on map to move pin
        map.on("click", (e) => {
          marker.setLatLng(e.latlng);
        });

        setTimeout(() => map.invalidateSize(), 200);

        return () => {
          map.remove();
          mapInstanceRef.current = null;
          markerRef.current = null;
        };
      }, []);

      const detectLocation = () => {
        if (!navigator.geolocation) return;
        setDetecting(true);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const latlng = [pos.coords.latitude, pos.coords.longitude];
            if (markerRef.current && mapInstanceRef.current) {
              markerRef.current.setLatLng(latlng);
              mapInstanceRef.current.setView(latlng, 17);
            }
            setDetecting(false);
          },
          (err) => {
            alert("Hindi ma-detect ang location: " + err.message);
            setDetecting(false);
          },
          { enableHighAccuracy: true, timeout: 15000 }
        );
      };

      const confirmPin = () => {
        if (markerRef.current) {
          const pos = markerRef.current.getLatLng();
          onPick(pos.lat, pos.lng);
        }
        onClose();
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,.7)", backdropFilter:"blur(6px)", display:"flex", flexDirection:"column" }}>
          <div style={{ flex:1, display:"flex", flexDirection:"column", maxWidth:480, width:"100%", margin:"0 auto" }}>
            {/* Header */}
            <div style={{
              background:"linear-gradient(135deg,#166534,#22C55E)",
              padding:"calc(env(safe-area-inset-top,0px) + 14px) 20px 14px",
              color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div>
                <div style={{ fontSize:16, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
                  <Ic n="map-pin" /> I-pin ang Lokasyon Mo
                </div>
                <div style={{ fontSize:12, opacity:.8, marginTop:3 }}>I-drag ang pin o i-tap ang mapa</div>
              </div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {/* Map */}
            <div ref={mapRef} style={{ flex:1, minHeight:300, background:"#E5E7EB" }} />

            {/* Bottom controls */}
            <div style={{
              background:"#fff", padding:"16px 20px", paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 16px)",
              display:"flex", flexDirection:"column", gap:10,
            }}>
              <button onClick={detectLocation} disabled={detecting} style={{
                width:"100%", padding:"13px", borderRadius:12,
                background:"#F0FDF4", border:"2px solid #BBF7D0",
                color:"#166534", fontSize:14, fontWeight:700,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
              }}>
                {detecting
                  ? <><Ic n="spinner" className="spin" /> Hinahanap ang location mo...</>
                  : <><Ic n="crosshairs" /> Gamitin ang GPS Ko</>
                }
              </button>
              <button onClick={confirmPin} style={{
                width:"100%", padding:"15px", borderRadius:14,
                background:"linear-gradient(135deg,#166534,#22C55E)", color:"#fff",
                fontSize:15, fontWeight:800,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                boxShadow:"0 4px 16px rgba(22,101,52,.35)",
              }}>
                <Ic n="circle-check" /> I-confirm ang Location
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ RIDER MAP MODAL ══════════════════ */
    function RiderMapModal({ order, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const riderMarkerRef = useRef(null);
      const routeLineRef = useRef(null);
      const [riderLoc, setRiderLoc] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [mapError, setMapError] = useState("");

      // Binangonan center as default
      const BINANG_CENTER = [14.4584, 121.1971];
      const toNum = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      };

      useEffect(() => {
        if (!order?.riderId) return;
        const locRef = _fbDb.ref("rider_locations/" + order.riderId);
        locRef.on("value", snap => {
          const val = snap.val();
          if (val && val.lat && val.lng) {
            setRiderLoc(val);
            setLastUpdate(val.updatedAt);
          }
        });
        return () => locRef.off();
      }, [order?.riderId]);

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        if (typeof L === "undefined" || !L?.map) {
          setMapError("Hindi available ang mapa ngayon. Pakisubukan ulit mamaya.");
          return;
        }

        const map = L.map(mapRef.current, {
          center: BINANG_CENTER,
          zoom: 15,
          zoomControl: false,
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);
        mapInstanceRef.current = map;

        // Add customer pin if available
        const custLat = toNum(order?.customer?.lat);
        const custLng = toNum(order?.customer?.lng);
        if (custLat != null && custLng != null) {
          const custIcon = L.divIcon({
            html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#166534,#22C55E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 4px 16px rgba(22,101,52,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div><div style="width:3px;height:10px;background:#166534;margin-top:-2px;border-radius:0 0 2px 2px;"></div></div>',
            className: '',
            iconSize: [36, 48],
            iconAnchor: [18, 48],
          });
          L.marker([custLat, custLng], { icon: custIcon }).addTo(map)
            .bindPopup(`<b>${order.customer?.name || "Customer"}</b><br/>${order.customer?.address || ""}`);
          map.setView([custLat, custLng], 16);
        }

        setTimeout(() => map.invalidateSize(), 200);

        return () => {
          map.remove();
          mapInstanceRef.current = null;
          riderMarkerRef.current = null;
          routeLineRef.current = null;
        };
      }, []);

      // Update rider marker when location changes
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map || !riderLoc) return;

        const riderLat = toNum(riderLoc?.lat);
        const riderLng = toNum(riderLoc?.lng);
        if (riderLat == null || riderLng == null) return;
        const pos = [riderLat, riderLng];
        const custLat = toNum(order?.customer?.lat);
        const custLng = toNum(order?.customer?.lng);
        const custPos = custLat != null && custLng != null ? [custLat, custLng] : null;

        if (!riderMarkerRef.current) {
          const riderIcon = L.divIcon({
            html: '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1D4ED8,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(29,78,216,.5);border:3px solid #fff;"><i class="fa-solid fa-motorcycle"></i></div>',
            className: '',
            iconSize: [42, 42],
            iconAnchor: [21, 21],
          });
          riderMarkerRef.current = L.marker(pos, { icon: riderIcon }).addTo(map);
          riderMarkerRef.current.bindPopup(
            `<b>${order.riderName || "Rider"}</b><br/>Papunta sa'yo!`
          );

          // Fit bounds to show both rider and customer pin
          if (custPos) {
            map.fitBounds([pos, custPos], { padding: [50, 50] });
          } else {
            map.setView(pos, 16);
          }
        } else {
          riderMarkerRef.current.setLatLng(pos);
        }

        if (custPos) {
          if (!routeLineRef.current) {
            routeLineRef.current = L.polyline([pos, custPos], {
              color: "#2563EB",
              weight: 5,
              opacity: 0.85,
              lineCap: "round",
            }).addTo(map);
          } else {
            routeLineRef.current.setLatLngs([pos, custPos]);
          }
        }
      }, [riderLoc]);

      const secAgo = lastUpdate ? Math.round((Date.now() - lastUpdate) / 1000) : null;

      return (
        <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.7)", backdropFilter:"blur(6px)", display:"flex", flexDirection:"column" }}
          onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{
            flex:1, display:"flex", flexDirection:"column", maxWidth:480, width:"100%", margin:"0 auto",
          }}>
            {/* Header */}
            <div style={{
              background:"linear-gradient(135deg,#1D4ED8,#3B82F6)",
              padding:"calc(env(safe-area-inset-top,0px) + 14px) 20px 14px",
              color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div>
                <div style={{ fontSize:16, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
                  <Ic n="location-dot" /> Nasaan ang Rider?
                </div>
                {order.riderName && (
                  <div style={{ fontSize:12, opacity:.8, marginTop:3, display:"flex", alignItems:"center", gap:6 }}>
                    {order.riderPhoto && <img src={order.riderPhoto} style={{ width:18, height:18, borderRadius:"50%", objectFit:"cover" }} />}
                    <Ic n="motorcycle" style={{marginRight:2}} />{order.riderName}
                  </div>
                )}
              </div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {/* Status bar */}
            <div style={{
              background:"#fff", padding:"10px 20px", borderBottom:"1px solid #E5E7EB",
              display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              {riderLoc ? (
                <>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:"#22C55E", boxShadow:"0 0 8px #22C55E" }} />
                    <span style={{ fontSize:13, fontWeight:700, color:"#166534" }}>Live Tracking</span>
                  </div>
                  <span style={{ fontSize:11, color:"#888" }}>
                    {secAgo != null && secAgo < 60
                      ? `${secAgo}s ago`
                      : secAgo != null
                        ? `${Math.round(secAgo/60)}m ago`
                        : ""}
                  </span>
                </>
              ) : (
                <>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <Ic n="satellite-dish" className="pulse" style={{ color:"#F59E0B" }} />
                    <span style={{ fontSize:13, fontWeight:600, color:"#92400E" }}>
                      {order.riderId ? "Hinihintay ang GPS ng rider..." : "Wala pang rider na nag-accept"}
                    </span>
                  </div>
                </>
              )}
            </div>
            <div style={{
              background:"#EFF6FF",
              borderBottom:"1px solid #DBEAFE",
              color:"#1D4ED8",
              fontSize:12,
              fontWeight:700,
              padding:"8px 20px",
              display:"flex",
              alignItems:"center",
              gap:8,
            }}>
              <Ic n="route" />
              Blue line = diretsong daan ng rider papunta sa'yo
            </div>

            {/* Map */}
            <div style={{ position:"relative", flex:1, minHeight:300, background:"#E5E7EB" }}>
              <div ref={mapRef} style={{ position:"absolute", inset:0 }} />
              {mapError && (
                <div style={{
                  position:"absolute", inset:0, background:"#F8FAFC",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  textAlign:"center", padding:"20px 24px", color:"#64748B", fontSize:13, fontWeight:600
                }}>
                  <div>
                    <div style={{ fontSize:20, marginBottom:6 }}><Ic n="triangle-exclamation" /></div>
                    {mapError}
                  </div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{
              background:"#fff", padding:"14px 20px", paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 14px)",
              borderTop:"1px solid #E5E7EB",
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{
                  width:40, height:40, borderRadius:12, flexShrink:0,
                  background: ST_COLOR[order.status]?.bg || "#FEF3C7",
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <Ic n={ST_COLOR[order.status]?.icon || "cart-shopping"} style={{ color: ST_COLOR[order.status]?.color || "#92400E" }} />
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:"#111" }}>
                    {getOrderStatuses(order).find(s => s.key === order.status)?.desc}
                  </div>
                  <div style={{ fontSize:12, color:"#888", marginTop:1 }}>{order.customer?.address}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    class OrdersErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      render() {
        if (this.state.error) return (
          <div style={{ padding:24, margin:20, background:"#FEF2F2", borderRadius:16, border:"1.5px solid #FCA5A5" }}>
            <div style={{ fontSize:13, fontWeight:800, color:"#B91C1C", marginBottom:6 }}>Error:</div>
            <div style={{ fontSize:11, color:"#7F1D1D", fontFamily:"monospace", wordBreak:"break-all" }}>{this.state.error.toString()}</div>
          </div>
        );
        return this.props.children;
      }
    }

    function OrdersPage({ orders, onTrack, onTrackRider, canCancelOrder, cancelCountdownText, onCancelOrder, gcashSettings }) {
      const active    = orders.filter(o => o.status !== "delivered" && o.status !== "cancelled");
      const completed = orders.filter(o => o.status === "delivered" || o.status === "cancelled");
      const [ordersView, setOrdersView] = useState("active");

      const ST_COLOR = {
        pending:   { bg:"#F3F4F6", color:"#555",    label:"Pending",     icon:"hourglass-half" },
        buying:    { bg:"#FEF3C7", color:"#92400E", label:"Buying",      icon:"cart-shopping" },
        otw:       { bg:"#DBEAFE", color:"#1D4ED8", label:"OTW",         icon:"motorcycle" },
        in_boat:   { bg:"#EFF6FF", color:"#1D4ED8", label:"In the Boat", icon:"ship" },
        delivered: { bg:"#DCFCE7", color:"#166534", label:"Delivered",   icon:"circle-check" },
        cancelled: { bg:"#FEE2E2", color:"#B91C1C", label:"Cancelled",   icon:"ban" },
      };

      const OrderCard = ({ o }) => {
        const st = ST_COLOR[o.status] || ST_COLOR.pending;
        const ts = o.createdAt ? (o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt)) : new Date();
        const orderStatuses = getOrderStatuses(o);
        const idx = orderStatuses.findIndex(s => s.key === o.status);
        const canTrackRider = o.status === "buying" || o.status === "otw" || o.status === "in_boat";
        const hasGcashBanner = o.locationType === "Island" && o.status === "buying";
        const hasBottomAttachment = canTrackRider || hasGcashBanner;
        return (
          <div style={{ marginBottom:12 }}>
            <button onClick={() => onTrack(o)} style={{
              width:"100%", textAlign:"left", background:"#fff",
              borderRadius: hasBottomAttachment ? "18px 18px 0 0" : 18,
              padding:"16px", border:"1px solid #F0F0F0",
              borderBottom: hasBottomAttachment ? "none" : undefined,
              boxShadow: hasBottomAttachment ? "none" : "0 2px 8px rgba(0,0,0,.05)", display:"block",
            }}>
              {/* Top row */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                <div style={{ flex:1, marginRight:12 }}>
                  <div style={{ fontSize:13, fontWeight:800, color:"#111", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {o.items?.map(i=>i.name).join(", ") || "—"}
                  </div>
                  <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>
                    {ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                  </div>
                </div>
                <div style={{ padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:700, whiteSpace:"nowrap", background:st.bg, color:st.color, display:"flex", alignItems:"center", gap:5 }}>
                  <Ic n={st.icon} />{st.label}
                </div>
              </div>

              {/* Progress bar */}
              <div style={{ display:"flex", gap:4, marginBottom:12 }}>
                {orderStatuses.map((s, i) => (
                  <div key={s.key} style={{
                    flex:1, height:4, borderRadius:4,
                    background: i <= idx ? "#22C55E" : "#E5E7EB",
                    transition:"background .3s",
                  }} />
                ))}
              </div>

              {/* Steps */}
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                {orderStatuses.map((s, i) => (
                  <div key={s.key} style={{ textAlign:"center", flex:1 }}>
                    <div style={{ fontSize:16, opacity: i <= idx ? 1 : 0.25 }}><Ic n={s.icon} /></div>
                    <div style={{ fontSize:9, fontWeight:700, color: i <= idx ? "#166534" : "#ccc", marginTop:2 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Footer */}
              <div style={{ marginTop:12, paddingTop:10, borderTop:"1px dashed #E5E7EB", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontSize:12, color:"#888" }}>{o.customer?.address}</div>
                <div style={{ fontSize:14, fontWeight:800, color:"#166534" }}>~{fmt(o.total)}</div>
              </div>
            </button>

            {/* GCash payment banner for island buying orders */}
            {o.locationType === "Island" && o.status === "buying" && (
              o.gcashPaymentConfirmed
                ? <div style={{ padding:"10px 14px", background:"#DCFCE7", color:"#166534", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:6, borderTop:"1px solid #BBF7D0" }}>
                    <Ic n="circle-check" /> GCash Payment Confirmed — Handa na!
                  </div>
                : <div onClick={() => onTrack(o)} style={{ padding:"10px 14px", background:"#EFF6FF", color:"#1D4ED8", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:6, borderTop:"1px solid #BFDBFE", cursor:"pointer" }}>
                    <Ic n="qrcode" /> I-send ang GCash Payment — Tingnan ang details
                  </div>
            )}

            {/* Track Rider button */}
            {canTrackRider && (
              <button onClick={() => onTrackRider(o)} style={{
                width:"100%", padding:"12px", borderRadius:"0 0 18px 18px",
                background:"linear-gradient(135deg,#1D4ED8,#3B82F6)", color:"#fff",
                fontSize:13, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                boxShadow:"0 2px 8px rgba(29,78,216,.25)",
              }}>
                <Ic n="location-dot" />
                Nasaan ang Rider?
                <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ADE80", boxShadow:"0 0 6px #4ADE80" }} />
              </button>
            )}
            {(o.status === "pending" && !o.riderId) && (
              canCancelOrder?.(o) ? (
                <button onClick={() => onCancelOrder?.(o)} style={{
                  width:"100%", marginTop:8, padding:"11px 12px", borderRadius:12,
                  background:"#FEF2F2", color:"#B91C1C", border:"1px solid #FCA5A5",
                  fontSize:12, fontWeight:800,
                }}>
                  I-cancel ang order (15+ min na walang rider)
                </button>
              ) : (
                <div style={{
                  marginTop:8, padding:"9px 10px", borderRadius:12,
                  background:"#FFFBEB", color:"#92400E", border:"1px solid #FDE68A",
                  fontSize:11, fontWeight:700,
                }}>
                  {cancelCountdownText?.(o)}
                </div>
              )
            )}
          </div>
        );
      };

      return (
        <div style={{ padding:"0 0 20px" }}>
          <div style={{ padding:"20px 20px 4px" }}>
            <h2 style={{ fontSize:18, fontWeight:800, color:"#111", margin:0 }}><Ic n="box" style={{marginRight:8,color:"#166534"}} />Ang Orders Ko</h2>
          </div>

          <div style={{ padding:"20px 20px 0" }}>
            {orders.length === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"#ccc" }}>
                <Ic n="envelope-open" size={56} style={{ color:"#ccc", marginBottom:12, display:"block" }} />
                <div style={{ fontSize:16, fontWeight:700, color:"#555" }}>Wala pang orders</div>
                <div style={{ fontSize:13, marginTop:6, color:"#aaa" }}>Pumunta sa Tindahan para mag-order!</div>
              </div>
            ) : (
              <>
                <div style={{
                  display:"flex", gap:8, marginBottom:14, padding:4,
                  background:"#F1F5F9", borderRadius:14, border:"1px solid #E2E8F0",
                }}>
                  <button onClick={() => setOrdersView("active")} style={{
                    flex:1, padding:"10px 12px", borderRadius:10, fontSize:12, fontWeight:800,
                    background:ordersView==="active" ? "#166534" : "transparent",
                    color:ordersView==="active" ? "#fff" : "#475569",
                    boxShadow:ordersView==="active" ? "0 2px 8px rgba(22,101,52,.28)" : "none",
                  }}>
                    <Ic n="circle" style={{ marginRight:6, color:ordersView==="active" ? "#FCA5A5" : "#EF4444" }} />
                    Active ({active.length})
                  </button>
                  <button onClick={() => setOrdersView("previous")} style={{
                    flex:1, padding:"10px 12px", borderRadius:10, fontSize:12, fontWeight:800,
                    background:ordersView==="previous" ? "#1E293B" : "transparent",
                    color:ordersView==="previous" ? "#fff" : "#475569",
                    boxShadow:ordersView==="previous" ? "0 2px 8px rgba(30,41,59,.25)" : "none",
                  }}>
                    <Ic n="clock-rotate-left" style={{ marginRight:6 }} />
                    Previous ({completed.length})
                  </button>
                </div>

                {ordersView === "active" ? (
                  active.length > 0 ? (
                    active.map(o => <OrderCard key={o.id} o={o} />)
                  ) : (
                    <div style={{ textAlign:"center", padding:"44px 16px", border:"1px dashed #D1D5DB", borderRadius:16, background:"#fff" }}>
                      <Ic n="box-open" size={34} style={{ color:"#9CA3AF", marginBottom:10 }} />
                      <div style={{ fontSize:14, fontWeight:700, color:"#4B5563" }}>Walang active orders</div>
                      <div style={{ fontSize:12, marginTop:6, color:"#9CA3AF" }}>Kapag may ongoing order ka, dito ito lalabas.</div>
                    </div>
                  )
                ) : (
                  completed.length > 0 ? (
                    completed.map(o => <OrderCard key={o.id} o={o} />)
                  ) : (
                    <div style={{ textAlign:"center", padding:"44px 16px", border:"1px dashed #D1D5DB", borderRadius:16, background:"#fff" }}>
                      <Ic n="clock-rotate-left" size={34} style={{ color:"#9CA3AF", marginBottom:10 }} />
                      <div style={{ fontSize:14, fontWeight:700, color:"#4B5563" }}>Wala pang previous orders</div>
                      <div style={{ fontSize:12, marginTop:6, color:"#9CA3AF" }}>Dito mapupunta ang mga tapos na order mo.</div>
                    </div>
                  )
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
