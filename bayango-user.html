<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BayanGo Admin</title>
  <meta name="description" content="BayanGo Admin Dashboard — Binangonan Concierge" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="BayanGo Admin" />
  <link rel="manifest" href="bayango-admin-manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0A0A0A; font-family: 'Plus Jakarta Sans', sans-serif; overscroll-behavior: none; color: #fff; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, textarea, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 4px; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    @keyframes pop     { 0%{transform:scale(.88);opacity:0;} 100%{transform:scale(1);opacity:1;} }
    @keyframes ping    { 0%{transform:scale(1);opacity:1;} 75%,100%{transform:scale(2);opacity:0;} }
    @keyframes pulse   { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    .fade-up  { animation: fadeUp  .35s ease both; }
    .slide-up { animation: slideUp .3s cubic-bezier(.4,0,.2,1) both; }
    .pop      { animation: pop .25s ease both; }
    .ping     { animation: ping 1.2s cubic-bezier(0,0,.2,1) infinite; }
    .pulse    { animation: pulse 1.8s ease infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback } = React;

    /* ══════════════════ CONSTANTS ══════════════════ */
    const CATEGORIES = [
      { id:"isda",     label:"Isda",     icon:"🐟", color:"#0EA5E9" },
      { id:"karne",    label:"Karne",    icon:"🥩", color:"#EF4444" },
      { id:"gulay",    label:"Gulay",    icon:"🥬", color:"#22C55E" },
      { id:"hardware", label:"Hardware", icon:"🔧", color:"#F59E0B" },
    ];

    const DEFAULT_PRODUCTS = [
      { id:1,  name:"Tilapia",          cat:"isda",     price:160, unit:"kg",   img:"🐟", stock:true },
      { id:2,  name:"Galunggong",       cat:"isda",     price:200, unit:"kg",   img:"🐠", stock:true },
      { id:3,  name:"Bangus",           cat:"isda",     price:180, unit:"kg",   img:"🎏", stock:true },
      { id:4,  name:"Hipon",            cat:"isda",     price:320, unit:"kg",   img:"🦐", stock:true },
      { id:5,  name:"Pusit",            cat:"isda",     price:280, unit:"kg",   img:"🦑", stock:true },
      { id:6,  name:"Pork Liempo",      cat:"karne",    price:320, unit:"kg",   img:"🥓", stock:true },
      { id:7,  name:"Chicken Whole",    cat:"karne",    price:190, unit:"kg",   img:"🍗", stock:true },
      { id:8,  name:"Beef Brisket",     cat:"karne",    price:380, unit:"kg",   img:"🥩", stock:true },
      { id:9,  name:"Ground Pork",      cat:"karne",    price:280, unit:"kg",   img:"🍖", stock:true },
      { id:10, name:"Kamatis",          cat:"gulay",    price:80,  unit:"kg",   img:"🍅", stock:true },
      { id:11, name:"Sibuyas",          cat:"gulay",    price:120, unit:"kg",   img:"🧅", stock:true },
      { id:12, name:"Bawang",           cat:"gulay",    price:200, unit:"kg",   img:"🧄", stock:true },
      { id:13, name:"Talong",           cat:"gulay",    price:60,  unit:"kg",   img:"🍆", stock:true },
      { id:14, name:"Sili",             cat:"gulay",    price:100, unit:"kg",   img:"🌶️", stock:true },
      { id:15, name:"Pako",             cat:"gulay",    price:40,  unit:"tali", img:"🌿", stock:true },
      { id:16, name:"Cement (Portland)",cat:"hardware", price:260, unit:"bag",  img:"🏗️", stock:true },
      { id:17, name:"Hollow Blocks",    cat:"hardware", price:14,  unit:"pc",   img:"🧱", stock:true },
      { id:18, name:"GI Wire #16",      cat:"hardware", price:85,  unit:"kg",   img:"🔩", stock:true },
      { id:19, name:"Pako 4\"",         cat:"hardware", price:95,  unit:"kg",   img:"📌", stock:true },
      { id:20, name:"Paint Latex White",cat:"hardware", price:450, unit:"gal",  img:"🎨", stock:true },
    ];

    const ORDER_STATUSES = [
      { key:"pending",   label:"Pending",   icon:"⏳" },
      { key:"buying",    label:"Buying",    icon:"🛒" },
      { key:"otw",       label:"OTW",       icon:"🏍️" },
      { key:"delivered", label:"Delivered", icon:"✅" },
    ];

    const fmt = n => "₱" + Number(n).toLocaleString("en-PH", { minimumFractionDigits:0 });

    /* ══════════════════ FIREBASE INIT ══════════════════ */
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",
      authDomain:        "bayango-315c6.firebaseapp.com",
      projectId:         "bayango-315c6",
      storageBucket:     "bayango-315c6.firebasestorage.app",
      messagingSenderId: "199013441811",
      appId:             "1:199013441811:web:315a38f03ddc9b676e3ae6",
    };

    let _db = null;
    let _fns = null;

    async function initFirebase() {
      if (_db) return { db: _db, fns: _fns };
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, setDoc, serverTimestamp, getDocs }
        = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const app = initializeApp(FIREBASE_CONFIG);
      _db  = getFirestore(app);
      _fns = { collection, onSnapshot, query, orderBy, doc, updateDoc, setDoc, serverTimestamp, getDocs };
      return { db: _db, fns: _fns };
    }

    /* ══════════════════ MAIN APP ══════════════════ */
    function App() {
      const [products, setProducts] = useState(DEFAULT_PRODUCTS);
      const [orders,   setOrders]   = useState([]);
      const [ready,    setReady]    = useState(false);
      const [locked,   setLocked]   = useState(() => localStorage.getItem("bayango_admin_unlocked") !== "yes");
      const [pin,      setPin]      = useState("");
      const [pinError, setPinError] = useState(false);

      useEffect(() => {
        let unsubOrders, unsubProducts;
        (async () => {
          const { db, fns } = await initFirebase();
          const { collection, onSnapshot, query, orderBy, getDocs, setDoc, doc } = fns;

          // Seed products to Firestore if empty
          const snap = await getDocs(collection(db, "products"));
          if (snap.empty) {
            DEFAULT_PRODUCTS.forEach(p => setDoc(doc(db, "products", String(p.id)), p));
          }

          // Listen products realtime
          unsubProducts = onSnapshot(collection(db, "products"), s => {
            if (!s.empty) setProducts(s.docs.map(d => ({ id: d.id, ...d.data() })));
          });

          // Listen orders realtime — ang admin ay makakakita ng lahat
          const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
          unsubOrders = onSnapshot(q, s => {
            setOrders(s.docs.map(d => ({ id: d.id, ...d.data() })));
          });

          setReady(true);
        })();
        return () => { unsubOrders?.(); unsubProducts?.(); };
      }, []);

      const updateOrderStatus = useCallback(async (id, status) => {
        const { db, fns } = await initFirebase();
        await fns.updateDoc(fns.doc(db, "orders", id), { status });
      }, []);

      const updatePrice = useCallback(async (id, price) => {
        const { db, fns } = await initFirebase();
        await fns.updateDoc(fns.doc(db, "products", String(id)), { price });
      }, []);

      const toggleStock = useCallback(async (id) => {
        const product = products.find(p => p.id == id || p.id === id);
        if (!product) return;
        const { db, fns } = await initFirebase();
        await fns.updateDoc(fns.doc(db, "products", String(id)), { stock: !product.stock });
      }, [products]);

      const addProduct = useCallback(async (product) => {
        const { db, fns } = await initFirebase();
        const newId = String(Date.now());
        await fns.setDoc(fns.doc(db, "products", newId), { ...product, stock: true });
      }, []);

      const tryPin = (digit) => {
        const next = pin + digit;
        setPin(next);
        if (next.length === 4) {
          if (next === "1234") {
            localStorage.setItem("bayango_admin_unlocked", "yes");
            setLocked(false);
          } else {
            setPinError(true);
            setTimeout(() => { setPinError(false); setPin(""); }, 800);
          }
        }
      };

      if (locked) return <PinScreen pin={pin} error={pinError} onDigit={tryPin} onBack={() => setPin(p => p.slice(0,-1))} />;

      if (!ready) return (
        <div style={{ minHeight:"100vh", background:"#0A0A0A", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
          <div style={{ fontSize:48 }}>🔌</div>
          <div style={{ fontSize:16, fontWeight:700, color:"#22C55E" }}>Nagkokonekta sa Firebase...</div>
          <div style={{ fontSize:12, color:"#444" }}>Hinihintay ang realtime data</div>
        </div>
      );

      return <AdminDashboard products={products} orders={orders}
        onUpdateStatus={updateOrderStatus} onUpdatePrice={updatePrice}
        onToggleStock={toggleStock} onAddProduct={addProduct}
        onLock={() => { localStorage.removeItem("bayango_admin_unlocked"); setLocked(true); setPin(""); }} />;
    }

    /* ══════════════════ PIN SCREEN ══════════════════ */
    function PinScreen({ pin, error, onDigit, onBack }) {
      return (
        <div style={{ minHeight:"100vh", background:"#0A0A0A", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32 }}>
          <div style={{ fontSize:48, marginBottom:16 }}>🔒</div>
          <h1 style={{ fontSize:24, fontWeight:800, color:"#fff", marginBottom:6 }}>BayanGo Admin</h1>
          <p style={{ fontSize:13, color:"#555", marginBottom:40 }}>Enter your PIN to continue</p>

          {/* Dots */}
          <div style={{ display:"flex", gap:16, marginBottom:40 }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{
                width:16, height:16, borderRadius:"50%",
                background: i < pin.length ? (error ? "#EF4444" : "#22C55E") : "#222",
                border:"2px solid " + (i < pin.length ? (error?"#EF4444":"#22C55E") : "#333"),
                transition:"all .15s"
              }} className={error ? "pulse" : ""} />
            ))}
          </div>

          {/* Keypad */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, width:"100%", maxWidth:280 }}>
            {[1,2,3,4,5,6,7,8,9].map(d => (
              <button key={d} onClick={() => onDigit(String(d))} style={{
                height:68, borderRadius:18, background:"#1A1A1A", border:"1px solid #222",
                fontSize:22, fontWeight:700, color:"#fff", transition:"all .1s",
                display:"flex", alignItems:"center", justifyContent:"center"
              }}
              onTouchStart={e => e.currentTarget.style.background="#2A2A2A"}
              onTouchEnd={e => e.currentTarget.style.background="#1A1A1A"}>
                {d}
              </button>
            ))}
            <div />
            <button onClick={() => onDigit("0")} style={{ height:68, borderRadius:18, background:"#1A1A1A", border:"1px solid #222", fontSize:22, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>0</button>
            <button onClick={onBack} style={{ height:68, borderRadius:18, background:"#1A1A1A", border:"1px solid #222", fontSize:22, fontWeight:700, color:"#888", display:"flex", alignItems:"center", justifyContent:"center" }}>⌫</button>
          </div>
          <p style={{ fontSize:11, color:"#333", marginTop:28 }}>Default PIN: 1234</p>
        </div>
      );
    }

    /* ══════════════════ ADMIN DASHBOARD ══════════════════ */
    function AdminDashboard({ products, orders, onUpdateStatus, onUpdatePrice, onToggleStock, onAddProduct, onLock }) {
      const [tab,          setTab]         = useState("orders");
      const [editingPrice, setEditingPrice]= useState(null);
      const [priceVal,     setPriceVal]    = useState("");
      const [filterCat,    setFilterCat]   = useState("all");
      const [showAddForm,  setShowAddForm] = useState(false);
      const [notification, setNotification]= useState(null);
      const [prevCount,    setPrevCount]   = useState(orders.length);

      const [newName,  setNewName]  = useState("");
      const [newCat,   setNewCat]   = useState("isda");
      const [newPrice, setNewPrice] = useState("");
      const [newUnit,  setNewUnit]  = useState("kg");
      const [newImg,   setNewImg]   = useState("📦");

      /* new order notification */
      useEffect(() => {
        if (orders.length > prevCount) {
          const newest = orders[0];
          setNotification(newest);
          setTimeout(() => setNotification(null), 5000);
        }
        setPrevCount(orders.length);
      }, [orders.length]);

      const active     = orders.filter(o => o.status !== "delivered").length;
      const delivered  = orders.filter(o => o.status === "delivered");
      const revenue    = delivered.reduce((s,o) => s+o.total, 0);
      const pending    = orders.filter(o=>o.status!=="delivered").reduce((s,o)=>s+o.total,0);
      const filtered   = filterCat==="all" ? products : products.filter(p=>p.cat===filterCat);

      const catRevenue = CATEGORIES.map(cat => {
        const rev = delivered.reduce((s,o) => {
          return s + (o.items||[]).filter(i=>i.cat===cat.id).reduce((ss,i)=>ss+i.price*i.qty,0);
        }, 0);
        return { ...cat, rev };
      });
      const maxRev = Math.max(...catRevenue.map(c=>c.rev), 1);

      const submitNew = () => {
        if (!newName || !newPrice) return;
        onAddProduct({ name:newName, cat:newCat, price:+newPrice, unit:newUnit, img:newImg });
        setNewName(""); setNewPrice(""); setNewImg("📦");
        setShowAddForm(false);
      };

      return (
        <div style={{ maxWidth:720, margin:"0 auto", background:"#0A0A0A", minHeight:"100vh", paddingBottom:40 }}>

          {/* ── New Order Notification ── */}
          {notification && (
            <div className="pop" style={{
              position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", zIndex:999,
              background:"#166534", color:"#fff", padding:"14px 22px", borderRadius:16,
              fontSize:13, fontWeight:700, boxShadow:"0 8px 32px rgba(0,0,0,.4)",
              display:"flex", alignItems:"center", gap:10, whiteSpace:"nowrap", border:"1px solid #22C55E"
            }}>
              <span style={{ fontSize:20 }}>🔔</span>
              Bagong order mula kay {notification.customer?.name}! — {fmt(notification.total)}
            </div>
          )}

          {/* ── Header ── */}
          <div style={{ padding:"calc(env(safe-area-inset-top,0px) + 24px) 24px 20px", display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
            <div>
              <div style={{ fontSize:10, fontWeight:700, color:"#22C55E", letterSpacing:".12em", textTransform:"uppercase", marginBottom:4 }}>Admin Panel</div>
              <h1 style={{ fontSize:26, fontWeight:800, color:"#fff", letterSpacing:"-.01em" }}>BayanGo</h1>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              {/* Live indicator */}
              <div style={{ display:"flex", alignItems:"center", gap:6, background:"#1A1A1A", borderRadius:20, padding:"6px 12px", border:"1px solid #222" }}>
                <div style={{ position:"relative", width:8, height:8 }}>
                  <div style={{ position:"absolute", inset:0, background:"#22C55E", borderRadius:"50%" }} />
                  <div className="ping" style={{ position:"absolute", inset:0, background:"#22C55E", borderRadius:"50%", opacity:.75 }} />
                </div>
                <span style={{ fontSize:11, color:"#22C55E", fontWeight:700 }}>LIVE</span>
              </div>
              <button onClick={onLock} style={{ width:36, height:36, borderRadius:10, background:"#1A1A1A", border:"1px solid #222", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>🔒</button>
            </div>
          </div>

          {/* ── Stats ── */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, padding:"0 24px 20px" }}>
            {[
              { label:"Active", val:active, color:"#F59E0B", icon:"📦", bg:"#422006" },
              { label:"Revenue", val:fmt(revenue), color:"#22C55E", icon:"💰", bg:"#052E16" },
              { label:"Total",  val:orders.length, color:"#0EA5E9", icon:"📊", bg:"#082F49" },
            ].map(s => (
              <div key={s.label} style={{ background:"#141414", borderRadius:16, padding:"16px 14px", border:"1px solid #1E1E1E" }}>
                <div style={{ width:34, height:34, borderRadius:10, background:s.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, marginBottom:10 }}>{s.icon}</div>
                <div style={{ fontSize:s.label==="Revenue"?16:22, fontWeight:800, color:s.color, lineHeight:1 }}>{s.val}</div>
                <div style={{ fontSize:10, color:"#555", fontWeight:600, marginTop:4, textTransform:"uppercase", letterSpacing:".06em" }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* ── Tabs ── */}
          <div style={{ display:"flex", gap:4, padding:"0 24px 16px", overflowX:"auto", scrollbarWidth:"none" }}>
            {[
              { id:"orders", label:"Orders", icon:"📋" },
              { id:"prices", label:"Prices", icon:"💲" },
              { id:"stats",  label:"Stats",  icon:"📈" },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                padding:"10px 20px", borderRadius:12, fontSize:13, fontWeight:700,
                background:tab===t.id?"#22C55E":"#1A1A1A",
                color:tab===t.id?"#fff":"#666",
                border:tab===t.id?"none":"1px solid #222",
                display:"flex", alignItems:"center", gap:6,
                transition:"all .2s", whiteSpace:"nowrap", position:"relative"
              }}>
                {t.icon} {t.label}
                {t.id==="orders" && active>0 && (
                  <span style={{ background:"#EF4444", color:"#fff", borderRadius:8, fontSize:10, fontWeight:800, padding:"1px 6px" }}>{active}</span>
                )}
              </button>
            ))}
          </div>

          {/* ═══ ORDERS TAB ═══ */}
          {tab === "orders" && (
            <div style={{ padding:"0 24px" }}>
              {orders.length === 0 ? (
                <div style={{ textAlign:"center", padding:"70px 0" }}>
                  <div style={{ fontSize:52, marginBottom:14 }}>📭</div>
                  <div style={{ fontSize:15, fontWeight:700, color:"#444" }}>Wala pang orders</div>
                  <div style={{ fontSize:12, color:"#333", marginTop:6 }}>Hinihintay ang unang customer! 🚀</div>
                </div>
              ) : (
                <>
                  {/* Active first, then delivered */}
                  {[...orders.filter(o=>o.status!=="delivered"), ...orders.filter(o=>o.status==="delivered")].map((order, idx) => {
                    const st      = ORDER_STATUSES.find(s=>s.key===order.status);
                    const curIdx  = ORDER_STATUSES.findIndex(s=>s.key===order.status);
                    const nextSt  = curIdx < ORDER_STATUSES.length-1 ? ORDER_STATUSES[curIdx+1] : null;
                    const isNew   = idx === 0 && order.status === "pending";
                    return (
                      <div key={order.id} className="fade-up" style={{
                        background: isNew ? "#0D1F0D" : "#141414",
                        borderRadius:18, padding:"18px 20px", marginBottom:12,
                        border:`1px solid ${isNew?"#166534":"#1E1E1E"}`,
                        animationDelay:`${idx*.04}s`
                      }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                          <div style={{ flex:1, marginRight:12 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <div style={{ fontSize:15, fontWeight:700, color:"#fff" }}>{order.customer?.name}</div>
                              {isNew && <span style={{ fontSize:9, fontWeight:800, background:"#22C55E", color:"#fff", padding:"2px 7px", borderRadius:6, letterSpacing:".04em" }}>NEW</span>}
                            </div>
                            <div style={{ fontSize:11, color:"#555", marginTop:3 }}>
                              📞 {order.customer?.phone} &nbsp;•&nbsp; 📍 {order.zone}
                            </div>
                            <div style={{ fontSize:11, color:"#444", marginTop:2 }}>
                              🏠 {order.customer?.address}
                            </div>
                          </div>
                          <div style={{
                            padding:"5px 12px", borderRadius:10, fontSize:11, fontWeight:700, whiteSpace:"nowrap",
                            background:order.status==="delivered"?"#052E16":order.status==="otw"?"#422006":order.status==="buying"?"#082F49":"#1A1A1A",
                            color:order.status==="delivered"?"#4ADE80":order.status==="otw"?"#FBBF24":order.status==="buying"?"#38BDF8":"#888",
                            border:`1px solid ${order.status==="delivered"?"#166534":order.status==="otw"?"#854D0E":order.status==="buying"?"#0C4A6E":"#333"}`
                          }}>{st?.icon} {st?.label}</div>
                        </div>

                        {/* Items */}
                        <div style={{ background:"#0A0A0A", borderRadius:12, padding:"12px 14px", marginBottom:12 }}>
                          {order.items.map((item,i) => (
                            <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:12, color:"#777" }}>
                              <span>{item.img} {item.name} ×{item.qty}</span>
                              <span style={{ color:"#555" }}>{fmt(item.price*item.qty)}</span>
                            </div>
                          ))}
                          <div style={{ borderTop:"1px solid #1A1A1A", marginTop:8, paddingTop:8, display:"flex", justifyContent:"space-between", fontSize:14, fontWeight:800, color:"#22C55E" }}>
                            <span>Total</span><span>{fmt(order.total)}</span>
                          </div>
                        </div>

                        {nextSt ? (
                          <button onClick={() => onUpdateStatus(order.id, nextSt.key)} style={{
                            width:"100%", padding:"13px", borderRadius:14, fontSize:13, fontWeight:700,
                            background:nextSt.key==="delivered"?"#166534":nextSt.key==="otw"?"#854D0E":nextSt.key==="buying"?"#0C4A6E":"#1E1E1E",
                            color:"#fff",
                            border:`1px solid ${nextSt.key==="delivered"?"#22C55E":nextSt.key==="otw"?"#F59E0B":nextSt.key==="buying"?"#0EA5E9":"#333"}`
                          }}>{nextSt.icon} Mark as "{nextSt.label}" →</button>
                        ) : (
                          <div style={{ textAlign:"center", padding:"8px 0", fontSize:12, color:"#4ADE80", fontWeight:600 }}>✅ Completed</div>
                        )}
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          )}

          {/* ═══ PRICES TAB ═══ */}
          {tab === "prices" && (
            <div style={{ padding:"0 24px" }}>
              <div style={{ display:"flex", gap:6, marginBottom:16, overflowX:"auto", scrollbarWidth:"none", alignItems:"center" }}>
                <button onClick={()=>setFilterCat("all")} style={{
                  padding:"8px 14px", borderRadius:10, fontSize:11, fontWeight:700,
                  background:filterCat==="all"?"#22C55E":"#1A1A1A",
                  color:filterCat==="all"?"#fff":"#666",
                  border:filterCat==="all"?"none":"1px solid #222"
                }}>All</button>
                {CATEGORIES.map(c => (
                  <button key={c.id} onClick={()=>setFilterCat(c.id)} style={{
                    padding:"8px 14px", borderRadius:10, fontSize:11, fontWeight:700,
                    background:filterCat===c.id?c.color:"#1A1A1A",
                    color:filterCat===c.id?"#fff":"#666",
                    border:filterCat===c.id?"none":"1px solid #222", whiteSpace:"nowrap"
                  }}>{c.icon} {c.label}</button>
                ))}
                <button onClick={()=>setShowAddForm(true)} style={{
                  padding:"8px 14px", borderRadius:10, fontSize:11, fontWeight:700,
                  background:"#1E3A2F", color:"#4ADE80", border:"1px solid #166534",
                  whiteSpace:"nowrap", marginLeft:"auto", flexShrink:0
                }}>+ Dagdag</button>
              </div>

              {filtered.map(p => (
                <div key={p.id} style={{
                  background:"#141414", borderRadius:14, padding:"14px 18px", marginBottom:8,
                  border:"1px solid #1E1E1E", display:"flex", alignItems:"center", gap:12, opacity:p.stock?1:.45
                }}>
                  <span style={{ fontSize:26, flexShrink:0 }}>{p.img}</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.name}</div>
                    <div style={{ fontSize:11, color:"#555" }}>per {p.unit}</div>
                  </div>
                  {editingPrice === p.id ? (
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      <input value={priceVal} onChange={e=>setPriceVal(e.target.value)} autoFocus type="number"
                        style={{ width:78, padding:"8px 10px", borderRadius:8, border:"1px solid #333", background:"#0A0A0A", color:"#22C55E", fontSize:15, fontWeight:700, outline:"none", textAlign:"right" }}
                        onKeyDown={e=>{ if(e.key==="Enter"&&priceVal){onUpdatePrice(p.id,+priceVal);setEditingPrice(null);}}} />
                      <button onClick={()=>{ if(priceVal)onUpdatePrice(p.id,+priceVal); setEditingPrice(null); }} style={{ padding:"8px 12px", borderRadius:8, background:"#166534", color:"#fff", fontSize:12, fontWeight:700 }}>✓</button>
                      <button onClick={()=>setEditingPrice(null)} style={{ padding:"8px 10px", borderRadius:8, background:"#222", color:"#666", fontSize:12 }}>✕</button>
                    </div>
                  ) : (
                    <button onClick={()=>{ setEditingPrice(p.id); setPriceVal(String(p.price)); }} style={{
                      padding:"8px 14px", borderRadius:10, background:"#0A0A0A",
                      border:"1px solid #222", color:"#22C55E", fontSize:15, fontWeight:800
                    }}>{fmt(p.price)}</button>
                  )}
                  <button onClick={()=>onToggleStock(p.id)} style={{
                    padding:"7px 10px", borderRadius:8, fontSize:10, fontWeight:700,
                    background:p.stock?"#052E16":"#1C1917",
                    color:p.stock?"#4ADE80":"#78716C",
                    border:`1px solid ${p.stock?"#166534":"#292524"}`,
                    whiteSpace:"nowrap"
                  }}>{p.stock?"In Stock":"Out"}</button>
                </div>
              ))}

              {/* Add Product Modal */}
              {showAddForm && (
                <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,.8)", backdropFilter:"blur(6px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
                  <div className="slide-up" style={{ width:"100%", maxWidth:480, background:"#141414", borderRadius:"24px 24px 0 0", padding:"26px 22px 40px", border:"1px solid #222", maxHeight:"90vh", overflowY:"auto" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
                      <h2 style={{ fontSize:19, fontWeight:800 }}>➕ Bagong Produkto</h2>
                      <button onClick={()=>setShowAddForm(false)} style={{ width:36, height:36, borderRadius:10, background:"#222", fontSize:18, color:"#666", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                    </div>

                    <div style={{ marginBottom:16 }}>
                      <label style={{ fontSize:11, fontWeight:700, color:"#555", display:"block", marginBottom:8, textTransform:"uppercase", letterSpacing:".05em" }}>Icon</label>
                      <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                        {["🐟","🐠","🦐","🦑","🥩","🍗","🥚","🥬","🥕","🍅","🧅","🧄","🌽","🥜","🔧","🪚","🔩","🪣","💡","🎨"].map(e => (
                          <button key={e} onClick={()=>setNewImg(e)} style={{
                            width:38, height:38, borderRadius:10, fontSize:22,
                            background:newImg===e?"#1E3A2F":"#222",
                            border:newImg===e?"2px solid #22C55E":"2px solid #2A2A2A"
                          }}>{e}</button>
                        ))}
                      </div>
                    </div>

                    {[
                      { lbl:"Pangalan", val:newName, set:setNewName, ph:"e.g. Hito, Kambing..." },
                      { lbl:"Presyo (₱)", val:newPrice, set:setNewPrice, ph:"e.g. 150", type:"number" },
                      { lbl:"Unit", val:newUnit, set:setNewUnit, ph:"kg / pc / tali / gal" },
                    ].map(({ lbl, val, set, ph, type }) => (
                      <div key={lbl} style={{ marginBottom:14 }}>
                        <label style={{ fontSize:11, fontWeight:700, color:"#555", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:".05em" }}>{lbl}</label>
                        <input type={type||"text"} value={val} onChange={e=>set(e.target.value)} placeholder={ph}
                          style={{ width:"100%", padding:"13px 16px", borderRadius:12, fontSize:14, border:"1px solid #2A2A2A", background:"#0A0A0A", color:"#fff", outline:"none" }} />
                      </div>
                    ))}

                    <div style={{ marginBottom:20 }}>
                      <label style={{ fontSize:11, fontWeight:700, color:"#555", display:"block", marginBottom:8, textTransform:"uppercase", letterSpacing:".05em" }}>Kategorya</label>
                      <div style={{ display:"flex", gap:6 }}>
                        {CATEGORIES.map(c => (
                          <button key={c.id} onClick={()=>setNewCat(c.id)} style={{
                            flex:1, padding:"10px 0", borderRadius:10, fontSize:11, fontWeight:700,
                            background:newCat===c.id?c.color:"#1A1A1A",
                            color:newCat===c.id?"#fff":"#555",
                            border:newCat===c.id?"none":"1px solid #222"
                          }}>{c.icon}</button>
                        ))}
                      </div>
                    </div>

                    <button onClick={submitNew} disabled={!newName||!newPrice} style={{
                      width:"100%", padding:"15px", borderRadius:14,
                      background:(!newName||!newPrice)?"#222":"linear-gradient(135deg,#166534,#22C55E)",
                      color:(!newName||!newPrice)?"#444":"#fff", fontSize:15, fontWeight:700
                    }}>I-add sa Listahan ✓</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ═══ STATS TAB ═══ */}
          {tab === "stats" && (
            <div style={{ padding:"0 24px" }}>

              {/* Revenue */}
              <div style={{ background:"#141414", borderRadius:18, padding:"20px", marginBottom:14, border:"1px solid #1E1E1E" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#444", marginBottom:16, textTransform:"uppercase", letterSpacing:".08em" }}>💰 Revenue</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:18 }}>
                  {[
                    { lbl:"Collected", val:fmt(revenue), color:"#22C55E", sub:"Delivered" },
                    { lbl:"Pending",   val:fmt(pending), color:"#F59E0B", sub:"Active" },
                  ].map(s => (
                    <div key={s.lbl} style={{ background:"#0A0A0A", borderRadius:14, padding:"14px" }}>
                      <div style={{ fontSize:10, color:"#444", marginBottom:6, textTransform:"uppercase", letterSpacing:".06em" }}>{s.sub}</div>
                      <div style={{ fontSize:18, fontWeight:800, color:s.color }}>{s.val}</div>
                      <div style={{ fontSize:11, color:"#555", marginTop:4 }}>{s.lbl}</div>
                    </div>
                  ))}
                </div>

                <div style={{ fontSize:11, fontWeight:700, color:"#444", marginBottom:12, textTransform:"uppercase", letterSpacing:".06em" }}>By Category</div>
                {catRevenue.map(c => (
                  <div key={c.id} style={{ marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5, fontSize:12 }}>
                      <span style={{ color:"#888", fontWeight:600 }}>{c.icon} {c.label}</span>
                      <span style={{ color:c.color, fontWeight:700 }}>{fmt(c.rev)}</span>
                    </div>
                    <div style={{ height:7, background:"#1A1A1A", borderRadius:4, overflow:"hidden" }}>
                      <div style={{ height:"100%", borderRadius:4, width:`${(c.rev/maxRev)*100}%`, background:`linear-gradient(90deg,${c.color}66,${c.color})`, transition:"width .6s ease" }} />
                    </div>
                  </div>
                ))}
              </div>

              {/* Status Breakdown */}
              <div style={{ background:"#141414", borderRadius:18, padding:"20px", marginBottom:14, border:"1px solid #1E1E1E" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#444", marginBottom:16, textTransform:"uppercase", letterSpacing:".08em" }}>📋 Status Breakdown</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10 }}>
                  {ORDER_STATUSES.map(s => {
                    const count = orders.filter(o=>o.status===s.key).length;
                    return (
                      <div key={s.key} style={{ background:"#0A0A0A", borderRadius:14, padding:"14px", display:"flex", alignItems:"center", gap:10 }}>
                        <span style={{ fontSize:24 }}>{s.icon}</span>
                        <div>
                          <div style={{ fontSize:22, fontWeight:800, color:"#fff" }}>{count}</div>
                          <div style={{ fontSize:10, color:"#444", fontWeight:700, textTransform:"uppercase", letterSpacing:".06em" }}>{s.label}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Top Products */}
              <div style={{ background:"#141414", borderRadius:18, padding:"20px", border:"1px solid #1E1E1E" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#444", marginBottom:16, textTransform:"uppercase", letterSpacing:".08em" }}>🏆 Top Selling Items</div>
                {(() => {
                  const tally = {};
                  delivered.forEach(o => {
                    (o.items||[]).forEach(i => {
                      if (!tally[i.name]) tally[i.name] = { name:i.name, img:i.img, qty:0, rev:0 };
                      tally[i.name].qty += i.qty;
                      tally[i.name].rev += i.price * i.qty;
                    });
                  });
                  const sorted = Object.values(tally).sort((a,b)=>b.qty-a.qty).slice(0,5);
                  if (!sorted.length) return <div style={{ textAlign:"center", color:"#444", padding:"20px 0", fontSize:13 }}>Wala pang delivered orders</div>;
                  return sorted.map((item,i) => (
                    <div key={item.name} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:i<sorted.length-1?"1px solid #1A1A1A":"none" }}>
                      <span style={{ fontSize:11, fontWeight:800, color:i===0?"#F59E0B":i===1?"#888":i===2?"#CD7F32":"#444", minWidth:20 }}>
                        {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
                      </span>
                      <span style={{ fontSize:22 }}>{item.img}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{item.name}</div>
                        <div style={{ fontSize:10, color:"#444" }}>{item.qty} units sold</div>
                      </div>
                      <div style={{ fontSize:13, fontWeight:800, color:"#22C55E" }}>{fmt(item.rev)}</div>
                    </div>
                  ));
                })()}
              </div>

              {/* Pending revenue breakdown */}
              {orders.filter(o=>o.status!=="delivered").length > 0 && (
                <div style={{ background:"#141414", borderRadius:18, padding:"20px", marginTop:14, border:"1px solid #1E1E1E" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#444", marginBottom:16, textTransform:"uppercase", letterSpacing:".08em" }}>⏳ Active Order Details</div>
                  {orders.filter(o=>o.status!=="delivered").map(o => {
                    const st = ORDER_STATUSES.find(s=>s.key===o.status);
                    return (
                      <div key={o.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #1A1A1A" }}>
                        <div>
                          <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{o.customer?.name}</div>
                          <div style={{ fontSize:10, color:"#555", marginTop:2 }}>{o.items.map(i=>i.name).join(", ")}</div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:13, fontWeight:800, color:"#22C55E" }}>{fmt(o.total)}</div>
                          <div style={{ fontSize:10, color:"#555", marginTop:2 }}>{st?.icon} {st?.label}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
