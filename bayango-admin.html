                  <button onClick={() => markStatus(openTicket, "open")} disabled={statusBusy===openTicket.id} style={{ flex:1, padding:"9px 0", borderRadius:10, background:"#FEF3C7", color:"#92400E", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                    <Ic n="envelope-open"/>Reopen
                  </button>
                )}
              </div>

              {/* Messages */}
              <div style={{ marginBottom:12 }}>
                {threadMsgs.map(m => {
                  const isAdmin = m.senderType === "admin";
                  const isBot   = m.senderType === "bot";
                  const isUser  = m.senderType === "user";
                  return (
                    <div key={m.id} style={{ display:"flex", flexDirection:"column", alignItems: isAdmin?"flex-end":"flex-start", marginBottom:10 }}>
                      {!isAdmin && <div style={{ fontSize:10, fontWeight:700, color: isBot?"#3B82F6":"#555", marginBottom:3, paddingLeft:4 }}>{isBot?"🤖 BayanGo Support":"👤 "+m.senderName}</div>}
                      <div style={{ maxWidth:"80%", padding:"10px 14px", borderRadius: isAdmin?"18px 18px 4px 18px":"18px 18px 18px 4px", background: isAdmin?"linear-gradient(135deg,#1E3A5F,#1D4ED8)":isBot?"#EFF6FF":"#F9FAFB", color: isAdmin?"#fff":"#111", fontSize:13, lineHeight:1.5, boxShadow:"0 1px 4px rgba(0,0,0,.08)" }}>
                        {m.text}
                      </div>
                      <div style={{ fontSize:10, color:"#ccc", marginTop:3, paddingLeft:4, paddingRight:4 }}>{fmtDate(m.createdAt)}</div>
                    </div>
                  );
                })}
                {threadMsgs.length === 0 && <div style={{ textAlign:"center", padding:"30px 0", fontSize:12, color:"#ccc" }}>Walang messages pa.</div>}
              </div>

              {/* Reply */}
              {openTicket.status !== "closed" ? (
                <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
                  <textarea value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder="I-type ang iyong reply..." rows={2} onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendReply();} }} style={{ flex:1, fontSize:13, color:"#111", border:"1px solid #E5E7EB", borderRadius:12, padding:"10px 12px", outline:"none", resize:"none", fontFamily:"inherit", boxSizing:"border-box" }} />
                  <button onClick={sendReply} disabled={replySending||!replyText.trim()} style={{ width:42, height:42, borderRadius:12, background:replyText.trim()?"linear-gradient(135deg,#1E3A5F,#1D4ED8)":"#E5E7EB", color:replyText.trim()?"#fff":"#aaa", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    {replySending?<Ic n="spinner" className="spin" size={16}/>:<Ic n="paper-plane" size={16}/>}
                  </button>
                </div>
              ) : (
                <div style={{ textAlign:"center", padding:"12px 0", fontSize:12, color:"#aaa", fontWeight:600 }}>Ang ticket na ito ay sarado na.</div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════ PRODUCT MODAL ══════════════════ */
    function ProductModal({ product, onSave, onClose, saving }) {
      const UNITS = ["kg","pc","tali","bag","gal","litro","bundle","dozen","box"];
      const [name,  setName]  = useState(product?.name  || "");
      const [cat,   setCat]   = useState(product?.cat   || "isda");
      const [price, setPrice] = useState(product?.basePrice != null ? String(product.basePrice) : (product?.price != null ? String(product.price) : ""));
      const [autoPriceEnabled, setAutoPriceEnabled] = useState(product?.autoPriceEnabled !== false);
      const [unit,  setUnit]  = useState(product?.unit  || "kg");
      const [stock, setStock] = useState(product?.stock !== false);
      const [img,       setImg]       = useState(product?.img || "");
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef(null);

      const catObj = CATEGORIES.find(c => c.id === cat);
      const isUrl  = img && (img.startsWith("http") || img.startsWith("/"));
      const valid  = name.trim() && price !== "" && Number(price) >= 0;

      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        const timeout = new Promise((_, rej) =>
          setTimeout(() => rej(new Error("Upload timeout. Subukan ulit.")), 60000)
        );
        try {
          const st = await initStorage();
          const storageRef = st.ref(st.storage, "products/" + Date.now() + "_" + file.name);
          await Promise.race([st.uploadBytes(storageRef, file), timeout]);
          const url = await Promise.race([st.getDownloadURL(storageRef), timeout]);
          setImg(url);
        } catch (err) {
          alert("Upload error: " + (err.message || err.code || "Hindi ma-upload ang larawan."));
        } finally {
          setUploading(false);
          try { e.target.value = ""; } catch(_) {}
        }
      };

      const handleSubmit = () => {
        if (!valid) return;
        onSave({ name: name.trim(), cat, price: Number(price), basePrice: Number(price), autoPriceEnabled, unit, stock, img });
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,.65)", backdropFilter:"blur(6px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={onClose}>
          <div className="slide-up" onClick={e => e.stopPropagation()} style={{
            width:"100%", maxWidth:540, background:"#fff", borderRadius:"24px 24px 0 0",
            maxHeight:"92vh", display:"flex", flexDirection:"column", overflow:"hidden"
          }}>
          <div style={{ flex:1, overflowY:"auto", padding:"24px 22px 12px" }}>
            {/* Header */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <h3 style={{ fontSize:19, fontWeight:800 }}>
                <Ic n={product ? "pen-to-square" : "plus-circle"} style={{ marginRight:8, color:"#166534" }} />
                {product ? "I-edit ang Produkto" : "Mag-dagdag ng Produkto"}
              </h3>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"#F3F4F6", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
            </div>

            {/* Image preview + input */}
            <div style={{ display:"flex", gap:14, marginBottom:18, alignItems:"center" }}>
              <div style={{
                width:72, height:72, borderRadius:16, flexShrink:0, overflow:"hidden",
                background: catObj ? `linear-gradient(135deg,${catObj.color}20,${catObj.color}08)` : "#F3F4F6",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:36,
                border:"2px dashed #E5E7EB"
              }}>
                {img
                  ? (isUrl ? <img src={img} alt="preview" style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : img)
                  : <Ic n="image" size={28} style={{ color:"#D1D5DB" }} />
                }
              </div>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:11, fontWeight:700, color:"#888", display:"block", marginBottom:5 }}>LARAWAN</label>
                <div style={{ display:"flex", gap:8 }}>
                  <input value={img} onChange={e => setImg(e.target.value)} placeholder="I-upload o i-paste ang URL..."
                    style={{ flex:1, padding:"10px 14px", borderRadius:10, border:"1.5px solid #E5E7EB", fontSize:13, outline:"none" }}
                    onFocus={e => e.target.style.borderColor="#22C55E"}
                    onBlur={e  => e.target.style.borderColor="#E5E7EB"} />
                  <button type="button" onClick={() => !uploading && fileRef.current.click()}
                    style={{ padding:"0 14px", borderRadius:10, border:"1.5px solid #BBF7D0", background:"#F0FDF4", color:"#166534", fontWeight:700, fontSize:12, whiteSpace:"nowrap", flexShrink:0, opacity: uploading ? 0.6 : 1 }}>
                    {uploading ? "↑..." : "Upload"}
                  </button>
                  <input ref={fileRef} type="file" accept="image/*" onChange={handleFileChange} style={{ display:"none" }} />
                </div>
              </div>
            </div>

            {/* Name */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:11, fontWeight:700, color:"#888", display:"block", marginBottom:5 }}>PANGALAN *</label>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Tilapia"
                style={{ width:"100%", padding:"12px 14px", borderRadius:10, border:"1.5px solid #E5E7EB", fontSize:15, outline:"none" }}
                onFocus={e => e.target.style.borderColor="#22C55E"}
                onBlur={e  => e.target.style.borderColor="#E5E7EB"} />
            </div>

            {/* Category */}
            <div style={{ marginBottom:16 }}>
              <label style={{ fontSize:11, fontWeight:700, color:"#888", display:"block", marginBottom:8 }}>KATEGORYA *</label>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {CATEGORIES.map(c => (
                  <button key={c.id} onClick={() => setCat(c.id)} style={{
                    padding:"11px 14px", borderRadius:12, textAlign:"left",
                    display:"flex", alignItems:"center", gap:8,
                    background: cat===c.id ? `${c.color}15` : "#F9FAFB",
                    border: cat===c.id ? `2px solid ${c.color}` : "2px solid transparent",
                    fontSize:13, fontWeight:700, color: cat===c.id ? c.color : "#555"
                  }}>
                    <Ic n={c.icon} size={14} style={{ color: cat===c.id ? c.color : "#aaa" }} />{c.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Price + Unit */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
              <div>
                <label style={{ fontSize:11, fontWeight:700, color:"#888", display:"block", marginBottom:5 }}>BASE / MANUAL PRICE (₱) *</label>
                <input type="number" value={price} onChange={e => setPrice(e.target.value)} placeholder="0" min="0"
                  style={{ width:"100%", padding:"12px 14px", borderRadius:10, border:"1.5px solid #E5E7EB", fontSize:15, outline:"none" }}
                  onFocus={e => e.target.style.borderColor="#22C55E"}
                  onBlur={e  => e.target.style.borderColor="#E5E7EB"} />
              </div>
              <div>
                <label style={{ fontSize:11, fontWeight:700, color:"#888", display:"block", marginBottom:5 }}>UNIT</label>
                <div style={{ position:"relative" }}>
                  <select value={unit} onChange={e => setUnit(e.target.value)} style={{
                    width:"100%", padding:"12px 14px", borderRadius:10, border:"1.5px solid #E5E7EB",
                    fontSize:15, outline:"none", background:"#fff", appearance:"none", WebkitAppearance:"none"
                  }}>
                    {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                  </select>
                  <Ic n="chevron-down" size={11} style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", color:"#aaa", pointerEvents:"none" }} />
                </div>
              </div>
            </div>

            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#EFF6FF", padding:"12px 14px", borderRadius:12, marginBottom:16, border:"1px solid #BFDBFE" }}>
              <div>
                <div style={{ fontSize:13, fontWeight:700, color:"#1D4ED8" }}>Auto Price via Market Factor</div>
                <div style={{ fontSize:11, color:"#1E40AF", marginTop:1 }}>
                  Kapag ON, ang final price ay Base Price × category market multiplier.
                </div>
              </div>
              <div onClick={() => setAutoPriceEnabled(!autoPriceEnabled)} style={{
                width:50, height:28, borderRadius:14, cursor:"pointer",
                background: autoPriceEnabled ? "#3B82F6" : "#D1D5DB",
                display:"flex", alignItems:"center", padding:"0 3px",
                justifyContent: autoPriceEnabled ? "flex-end" : "flex-start"
              }}>
                <div style={{ width:22, height:22, borderRadius:"50%", background:"#fff", boxShadow:"0 1px 4px rgba(0,0,0,.2)" }} />
              </div>
            </div>

            {/* Stock toggle */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#F9FAFB", padding:"14px 16px", borderRadius:12, marginBottom:22, border:"1px solid #E5E7EB" }}>
              <div>
                <div style={{ fontSize:14, fontWeight:700 }}>Availability</div>
                <div style={{ fontSize:12, color:"#888", marginTop:1 }}>
                  {stock ? "In Stock — available sa order" : "Out of Stock — hindi maoorder"}
                </div>
              </div>
              <div onClick={() => setStock(!stock)} style={{
                width:50, height:28, borderRadius:14, cursor:"pointer", transition:"background .25s",
                background: stock ? "#22C55E" : "#D1D5DB",
                display:"flex", alignItems:"center", padding:"0 3px",
                justifyContent: stock ? "flex-end" : "flex-start"
              }}>
                <div style={{ width:22, height:22, borderRadius:"50%", background:"#fff", boxShadow:"0 1px 4px rgba(0,0,0,.2)", transition:"all .25s" }} />
              </div>
            </div>

          </div>
          <div style={{ padding:"12px 22px 44px", borderTop:"1px solid #F0F0F0", background:"#fff" }}>
            <button onClick={handleSubmit} disabled={saving || uploading || !valid} style={{
              width:"100%", padding:"16px", borderRadius:16, fontSize:15, fontWeight:700,
              background: (saving || uploading || !valid) ? "#D1D5DB" : "linear-gradient(135deg,#166534,#22C55E)",
              color:      (saving || uploading || !valid) ? "#aaa"    : "#fff",
              boxShadow:  (saving || uploading || !valid) ? "none"    : "0 4px 16px rgba(22,101,52,.3)",
              display:"flex", alignItems:"center", justifyContent:"center", gap:8
            }}>
              {uploading
                ? <><Ic n="arrow-up-from-bracket" />Ina-upload ang larawan...</>
                : saving
                  ? <><Ic n="hourglass-half" />Sine-save...</>
                  : <><Ic n="floppy-disk" />{product ? "I-update ang Produkto" : "I-save ang Produkto"}</>
              }
            </button>
          </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ USER APP ══════════════════ */
    function UserApp({ products, orders, onOrder }) {
      const [activeCat,    setActiveCat]    = useState("isda");
      const [cart,         setCart]         = useState({});
      const [showCart,     setShowCart]     = useState(false);
      const [showCheckout, setShowCheckout] = useState(false);
      const [showTracker,  setShowTracker]  = useState(null);
      const [zone,         setZone]         = useState(0);
      const [name,         setName]         = useState("");
      const [phone,        setPhone]        = useState("");
      const [addr,         setAddr]         = useState("");
      const [searchQ,      setSearchQ]      = useState("");
      const [orderPlaced,  setOrderPlaced]  = useState(false);

      const cartCount = Object.values(cart).reduce((s,v) => s+v, 0);
      const cartItems = Object.entries(cart)
        .filter(([,q]) => q > 0)
        .map(([id,qty]) => ({ ...products.find(p => p.id === +id), qty }))
        .filter(i => i.name);

      const subtotal    = cartItems.reduce((s,i) => s + i.price * i.qty, 0);
      const deliveryFee = DELIVERY_ZONES[zone].fee;
      const total       = subtotal + deliveryFee + SERVICE_FEE;

      const add = id => setCart(c => ({ ...c, [id]:(c[id]||0)+1 }));
      const rem = id => setCart(c => {
        const n = { ...c };
        if (n[id] > 1) n[id]--; else delete n[id];
        return n;
      });

      const filtered = products.filter(p =>
        p.cat === activeCat && (searchQ === "" || p.name.toLowerCase().includes(searchQ.toLowerCase()))
      );

      const placeOrder = async () => {
        if (!name || !phone || !addr) return;

        await onOrder({
          items:cartItems, subtotal, deliveryFee,
          serviceFee:SERVICE_FEE, total,
          zone:DELIVERY_ZONES[zone].label,
          customer:{ name, phone, address:addr },
        });
        setCart({});
        setShowCheckout(false);
        setShowCart(false);
        setOrderPlaced(true);
        setTimeout(() => setOrderPlaced(false), 3500);
      };

      const myOrders = orders.filter(o => o.customer?.name === name && name !== "");

      return (
        <div style={{ maxWidth:480, margin:"0 auto", paddingBottom:120, background:"#F8FAF8", minHeight:"100vh" }}>

          {/* ── Hero ── */}
          <div style={{
            background:"linear-gradient(145deg,#0D5C2E,#166534,#22C55E)",
            padding:"env(safe-area-inset-top, 16px) 24px 32px",
            paddingTop:`calc(env(safe-area-inset-top, 0px) + 28px)`,
            color:"#fff", position:"relative", overflow:"hidden"
          }}>
            <div style={{ position:"absolute", top:-50, right:-40, width:180, height:180, borderRadius:"50%", background:"rgba(255,255,255,.07)" }} />
            <div style={{ position:"absolute", bottom:-30, left:-20, width:120, height:120, borderRadius:"50%", background:"rgba(255,255,255,.04)" }} />
            <div style={{ position:"relative" }}>
              <div style={{ fontSize:11, fontWeight:600, opacity:.7, letterSpacing:".1em", textTransform:"uppercase", marginBottom:6 }}>
                Binangonan Concierge
              </div>
              <img src="https://i.imgur.com/tMk73Mg.png" style={{ height:56, objectFit:"contain", margin:"0 0 6px" }} />
              <p style={{ fontSize:13, opacity:.75, fontWeight:400, lineHeight:1.5 }}>
                Kami na ang mamamalengke para sa'yo <Ic n="cart-shopping" style={{ marginLeft:4 }} />
              </p>
            </div>
          </div>

          {/* ── Search ── */}
          <div style={{ padding:"16px 20px 0" }}>
            <div style={{ background:"#fff", borderRadius:16, padding:"12px 16px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 1px 4px rgba(0,0,0,.07)", border:"1px solid #E9ECEF" }}>
              <Ic n="magnifying-glass" style={{ opacity:.35, fontSize:17 }} />
              <input placeholder="Maghanap ng produkto..." value={searchQ}
                onChange={e => setSearchQ(e.target.value)}
                style={{ flex:1, border:"none", outline:"none", fontSize:15, fontWeight:500, background:"transparent", color:"#111" }} />
              {searchQ && <button onClick={() => setSearchQ("")} style={{ opacity:.4, fontSize:16 }}>✕</button>}
            </div>
          </div>

          {/* ── Categories ── */}
          <div style={{ display:"flex", gap:8, padding:"14px 20px", overflowX:"auto", scrollbarWidth:"none" }}>
            {CATEGORIES.map(cat => (
              <button key={cat.id} onClick={() => setActiveCat(cat.id)} style={{
                padding:"10px 18px", borderRadius:30, whiteSpace:"nowrap",
                fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:6,
                background: activeCat===cat.id ? cat.color : "#fff",
                color: activeCat===cat.id ? "#fff" : "#555",
                boxShadow: activeCat===cat.id ? `0 4px 14px ${cat.color}40` : "0 1px 3px rgba(0,0,0,.06)",
                border: activeCat===cat.id ? "none" : "1px solid #E5E7EB",
                transition:"all .22s ease",
                transform: activeCat===cat.id ? "scale(1.04)" : "scale(1)"
              }}>
                <Ic n={cat.icon} size={16} />{cat.label}
              </button>
            ))}
          </div>

          {/* ── Section Label ── */}
          <div style={{ padding:"0 20px 10px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, color:"#111" }}>
              {(() => { const c = CATEGORIES.find(c=>c.id===activeCat); return c ? <><Ic n={c.icon} style={{ marginRight:6 }} />{c.label}</> : null; })()}
            </h2>
            <span style={{ fontSize:12, color:"#999", fontWeight:500 }}>{filtered.length} items</span>
          </div>

          {/* ── Products Grid ── */}
          <div style={{ padding:`0 20px ${cartCount > 0 && !showCart ? "116px" : "16px"}` }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {filtered.map((p, i) => (
                <div key={p.id} className="fade-up" style={{
                  animationDelay:`${i*.05}s`,
                  background:"#fff", borderRadius:18, overflow:"hidden",
                  border:"1px solid #F0F0F0", boxShadow:"0 2px 8px rgba(0,0,0,.04)",
                  opacity:p.stock?1:.5, position:"relative"
                }}>
                  {!p.stock && (
                    <div style={{
                      position:"absolute", top:10, right:10, background:"#EF4444",
                      color:"#fff", fontSize:9, fontWeight:800, padding:"3px 8px",
                      borderRadius:6, zIndex:2, letterSpacing:".04em"
                    }}>SOLD OUT</div>
                  )}
                  <div style={{
                    height:96, display:"flex", alignItems:"center", justifyContent:"center",
                    background:`linear-gradient(135deg,${CATEGORIES.find(c=>c.id===p.cat)?.color}12,${CATEGORIES.find(c=>c.id===p.cat)?.color}06)`,
                    fontSize:46,
                    overflow:"hidden"
                  }}>
                    {(typeof p.img === "string" && (p.img.startsWith("http") || p.img.startsWith("/")))
                      ? <img src={p.img} alt={p.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                      : (p.img || <Ic n="image" size={28} style={{ color:"#D1D5DB" }} />)
                    }
                  </div>
                  <div style={{ padding:"11px 14px 14px" }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#111", marginBottom:2, lineHeight:1.25 }}>{p.name}</div>
                    <div style={{ fontSize:11, color:"#aaa", marginBottom:10 }}>per {p.unit}</div>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <span style={{ fontSize:17, fontWeight:800, color:"#166534" }}>{fmt(p.price)}</span>
                      {p.stock && (
                        cart[p.id] ? (
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <button onClick={() => rem(p.id)} style={{ width:28, height:28, borderRadius:8, background:"#F3F4F6", fontSize:16, fontWeight:700, color:"#555", display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                            <span style={{ fontSize:14, fontWeight:800, minWidth:16, textAlign:"center" }}>{cart[p.id]}</span>
                            <button onClick={() => add(p.id)} style={{ width:28, height:28, borderRadius:8, background:"#22C55E", fontSize:16, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                          </div>
                        ) : (
                          <button onClick={() => add(p.id)} style={{
                            width:34, height:34, borderRadius:10, background:"#22C55E",
                            color:"#fff", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center",
                            boxShadow:"0 3px 10px #22C55E40"
                          }}>+</button>
                        )
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            {filtered.length === 0 && (
              <div style={{ textAlign:"center", padding:"50px 0", color:"#bbb" }}>
                <Ic n="face-meh" size={48} style={{ marginBottom:10, color:"#bbb" }} />
                <div style={{ fontSize:14, fontWeight:600 }}>Walang makitang produkto</div>
              </div>
            )}
          </div>

          {/* ── My Orders ── */}
          {myOrders.length > 0 && (
            <div style={{ padding:"0 20px 16px" }}>
              <h3 style={{ fontSize:15, fontWeight:800, color:"#111", marginBottom:12 }}><Ic n="box" style={{ marginRight:6 }} />My Orders</h3>
              {myOrders.slice(0,4).map(o => {
                const st = ORDER_STATUSES.find(s => s.key === o.status);
                return (
                  <button key={o.id} onClick={() => setShowTracker(o)} style={{
                    width:"100%", textAlign:"left", background:"#fff", borderRadius:14,
                    padding:"14px 16px", marginBottom:8,
                    border:"1px solid #E5E7EB", display:"flex", alignItems:"center", justifyContent:"space-between",
                    boxShadow:"0 1px 4px rgba(0,0,0,.04)"
                  }}>
                    <div style={{ flex:1, marginRight:12 }}>
                      <div style={{ fontSize:13, fontWeight:700, color:"#111", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:200 }}>
                        {o.items.map(i=>i.name).join(", ")}
                      </div>
                      <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>{fmt(o.total)} • {o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString("en-PH") : new Date(o.createdAt).toLocaleDateString("en-PH")}</div>
                    </div>
                    <div style={{
                      padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:700, whiteSpace:"nowrap",
                      background:o.status==="delivered"?"#DCFCE7":o.status==="otw"?"#FEF3C7":"#F3F4F6",
                      color:o.status==="delivered"?"#166534":o.status==="otw"?"#92400E":"#555"
                    }}>{st ? <><Ic n={st.icon} style={{ marginRight:4 }} />{st.label}</> : null}</div>
                  </button>
                );
              })}
            </div>
          )}

          {/* ── Floating Cart ── */}
          {cartCount > 0 && !showCart && (
            <div className="slide-up" style={{
              position:"fixed", bottom:`calc(env(safe-area-inset-bottom,0px) + 20px)`,
              left:20, right:20,
              zIndex:100
            }}>
              <button onClick={() => setShowCart(true)} style={{
                width:"100%", padding:"15px 24px", borderRadius:18,
                background:"linear-gradient(135deg,#166534,#22C55E)",
                color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
                boxShadow:"0 8px 32px rgba(22,101,52,.38)", fontSize:15, fontWeight:700
              }}>
                <span><Ic n="basket-shopping" style={{ marginRight:6 }} />Basket ({cartCount} items)</span>
                <span style={{ fontSize:16, fontWeight:800 }}>{fmt(subtotal)}</span>
              </button>
            </div>
          )}

          {/* ── Cart Drawer ── */}
          {showCart && (
            <div style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,.55)", backdropFilter:"blur(4px)" }}
              onClick={() => setShowCart(false)}>
              <div className="slide-in" onClick={e => e.stopPropagation()} style={{
                position:"absolute", right:0, top:0, bottom:0,
                width:"100%", maxWidth:400, background:"#FAFAFA",
                display:"flex", flexDirection:"column"
              }}>
                <div style={{ padding:"20px 24px", borderBottom:"1px solid #E5E7EB", display:"flex", alignItems:"center", justifyContent:"space-between", background:"#fff" }}>
                  <h2 style={{ fontSize:19, fontWeight:800 }}><Ic n="basket-shopping" style={{ marginRight:6 }} />Your Basket</h2>
                  <button onClick={() => setShowCart(false)} style={{ width:36, height:36, borderRadius:10, background:"#F3F4F6", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                </div>
                <div style={{ flex:1, overflowY:"auto", padding:"12px 24px" }}>
                  {cartItems.map(item => (
                    <div key={item.id} className="fade-up" style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 0", borderBottom:"1px solid #F0F0F0" }}>
                      <div style={{ width:50, height:50, borderRadius:13, fontSize:28, display:"flex", alignItems:"center", justifyContent:"center", background:"#F0FDF4" }}>{item.img}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:14, fontWeight:700, color:"#111" }}>{item.name}</div>
                        <div style={{ fontSize:12, color:"#999" }}>{fmt(item.price)} / {item.unit}</div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                        <button onClick={() => rem(item.id)} style={{ width:30, height:30, borderRadius:8, background:"#F3F4F6", fontSize:16, fontWeight:700, color:"#666", display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                        <span style={{ fontSize:14, fontWeight:800, minWidth:20, textAlign:"center" }}>{item.qty}</span>
                        <button onClick={() => add(item.id)} style={{ width:30, height:30, borderRadius:8, background:"#22C55E", fontSize:16, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                      </div>
                      <div style={{ fontSize:14, fontWeight:800, color:"#166534", minWidth:58, textAlign:"right" }}>{fmt(item.price*item.qty)}</div>
                    </div>
                  ))}
                </div>
                <div style={{ padding:"18px 24px", background:"#fff", borderTop:"1px solid #E5E7EB" }}>
                  {[["Subtotal",fmt(subtotal)],["Delivery ("+DELIVERY_ZONES[zone].label+")",fmt(deliveryFee)],["Service Fee",fmt(SERVICE_FEE)]].map(([l,v]) => (
                    <div key={l} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:13, color:"#777" }}>
                      <span>{l}</span><span style={{ fontWeight:600 }}>{v}</span>
                    </div>
                  ))}
                  <div style={{ display:"flex", justifyContent:"space-between", paddingTop:12, borderTop:"2px dashed #E5E7EB", fontSize:17, fontWeight:800, color:"#111" }}>
                    <span>Total</span><span>{fmt(total)}</span>
                  </div>
                  <button onClick={() => { setShowCart(false); setShowCheckout(true); }} style={{
                    width:"100%", marginTop:14, padding:"15px", borderRadius:16,
                    background:"linear-gradient(135deg,#166534,#22C55E)", color:"#fff",
                    fontSize:15, fontWeight:700, boxShadow:"0 4px 16px rgba(22,101,52,.3)"
                  }}>Proceed to Checkout →</button>
                </div>
              </div>
            </div>
          )}

          {/* ── Checkout Modal ── */}
          {showCheckout && (
            <div style={{ position:"fixed", inset:0, zIndex:300, background:"rgba(0,0,0,.65)", backdropFilter:"blur(6px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
              <div className="slide-up" style={{ width:"100%", maxWidth:480, background:"#fff", borderRadius:"24px 24px 0 0", padding:"26px 24px 36px", maxHeight:"92vh", overflowY:"auto" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
                  <h2 style={{ fontSize:21, fontWeight:800 }}><Ic n="clipboard" style={{ marginRight:6 }} />Checkout</h2>
                  <button onClick={() => setShowCheckout(false)} style={{ width:36, height:36, borderRadius:10, background:"#F3F4F6", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                </div>

                <label style={{ fontSize:12, fontWeight:700, color:"#666", display:"block", marginBottom:8 }}><Ic n="location-dot" style={{ marginRight:4 }} />Delivery Area</label>
                <div style={{ display:"flex", gap:8, marginBottom:20 }}>
                  {DELIVERY_ZONES.map((z,i) => (
                    <button key={i} onClick={() => setZone(i)} style={{
                      flex:1, padding:"12px 6px", borderRadius:12, textAlign:"center",
                      border:zone===i?"2px solid #22C55E":"1px solid #E5E7EB",
                      background:zone===i?"#F0FDF4":"#fff", transition:"all .2s"
                    }}>
                      <div style={{ fontSize:12, fontWeight:700, color:zone===i?"#166534":"#333", lineHeight:1.3 }}>{z.label}</div>
                      <div style={{ fontSize:11, color:"#aaa", marginTop:3 }}>{fmt(z.fee)}</div>
                    </button>
                  ))}
                </div>

                {[
                  { lbl:"Pangalan", val:name, set:setName, ph:"Juan Dela Cruz" },
                  { lbl:"Phone",    val:phone, set:setPhone, ph:"09XX XXX XXXX" },
                  { lbl:"Address",  val:addr,  set:setAddr,  ph:"House/Lot, Street, Barangay" },
                ].map(({ lbl, val, set, ph }) => (
                  <div key={lbl} style={{ marginBottom:14 }}>
                    <label style={{ fontSize:12, fontWeight:700, color:"#666", display:"block", marginBottom:6 }}>{lbl}</label>
                    <input value={val} onChange={e => set(e.target.value)} placeholder={ph}
                      style={{ width:"100%", padding:"13px 16px", borderRadius:12, fontSize:14, border:"1.5px solid #E5E7EB", outline:"none", transition:"border .2s" }}
                      onFocus={e => e.target.style.borderColor="#22C55E"}
                      onBlur={e  => e.target.style.borderColor="#E5E7EB"} />
                  </div>
                ))}

                <div style={{ background:"#F9FAFB", borderRadius:14, padding:"14px 16px", marginBottom:16, border:"1px solid #E5E7EB" }}>
                  {cartItems.map(i => (
                    <div key={i.id} style={{ display:"flex", justifyContent:"space-between", padding:"5px 0", fontSize:13, color:"#555" }}>
                      <span>{i.img} {i.name} x{i.qty}</span>
                      <span style={{ fontWeight:600 }}>{fmt(i.price*i.qty)}</span>
                    </div>
                  ))}
                  <div style={{ borderTop:"1px solid #E5E7EB", marginTop:8, paddingTop:8, display:"flex", justifyContent:"space-between", fontSize:13, color:"#888" }}>
                    <span>Delivery + Service</span><span style={{ fontWeight:600 }}>{fmt(deliveryFee+SERVICE_FEE)}</span>
                  </div>
                  <div style={{ marginTop:10, paddingTop:10, borderTop:"2px dashed #D1D5DB", display:"flex", justifyContent:"space-between", fontSize:17, fontWeight:800, color:"#111" }}>
                    <span>Total</span><span>{fmt(total)}</span>
                  </div>
                </div>

                <div style={{ background:"#FEF3C7", borderRadius:12, padding:"12px 14px", marginBottom:18, display:"flex", gap:10 }}>
                  <Ic n="credit-card" size={18} style={{ color:"#92400E" }} />
                  <div style={{ fontSize:12, color:"#92400E", lineHeight:1.5 }}>
                    <strong>GCash o COD</strong> — Pag-deliver ng order, pwede kang magbayad via GCash o Cash on Delivery.
                  </div>
                </div>

                <button onClick={placeOrder} disabled={!name||!phone||!addr} style={{
                  width:"100%", padding:"17px", borderRadius:16,
                  background:(!name||!phone||!addr)?"#D1D5DB":"linear-gradient(135deg,#166534,#22C55E)",
                  color:"#fff", fontSize:16, fontWeight:700,
                  boxShadow:(!name||!phone||!addr)?"none":"0 4px 20px rgba(22,101,52,.35)",
                  transition:"all .2s"
                }}>Mag-Order Na! <Ic n="circle-check" style={{ marginLeft:4 }} /></button>
              </div>
            </div>
          )}

          {/* ── Order Tracker Modal ── */}
          {showTracker && (
            <div style={{ position:"fixed", inset:0, zIndex:300, background:"rgba(0,0,0,.55)", backdropFilter:"blur(4px)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
              onClick={() => setShowTracker(null)}>
              <div className="pop" onClick={e => e.stopPropagation()} style={{ width:"100%", maxWidth:370, background:"#fff", borderRadius:24, padding:"28px 22px", boxShadow:"0 20px 60px rgba(0,0,0,.14)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
                  <div>
                    <h3 style={{ fontSize:19, fontWeight:800 }}>Order Tracker</h3>
                    <p style={{ fontSize:12, color:"#bbb", marginTop:2 }}>#{showTracker.id?.slice(0,8)}</p>
                  </div>
                  <button onClick={() => setShowTracker(null)} style={{ width:34, height:34, borderRadius:10, background:"#F3F4F6", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                </div>
                {ORDER_STATUSES.map((s,i) => {
                  const idx     = ORDER_STATUSES.findIndex(st => st.key === showTracker.status);
                  const active  = i <= idx;
                  const current = i === idx;
                  return (
                    <div key={s.key} style={{ display:"flex", gap:14 }}>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                        <div style={{
                          width:40, height:40, borderRadius:12,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          background:active?"#22C55E":"#F3F4F6", color:active?"#fff":"#ccc",
                          boxShadow:current?"0 0 0 4px #BBF7D0":"none", transition:"all .3s"
                        }}><Ic n={s.icon} size={18} /></div>
                        {i < 3 && <div style={{ width:3, height:32, background:active&&i<idx?"#22C55E":"#E5E7EB", borderRadius:3 }} />}
                      </div>
                      <div style={{ paddingTop:4, paddingBottom:i<3?14:0 }}>
                        <div style={{ fontSize:14, fontWeight:700, color:active?"#111":"#ccc" }}>{s.label}</div>
                        <div style={{ fontSize:11, color:"#aaa" }}>{s.desc}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── Success Toast ── */}
          {orderPlaced && (
            <div className="pop" style={{
              position:"fixed", top:`calc(env(safe-area-inset-top,0px) + 16px)`, left:20, right:20, zIndex:500,
              background:"#166534", color:"#fff", padding:"15px 26px", borderRadius:16,
              fontSize:14, fontWeight:700, boxShadow:"0 8px 32px rgba(0,0,0,.22)",
              display:"flex", alignItems:"center", gap:10
            }}>
              <Ic n="circle-check" size={22} /> Order placed! Salamat, mare/pare!
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
