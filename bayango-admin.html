<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BayanGo — Binangonan Concierge</title>
  <meta name="description" content="Kami na ang mamamalengke para sa'yo sa Binangonan!" />
  <meta name="theme-color" content="#166534" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BayanGo" />
  <link rel="manifest" href="bayango-user-manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F8FAF8; font-family: 'Plus Jakarta Sans', sans-serif; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn { from { transform:translateX(100%); } to { transform:translateX(0); } }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    @keyframes pop     { 0%{transform:scale(.85);opacity:0;} 100%{transform:scale(1);opacity:1;} }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes pulse   { 0%,100%{opacity:1;} 50%{opacity:.45;} }
    @keyframes ripple  { 0%{transform:scale(0);opacity:.6;} 100%{transform:scale(2.5);opacity:0;} }
    .fade-up  { animation: fadeUp  .38s ease both; }
    .slide-in { animation: slideIn .28s cubic-bezier(.4,0,.2,1) both; }
    .slide-up { animation: slideUp .3s cubic-bezier(.4,0,.2,1) both; }
    .pop      { animation: pop .25s ease both; }
    .spin     { animation: spin 1s linear infinite; }
    .ai-pulse { animation: pulse 1.4s ease infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    const Ic = ({ n, style, size, className }) => <i className={`fa-solid fa-${n}${className?' '+className:''}`} style={{ fontSize:size, lineHeight:1, ...style }} />;

    /* ══════════════════ CONSTANTS ══════════════════ */
    const CATEGORIES = [
      { id:"isda",     label:"Isda",          icon:"fish",               color:"#0EA5E9" },
      { id:"karne",    label:"Karne",          icon:"drumstick-bite",     color:"#EF4444" },
      { id:"gulay",    label:"Gulay",          icon:"leaf",               color:"#22C55E" },
      { id:"prutas",   label:"Prutas",         icon:"apple-whole",        color:"#F97316" },
      { id:"ulam",     label:"Lutong Ulam",    icon:"bowl-food",          color:"#A855F7" },
      { id:"sari",     label:"Sari-Sari",      icon:"store",              color:"#EC4899" },
      { id:"gamot",    label:"Gamot",          icon:"pills",              color:"#14B8A6" },
      { id:"hardware", label:"Hardware",       icon:"screwdriver-wrench", color:"#F59E0B" },
    ];

    const ORDER_STATUSES = [
      { key:"pending",   label:"Pending",   icon:"hourglass-half", desc:"Nai-receive na ang order mo" },
      { key:"buying",    label:"Buying",    icon:"cart-shopping",  desc:"Binibili na sa palengke" },
      { key:"otw",       label:"OTW",       icon:"motorcycle",     desc:"Papunta na sa'yo" },
      { key:"delivered", label:"Delivered", icon:"circle-check",   desc:"Na-deliver na!" },
    ];

    const DELIVERY_ZONES = [
      { label:"Bayan Area",          fee:49 },
      { label:"Eastridge / Tayuman", fee:65 },
      { label:"Libis / Pantok",      fee:75 },
    ];

    const SERVICE_FEE = 20;
    const fmt = n => "₱" + Number(n).toLocaleString("en-PH", { minimumFractionDigits:0 });
    const DEFAULT_MARKET_FACTOR = 1;
    const roundPrice = (n) => Math.max(0, Math.round(Number(n) || 0));
    const computeLivePrice = (product, marketPricing = {}) => {
      const manualPrice = Number(product?.basePrice ?? product?.price ?? 0);
      if (product?.autoPriceEnabled === false) return roundPrice(manualPrice);
      const factor = Number(marketPricing?.[product?.cat]) || DEFAULT_MARKET_FACTOR;
      return roundPrice(manualPrice * factor);
    };
    const isImageSrc = (value) =>
      typeof value === "string" &&
      /^(https?:\/\/|blob:|data:image\/)/i.test(value);
    const orderItemImage = (item) => {
      const possible = [item?.img, item?.image, item?.imageUrl, item?.photo, item?.photoURL];
      return possible.find(isImageSrc) || "";
    };

    /* ══════════════════ FIREBASE INIT (AUTH + FIRESTORE) ══════════════════ */
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",
      authDomain:        "bayango-315c6.firebaseapp.com",
      projectId:         "bayango-315c6",
      storageBucket:     "bayango-315c6.firebasestorage.app",
      messagingSenderId: "199013441811",
      appId:             "1:199013441811:web:315a38f03ddc9b676e3ae6",
      measurementId:     "G-1EEGFZWB7E",
      databaseURL:       "https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app",
    };

    let _db = null;
    let _fns = null;
    let _auth = null;
    let _authFns = null;
    let _app = null;
    let _initPromise = null; // singleton guard — prevents duplicate-app errors

    async function initFirebase() {
      if (_db && _auth) return { db: _db, fns: _fns, auth: _auth, authFns: _authFns };
      if (_initPromise) return _initPromise; // already initializing — wait for it

      _initPromise = (async () => {
        const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
        const { getDatabase, ref, push, set, update, remove, onValue, off, get, query: rtdbQuery, orderByChild, equalTo } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
        const { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");

        // Avoid "duplicate-app" error if already initialized
        _app  = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
        _db   = getDatabase(_app, FIREBASE_CONFIG.databaseURL);
        _auth = getAuth(_app);

        _fns = { ref, push, set, update, remove, onValue, off, get, rtdbQuery, orderByChild, equalTo };
        _authFns = { signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut };

        return { db: _db, fns: _fns, auth: _auth, authFns: _authFns };
      })();

      return _initPromise;
    }

    async function initStorage() {
      if (!_app) await initFirebase();
      const mod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js");
      return { storage: mod.getStorage(_app), ref: mod.ref, uploadBytes: mod.uploadBytes, getDownloadURL: mod.getDownloadURL };
    }

    const GOOGLE_TOKEN_URI = "https://oauth2.googleapis.com/token";
    const FIREBASE_MESSAGING_SCOPE = "https://www.googleapis.com/auth/firebase.messaging";
    let _joseModule = null;

    const getServiceAccountJson = () => localStorage.getItem("bayango_fcm_service_account") || "";

    async function getJoseModule() {
      if (_joseModule) return _joseModule;
      _joseModule = await import("https://cdn.jsdelivr.net/npm/jose@5/+esm");
      return _joseModule;
    }

    async function getGoogleAccessToken(serviceAccount) {
      const { importPKCS8, SignJWT } = await getJoseModule();
      const now = Math.floor(Date.now() / 1000);
      const jwtKey = await importPKCS8(serviceAccount.private_key, "RS256");

      const assertion = await new SignJWT({ scope: FIREBASE_MESSAGING_SCOPE })
        .setProtectedHeader({ alg: "RS256", typ: "JWT" })
        .setIssuer(serviceAccount.client_email)
        .setSubject(serviceAccount.client_email)
        .setAudience(serviceAccount.token_uri || GOOGLE_TOKEN_URI)
        .setIssuedAt(now)
        .setExpirationTime(now + 3600)
        .sign(jwtKey);

      const tokenRes = await fetch(serviceAccount.token_uri || GOOGLE_TOKEN_URI, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          grant_type: "urn:ietf:params:oauth:grant-type:jwt-bearer",
          assertion,
        }),
      });
      const tokenJson = await tokenRes.json().catch(() => ({}));
      if (!tokenRes.ok || !tokenJson.access_token) {
        throw new Error(tokenJson?.error_description || tokenJson?.error || `OAuth HTTP ${tokenRes.status}`);
      }
      return tokenJson.access_token;
    }

    async function sendFcmToTokens(tokens, { title, body, data = {} }) {
      const rawJson = getServiceAccountJson();
      if (!rawJson) throw new Error("Walang service account JSON. I-save muna sa admin panel.");

      let serviceAccount;
      try {
        serviceAccount = JSON.parse(rawJson);
      } catch {
        throw new Error("Invalid service account JSON format.");
      }

      if (!serviceAccount?.project_id || !serviceAccount?.client_email || !serviceAccount?.private_key) {
        throw new Error("Incomplete service account fields.");
      }

      const uniq = [...new Set((tokens || []).filter(Boolean))];
      if (!uniq.length) return { sent: 0 };

      const accessToken = await getGoogleAccessToken(serviceAccount);
      const endpoint = `https://fcm.googleapis.com/v1/projects/${serviceAccount.project_id}/messages:send`;
      let sent = 0;

      for (const token of uniq) {
        const payload = {
          message: {
            token,
            notification: { title, body },
            data: Object.fromEntries(Object.entries(data || {}).map(([k, v]) => [String(k), String(v)])),
            webpush: {
              notification: {
                title,
                body,
                icon: "https://i.imgur.com/wL8wcBB.jpeg",
              },
              fcm_options: {
                link: "https://bayango.ph/bayango-user.html#/orders",
              },
            },
          },
        };

        const res = await fetch(endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${accessToken}`,
          },
          body: JSON.stringify(payload),
        });

        if (res.ok) {
          sent += 1;
          continue;
        }

        const errJson = await res.json().catch(() => ({}));
        console.error("FCM send failed for token:", token, errJson);
      }

      return { sent };
    }

    async function collectUserTokens(uid) {
      if (!uid) return [];
      const { db, fns } = await initFirebase();
      const snap = await fns.get(fns.ref(db, `push_tokens/${uid}`));
      if (!snap.exists()) return [];
      const val = snap.val() || {};
      return Object.values(val).map(v => v?.token).filter(Boolean);
    }

    async function collectAllTokens() {
      const { db, fns } = await initFirebase();
      const snap = await fns.get(fns.ref(db, "push_tokens"));
      if (!snap.exists()) return [];
      const val = snap.val() || {};
      const tokens = [];
      Object.values(val).forEach((userTokens) => {
        Object.values(userTokens || {}).forEach((entry) => {
          if (entry?.enabled !== false && entry?.token) tokens.push(entry.token);
        });
      });
      return [...new Set(tokens)];
    }

    /* ══════════════════ MAIN APP ══════════════════ */
    function App() {
      const [products, setProducts] = useState([]);
      const [orders,   setOrders]   = useState([]);
      const [tickets,  setTickets]  = useState([]);
      const [vouchers, setVouchers] = useState([]);
      const [ready,    setReady]    = useState(false);
      const [user,     setUser]     = useState(null);
      const [marketPricing, setMarketPricing] = useState({});

      useEffect(() => {
        let unsubOrders, unsubProducts, unsubTickets, unsubVouchers, unsubMarket, unsubAuth;
        (async () => {
          const { db, fns, auth, authFns } = await initFirebase();
          const { onAuthStateChanged } = authFns;

          unsubAuth = onAuthStateChanged(auth, (currentUser) => {
            setUser(currentUser);
            setReady(true);

            // Clean up any previous realtime listeners before re-establishing
            unsubOrders?.();
            unsubProducts?.();
            unsubTickets?.();
            unsubVouchers?.();

            if (!currentUser) {
              setOrders([]);
              setTickets([]);
              setVouchers([]);
              return;
            }

            // Listen products realtime
            const prodsRef = fns.ref(db, "products");
            fns.onValue(prodsRef, snap => {
              const list = [];
              snap.forEach(c => {
                const v = c.val() || {};
                list.push({
                  id: c.key,
                  name: typeof v.name === "string" ? v.name : "",
                  cat: typeof v.cat === "string" ? v.cat : "isda",
                  price: Number.isFinite(Number(v.price)) ? Number(v.price) : 0,
                  basePrice: Number.isFinite(Number(v.basePrice)) ? Number(v.basePrice) : (Number.isFinite(Number(v.price)) ? Number(v.price) : 0),
                  autoPriceEnabled: v.autoPriceEnabled !== false,
                  unit: typeof v.unit === "string" && v.unit ? v.unit : "kg",
                  stock: v.stock !== false,
                  img: typeof v.img === "string" ? v.img : "",
                  createdAt: Number(v.createdAt || 0),
                });
              });
              setProducts(list);
            }, err => console.error("Products snapshot error:", err));
            unsubProducts = () => fns.off(prodsRef);

            const marketPricingRef = fns.ref(db, "settings/marketPricing");
            fns.onValue(marketPricingRef, snap => {
              const raw = snap.val() || {};
              const normalized = {};
              CATEGORIES.forEach(c => {
                const val = Number(raw?.[c.id]);
                normalized[c.id] = Number.isFinite(val) && val > 0 ? val : DEFAULT_MARKET_FACTOR;
              });
              setMarketPricing(normalized);
            }, err => console.error("Market pricing snapshot error:", err));
            unsubMarket = () => fns.off(marketPricingRef);

            // Listen orders realtime (query first, fallback to plain ref if query is denied by rules)
            const ordersQueryRef = fns.rtdbQuery(fns.ref(db, "orders"), fns.orderByChild("createdAt"));
            const ordersPlainRef = fns.ref(db, "orders");
            let usingOrdersFallback = false;
            const mapAndSortOrders = (snap) => {
              const list = [];
              snap.forEach(c => {
                const v = c.val() || {};
                list.push({ id:c.key, ...v, status: v.status || "pending" });
              });
              list.sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
              setOrders(list);
            };

            fns.onValue(ordersQueryRef, mapAndSortOrders, err => {
              console.error("Orders snapshot error:", err.code, err.message);
              const code = String(err?.code || "").toLowerCase();
              if ((code === "permission_denied" || code === "permission-denied") && !usingOrdersFallback) {
                usingOrdersFallback = true;
                fns.onValue(ordersPlainRef, mapAndSortOrders, plainErr => {
                  console.error("Orders fallback snapshot error:", plainErr.code, plainErr.message);
                });
              }
            });
            unsubOrders = () => {
              fns.off(ordersQueryRef);
              if (usingOrdersFallback) fns.off(ordersPlainRef);
            };

            // Listen support tickets realtime
            const ticketsRef = fns.rtdbQuery(fns.ref(db, "support_tickets"), fns.orderByChild("createdAt"));
            fns.onValue(ticketsRef, snap => {
              const list = [];
              snap.forEach(c => list.push({ id:c.key, ...c.val() }));
              setTickets(list.reverse());
            }, err => console.error("Tickets snapshot error:", err.code, err.message));
            unsubTickets = () => fns.off(ticketsRef);

            // Listen vouchers realtime
            const vouchersRef = fns.ref(db, "vouchers");
            fns.onValue(vouchersRef, snap => {
              const list = [];
              snap.forEach(c => {
                const v = c.val() || {};
                list.push({
                  id: c.key,
                  code: String(v.code || "").toUpperCase(),
                  type: v.type || "fixed",
                  value: Number(v.value || 0),
                  minOrder: Number(v.minOrder || 0),
                  active: v.active !== false,
                  expiresAt: Number(v.expiresAt || 0),
                  createdAt: Number(v.createdAt || 0),
                });
              });
              list.sort((a,b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
              setVouchers(list);
            }, err => console.error("Vouchers snapshot error:", err.code, err.message));
            unsubVouchers = () => fns.off(vouchersRef);
          });
        })();
        return () => { unsubOrders?.(); unsubProducts?.(); unsubTickets?.(); unsubVouchers?.(); unsubMarket?.(); unsubAuth?.(); };
      }, []);

      const addOrder = useCallback(async (order) => {
        const { db, fns } = await initFirebase();
        await fns.push(fns.ref(db, "orders"), {
          ...order,
          status: "pending",
          createdAt: Date.now(),
        });
      }, []);

      const updateOrderStatus = useCallback(async (order, newStatus) => {
        const { db, fns } = await initFirebase();
        await fns.update(fns.ref(db, "orders/" + order.id), { status: newStatus });

        try {
          const statusLabel = (ORDER_STATUSES.find(s => s.key === newStatus)?.label) || newStatus;
          const tokens = await collectUserTokens(order.uid || order.userId);
          await sendFcmToTokens(tokens, {
            title: "Order Update",
            body: `Order #${String(order.id || "").slice(-6)}: ${statusLabel}`,
            data: { type: "order_status", orderId: String(order.id || ""), status: newStatus },
          });
        } catch (pushErr) {
          console.error("Order push send failed:", pushErr);
        }
      }, []);

      const sendBroadcast = useCallback(async (title, message) => {
        const tokens = await collectAllTokens();
        await sendFcmToTokens(tokens, {
          title,
          body: message,
          data: { type: "broadcast" },
        });
      }, []);

      const handleGoogleLogin = async () => {
        try {
          const { auth, authFns } = await initFirebase();
          const provider = new authFns.GoogleAuthProvider();
          await authFns.signInWithPopup(auth, provider);
        } catch (error) {
          alert("Error sa pag-login: " + error.message);
        }
      };

      const handleLogout = async () => {
        const { auth, authFns } = await initFirebase();
        await authFns.signOut(auth);
      };

      const addProduct = useCallback(async (data) => {
        const { db, fns } = await initFirebase();
        try {
          await fns.push(fns.ref(db, "products"), { ...data, createdAt: Date.now() });
        } catch (err) {
          const code = String(err?.code || "").toLowerCase();
          if (code.includes("permission")) {
            throw new Error("Permission denied: i-check kung naka-login ka at may write access sa Firebase rules.");
          }
          throw err;
        }
      }, []);

      const updateProduct = useCallback(async (productId, data) => {
        if (typeof productId !== "string" || !productId) throw new Error("Invalid product ID: " + productId);
        const { db, fns } = await initFirebase();
        await fns.update(fns.ref(db, "products/" + productId), data);
      }, []);

      const deleteProduct = useCallback(async (productId) => {
        if (typeof productId !== "string" || !productId) throw new Error("Invalid product ID: " + productId);
        const { db, fns } = await initFirebase();
        await fns.remove(fns.ref(db, "products/" + productId));
      }, []);

      const updateMarketPricing = useCallback(async (catId, factor) => {
        const { db, fns } = await initFirebase();
        await fns.update(fns.ref(db, "settings/marketPricing"), {
          [catId]: Number(factor),
        });
      }, []);

      const addVoucher = useCallback(async (data) => {
        const { db, fns } = await initFirebase();
        await fns.push(fns.ref(db, "vouchers"), { ...data, createdAt: Date.now() });
      }, []);

      const updateVoucher = useCallback(async (voucherId, data) => {
        if (typeof voucherId !== "string" || !voucherId) throw new Error("Invalid voucher ID: " + voucherId);
        const { db, fns } = await initFirebase();
        await fns.update(fns.ref(db, "vouchers/" + voucherId), data);
      }, []);

      const deleteVoucher = useCallback(async (voucherId) => {
        if (typeof voucherId !== "string" || !voucherId) throw new Error("Invalid voucher ID: " + voucherId);
        const { db, fns } = await initFirebase();
        await fns.remove(fns.ref(db, "vouchers/" + voucherId));
      }, []);

      // Show loading state while Firebase connects
      if (!ready) return (
        <div style={{ minHeight:"100vh", background:"#F8FAF8", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
          <Ic n="gear" size={48} className="spin" style={{ color:"#166534" }} />
          <div style={{ fontSize:16, fontWeight:700, color:"#166534" }}>Nagkokonekta sa BayanGo...</div>
          <div style={{ fontSize:12, color:"#aaa" }}>Hinihintay ang Firebase</div>
        </div>
      );

      // Show login screen if not logged in
      if (!user) {
        return (
          <div style={{ minHeight:"100vh", background:"#111", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:20, padding:20 }}>
            <div className="fade-up" style={{ textAlign:"center" }}>
              <img src="https://i.imgur.com/tMk73Mg.png" style={{ height:180, objectFit:"contain", marginBottom:10, filter:"drop-shadow(0 6px 28px rgba(0,0,0,.5))" }} />
              <p style={{ color:"#888", fontSize:14 }}>Mag-sign in para pamahalaan ang orders.</p>
            </div>
            <button className="fade-up" onClick={handleGoogleLogin} style={{
              background:"#fff", border:"1px solid #ddd", padding:"12px 24px", borderRadius:12,
              fontSize:15, fontWeight:700, color:"#111", display:"flex", alignItems:"center", gap:10,
              boxShadow:"0 2px 10px rgba(0,0,0,0.5)", cursor:"pointer", animationDelay:".1s"
            }}>
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style={{width:20, height:20}} />
              Sign in with Google
            </button>
          </div>
        );
      }

      // Render actual app with logout bar
      return (
        <>
          <div style={{ background:"#000", color:"#fff", padding:"8px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:12 }}>
            <span style={{color:"#aaa"}}>Admin: <b style={{color:"#fff"}}>{user.displayName || user.email}</b></span>
            <button onClick={handleLogout} style={{ color:"#EF4444", fontWeight:"bold" }}>Sign Out</button>
          </div>
          <AdminDashboard
            orders={orders} onUpdateStatus={updateOrderStatus} onBroadcast={sendBroadcast}
            products={products} onAddProduct={addProduct}
            onUpdateProduct={updateProduct} onDeleteProduct={deleteProduct}
            marketPricing={marketPricing}
            onUpdateMarketPricing={updateMarketPricing}
            tickets={tickets}
            vouchers={vouchers}
            onAddVoucher={addVoucher}
            onUpdateVoucher={updateVoucher}
            onDeleteVoucher={deleteVoucher}
          />
        </>
      );
    }

    /* ══════════════════ ADMIN DASHBOARD ══════════════════ */
    function AdminDashboard({ orders, onUpdateStatus, onBroadcast, products, onAddProduct, onUpdateProduct, onDeleteProduct, marketPricing, onUpdateMarketPricing, tickets, vouchers, onAddVoucher, onUpdateVoucher, onDeleteVoucher }) {
      const [tab,          setTab]          = useState("orders");
      const [selected,     setSelected]     = useState(null);
      const [updating,     setUpdating]     = useState(null);
      const [ordersView,   setOrdersView]   = useState("active");
      const [filterStatus, setFilterStatus] = useState("all");
      const [searchQ,      setSearchQ]      = useState("");
      const [svcJson,      setSvcJson]      = useState(() => localStorage.getItem("bayango_fcm_service_account") || "");
      const [bTitle,        setBTitle]       = useState("Advisory");
      const [bMessage,      setBMessage]     = useState("");
      const [pushBusy,      setPushBusy]     = useState(false);
      const [vapidKey,      setVapidKey]     = useState("");

      const STATUS_FLOW = ["pending","buying","otw","delivered"];

      const viewFilteredOrders = orders.filter(o => ordersView === "archive" ? o.status === "delivered" : o.status !== "delivered");

      const filtered = viewFilteredOrders.filter(o => {
        if (filterStatus !== "all" && o.status !== filterStatus) return false;
        if (searchQ) {
          const q = searchQ.toLowerCase();
          return (
            o.customer?.name?.toLowerCase().includes(q) ||
            o.customer?.phone?.includes(q) ||
            o.items?.some(i => i.name?.toLowerCase().includes(q))
          );
        }
        return true;
      });

      const counts = {
        all:       orders.length,
        pending:   orders.filter(o => o.status === "pending").length,
        buying:    orders.filter(o => o.status === "buying").length,
        otw:       orders.filter(o => o.status === "otw").length,
        delivered: orders.filter(o => o.status === "delivered").length,
      };

      useEffect(() => {
        (async () => {
          try {
            const { db, fns } = await initFirebase();
            const snap = await fns.get(fns.ref(db, "settings/pushVapidKey"));
            if (snap.exists()) setVapidKey(String(snap.val() || ""));
          } catch (err) {
            console.error("Failed to read VAPID key:", err);
          }
        })();
      }, []);

      const advance = async (order) => {
        const idx = STATUS_FLOW.indexOf(order.status);
        if (idx < 0 || idx >= STATUS_FLOW.length - 1) return;
        const next = STATUS_FLOW[idx + 1];
        setUpdating(order.id);
        try { await onUpdateStatus(order, next); }
        finally { setUpdating(null); if (selected?.id === order.id) setSelected(s => ({...s, status:next})); }
      };

      const STATUS_INFO = {
        pending:   { label:"Pending",   icon:"hourglass-half", bg:"#F3F4F6", color:"#555",    next:"Mark as Buying" },
        buying:    { label:"Buying",    icon:"cart-shopping",  bg:"#FEF3C7", color:"#92400E", next:"Mark as OTW" },
        otw:       { label:"OTW",       icon:"motorcycle",     bg:"#DBEAFE", color:"#1D4ED8", next:"Mark Delivered" },
        delivered: { label:"Delivered", icon:"circle-check",   bg:"#DCFCE7", color:"#166534", next:null },
      };

      const deliveredOrders = orders.filter(o => o.status === "delivered");
      const activeOrders = orders.filter(o => o.status !== "delivered");
      const totalRevenue = deliveredOrders.reduce((s,o) => s + (o.serviceFee||0), 0);
      const todayStr = new Date().toLocaleDateString("en-PH");
      const todayOrders = orders.filter(o => {
        const d = o.createdAt?.toDate ? o.createdAt.toDate() : new Date(o.createdAt||0);
        return d.toLocaleDateString("en-PH") === todayStr;
      });
      const activeRiders = [...new Set(orders.filter(o => o.status === "otw" && o.riderId).map(o => o.riderId))].length;

      return (
        <div style={{ maxWidth:640, margin:"0 auto", minHeight:"100vh", background:"#F8FAF8", paddingBottom:40 }}>

          {/* ── Tab Bar ── */}
          <div style={{ display:"flex", background:"#fff", borderBottom:"1px solid #E5E7EB", padding:"0 20px" }}>
            {[
              { key:"orders",   label:"Mga Orders",   icon:"receipt" },
              { key:"products", label:"Mga Produkto",  icon:"store" },
              { key:"vouchers", label:"Vouchers",      icon:"ticket" },
              { key:"support",  label:"Support",       icon:"headset", badge: tickets.filter(t=>t.status==="open").length },
            ].map(t => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                flex:1, padding:"14px 8px", fontSize:13, fontWeight:700,
                color: tab===t.key ? "#166534" : "#888",
                borderBottom: tab===t.key ? "3px solid #22C55E" : "3px solid transparent",
                display:"flex", alignItems:"center", justifyContent:"center", gap:7,
                transition:"all .2s", position:"relative",
              }}>
                <Ic n={t.icon} size={14} />{t.label}
                {t.badge > 0 && (
                  <span style={{ position:"absolute", top:8, right:8, background:"#EF4444", color:"#fff", borderRadius:10, fontSize:10, fontWeight:800, padding:"1px 6px", minWidth:17, textAlign:"center" }}>{t.badge}</span>
                )}
              </button>
            ))}
          </div>

          {tab === "support" && (
            <SupportPanel tickets={tickets} />
          )}

          {tab === "products" && (
            <ProductsPanel
              products={products}
              onAdd={onAddProduct}
              onUpdate={onUpdateProduct}
              onDelete={onDeleteProduct}
              marketPricing={marketPricing}
              onUpdateMarketPricing={onUpdateMarketPricing}
            />
          )}

          {tab === "vouchers" && (
            <VouchersPanel
              vouchers={vouchers}
              onAdd={onAddVoucher}
              onUpdate={onUpdateVoucher}
              onDelete={onDeleteVoucher}
            />
          )}

          {tab === "orders" && <>

          {/* ── Push Notifications ── */}
          <div style={{ margin:"14px 20px 10px", background:"#fff", border:"1px solid #E5E7EB", borderRadius:16, padding:14 }}>
            <div style={{ fontSize:14, fontWeight:800, color:"#166534", marginBottom:8 }}><Ic n="bell" style={{marginRight:6}} />Push Notifications</div>
            <div style={{ fontSize:11, color:"#666", marginBottom:10 }}>Gamitin ang Firebase Service Account JSON para secure na FCM v1 sending.</div>
            <textarea value={svcJson} onChange={e=>setSvcJson(e.target.value)} placeholder="Service Account JSON" rows={6} style={{ width:"100%", padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:12, marginBottom:8, fontFamily:"monospace", resize:"vertical" }} />
            <button onClick={() => { localStorage.setItem("bayango_fcm_service_account", svcJson.trim()); alert("Service account saved (local browser only)."); }} style={{ width:"100%", padding:"9px 12px", borderRadius:10, background:"#111827", color:"#fff", fontSize:12, fontWeight:700, marginBottom:8 }}>Save Service Account</button>
            <input value={vapidKey} onChange={e=>setVapidKey(e.target.value)} placeholder="Public VAPID Key (Web Push)" style={{ width:"100%", padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:12, marginBottom:8 }} />
            <button onClick={async () => {
              try {
                const { db, fns } = await initFirebase();
                await fns.set(fns.ref(db, "settings/pushVapidKey"), vapidKey.trim());
                alert("VAPID key saved.");
              } catch (err) { alert(err.message || "Failed to save VAPID key"); }
            }} style={{ width:"100%", padding:"9px 12px", borderRadius:10, background:"#1D4ED8", color:"#fff", fontSize:12, fontWeight:700, marginBottom:10 }}>Save VAPID Key</button>
            <input value={bTitle} onChange={e=>setBTitle(e.target.value)} placeholder="Broadcast title" style={{ width:"100%", padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:12, marginBottom:8 }} />
            <textarea value={bMessage} onChange={e=>setBMessage(e.target.value)} placeholder="Broadcast message" rows={2} style={{ width:"100%", padding:"10px 12px", border:"1px solid #D1D5DB", borderRadius:10, fontSize:12, marginBottom:8, resize:"vertical" }} />
            <button disabled={pushBusy || !bTitle.trim() || !bMessage.trim()} onClick={async () => {
              setPushBusy(true);
              try {
                await onBroadcast(bTitle.trim(), bMessage.trim());
                setBMessage("");
                alert("Broadcast sent.");
              } catch (err) {
                alert(err.message || "Failed to send broadcast");
              } finally { setPushBusy(false); }
            }} style={{ width:"100%", padding:"10px 12px", borderRadius:10, background: pushBusy?"#9CA3AF":"#166534", color:"#fff", fontSize:12, fontWeight:700 }}>
              {pushBusy ? "Sending..." : "Send Broadcast"}
            </button>
          </div>

          {/* ── Sales Summary ── */}
          <div style={{ padding:"18px 20px 10px", display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
            {[
              { label:"Service Fee Revenue", value:`₱${totalRevenue.toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2})}`, icon:"coins",        color:"#166534", bg:"#F0FDF4" },
              { label:"Today's Orders",       value:todayOrders.length,                                                                                icon:"calendar-day", color:"#1D4ED8", bg:"#EFF6FF" },
              { label:"Active Riders",         value:activeRiders,                                                                                     icon:"motorcycle",   color:"#7C3AED", bg:"#F5F3FF" },
            ].map(s => (
              <div key={s.label} style={{ background:s.bg, borderRadius:14, padding:"14px 12px", textAlign:"center", boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
                <div style={{ marginBottom:2 }}><Ic n={s.icon} size={20} style={{ color:s.color }} /></div>
                <div style={{ fontSize:s.label==="Service Fee Revenue"?14:24, fontWeight:800, color:s.color, lineHeight:1.2, marginTop:2 }}>{s.value}</div>
                <div style={{ fontSize:10, fontWeight:600, color:"#888", marginTop:2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* ── Stats Row ── */}
          <div style={{ padding:"4px 20px 10px", display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10 }}>
            {[
              { key:"pending",   label:"Pending",   icon:"hourglass-half", color:"#F59E0B" },
              { key:"buying",    label:"Buying",    icon:"cart-shopping",  color:"#3B82F6" },
              { key:"otw",       label:"OTW",       icon:"motorcycle",     color:"#8B5CF6" },
              { key:"delivered", label:"Done",      icon:"circle-check",   color:"#22C55E" },
            ].map(s => (
              <div key={s.key} style={{ background:"#fff", borderRadius:14, padding:"12px 10px", textAlign:"center", boxShadow:"0 1px 4px rgba(0,0,0,.06)", border:`2px solid ${filterStatus===s.key?s.color:"transparent"}`, cursor:"pointer" }}
                onClick={() => setFilterStatus(filterStatus===s.key?"all":s.key)}>
                <div style={{ marginBottom:2 }}><Ic n={s.icon} size={20} style={{ color:s.color }} /></div>
                <div style={{ fontSize:22, fontWeight:800, color:s.color, lineHeight:1.2 }}>{counts[s.key]}</div>
                <div style={{ fontSize:10, fontWeight:600, color:"#888" }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* ── Search ── */}
          <div style={{ padding:"6px 20px 14px" }}>
            <div style={{ marginBottom:10, display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, background:"#F1F5F9", borderRadius:14, border:"1px solid #E2E8F0", padding:6 }}>
              <button onClick={() => { setOrdersView("active"); if (filterStatus === "delivered") setFilterStatus("all"); }} style={{
                padding:"10px 12px", borderRadius:10, fontSize:12, fontWeight:800,
                background:ordersView==="active" ? "#166534" : "transparent",
                color:ordersView==="active" ? "#fff" : "#475569",
                boxShadow:ordersView==="active" ? "0 2px 8px rgba(22,101,52,.28)" : "none",
              }}>
                <Ic n="clock-rotate-left" style={{ marginRight:6 }} />
                Active ({activeOrders.length})
              </button>
              <button onClick={() => { setOrdersView("archive"); if (filterStatus === "all") setFilterStatus("delivered"); }} style={{
                padding:"10px 12px", borderRadius:10, fontSize:12, fontWeight:800,
                background:ordersView==="archive" ? "#1E293B" : "transparent",
                color:ordersView==="archive" ? "#fff" : "#475569",
                boxShadow:ordersView==="archive" ? "0 2px 8px rgba(30,41,59,.25)" : "none",
              }}>
                <Ic n="box-archive" style={{ marginRight:6 }} />
                Archive ({deliveredOrders.length})
              </button>
            </div>
            <div style={{ background:"#fff", borderRadius:14, padding:"11px 16px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 1px 4px rgba(0,0,0,.07)", border:"1px solid #E9ECEF" }}>
              <Ic n="magnifying-glass" style={{ opacity:.4, fontSize:16 }} />
              <input placeholder="Hanapin ang order (pangalan, phone, item)..." value={searchQ}
                onChange={e => setSearchQ(e.target.value)}
                style={{ flex:1, border:"none", outline:"none", fontSize:14, background:"transparent" }} />
              {searchQ && <button onClick={() => setSearchQ("")} style={{ opacity:.4, fontSize:15 }}>✕</button>}
            </div>
          </div>

          {/* ── Orders List ── */}
          <div style={{ padding:"0 20px" }}>
            {filtered.length === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"#ccc" }}>
                <Ic n="inbox" size={48} style={{ marginBottom:10, color:"#ccc" }} />
                <div style={{ fontSize:14, fontWeight:600 }}>{ordersView === "archive" ? "Wala pang archived orders" : "Walang active orders"}</div>
              </div>
            ) : filtered.map(order => {
              const st = STATUS_INFO[order.status] || STATUS_INFO.pending;
              const ts = order.createdAt?.toDate ? order.createdAt.toDate() : new Date(order.createdAt);
              const regularItems = order.items?.filter(i => !i.isCustom) || [];
              const customItems  = order.items?.filter(i => i.isCustom)  || [];
              return (
                <div key={order.id} className="fade-up" style={{ background:"#fff", borderRadius:18, padding:"16px", marginBottom:12, boxShadow:"0 2px 8px rgba(0,0,0,.05)", border:"1px solid #F0F0F0" }}>
                  {/* Header row */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                    <div>
                      <div style={{ fontSize:15, fontWeight:800, color:"#111" }}>{order.customer?.name || "—"}</div>
                      <div style={{ fontSize:12, color:"#888", marginTop:1 }}>{order.customer?.phone} • {order.customer?.address}</div>
                      <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>{ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ padding:"4px 12px", borderRadius:20, fontSize:12, fontWeight:700, background:st.bg, color:st.color, display:"inline-block" }}>
                        <Ic n={st.icon} style={{ marginRight:4 }} />{st.label}
                      </div>
                      {order.riderName && (
                        <div style={{ fontSize:11, fontWeight:600, color:"#7C3AED", marginTop:4 }}><Ic n="motorcycle" style={{ marginRight:4 }} />{order.riderName}</div>
                      )}
                      <div style={{ fontSize:14, fontWeight:800, color:"#166534", marginTop:4 }}>~{fmt(order.total)}</div>
                    </div>
                  </div>

                  {/* Items preview */}
                  <div style={{ marginBottom:10 }}>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                      {regularItems.map(i => {
                        const imgSrc = orderItemImage(i);
                        return (
                          <div key={i.id || `${i.name}-${i.qty}`} style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 8px", borderRadius:999, background:"#F8FAFC", border:"1px solid #E2E8F0", fontSize:12, color:"#475569" }}>
                            {imgSrc
                              ? <img src={imgSrc} alt={i.name} style={{ width:22, height:22, borderRadius:6, objectFit:"cover", border:"1px solid #E5E7EB" }} />
                              : <Ic n="bag-shopping" style={{ color:"#94A3B8" }} />
                            }
                            <span>{i.name} ×{i.qty}</span>
                          </div>
                        );
                      })}
                    </div>
                    {customItems.length > 0 && (
                      <span style={{ color:"#166534", fontWeight:700, fontSize:12, display:"inline-block", marginTop:8 }}>
                        <Ic n="note-sticky" style={{ marginRight:4 }} />{customItems.map(i=>i.name).join(", ")} <span style={{ fontSize:10, background:"#F0FDF4", padding:"1px 6px", borderRadius:4 }}>custom</span>
                      </span>
                    )}
                  </div>

                  {/* Zone + total */}
                  <div style={{ fontSize:11, color:"#aaa", marginBottom:12 }}>
                    <Ic n="location-dot" style={{ marginRight:4 }} />{order.zone} • Delivery {fmt(order.deliveryFee)} + Service {fmt(order.serviceFee)}
                    {(order.firstTimeFreeShipping || order.voucher?.code) && (
                      <span style={{ color:"#166534", marginLeft:6 }}>
                        • Discount {fmt(order.totalDiscount || ((order.freeShipDiscount || 0) + (order.voucher?.discount || 0)))}
                      </span>
                    )}
                  </div>

                  {/* Action buttons */}
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={() => setSelected(order)} style={{
                      flex:1, padding:"10px", borderRadius:12, background:"#F9FAFB",
                      border:"1px solid #E5E7EB", fontSize:13, fontWeight:600, color:"#555"
                    }}><Ic n="clipboard" style={{ marginRight:4 }} />Details</button>
                    {st.next && (
                      <button onClick={() => advance(order)} disabled={updating === order.id} style={{
                        flex:2, padding:"10px", borderRadius:12,
                        background: updating===order.id ? "#E5E7EB" : "linear-gradient(135deg,#166534,#22C55E)",
                        color: updating===order.id ? "#aaa" : "#fff",
                        fontSize:13, fontWeight:700,
                      }}>
                        {updating===order.id ? <><Ic n="hourglass-half" style={{ marginRight:4 }} />Updating...</> : `${st.next} →`}
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Order Detail Modal ── */}
          {selected && (
            <div style={{ position:"fixed", inset:0, zIndex:300, background:"rgba(0,0,0,.6)", backdropFilter:"blur(4px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}
              onClick={() => setSelected(null)}>
              <div className="slide-up" onClick={e => e.stopPropagation()} style={{
                width:"100%", maxWidth:540, background:"#fff", borderRadius:"24px 24px 0 0",
                padding:"24px 22px 36px", maxHeight:"85vh", overflowY:"auto"
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
                  <div>
                    <h3 style={{ fontSize:19, fontWeight:800 }}>Order Detail</h3>
                    <p style={{ fontSize:12, color:"#bbb" }}>#{selected.id?.slice(0,8)}</p>
                  </div>
                  <button onClick={() => setSelected(null)} style={{ width:34, height:34, borderRadius:10, background:"#F3F4F6", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                </div>

                {/* Customer */}
                <div style={{ background:"#F9FAFB", borderRadius:14, padding:"14px 16px", marginBottom:14, border:"1px solid #E5E7EB" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#888", marginBottom:6 }}>CUSTOMER</div>
                  <div style={{ fontSize:15, fontWeight:800 }}>{selected.customer?.name}</div>
                  <div style={{ fontSize:13, color:"#555", marginTop:2 }}>{selected.customer?.phone}</div>
                  <div style={{ fontSize:13, color:"#555", marginTop:2 }}><Ic n="location-dot" style={{ marginRight:4 }} />{selected.customer?.address}</div>
                  <div style={{ fontSize:12, color:"#aaa", marginTop:4 }}>Zone: {selected.zone}</div>
                </div>

                {/* Rider */}
                {selected.riderId && (
                  <div style={{ background:"#F5F3FF", borderRadius:14, padding:"14px 16px", marginBottom:14, border:"1px solid #DDD6FE" }}>
                    <div style={{ fontSize:12, fontWeight:700, color:"#7C3AED", marginBottom:6 }}>RIDER</div>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      {selected.riderPhoto && <img src={selected.riderPhoto} style={{ width:36, height:36, borderRadius:"50%", objectFit:"cover" }} />}
                      <div>
                        <div style={{ fontSize:15, fontWeight:800 }}>{selected.riderName || "—"}</div>
                        {selected.acceptedAt && (
                          <div style={{ fontSize:11, color:"#888" }}>
                            Accepted: {(selected.acceptedAt?.toDate ? selected.acceptedAt.toDate() : new Date(selected.acceptedAt)).toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                          </div>
                        )}
                        {selected.deliveredAt && (
                          <div style={{ fontSize:11, color:"#166534" }}>
                            Delivered: {(selected.deliveredAt?.toDate ? selected.deliveredAt.toDate() : new Date(selected.deliveredAt)).toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {/* Items */}
                <div style={{ background:"#F9FAFB", borderRadius:14, padding:"14px 16px", marginBottom:14, border:"1px solid #E5E7EB" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#888", marginBottom:10 }}>ITEMS</div>
                  {selected.items?.filter(i => !i.isCustom).map(i => (
                    <div key={i.id} style={{ display:"flex", justifyContent:"space-between", padding:"5px 0", fontSize:13, color:"#555", borderBottom:"1px solid #F0F0F0", gap:10 }}>
                      <span style={{ display:"inline-flex", alignItems:"center", gap:7 }}>
                        {orderItemImage(i)
                          ? <img src={orderItemImage(i)} alt={i.name} style={{ width:24, height:24, borderRadius:6, objectFit:"cover", border:"1px solid #E5E7EB" }} />
                          : <Ic n="bag-shopping" style={{ color:"#94A3B8" }} />
                        }
                        {i.name} ×{i.qty}
                      </span>
                      <span style={{ fontWeight:700 }}>{fmt(i.price * i.qty)}</span>
                    </div>
                  ))}
                  {selected.items?.some(i => i.isCustom) && (
                    <>
                      <div style={{ fontSize:11, fontWeight:700, color:"#166534", padding:"8px 0 4px", marginTop:4 }}><Ic n="note-sticky" style={{ marginRight:4 }} />Custom Items (User-requested)</div>
                      {selected.items.filter(i => i.isCustom).map(i => (
                        <div key={i.id} style={{ display:"flex", justifyContent:"space-between", padding:"5px 0", fontSize:13, color:"#555", borderBottom:"1px solid #F0F0F0" }}>
                          <span><Ic n="note-sticky" style={{ marginRight:4 }} />{i.name} ({i.unit})</span>
                          <span style={{ fontWeight:700, fontStyle:"italic", color:"#888" }}>~{fmt(i.estPrice)}</span>
                        </div>
                      ))}
                    </>
                  )}
                  <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid #E5E7EB", fontSize:13, color:"#888" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                      <span>Delivery</span><span>{fmt(selected.deliveryFee)}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between" }}>
                      <span>Service Fee</span><span>{fmt(selected.serviceFee)}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, paddingTop:8, borderTop:"2px dashed #D1D5DB", fontSize:16, fontWeight:800, color:"#111" }}>
                      <span>~Total</span><span>~{fmt(selected.total)}</span>
                    </div>
                  </div>
                </div>

                {/* Status update */}
                {STATUS_INFO[selected.status]?.next && (
                  <button onClick={() => advance(selected)} disabled={updating === selected.id} style={{
                    width:"100%", padding:"15px", borderRadius:16,
                    background: updating===selected.id ? "#E5E7EB" : "linear-gradient(135deg,#166534,#22C55E)",
                    color: updating===selected.id ? "#aaa" : "#fff",
                    fontSize:15, fontWeight:700,
                  }}>
                    {updating===selected.id ? <><Ic n="hourglass-half" style={{ marginRight:4 }} />Updating...</> : `${STATUS_INFO[selected.status].next} →`}
                  </button>
                )}
                {selected.status === "delivered" && (
                  <div style={{ textAlign:"center", padding:"10px", fontSize:15, fontWeight:700, color:"#166534" }}><Ic n="circle-check" style={{ marginRight:6 }} />Na-deliver na ang order na ito!</div>
                )}
              </div>
            </div>
          )}

          </>}
        </div>
      );
    }

    /* ══════════════════ PRODUCTS PANEL ══════════════════ */
    function ProductsPanel({ products, onAdd, onUpdate, onDelete, marketPricing, onUpdateMarketPricing }) {
      const [catFilter,  setCatFilter]  = useState("all");
      const [searchQ,    setSearchQ]    = useState("");
      const [showModal,  setShowModal]  = useState(false);
      const [editProd,  setEditProd]  = useState(null);
      const [delProd,   setDelProd]   = useState(null);
      const [delBusy,   setDelBusy]   = useState(false);
      const [saving,    setSaving]    = useState(false);
      const [deleteAllBusy, setDeleteAllBusy] = useState(false);
      const [savingFactor, setSavingFactor] = useState(null);

      const handleDeleteAll = async () => {
        if (deleteAllBusy) return;
        if (!window.confirm(`I-delete lahat ng ${products.length} produkto? Hindi na ito maibabalik.`)) return;
        setDeleteAllBusy(true);
        try {
          await Promise.all(products.map(p => onDelete(p.id)));
        } catch (err) {
          alert("May error sa pag-delete: " + (err.message || err.code || "unknown"));
        } finally {
          setDeleteAllBusy(false);
        }
      };

      const ALL_CATS = [{ id:"all", label:"Lahat", icon:"border-all", color:"#555" }, ...CATEGORIES];

      const filtered = products.filter(p => {
        if (catFilter !== "all" && p.cat !== catFilter) return false;
        if (searchQ) return p.name.toLowerCase().includes(searchQ.toLowerCase());
        return true;
      });

      const openAdd  = ()    => { setEditProd(null);  setShowModal(true); };
      const openEdit = (p)   => { setEditProd(p);     setShowModal(true); };
      const closeModal = ()  => { setShowModal(false); setEditProd(null); };

      const handleSave = async (data) => {
        setSaving(true);
        try {
          // editProd.id must be a Firestore string ID
          const isRealDoc = editProd && typeof editProd.id === "string";
          if (isRealDoc) await onUpdate(editProd.id, data);
          else           await onAdd(data);
          closeModal();
        } catch (err) {
          alert("Hindi ma-save ang produkto:\n" + (err.message || err.code || "Unknown error"));
        } finally { setSaving(false); }
      };

      const handleDelete = async () => {
        if (!delProd || delBusy) return;
        setDelBusy(true);
        try {
          await onDelete(delProd.id);
          setDelProd(null);
        } catch (err) {
          alert("Hindi ma-delete: " + (err.message || err.code || "unknown error"));
        } finally {
          setDelBusy(false);
        }
      };

      return (
        <div style={{ paddingBottom:80 }}>
          <div style={{ margin:"0 20px 8px", background:"#fff", borderRadius:14, border:"1px solid #E5E7EB", padding:"12px 12px 10px" }}>
            <div style={{ fontSize:12, fontWeight:800, color:"#166534", marginBottom:8 }}><Ic n="chart-line" style={{ marginRight:6 }} />Market Multiplier per Category</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:8 }}>
              {CATEGORIES.map(c => (
                <label key={c.id} style={{ background:"#F9FAFB", border:"1px solid #E5E7EB", borderRadius:10, padding:"8px 10px", display:"block" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:c.color, marginBottom:5 }}><Ic n={c.icon} style={{ marginRight:4 }} />{c.label}</div>
                  <input
                    type="number"
                    step="0.01"
                    min="0.1"
                    value={marketPricing?.[c.id] ?? DEFAULT_MARKET_FACTOR}
                    onChange={async (e) => {
                      const next = Number(e.target.value);
                      if (!Number.isFinite(next) || next <= 0) return;
                      setSavingFactor(c.id);
                      try { await onUpdateMarketPricing(c.id, next); }
                      finally { setSavingFactor(null); }
                    }}
                    style={{ width:"100%", padding:"8px", borderRadius:8, border:"1px solid #D1D5DB", fontSize:12 }}
                  />
                </label>
              ))}
            </div>
            <div style={{ fontSize:11, color:"#777", marginTop:8 }}>
              {savingFactor ? "Nagse-save ng market factor..." : "1.00 = normal, 1.10 = +10%, 0.90 = -10%"}
            </div>
          </div>

          {/* Search */}
          <div style={{ padding:"14px 20px 10px" }}>
            <div style={{ background:"#fff", borderRadius:14, padding:"11px 16px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 1px 4px rgba(0,0,0,.07)", border:"1px solid #E9ECEF" }}>
              <Ic n="magnifying-glass" style={{ opacity:.4, fontSize:16 }} />
              <input placeholder="Hanapin ang produkto..." value={searchQ}
                onChange={e => setSearchQ(e.target.value)}
                style={{ flex:1, border:"none", outline:"none", fontSize:14, background:"transparent" }} />
              {searchQ && <button onClick={() => setSearchQ("")} style={{ opacity:.4, fontSize:15 }}>✕</button>}
            </div>
          </div>

          {/* Category filter */}
          <div style={{ display:"flex", gap:8, padding:"4px 20px 10px", overflowX:"auto", scrollbarWidth:"none" }}>
            {ALL_CATS.map(c => (
              <button key={c.id} onClick={() => setCatFilter(c.id)} style={{
                padding:"8px 16px", borderRadius:30, whiteSpace:"nowrap", fontSize:12, fontWeight:700,
                display:"flex", alignItems:"center", gap:6,
                background: catFilter===c.id ? (c.color||"#166534") : "#fff",
                color:      catFilter===c.id ? "#fff" : "#555",
                border: catFilter===c.id ? "none" : "1px solid #E5E7EB",
                boxShadow: catFilter===c.id ? `0 4px 14px ${c.color||"#166534"}40` : "0 1px 3px rgba(0,0,0,.06)",
              }}>
                <Ic n={c.icon} size={12} />{c.label}
                {c.id !== "all" && <span style={{ background:"rgba(255,255,255,.25)", borderRadius:10, padding:"0 6px", fontSize:10, fontWeight:800 }}>
                  {products.filter(p => p.cat===c.id).length}
                </span>}
              </button>
            ))}
          </div>

          <div style={{ padding:"4px 20px 12px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ fontSize:13, color:"#888", fontWeight:600 }}>{filtered.length} produkto</span>
            <div style={{ display:"flex", gap:8 }}>
              {products.length > 0 && (
                <button onClick={handleDeleteAll} disabled={deleteAllBusy} style={{
                  padding:"9px 16px", borderRadius:12,
                  background: deleteAllBusy ? "#ccc" : "linear-gradient(135deg,#991b1b,#ef4444)",
                  color:"#fff", fontSize:13, fontWeight:700,
                  display:"flex", alignItems:"center", gap:7,
                  boxShadow:"0 3px 12px rgba(153,27,27,.3)",
                  opacity: deleteAllBusy ? .7 : 1
                }}>
                  <Ic n={deleteAllBusy ? "spinner" : "trash"} className={deleteAllBusy ? "spin" : ""} />
                  {deleteAllBusy ? "Dine-delete..." : "Delete Lahat"}
                </button>
              )}
              <button onClick={openAdd} style={{
                padding:"9px 16px", borderRadius:12,
                background:"linear-gradient(135deg,#166534,#22C55E)",
                color:"#fff", fontSize:13, fontWeight:700,
                display:"flex", alignItems:"center", gap:7,
                boxShadow:"0 3px 12px rgba(22,101,52,.3)"
              }}>
                <Ic n="plus" />Dagdag na Produkto
              </button>
            </div>
          </div>

          {/* Product list */}
          <div style={{ padding:"0 20px" }}>
            {filtered.length === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"#ccc" }}>
                <Ic n="box-open" size={48} style={{ marginBottom:12, color:"#ddd" }} />
                <div style={{ fontSize:14, fontWeight:600 }}>Walang produkto</div>
              </div>
            ) : filtered.map(p => {
              const cat = CATEGORIES.find(c => c.id === p.cat);
              const isUrl = typeof p.img === "string" && (p.img.startsWith("http") || p.img.startsWith("/"));
              return (
                <div key={p.id || p.name} className="fade-up" style={{
                  background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:10,
                  boxShadow:"0 2px 8px rgba(0,0,0,.05)", border:"1px solid #F0F0F0",
                  display:"flex", alignItems:"center", gap:12
                }}>
                  {/* Thumbnail */}
                  <div style={{
                    width:56, height:56, borderRadius:14, flexShrink:0, overflow:"hidden",
                    background: cat ? `linear-gradient(135deg,${cat.color}20,${cat.color}08)` : "#F3F4F6",
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:30
                  }}>
                    {isUrl
                      ? <img src={p.img} alt={p.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                      : (p.img || <Ic n="image" size={22} style={{ color:"#D1D5DB" }} />)
                    }
                  </div>

                  {/* Info */}
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:800, color:"#111", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</div>
                    <div style={{ fontSize:12, color:"#888", marginTop:2, display:"flex", alignItems:"center", gap:4 }}>
                      {cat && <><Ic n={cat.icon} size={11} style={{ color:cat.color }} /><span>{cat.label}</span><span>•</span></>}
                      <span style={{ fontWeight:700, color:"#166534" }}>₱{computeLivePrice(p, marketPricing)}</span>
                      <span>/ {p.unit}</span>
                      {p.autoPriceEnabled !== false && (
                        <span style={{ fontSize:10, color:"#0EA5E9", fontWeight:700, marginLeft:4 }}>AUTO</span>
                      )}
                    </div>
                    <span style={{
                      display:"inline-block", marginTop:5,
                      fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:6,
                      background: p.stock ? "#DCFCE7" : "#FEE2E2",
                      color:      p.stock ? "#166534" : "#DC2626"
                    }}>
                      {p.stock ? <><Ic n="circle-check" style={{ marginRight:3 }} />In Stock</> : <><Ic n="circle-xmark" style={{ marginRight:3 }} />Out of Stock</>}
                    </span>
                  </div>

                  {/* Action buttons */}
                  <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                    <button onClick={() => openEdit(p)} style={{
                      width:36, height:36, borderRadius:10, background:"#EFF6FF", border:"1px solid #BFDBFE",
                      display:"flex", alignItems:"center", justifyContent:"center", color:"#1D4ED8"
                    }}><Ic n="pen-to-square" size={14} /></button>
                    <button onClick={() => setDelProd(p)} style={{
                      width:36, height:36, borderRadius:10, background:"#FEF2F2", border:"1px solid #FECACA",
                      display:"flex", alignItems:"center", justifyContent:"center", color:"#DC2626"
                    }}><Ic n="trash" size={14} /></button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Add / Edit Modal */}
          {showModal && (
            <ProductModal
              product={editProd}
              onSave={handleSave}
              onClose={closeModal}
              saving={saving}
            />
          )}

          {/* Delete Confirm */}
          {delProd && (
            <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.6)", backdropFilter:"blur(4px)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
              onClick={() => !delBusy && setDelProd(null)}>
              <div className="pop" onClick={e => e.stopPropagation()} style={{
                width:"100%", maxWidth:340, background:"#fff", borderRadius:20, padding:"26px 22px"
              }}>
                <div style={{ textAlign:"center", marginBottom:22 }}>
                  <Ic n="trash-can" size={40} style={{ color:"#DC2626", marginBottom:12 }} />
                  <h3 style={{ fontSize:17, fontWeight:800, marginBottom:6 }}>I-delete ang produkto?</h3>
                  <p style={{ fontSize:13, color:"#888" }}>Hindi na mababalik ang <strong>{delProd.name}</strong>.</p>
                </div>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => setDelProd(null)} disabled={delBusy} style={{
                    flex:1, padding:"12px", borderRadius:12, background:"#F3F4F6", fontSize:14, fontWeight:700, color:"#555",
                    opacity: delBusy ? 0.5 : 1
                  }}>Huwag</button>
                  <button onClick={handleDelete} disabled={delBusy} style={{
                    flex:1, padding:"12px", borderRadius:12, fontSize:14, fontWeight:700, color:"#fff",
                    background: delBusy ? "#F87171" : "#DC2626"
                  }}>
                    {delBusy
                      ? <><Ic n="hourglass-half" style={{ marginRight:4 }} />Dine-delete...</>
                      : <><Ic n="trash" style={{ marginRight:4 }} />I-delete</>
                    }
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════ VOUCHERS PANEL ══════════════════ */
    function VouchersPanel({ vouchers, onAdd, onUpdate, onDelete }) {
      const [code, setCode] = useState("");
      const [type, setType] = useState("fixed");
      const [value, setValue] = useState("");
      const [minOrder, setMinOrder] = useState("");
      const [expiry, setExpiry] = useState("");
      const [saving, setSaving] = useState(false);

      const handleAdd = async () => {
        if (!code.trim()) return alert("Kailangan ng voucher code.");
        const normalized = code.trim().toUpperCase();
        if (vouchers.some(v => v.code === normalized)) return alert("May existing voucher na ganyang code.");
        setSaving(true);
        try {
          await onAdd({
            code: normalized,
            type,
            value: Number(value || 0),
            minOrder: Number(minOrder || 0),
            active: true,
            expiresAt: expiry ? new Date(expiry + "T23:59:59").getTime() : 0,
          });
          setCode(""); setType("fixed"); setValue(""); setMinOrder(""); setExpiry("");
        } catch (e) {
          alert("Failed mag-save ng voucher: " + e.message);
        } finally {
          setSaving(false);
        }
      };

      return (
        <div style={{ padding:"18px 20px 24px" }}>
          <div style={{ background:"#fff", borderRadius:16, padding:14, border:"1px solid #E5E7EB", marginBottom:14 }}>
            <div style={{ fontSize:14, fontWeight:800, color:"#111", marginBottom:10 }}><Ic n="ticket" style={{marginRight:6, color:"#166534"}} />Gumawa ng Voucher</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              <input value={code} onChange={e => setCode(e.target.value.toUpperCase())} placeholder="Code (e.g. BAYAN20)" style={{ padding:"11px 12px", borderRadius:10, border:"1px solid #D1D5DB" }} />
              <select value={type} onChange={e => setType(e.target.value)} style={{ padding:"11px 12px", borderRadius:10, border:"1px solid #D1D5DB", background:"#fff" }}>
                <option value="fixed">Fixed Peso Off</option>
                <option value="percent">Percent Off</option>
                <option value="free_shipping">Free Shipping</option>
              </select>
              <input type="number" min="0" value={value} onChange={e => setValue(e.target.value)} placeholder={type === "percent" ? "Percent (e.g. 10)" : "Value (₱)"} style={{ padding:"11px 12px", borderRadius:10, border:"1px solid #D1D5DB" }} />
              <input type="number" min="0" value={minOrder} onChange={e => setMinOrder(e.target.value)} placeholder="Min order (₱)" style={{ padding:"11px 12px", borderRadius:10, border:"1px solid #D1D5DB" }} />
              <input type="date" value={expiry} onChange={e => setExpiry(e.target.value)} style={{ padding:"11px 12px", borderRadius:10, border:"1px solid #D1D5DB", gridColumn:"span 2" }} />
            </div>
            <button onClick={handleAdd} disabled={saving} style={{ marginTop:10, width:"100%", padding:"12px", borderRadius:12, background:"#166534", color:"#fff", fontWeight:700 }}>
              {saving ? "Nagse-save..." : "Create Voucher"}
            </button>
          </div>

          <div style={{ display:"grid", gap:10 }}>
            {vouchers.length === 0 && <div style={{ fontSize:13, color:"#888", textAlign:"center", padding:"30px 0" }}>Walang vouchers pa.</div>}
            {vouchers.map(v => (
              <div key={v.id} style={{ background:"#fff", border:"1px solid #E5E7EB", borderRadius:14, padding:"12px 14px", display:"flex", justifyContent:"space-between", gap:10, alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:14, fontWeight:800 }}>{v.code}</div>
                  <div style={{ fontSize:12, color:"#666", marginTop:3 }}>
                    {v.type === "percent" ? `${v.value}% off` : v.type === "free_shipping" ? "Free shipping" : `${fmt(v.value)} off`} • Min {fmt(v.minOrder || 0)}
                  </div>
                  <div style={{ fontSize:11, color:"#999", marginTop:3 }}>
                    {v.expiresAt ? `Expires: ${new Date(v.expiresAt).toLocaleDateString("en-PH")}` : "No expiry"}
                  </div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:6, alignItems:"flex-end" }}>
                  <button onClick={() => onUpdate(v.id, { active: !v.active })} style={{
                    padding:"7px 10px", borderRadius:999, fontSize:11, fontWeight:700,
                    background: v.active ? "#DCFCE7" : "#F3F4F6",
                    color: v.active ? "#166534" : "#666"
                  }}>{v.active ? "Active" : "Inactive"}</button>
                  <button onClick={() => onDelete(v.id)} style={{ padding:"7px 10px", borderRadius:8, fontSize:11, fontWeight:700, background:"#FEF2F2", color:"#DC2626" }}>
                    Delete
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════ SUPPORT PANEL ══════════════════ */
    function SupportPanel({ tickets }) {
      const [openTicket,    setOpenTicket]    = useState(null);
      const [threadMsgs,    setThreadMsgs]    = useState([]);
      const [filterStatus,  setFilterStatus]  = useState("all");
      const [statusBusy,    setStatusBusy]    = useState(null);
      const [replyText,     setReplyText]     = useState("");
      const [replySending,  setReplySending]  = useState(false);

      // Listen to messages of selected ticket
      useEffect(() => {
        if (!openTicket) { setThreadMsgs([]); return; }
        let msgsRef;
        initFirebase().then(({ db, fns }) => {
          msgsRef = fns.rtdbQuery(fns.ref(db, "support_messages/" + openTicket.id), fns.orderByChild("createdAt"));
          fns.onValue(msgsRef, snap => {
            const list = [];
            snap.forEach(c => list.push({ id:c.key, ...c.val() }));
            setThreadMsgs(list);
          }, err => console.error("Thread listener:", err.code));
        });
        return () => { if (msgsRef) { initFirebase().then(({ fns }) => fns.off(msgsRef)); } };
      }, [openTicket?.id]);

      const markStatus = async (ticket, status) => {
        setStatusBusy(ticket.id);
        try {
          const { db, fns } = await initFirebase();
          await fns.update(fns.ref(db, "support_tickets/" + ticket.id), { status });
          if (openTicket?.id === ticket.id) setOpenTicket(t => ({ ...t, status }));
        } catch (err) {
          alert("Error: " + (err.message || err.code));
        } finally { setStatusBusy(null); }
      };

      const sendReply = async () => {
        if (!replyText.trim() || !openTicket) return;
        setReplySending(true);
        try {
          const { db, fns } = await initFirebase();
          await fns.push(fns.ref(db, "support_messages/" + openTicket.id), {
            text: replyText.trim(), senderType:"admin", senderName:"BayanGo Admin",
            createdAt: Date.now(),
          });
          setReplyText("");
        } catch (err) {
          alert("Hindi ma-send: " + (err.message || err.code));
        } finally { setReplySending(false); }
      };

      const ST = {
        open:     { bg:"#FEF3C7", color:"#92400E", label:"Open",     icon:"envelope-open" },
        resolved: { bg:"#DCFCE7", color:"#166534", label:"Resolved", icon:"circle-check"  },
        closed:   { bg:"#F3F4F6", color:"#555",    label:"Closed",   icon:"xmark-circle"  },
      };
      const fmtDate = ts => { if(!ts) return "—"; const d=new Date(ts); return d.toLocaleDateString("en-PH")+" "+d.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"}); };
      const filtered = filterStatus === "all" ? tickets : tickets.filter(t => t.status === filterStatus);
      const openCount = tickets.filter(t => t.status === "open").length;

      return (
        <div style={{ padding:"0 0 40px" }}>
          {/* Header */}
          <div style={{ background:"linear-gradient(145deg,#1E3A5F,#1D4ED8)", padding:"28px 24px 24px", color:"#fff" }}>
            <img src="https://i.imgur.com/tMk73Mg.png" style={{ height:44, objectFit:"contain", marginBottom:4 }} />
            {openTicket ? (
              <div>
                <button onClick={() => setOpenTicket(null)} style={{ display:"flex", alignItems:"center", gap:6, fontSize:13, fontWeight:700, color:"rgba(255,255,255,.8)", marginBottom:10 }}>
                  <Ic n="arrow-left" />Bumalik
                </button>
                <h1 style={{ fontSize:20, fontWeight:800 }}>{openTicket.subject}</h1>
                <div style={{ fontSize:12, opacity:.75, marginTop:4 }}>{openTicket.name} {openTicket.phone?"· "+openTicket.phone:""}</div>
              </div>
            ) : (
              <>
                <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:"-.02em" }}><Ic n="headset" style={{marginRight:8}} />Support Tickets</h1>
                <p style={{ fontSize:13, opacity:.75, marginTop:4 }}>{openCount} open ticket{openCount!==1?"s":""}</p>
              </>
            )}
          </div>

          {/* Ticket List */}
          {!openTicket && <>
            <div style={{ display:"flex", gap:8, padding:"16px 20px 0", overflowX:"auto" }}>
              {[
                { key:"all",      label:`Lahat (${tickets.length})` },
                { key:"open",     label:`Open (${tickets.filter(t=>t.status==="open").length})` },
                { key:"resolved", label:`Resolved (${tickets.filter(t=>t.status==="resolved").length})` },
                { key:"closed",   label:`Closed (${tickets.filter(t=>t.status==="closed").length})` },
              ].map(f => (
                <button key={f.key} onClick={() => setFilterStatus(f.key)} style={{ padding:"7px 14px", borderRadius:20, fontSize:12, fontWeight:700, whiteSpace:"nowrap", background:filterStatus===f.key?"#1D4ED8":"#fff", color:filterStatus===f.key?"#fff":"#555", border:filterStatus===f.key?"none":"1px solid #E5E7EB", boxShadow:filterStatus===f.key?"0 3px 10px rgba(29,78,216,.3)":"0 1px 3px rgba(0,0,0,.06)" }}>{f.label}</button>
              ))}
            </div>
            <div style={{ padding:"16px 20px 0" }}>
              {filtered.length === 0 ? (
                <div style={{ textAlign:"center", padding:"60px 0" }}>
                  <Ic n="inbox" size={48} style={{ color:"#ddd", marginBottom:12, display:"block" }} />
                  <div style={{ fontSize:15, fontWeight:700, color:"#555" }}>Walang tickets</div>
                </div>
              ) : filtered.map(t => {
                const st = ST[t.status] || ST.open;
                return (
                  <button key={t.id} onClick={() => setOpenTicket(t)} style={{ width:"100%", textAlign:"left", background:"#fff", borderRadius:16, padding:16, marginBottom:10, border:"1px solid #F0F0F0", boxShadow:"0 2px 8px rgba(0,0,0,.05)", display:"block" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                      <div style={{ flex:1, marginRight:10 }}>
                        <div style={{ fontSize:14, fontWeight:800, color:"#111" }}>{t.subject}</div>
                        <div style={{ fontSize:12, color:"#888", marginTop:2 }}>{t.name}{t.phone?" · "+t.phone:""}{t.email?" · "+t.email:""}</div>
                      </div>
                      <div style={{ padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:700, background:st.bg, color:st.color, display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap" }}>
                        <Ic n={st.icon} />{st.label}
                      </div>
                    </div>
                    <div style={{ fontSize:11, color:"#aaa" }}>{fmtDate(t.createdAt)}</div>
                    <div style={{ fontSize:12, color:"#1D4ED8", marginTop:6, display:"flex", alignItems:"center", gap:4 }}><Ic n="chevron-right" size={10} />Buksan ang conversation</div>
                  </button>
                );
              })}
            </div>
          </>}

          {/* Thread View */}
          {openTicket && (
            <div style={{ padding:"16px 20px 0" }}>
              {/* Status actions */}
              <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                {openTicket.status !== "resolved" && (
                  <button onClick={() => markStatus(openTicket, "resolved")} disabled={statusBusy===openTicket.id} style={{ flex:1, padding:"9px 0", borderRadius:10, background:"linear-gradient(135deg,#166534,#22C55E)", color:"#fff", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                    {statusBusy===openTicket.id?<Ic n="spinner" className="spin"/>:<Ic n="circle-check"/>}Mark Resolved
                  </button>
                )}
                {openTicket.status !== "closed" && (
                  <button onClick={() => markStatus(openTicket, "closed")} disabled={statusBusy===openTicket.id} style={{ flex:1, padding:"9px 0", borderRadius:10, background:"#F3F4F6", color:"#555", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                    <Ic n="xmark-circle"/>Close Ticket
                  </button>
                )}
                {openTicket.status !== "open" && (
