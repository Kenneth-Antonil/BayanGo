    /* ══════════════════ LOCATION PICKER ══════════════════ */
    function LocationPicker({ lat, lng, onPick, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markerRef = useRef(null);
      const [detecting, setDetecting] = useState(false);

      const BINANG_CENTER = [14.4584, 121.1971];
      const initialPos = (lat && lng) ? [lat, lng] : BINANG_CENTER;

      const pinIcon = L.divIcon({
        html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#166534,#22C55E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 4px 16px rgba(22,101,52,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div><div style="width:3px;height:10px;background:#166534;margin-top:-2px;border-radius:0 0 2px 2px;"></div></div>',
        className: '',
        iconSize: [36, 48],
        iconAnchor: [18, 48],
      });

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;

        const map = L.map(mapRef.current, {
          center: initialPos,
          zoom: (lat && lng) ? 17 : 15,
          zoomControl: false,
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);

        const marker = L.marker(initialPos, { icon: pinIcon, draggable: true }).addTo(map);
        marker.bindPopup("I-drag ako sa tamang lokasyon!").openPopup();
        markerRef.current = marker;
        mapInstanceRef.current = map;

        // Tap on map to move pin
        map.on("click", (e) => {
          marker.setLatLng(e.latlng);
        });

        setTimeout(() => map.invalidateSize(), 200);

        return () => {
          map.remove();
          mapInstanceRef.current = null;
          markerRef.current = null;
        };
      }, []);

      const detectLocation = () => {
        if (!navigator.geolocation) return;
        setDetecting(true);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const latlng = [pos.coords.latitude, pos.coords.longitude];
            if (markerRef.current && mapInstanceRef.current) {
              markerRef.current.setLatLng(latlng);
              mapInstanceRef.current.setView(latlng, 17);
            }
            setDetecting(false);
          },
          (err) => {
            alert("Hindi ma-detect ang location: " + err.message);
            setDetecting(false);
          },
          { enableHighAccuracy: true, timeout: 15000 }
        );
      };

      const confirmPin = () => {
        if (markerRef.current) {
          const pos = markerRef.current.getLatLng();
          onPick(pos.lat, pos.lng);
        }
        onClose();
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,.7)", backdropFilter:"blur(6px)", display:"flex", flexDirection:"column" }}>
          <div style={{ flex:1, display:"flex", flexDirection:"column", maxWidth:480, width:"100%", margin:"0 auto" }}>
            {/* Header */}
            <div style={{
              background:"linear-gradient(135deg,#166534,#22C55E)",
              padding:"calc(env(safe-area-inset-top,0px) + 14px) 20px 14px",
              color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div>
                <div style={{ fontSize:16, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
                  <Ic n="map-pin" /> I-pin ang Lokasyon Mo
                </div>
                <div style={{ fontSize:12, opacity:.8, marginTop:3 }}>I-drag ang pin o i-tap ang mapa</div>
              </div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {/* Map */}
            <div ref={mapRef} style={{ flex:1, minHeight:300, background:"#E5E7EB" }} />

            {/* Bottom controls */}
            <div style={{
              background:"#fff", padding:"16px 20px", paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 16px)",
              display:"flex", flexDirection:"column", gap:10,
            }}>
              <button onClick={detectLocation} disabled={detecting} style={{
                width:"100%", padding:"13px", borderRadius:12,
                background:"#F0FDF4", border:"2px solid #BBF7D0",
                color:"#166534", fontSize:14, fontWeight:700,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
              }}>
                {detecting
                  ? <><Ic n="spinner" className="spin" /> Hinahanap ang location mo...</>
                  : <><Ic n="crosshairs" /> Gamitin ang GPS Ko</>
                }
              </button>
              <button onClick={confirmPin} style={{
                width:"100%", padding:"15px", borderRadius:14,
                background:"linear-gradient(135deg,#166534,#22C55E)", color:"#fff",
                fontSize:15, fontWeight:800,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                boxShadow:"0 4px 16px rgba(22,101,52,.35)",
              }}>
                <Ic n="circle-check" /> I-confirm ang Location
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ RIDER MAP MODAL ══════════════════ */
    function RiderMapModal({ order, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const riderMarkerRef = useRef(null);
      const [riderLoc, setRiderLoc] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [mapError, setMapError] = useState("");

      // Binangonan center as default
      const BINANG_CENTER = [14.4584, 121.1971];
      const toNum = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      };

      useEffect(() => {
        if (!order?.riderId) return;
        const locRef = _fbDb.ref("rider_locations/" + order.riderId);
        locRef.on("value", snap => {
          const val = snap.val();
          if (val && val.lat && val.lng) {
            setRiderLoc(val);
            setLastUpdate(val.updatedAt);
          }
        });
        return () => locRef.off();
      }, [order?.riderId]);

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        if (typeof L === "undefined" || !L?.map) {
          setMapError("Hindi available ang mapa ngayon. Pakisubukan ulit mamaya.");
          return;
        }

        const map = L.map(mapRef.current, {
          center: BINANG_CENTER,
          zoom: 15,
          zoomControl: false,
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);
        mapInstanceRef.current = map;

        // Add customer pin if available
        const custLat = toNum(order?.customer?.lat);
        const custLng = toNum(order?.customer?.lng);
        if (custLat != null && custLng != null) {
          const custIcon = L.divIcon({
            html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#166534,#22C55E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 4px 16px rgba(22,101,52,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div><div style="width:3px;height:10px;background:#166534;margin-top:-2px;border-radius:0 0 2px 2px;"></div></div>',
            className: '',
            iconSize: [36, 48],
            iconAnchor: [18, 48],
          });
          L.marker([custLat, custLng], { icon: custIcon }).addTo(map)
            .bindPopup(`<b>${order.customer?.name || "Customer"}</b><br/>${order.customer?.address || ""}`);
          map.setView([custLat, custLng], 16);
        }

        setTimeout(() => map.invalidateSize(), 200);

        return () => {
          map.remove();
          mapInstanceRef.current = null;
          riderMarkerRef.current = null;
        };
      }, []);

      // Update rider marker when location changes
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map || !riderLoc) return;

        const riderLat = toNum(riderLoc?.lat);
        const riderLng = toNum(riderLoc?.lng);
        if (riderLat == null || riderLng == null) return;
        const pos = [riderLat, riderLng];

        if (!riderMarkerRef.current) {
          const riderIcon = L.divIcon({
            html: '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1D4ED8,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(29,78,216,.5);border:3px solid #fff;"><i class="fa-solid fa-motorcycle"></i></div>',
            className: '',
            iconSize: [42, 42],
            iconAnchor: [21, 21],
          });
          riderMarkerRef.current = L.marker(pos, { icon: riderIcon }).addTo(map);
          riderMarkerRef.current.bindPopup(
            `<b>${order.riderName || "Rider"}</b><br/>Papunta sa'yo!`
          );

          // Fit bounds to show both rider and customer pin
          const custLat = toNum(order?.customer?.lat);
          const custLng = toNum(order?.customer?.lng);
          if (custLat != null && custLng != null) {
            map.fitBounds([pos, [custLat, custLng]], { padding: [50, 50] });
          } else {
            map.setView(pos, 16);
          }
        } else {
          riderMarkerRef.current.setLatLng(pos);
        }
      }, [riderLoc]);

      const secAgo = lastUpdate ? Math.round((Date.now() - lastUpdate) / 1000) : null;

      return (
        <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.7)", backdropFilter:"blur(6px)", display:"flex", flexDirection:"column" }}
          onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{
            flex:1, display:"flex", flexDirection:"column", maxWidth:480, width:"100%", margin:"0 auto",
          }}>
            {/* Header */}
            <div style={{
              background:"linear-gradient(135deg,#1D4ED8,#3B82F6)",
              padding:"calc(env(safe-area-inset-top,0px) + 14px) 20px 14px",
              color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div>
                <div style={{ fontSize:16, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
                  <Ic n="location-dot" /> Nasaan ang Rider?
                </div>
                {order.riderName && (
                  <div style={{ fontSize:12, opacity:.8, marginTop:3, display:"flex", alignItems:"center", gap:6 }}>
                    {order.riderPhoto && <img src={order.riderPhoto} style={{ width:18, height:18, borderRadius:"50%", objectFit:"cover" }} />}
                    <Ic n="motorcycle" style={{marginRight:2}} />{order.riderName}
                  </div>
                )}
              </div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {/* Status bar */}
            <div style={{
              background:"#fff", padding:"10px 20px", borderBottom:"1px solid #E5E7EB",
              display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              {riderLoc ? (
                <>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:"#22C55E", boxShadow:"0 0 8px #22C55E" }} />
                    <span style={{ fontSize:13, fontWeight:700, color:"#166534" }}>Live Tracking</span>
                  </div>
                  <span style={{ fontSize:11, color:"#888" }}>
                    {secAgo != null && secAgo < 60
                      ? `${secAgo}s ago`
                      : secAgo != null
                        ? `${Math.round(secAgo/60)}m ago`
                        : ""}
                  </span>
                </>
              ) : (
                <>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <Ic n="satellite-dish" className="pulse" style={{ color:"#F59E0B" }} />
                    <span style={{ fontSize:13, fontWeight:600, color:"#92400E" }}>
                      {order.riderId ? "Hinihintay ang GPS ng rider..." : "Wala pang rider na nag-accept"}
                    </span>
                  </div>
                </>
              )}
            </div>

            {/* Map */}
            <div style={{ position:"relative", flex:1, minHeight:300, background:"#E5E7EB" }}>
              <div ref={mapRef} style={{ position:"absolute", inset:0 }} />
              {mapError && (
                <div style={{
                  position:"absolute", inset:0, background:"#F8FAFC",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  textAlign:"center", padding:"20px 24px", color:"#64748B", fontSize:13, fontWeight:600
                }}>
                  <div>
                    <div style={{ fontSize:20, marginBottom:6 }}><Ic n="triangle-exclamation" /></div>
                    {mapError}
                  </div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{
              background:"#fff", padding:"14px 20px", paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 14px)",
              borderTop:"1px solid #E5E7EB",
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{
                  width:40, height:40, borderRadius:12, flexShrink:0,
                  background: order.status==="otw" ? "#DBEAFE" : "#FEF3C7",
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <Ic n={order.status==="otw"?"motorcycle":"cart-shopping"} style={{ color: order.status==="otw"?"#1D4ED8":"#92400E" }} />
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:"#111" }}>
                    {order.status==="otw" ? "Papunta na sa'yo!" : order.status==="buying" ? "Binibili pa sa palengke" : ORDER_STATUSES.find(s=>s.key===order.status)?.desc}
                  </div>
                  <div style={{ fontSize:12, color:"#888", marginTop:1 }}>{order.customer?.address}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function OrdersPage({ orders, onTrack, onTrackRider }) {
      const active    = orders.filter(o => o.status !== "delivered");
      const completed = orders.filter(o => o.status === "delivered");

      const ST_COLOR = {
        pending:   { bg:"#F3F4F6", color:"#555",    label:"Pending",   icon:"hourglass-half" },
        buying:    { bg:"#FEF3C7", color:"#92400E", label:"Buying",    icon:"cart-shopping" },
        otw:       { bg:"#DBEAFE", color:"#1D4ED8", label:"OTW",       icon:"motorcycle" },
        delivered: { bg:"#DCFCE7", color:"#166534", label:"Delivered", icon:"circle-check" },
      };

      const OrderCard = ({ o }) => {
        const st = ST_COLOR[o.status] || ST_COLOR.pending;
        const ts = o.createdAt ? (o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt)) : new Date();
        const idx = ORDER_STATUSES.findIndex(s => s.key === o.status);
        const canTrackRider = o.status === "buying" || o.status === "otw";
        return (
          <div style={{ marginBottom:12 }}>
            <button onClick={() => onTrack(o)} style={{
              width:"100%", textAlign:"left", background:"#fff",
              borderRadius: canTrackRider ? "18px 18px 0 0" : 18,
              padding:"16px", border:"1px solid #F0F0F0",
              borderBottom: canTrackRider ? "none" : undefined,
              boxShadow: canTrackRider ? "none" : "0 2px 8px rgba(0,0,0,.05)", display:"block",
            }}>
              {/* Top row */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                <div style={{ flex:1, marginRight:12 }}>
                  <div style={{ fontSize:13, fontWeight:800, color:"#111", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {o.items?.map(i=>i.name).join(", ") || "—"}
                  </div>
                  <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>
                    {ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                  </div>
                </div>
                <div style={{ padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:700, whiteSpace:"nowrap", background:st.bg, color:st.color, display:"flex", alignItems:"center", gap:5 }}>
                  <Ic n={st.icon} />{st.label}
                </div>
              </div>

              {/* Progress bar */}
              <div style={{ display:"flex", gap:4, marginBottom:12 }}>
                {ORDER_STATUSES.map((s, i) => (
                  <div key={s.key} style={{
                    flex:1, height:4, borderRadius:4,
                    background: i <= idx ? "#22C55E" : "#E5E7EB",
                    transition:"background .3s",
                  }} />
                ))}
              </div>

              {/* Steps */}
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                {ORDER_STATUSES.map((s, i) => (
                  <div key={s.key} style={{ textAlign:"center", flex:1 }}>
                    <div style={{ fontSize:16, opacity: i <= idx ? 1 : 0.25 }}><Ic n={s.icon} /></div>
                    <div style={{ fontSize:9, fontWeight:700, color: i <= idx ? "#166534" : "#ccc", marginTop:2 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Footer */}
              <div style={{ marginTop:12, paddingTop:10, borderTop:"1px dashed #E5E7EB", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontSize:12, color:"#888" }}>{o.customer?.address}</div>
                <div style={{ fontSize:14, fontWeight:800, color:"#166534" }}>~{fmt(o.total)}</div>
              </div>
            </button>

            {/* Track Rider button */}
            {canTrackRider && (
              <button onClick={() => onTrackRider(o)} style={{
                width:"100%", padding:"12px", borderRadius:"0 0 18px 18px",
                background:"linear-gradient(135deg,#1D4ED8,#3B82F6)", color:"#fff",
                fontSize:13, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                boxShadow:"0 2px 8px rgba(29,78,216,.25)",
              }}>
                <Ic n="location-dot" />
                Nasaan ang Rider?
                <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ADE80", boxShadow:"0 0 6px #4ADE80" }} />
              </button>
            )}
          </div>
        );
      };

      return (
        <div style={{ padding:"0 0 20px" }}>
          <div style={{ padding:"20px 20px 4px" }}>
            <h2 style={{ fontSize:18, fontWeight:800, color:"#111", margin:0 }}><Ic n="box" style={{marginRight:8,color:"#166534"}} />Ang Orders Ko</h2>
          </div>

          <div style={{ padding:"20px 20px 0" }}>
            {orders.length === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"#ccc" }}>
                <Ic n="envelope-open" size={56} style={{ color:"#ccc", marginBottom:12, display:"block" }} />
                <div style={{ fontSize:16, fontWeight:700, color:"#555" }}>Wala pang orders</div>
                <div style={{ fontSize:13, marginTop:6, color:"#aaa" }}>Pumunta sa Tindahan para mag-order!</div>
              </div>
            ) : (
              <>
                {active.length > 0 && (
                  <>
                    <div style={{ fontSize:12, fontWeight:700, color:"#166534", marginBottom:10, textTransform:"uppercase", letterSpacing:".08em" }}>
                      <Ic n="circle" style={{color:"#EF4444",marginRight:4}} />Active ({active.length})
                    </div>
                    {active.map(o => <OrderCard key={o.id} o={o} />)}
                  </>
                )}
                {completed.length > 0 && (
                  <>
                    <div style={{ fontSize:12, fontWeight:700, color:"#94A3B8", margin:`${active.length>0?16:0}px 0 10px`, textTransform:"uppercase", letterSpacing:".08em" }}>
                      <Ic n="circle-check" style={{marginRight:4}} />Na-deliver na ({completed.length})
                    </div>
                    {completed.map(o => <OrderCard key={o.id} o={o} />)}
                  </>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    /* ══════════════════ AI RECIPE MODAL ══════════════════ */
    function AIRecipeModal({ cartItems, onClose }) {
      const [loading,  setLoading]  = useState(false);
      const [recipes,  setRecipes]  = useState(null);
      const [error,    setError]    = useState(null);
      const [selected, setSelected] = useState(null);

      const generate = async () => {
        setLoading(true); setError(null); setRecipes(null); setSelected(null);
        try {
          const itemList = cartItems.map(i => `${i.name} (${i.qty} ${i.unit})`).join(", ");
          const system = `Ikaw ay isang expert na Filipino chef na taga-Rizal.
Magbibigay ka ng tatlong (3) putahe na recipe gamit ang mga sangkap na nasa basket ng customer.
Sumagot LAMANG ng valid JSON, walang markdown, walang backtick, walang text bago o pagkatapos.
Format:
[{"name":"Pangalan","emoji":"🍳","difficulty":"Madali|Katamtaman|Mahirap","time":"XX minuto","description":"1-2 sentence sa Tagalog","steps":["Hakbang 1","Hakbang 2"],"tip":"Pro tip sa Tagalog"}]`;
          const raw = await askClaude(system, `Mga sangkap: ${itemList}. Mag-suggest ng 3 putahe.`);
          setRecipes(JSON.parse(raw.replace(/```json|```/g,"").trim()));
        } catch(e) {
          setError("May error sa AI. Subukan ulit!");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.7)", backdropFilter:"blur(8px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
          <div className="slide-up" style={{ width:"100%", maxWidth:480, background:"#fff", borderRadius:"24px 24px 0 0", padding:"26px 22px 40px", maxHeight:"90vh", overflowY:"auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <div>
                <h2 style={{ fontSize:21, fontWeight:800 }}><Ic n="robot" style={{marginRight:6}} />Ano Lulutuin?</h2>
                <p style={{ fontSize:12, color:"#aaa", marginTop:2 }}>AI-powered recipe suggestions</p>
              </div>
              <button onClick={onClose} style={{ width:36, height:36, borderRadius:10, background:"#F3F4F6", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="xmark" /></button>
            </div>

            <div style={{ background:"#F0FDF4", borderRadius:14, padding:"12px 14px", marginBottom:18, border:"1px solid #BBF7D0" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#166534", marginBottom:8 }}><Ic n="basket-shopping" style={{marginRight:4}} />Mga sangkap sa basket:</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {cartItems.map(i => (
                  <span key={i.id} style={{ background:"#fff", border:"1px solid #D1FAE5", borderRadius:20, padding:"4px 10px", fontSize:11, fontWeight:700, color:"#166534" }}>
                    {i.name}
                  </span>
                ))}
              </div>
            </div>

            {!recipes && (
              <button onClick={generate} disabled={loading} style={{
                width:"100%", padding:"16px", borderRadius:16,
                background:loading?"#E5E7EB":"linear-gradient(135deg,#7C3AED,#A855F7)",
                color:loading?"#aaa":"#fff", fontSize:15, fontWeight:700,
                boxShadow:loading?"none":"0 4px 20px rgba(124,58,237,.35)",
                display:"flex", alignItems:"center", justifyContent:"center", gap:10
              }}>
                {loading ? (<><Ic n="gear" className="spin" size={18} style={{marginRight:6}} /><span className="ai-pulse">Nag-iisip si AI...</span></>) : (<><Ic n="wand-magic-sparkles" style={{marginRight:6}} />Mag-suggest ng Recipe</>)}
              </button>
            )}

            {error && (
              <div style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:12, padding:"12px 14px", marginTop:14, fontSize:13, color:"#DC2626", fontWeight:500 }}>
                <Ic n="triangle-exclamation" style={{marginRight:4}} />{error} <button onClick={generate} style={{ marginLeft:8, color:"#DC2626", textDecoration:"underline", fontWeight:700 }}>Ulit</button>
              </div>
            )}

            {recipes && !selected && (
              <div style={{ marginTop:8 }}>
                <p style={{ fontSize:12, color:"#aaa", marginBottom:12, textAlign:"center" }}>Piliin ang gusto mong lutuin:</p>
                {recipes.map((r,i) => (
                  <button key={i} onClick={() => setSelected(r)} className="fade-up" style={{
                    width:"100%", textAlign:"left", background:"#fff", borderRadius:16,
                    padding:"16px", marginBottom:10, border:"1px solid #E5E7EB",
                    boxShadow:"0 2px 8px rgba(0,0,0,.04)", animationDelay:`${i*.1}s`
                  }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
                      <span style={{ fontSize:34 }}>{r.emoji}</span>
                      <div>
                        <div style={{ fontSize:15, fontWeight:800, color:"#111" }}>{r.name}</div>
                        <div style={{ display:"flex", gap:6, marginTop:4 }}>
                          <span style={{ fontSize:10, fontWeight:700, background:"#F0FDF4", color:"#166534", padding:"2px 8px", borderRadius:6 }}><Ic n="clock" style={{marginRight:3}} />{r.time}</span>
                          <span style={{ fontSize:10, fontWeight:700, background:"#FEF3C7", color:"#92400E", padding:"2px 8px", borderRadius:6 }}><Ic n="fire" style={{marginRight:3}} />{r.difficulty}</span>
                        </div>
                      </div>
                    </div>
                    <p style={{ fontSize:12, color:"#777", lineHeight:1.55 }}>{r.description}</p>
                  </button>
                ))}
                <button onClick={() => { setRecipes(null); generate(); }} style={{
                  width:"100%", padding:"12px", borderRadius:12, background:"#F9FAFB",
                  border:"1px solid #E5E7EB", fontSize:13, fontWeight:600, color:"#888"
                }}><Ic n="rotate" style={{marginRight:6}} />Ibang suggestions</button>
              </div>
            )}

            {selected && (
              <div className="fade-up">
                <button onClick={() => setSelected(null)} style={{ color:"#7C3AED", fontWeight:700, fontSize:13, marginBottom:16, display:"flex", alignItems:"center", gap:4 }}><Ic n="arrow-left" style={{marginRight:4}} />Bumalik</button>
                <div style={{ textAlign:"center", marginBottom:20 }}>
                  <div style={{ fontSize:60 }}>{selected.emoji}</div>
                  <h3 style={{ fontSize:21, fontWeight:800, marginTop:8 }}>{selected.name}</h3>
                  <div style={{ display:"flex", gap:8, justifyContent:"center", marginTop:8 }}>
                    <span style={{ fontSize:11, fontWeight:700, background:"#F0FDF4", color:"#166534", padding:"4px 12px", borderRadius:20 }}><Ic n="clock" style={{marginRight:3}} />{selected.time}</span>
                    <span style={{ fontSize:11, fontWeight:700, background:"#FEF3C7", color:"#92400E", padding:"4px 12px", borderRadius:20 }}><Ic n="fire" style={{marginRight:3}} />{selected.difficulty}</span>
                  </div>
                  <p style={{ fontSize:13, color:"#777", lineHeight:1.6, marginTop:12 }}>{selected.description}</p>
                </div>
                <div style={{ background:"#F9FAFB", borderRadius:16, padding:"16px", marginBottom:14, border:"1px solid #E5E7EB" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#444", marginBottom:12 }}><Ic n="list-ol" style={{marginRight:4}} />Paraan ng Pagluto:</div>
                  {selected.steps.map((step,i) => (
                    <div key={i} style={{ display:"flex", gap:12, marginBottom:12, alignItems:"flex-start" }}>
                      <div style={{ width:26, height:26, borderRadius:8, background:"#7C3AED", color:"#fff", fontSize:11, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{i+1}</div>
                      <p style={{ fontSize:13, color:"#555", lineHeight:1.55, margin:0, paddingTop:3 }}>{step}</p>
                    </div>
                  ))}
                </div>
                <div style={{ background:"#FFF7ED", borderRadius:14, padding:"14px 16px", border:"1px solid #FED7AA", display:"flex", gap:10 }}>
                  <Ic n="lightbulb" size={18} style={{ color:"#EA580C" }} />
                  <div>
                    <div style={{ fontSize:11, fontWeight:800, color:"#EA580C", marginBottom:4 }}>Pro Tip</div>
                    <p style={{ fontSize:12, color:"#9A3412", lineHeight:1.55, margin:0 }}>{selected.tip}</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
