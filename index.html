    /* ══════════════════ CLAUDE API ══════════════════ */
    function getApiKey() {
      let key = localStorage.getItem("bayango_api_key");
      if (!key) {
        key = window.prompt("Ilagay ang Anthropic API Key para sa AI Recipe feature:");
        if (key) localStorage.setItem("bayango_api_key", key.trim());
      }
      return key ? key.trim() : null;
    }

    async function askClaude(system, user) {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error("Walang API key.");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system,
          messages: [{ role:"user", content:user }],
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        if (res.status === 401) {
          localStorage.removeItem("bayango_api_key");
          throw new Error("Invalid API key. I-clear at subukan ulit.");
        }
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      return data.content?.map(b => b.text || "").join("") || "";
    }

    /* ══════════════════ MAIN APP ══════════════════ */
    function App() {
      const [products,    setProducts]    = useState(LS.getProducts);
      const [orders,      setOrders]      = useState(LS.getOrders);
      const [user,        setUser]        = useState(null);
      const [loading,     setLoading]     = useState(true);
      const [authMode,      setAuthMode]      = useState("options");
      const [authEmail,     setAuthEmail]     = useState("");
      const [authPassword,  setAuthPassword]  = useState("");
      const [authConfirm,   setAuthConfirm]   = useState("");
      const [authError,     setAuthError]     = useState("");
      const [authLoading,   setAuthLoading]   = useState(false);
      const [syncError,     setSyncError]     = useState(null);

      useEffect(() => {
        let unsubAuth, unsubOrders;
        const timeout = setTimeout(() => setLoading(false), 8000);
        try {
          _fbAuth.getRedirectResult().catch(err => console.error("Redirect result error:", err));
          unsubAuth = _fbAuth.onAuthStateChanged(currentUser => {
            clearTimeout(timeout);
            setUser(currentUser);
            setLoading(false);

            // Clean up previous order listener
            unsubOrders?.();
            unsubOrders = null;

            if (currentUser && _fbDb) {
              // Listen for this user's orders in Firestore for live status updates
              unsubOrders = _fbDb.collection("orders")
                .where("uid", "==", currentUser.uid)
                .onSnapshot(snapshot => {
                  snapshot.docChanges().forEach(change => {
                    const data = { id: change.doc.id, ...change.doc.data() };
                    if (change.type === "added" || change.type === "modified") {
                      setOrders(prev => {
                        // Match by Firestore doc id or by customer+createdAt proximity
                        const idx = prev.findIndex(o => o.firestoreId === data.id);
                        if (idx >= 0) {
                          // Update existing
                          const updated = [...prev];
                          updated[idx] = { ...updated[idx], status: data.status, firestoreId: data.id };
                          LS.saveOrders(updated);
                          return updated;
                        }
                        // Tag newly placed orders with firestoreId if not yet linked
                        const unlinked = prev.findIndex(o =>
                          !o.firestoreId &&
                          o.customer?.name === data.customer?.name &&
                          o.customer?.phone === data.customer?.phone &&
                          Math.abs((o.createdAt || 0) - (data.createdAt?.toDate?.()?.getTime?.() || 0)) < 30000
                        );
                        if (unlinked >= 0) {
                          const updated = [...prev];
                          updated[unlinked] = { ...updated[unlinked], status: data.status, firestoreId: data.id };
                          LS.saveOrders(updated);
                          return updated;
                        }
                        return prev;
                      });
                    }
                  });
                }, err => console.error("Orders listener error:", err.code));
            }
          });
        } catch (err) {
          console.error("Firebase error:", err);
          clearTimeout(timeout);
          setLoading(false);
        }

        const onStorage = (e) => {
          if (e.key === "bayango_products") setProducts(JSON.parse(e.newValue) || DEFAULT_PRODUCTS);
          if (e.key === "bayango_orders")   setOrders(JSON.parse(e.newValue) || []);
        };
        window.addEventListener("storage", onStorage);
        const interval = setInterval(() => {
          const fresh = LS.getProducts();
          setProducts(p => JSON.stringify(p) !== JSON.stringify(fresh) ? fresh : p);
        }, 4000);
        return () => {
          window.removeEventListener("storage", onStorage);
          clearInterval(interval);
          unsubAuth?.();
          unsubOrders?.();
        };
      }, []);

      const addOrder = useCallback(async (order) => {
        const localOrder = { ...order, id:genId(), createdAt:Date.now() };
        // Save locally for "My Orders" history
        setOrders(prev => {
          const updated = [localOrder, ...prev];
          LS.saveOrders(updated);
          return updated;
        });
        // Write to Firestore so admin can see it (include uid for real-time status sync)
        setSyncError(null);
        try {
          if (!_fbDb) throw new Error("Firestore not initialized");
          const uid = _fbAuth.currentUser?.uid || null;
          await _fbDb.collection("orders").add({
            ...order,
            uid,
            createdAt: new Date(),
          });
        } catch (err) {
          console.error("Firestore write failed:", err.code, err.message);
          setSyncError(err.code || err.message || "sync-failed");
        }
      }, []);

      const getFriendlyError = (code) => {
        const map = {
          'auth/user-not-found':     'Walang account na may email na ito.',
          'auth/wrong-password':     'Mali ang password.',
          'auth/invalid-credential': 'Mali ang email o password.',
          'auth/email-already-in-use': 'Ginagamit na ang email na ito.',
          'auth/weak-password':      'Masyadong mahina ang password (min. 6 characters).',
          'auth/invalid-email':      'Hindi valid ang email address.',
          'auth/too-many-requests':  'Napakaraming pagtatangka. Subukan ulit mamaya.',
          'auth/popup-blocked':      'Nablock ang popup. Subukan ulit.',
        };
        return map[code] || 'May error. Subukan ulit.';
      };

      const handleGoogleLogin = async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await _fbAuth.signInWithPopup(provider);
        } catch (error) {
          if (
            error.code === 'auth/popup-blocked' ||
            error.code === 'auth/popup-closed-by-user' ||
            error.code === 'auth/cancelled-popup-request'
          ) {
            try {
              const provider = new firebase.auth.GoogleAuthProvider();
              await _fbAuth.signInWithRedirect(provider);
            } catch (err2) {
              alert("Error sa pag-login: " + err2.message);
            }
          } else {
            alert("Error sa pag-login: " + error.message);
          }
        }
      };

      const handleEmailSignIn = async () => {
        setAuthError("");
        setAuthLoading(true);
        try {
          await _fbAuth.signInWithEmailAndPassword(authEmail, authPassword);
        } catch (error) {
          setAuthError(getFriendlyError(error.code));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleEmailSignUp = async () => {
        setAuthError("");
        if (authPassword !== authConfirm) {
          setAuthError("Hindi magkaparehong password.");
          return;
        }
        setAuthLoading(true);
        try {
          await _fbAuth.createUserWithEmailAndPassword(authEmail, authPassword);
        } catch (error) {
          setAuthError(getFriendlyError(error.code));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = async () => {
        await _fbAuth.signOut();
      };

      if (loading) return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:14 }}>
          <Ic n="gear" className="spin" size={48} style={{ color:"#166534" }} />
          <div style={{ fontSize:16, fontWeight:800, color:"#166534" }}>Naglo-load...</div>
        </div>
      );

      if (!user) {
        const inputStyle = {
          border:"1px solid #E5E7EB", borderRadius:12, padding:"14px 16px",
          fontSize:15, outline:"none", background:"#fff", width:"100%",
        };
        return (
          <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:20, padding:"20px 24px" }}>
            <div className="fade-up" style={{ textAlign:"center" }}>
              <Ic n="cart-shopping" size={64} style={{ color:"#166534", marginBottom:10, display:"block" }} />
              <h1 style={{ fontSize:32, fontWeight:800, color:"#166534", letterSpacing:"-.02em" }}>BayanGo</h1>
              <p style={{ color:"#666", fontSize:15, marginTop:4 }}>Palengke sa'yo. Mag-sign in para makapag-order.</p>
            </div>

            {authMode === "options" && (
              <div className="fade-up" style={{ width:"100%", maxWidth:360, display:"flex", flexDirection:"column", gap:12, animationDelay:".1s" }}>
                <button onClick={handleGoogleLogin} style={{
                  background:"#fff", border:"1px solid #E5E7EB", padding:"14px 20px", borderRadius:100,
                  fontSize:15, fontWeight:700, color:"#333", display:"flex", alignItems:"center", justifyContent:"center", gap:12,
                  boxShadow:"0 4px 12px rgba(0,0,0,0.05)",
                }}>
                  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style={{width:22, height:22}} />
                  Sign in with Google
                </button>
                <button onClick={() => { setAuthMode("email-signin"); setAuthError(""); }} style={{
                  background:"#166534", border:"none", padding:"14px 20px", borderRadius:100,
                  fontSize:15, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", gap:10,
                  boxShadow:"0 4px 16px rgba(22,101,52,0.3)",
                }}>
                  <Ic n="envelope" style={{marginRight:8}} />Sign in with Email
                </button>
                <div style={{ textAlign:"center", fontSize:13, color:"#888", marginTop:4 }}>
                  Wala pang account?{" "}
                  <button onClick={() => { setAuthMode("email-signup"); setAuthError(""); }} style={{ color:"#166534", fontWeight:700, textDecoration:"underline", fontSize:13 }}>
                    Mag-sign up
                  </button>
                </div>
              </div>
            )}

            {(authMode === "email-signin" || authMode === "email-signup") && (
              <div className="fade-up" style={{ width:"100%", maxWidth:360, display:"flex", flexDirection:"column", gap:12 }}>
                <h2 style={{ textAlign:"center", fontSize:20, fontWeight:800, color:"#166534", marginBottom:4 }}>
                  {authMode === "email-signup" ? "Gumawa ng Account" : "Mag-sign in"}
                </h2>

                {authError && (
                  <div style={{ background:"#FEF2F2", border:"1px solid #FCA5A5", borderRadius:12, padding:"10px 14px", fontSize:13, color:"#B91C1C" }}>
                    {authError}
                  </div>
                )}

                <input type="email" placeholder="Email address" value={authEmail}
                  onChange={e => setAuthEmail(e.target.value)} style={inputStyle} />
                <input type="password" placeholder="Password" value={authPassword}
                  onChange={e => setAuthPassword(e.target.value)} style={inputStyle} />
                {authMode === "email-signup" && (
                  <input type="password" placeholder="Ulitin ang Password" value={authConfirm}
                    onChange={e => setAuthConfirm(e.target.value)} style={inputStyle} />
                )}

                <button
                  onClick={authMode === "email-signup" ? handleEmailSignUp : handleEmailSignIn}
                  disabled={authLoading}
                  style={{
                    background:"#166534", border:"none", padding:"14px", borderRadius:100,
                    fontSize:15, fontWeight:700, color:"#fff", opacity: authLoading ? 0.7 : 1, marginTop:4,
                  }}
                >
                  {authLoading ? "Loading..." : authMode === "email-signup" ? "Gumawa ng Account" : "Mag-sign in"}
                </button>

                <div style={{ textAlign:"center", fontSize:13, color:"#888" }}>
                  {authMode === "email-signup"
                    ? <>May account na? <button onClick={() => { setAuthMode("email-signin"); setAuthError(""); }} style={{ color:"#166534", fontWeight:700, textDecoration:"underline", fontSize:13 }}>Mag-sign in</button></>
                    : <>Wala pang account? <button onClick={() => { setAuthMode("email-signup"); setAuthError(""); }} style={{ color:"#166534", fontWeight:700, textDecoration:"underline", fontSize:13 }}>Mag-sign up</button></>
                  }
                </div>

                <button onClick={() => { setAuthMode("options"); setAuthError(""); }} style={{ color:"#999", fontSize:13, textAlign:"center", marginTop:2 }}>
                  <Ic n="arrow-left" style={{marginRight:6}} />Bumalik sa ibang options
                </button>
              </div>
            )}
          </div>
        );
      }

      return (
        <>
          <div style={{ background:"#166534", color:"#fff", padding:"8px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:12, fontWeight:600 }}>
            <span style={{opacity:0.9}}>Hello, {user.displayName || user.email.split('@')[0]}</span>
            <button onClick={handleLogout} style={{ color:"#BBF7D0", textDecoration:"underline", fontSize:12, fontWeight:700 }}>Log Out</button>
          </div>
          <UserApp products={products} orders={orders} onOrder={addOrder} />
          <InstallBanner />
          {syncError && (
            <div className="pop" style={{
              position:"fixed", top:"calc(env(safe-area-inset-top,0px) + 16px)", left:20, right:20, zIndex:9999,
              background:"#EF4444", color:"#fff", padding:"12px 16px", borderRadius:14,
              fontSize:13, fontWeight:700, boxShadow:"0 4px 20px rgba(0,0,0,.25)",
              display:"flex", alignItems:"center", gap:8,
            }}>
              <Ic n="triangle-exclamation" />
              <div>
                <div>Hindi ma-sync ang order sa admin</div>
                <div style={{ fontSize:11, fontWeight:400, opacity:0.85, marginTop:2 }}>Error: {syncError}</div>
              </div>
              <button onClick={() => setSyncError(null)} style={{ color:"#fff", opacity:.7, fontSize:16, marginLeft:8 }}><Ic n="xmark" /></button>
            </div>
          )}
        </>
      );
    }

    /* ══════════════════ USER APP ══════════════════ */
    function UserApp({ products, orders, onOrder }) {
      const [activeCat,      setActiveCat]      = useState("isda");
      const [cart,           setCart]           = useState({});
      const [showCart,       setShowCart]       = useState(false);
      const [showCheckout,   setShowCheckout]   = useState(false);
      const [showTracker,    setShowTracker]    = useState(null);
      const [zone,           setZone]           = useState(0);
      const [name,           setName]           = useState(() => localStorage.getItem("bayango_customer_name") || "");
      const [phone,          setPhone]          = useState(() => localStorage.getItem("bayango_customer_phone") || "");
      const [addr,           setAddr]           = useState(() => localStorage.getItem("bayango_customer_addr") || "");
      const [searchQ,        setSearchQ]        = useState("");
      const [orderPlaced,    setOrderPlaced]    = useState(false);
      const [showAI,         setShowAI]         = useState(false);
      const [activePage,     setActivePage]     = useState("shop");
      const [customItems,    setCustomItems]    = useState([]);
      const [showCustomList, setShowCustomList] = useState(false);
      const [newItemName,    setNewItemName]    = useState("");
      const [newItemQty,     setNewItemQty]     = useState("");
      const [newItemPrice,   setNewItemPrice]   = useState("");

      const cartCount = Object.values(cart).reduce((s,v) => s+v, 0);
      const cartItems = Object.entries(cart)
        .filter(([,q]) => q > 0)
        .map(([id,qty]) => ({ ...products.find(p => p.id === +id), qty }))
        .filter(i => i.name);

      const customEstTotal  = customItems.reduce((s,i) => s + (i.estPrice || 0), 0);
      const subtotal        = cartItems.reduce((s,i) => s + i.price * i.qty, 0);
      const itemsTotal      = subtotal + customEstTotal;
      const deliveryFee     = DELIVERY_ZONES[zone].fee;
      const serviceFee      = Math.round(itemsTotal * 0.02);
      const smallOrderFee   = itemsTotal < 100 ? Math.round(itemsTotal * 0.05) : 0;
      const total           = itemsTotal + deliveryFee + serviceFee + smallOrderFee;
      const totalItemCount = cartCount + customItems.length;

      const add = id => setCart(c => ({ ...c, [id]:(c[id]||0)+1 }));
      const rem = id => setCart(c => {
        const n = { ...c };
        if (n[id] > 1) n[id]--; else delete n[id];
        return n;
      });

      const addCustom = () => {
        if (!newItemName.trim()) return;
        setCustomItems(prev => [...prev, {
          id: "cust_" + genId(),
          name: newItemName.trim(),
          qty: 1,
          unit: newItemQty.trim() || "pc",
          estPrice: parseFloat(newItemPrice) || 0,
          isCustom: true,
          img: null,
        }]);
        setNewItemName(""); setNewItemQty(""); setNewItemPrice("");
      };
      const removeCustom = id => setCustomItems(prev => prev.filter(i => i.id !== id));

      const filtered = products.filter(p =>
        p.cat === activeCat && (searchQ === "" || p.name.toLowerCase().includes(searchQ.toLowerCase()))
      );

      const placeOrder = () => {
        if (!name || !phone || !addr) return;
        localStorage.setItem("bayango_customer_name",  name);
        localStorage.setItem("bayango_customer_phone", phone);
        localStorage.setItem("bayango_customer_addr",  addr);
        const allItems = [
          ...cartItems,
          ...customItems.map(i => ({ ...i, price: i.estPrice })),
        ];
        onOrder({
          items: allItems,
          subtotal, customEstimate: customEstTotal, deliveryFee,
          serviceFee, smallOrderFee, total,
          zone: DELIVERY_ZONES[zone].label,
          customer: { name, phone, address: addr },
          status: "pending",
          hasCustomItems: customItems.length > 0,
        });
        setCart({});
        setCustomItems([]);
        setShowCheckout(false);
        setShowCart(false);
        setOrderPlaced(true);
        setTimeout(() => setOrderPlaced(false), 3500);
      };

      const myOrders = orders.filter(o => o.customer?.name === name && name !== "");

      const activeOrders = myOrders.filter(o => o.status !== "delivered");

      return (
        <div style={{ maxWidth:480, margin:"0 auto", paddingBottom:80, background:"#F8FAF8", minHeight:"100vh" }}>

          {/* ── SHOP PAGE ── */}
          {activePage === "shop" && <>

          {/* ── Hero ── */}
          <div style={{
            background:"linear-gradient(145deg,#0D5C2E,#166534,#22C55E)",
            padding:"env(safe-area-inset-top, 16px) 24px 32px",
            paddingTop:`calc(env(safe-area-inset-top, 0px) + 28px)`,
            color:"#fff", position:"relative", overflow:"hidden"
          }}>
            <div style={{ position:"absolute", top:-50, right:-40, width:180, height:180, borderRadius:"50%", background:"rgba(255,255,255,.07)" }} />
            <div style={{ position:"absolute", bottom:-30, left:-20, width:120, height:120, borderRadius:"50%", background:"rgba(255,255,255,.04)" }} />
            <div style={{ position:"relative" }}>
              <div style={{ fontSize:11, fontWeight:600, opacity:.7, letterSpacing:".1em", textTransform:"uppercase", marginBottom:6 }}>
                Binangonan Concierge
              </div>
              <h1 style={{ fontSize:34, fontWeight:800, letterSpacing:"-.02em", margin:"0 0 6px" }}>BayanGo</h1>
              <p style={{ fontSize:13, opacity:.75, fontWeight:400, lineHeight:1.5 }}>
                Kami na ang mamamalengke para sa'yo
              </p>
            </div>
          </div>

          {/* ── Search ── */}
          <div style={{ padding:"16px 20px 0" }}>
            <div style={{ background:"#fff", borderRadius:16, padding:"12px 16px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 1px 4px rgba(0,0,0,.07)", border:"1px solid #E9ECEF" }}>
              <Ic n="magnifying-glass" size={17} style={{ opacity:.35 }} />
              <input placeholder="Maghanap ng produkto..." value={searchQ}
                onChange={e => setSearchQ(e.target.value)}
                style={{ flex:1, border:"none", outline:"none", fontSize:15, fontWeight:500, background:"transparent", color:"#111" }} />
              {searchQ && <button onClick={() => setSearchQ("")} style={{ opacity:.4, fontSize:16 }}><Ic n="xmark" /></button>}
            </div>
          </div>

          {/* ── Categories ── */}
          <div style={{ display:"flex", gap:8, padding:"14px 20px", overflowX:"auto", scrollbarWidth:"none" }}>
            {CATEGORIES.map(cat => (
              <button key={cat.id} onClick={() => setActiveCat(cat.id)} style={{
                padding:"10px 18px", borderRadius:30, whiteSpace:"nowrap",
                fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:6,
                background: activeCat===cat.id ? cat.color : "#fff",
                color: activeCat===cat.id ? "#fff" : "#555",
                boxShadow: activeCat===cat.id ? `0 4px 14px ${cat.color}40` : "0 1px 3px rgba(0,0,0,.06)",
                border: activeCat===cat.id ? "none" : "1px solid #E5E7EB",
                transition:"all .22s ease",
                transform: activeCat===cat.id ? "scale(1.04)" : "scale(1)"
              }}>
                <Ic n={cat.icon} size={14} />{cat.label}
              </button>
            ))}
          </div>

          {/* ── Custom List Entry ── */}
          <div style={{ padding:"0 20px 14px" }}>
            <button onClick={() => setShowCustomList(true)} style={{
              width:"100%", background:"#F0FDF4", border:"2px dashed #86EFAC", borderRadius:16,
              padding:"13px 16px", display:"flex", alignItems:"center", gap:12,
            }}>
              <Ic n="list-check" size={26} style={{ color:"#22C55E" }} />
              <div style={{ flex:1, textAlign:"left" }}>
                <div style={{ fontSize:14, fontWeight:700, color:"#166534" }}>Custom List</div>
                <div style={{ fontSize:12, color:"#6B7280" }}>
                  {customItems.length === 0
                    ? "Dagdag ng items na hindi nasa listahan"
                    : `${customItems.length} custom item${customItems.length>1?"s":""} • ~${fmt(customEstTotal)}`}
                </div>
              </div>
              <span style={{ fontSize:18, color:"#22C55E", fontWeight:800 }}>
                {customItems.length > 0 && (
                  <span style={{ background:"#22C55E", color:"#fff", borderRadius:20, fontSize:11, fontWeight:800, padding:"2px 8px", marginRight:6 }}>{customItems.length}</span>
                )}
                ›
              </span>
            </button>
          </div>

          {/* ── Section Label ── */}
          <div style={{ padding:"0 20px 10px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h2 style={{ fontSize:15, fontWeight:800, color:"#111", display:"flex", alignItems:"center", gap:6 }}>
              <Ic n={CATEGORIES.find(c=>c.id===activeCat)?.icon} style={{color:CATEGORIES.find(c=>c.id===activeCat)?.color}} />
              {CATEGORIES.find(c=>c.id===activeCat)?.label}
            </h2>
            <span style={{ fontSize:12, color:"#999", fontWeight:500 }}>{filtered.length} items</span>
          </div>

          {/* ── Products Grid ── */}
          <div style={{ padding:"0 20px 16px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {filtered.map((p, i) => (
                <div key={p.id} className="fade-up" style={{
                  animationDelay:`${i*.05}s`,
                  background:"#fff", borderRadius:18, overflow:"hidden",
                  border:"1px solid #F0F0F0", boxShadow:"0 2px 8px rgba(0,0,0,.04)",
                  opacity:p.stock?1:.5, position:"relative"
                }}>
                  {!p.stock && (
                    <div style={{
                      position:"absolute", top:10, right:10, background:"#EF4444",
                      color:"#fff", fontSize:9, fontWeight:800, padding:"3px 8px",
                      borderRadius:6, zIndex:2, letterSpacing:".04em"
                    }}>SOLD OUT</div>
                  )}
                  <div style={{
                    height:96, overflow:"hidden",
                    background:`linear-gradient(135deg,${CATEGORIES.find(c=>c.id===p.cat)?.color}12,${CATEGORIES.find(c=>c.id===p.cat)?.color}06)`,
                    display:"flex", alignItems:"center", justifyContent:"center"
                  }}>
                    {p.img && p.img.startsWith("http")
                      ? <img src={p.img} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}} />
                      : null}
                    <div style={{display:p.img&&p.img.startsWith("http")?"none":"flex",alignItems:"center",justifyContent:"center",width:"100%",height:"100%"}}>
                      <Ic n={CATEGORIES.find(c=>c.id===p.cat)?.icon} size={40} style={{color:CATEGORIES.find(c=>c.id===p.cat)?.color,opacity:.5}} />
                    </div>
                  </div>
                  <div style={{ padding:"11px 14px 14px" }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#111", marginBottom:2, lineHeight:1.25 }}>{p.name}</div>
                    <div style={{ fontSize:11, color:"#aaa", marginBottom:10 }}>per {p.unit}</div>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <span style={{ fontSize:17, fontWeight:800, color:"#166534" }}>{fmt(p.price)}</span>
                      {p.stock && (
                        cart[p.id] ? (
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <button onClick={() => rem(p.id)} style={{ width:28, height:28, borderRadius:8, background:"#F3F4F6", fontSize:16, fontWeight:700, color:"#555", display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                            <span style={{ fontSize:14, fontWeight:800, minWidth:16, textAlign:"center" }}>{cart[p.id]}</span>
                            <button onClick={() => add(p.id)} style={{ width:28, height:28, borderRadius:8, background:"#22C55E", fontSize:16, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                          </div>
                        ) : (
                          <button onClick={() => add(p.id)} style={{
                            width:34, height:34, borderRadius:10, background:"#22C55E",
                            color:"#fff", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center",
                            boxShadow:"0 3px 10px #22C55E40"
                          }}>+</button>
                        )
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            {filtered.length === 0 && (
              <div style={{ textAlign:"center", padding:"50px 0", color:"#bbb" }}>
                <Ic n="face-meh" size={48} style={{ color:"#bbb", marginBottom:10, display:"block" }} />
                <div style={{ fontSize:14, fontWeight:600 }}>Walang makitang produkto</div>
              </div>
            )}
          </div>

          {/* ── AI FAB ── */}
          {cartItems.length > 0 && (
            <div style={{ position:"fixed", bottom:90, right:20, zIndex:90 }}>
              <button onClick={() => setShowAI(true)} style={{
                width:56, height:56, borderRadius:16,
                background:"linear-gradient(135deg,#7C3AED,#A855F7)",
                color:"#fff", fontSize:26, display:"flex", alignItems:"center", justifyContent:"center",
                boxShadow:"0 6px 24px rgba(124,58,237,.45)"
              }}><Ic n="robot" size={24} /></button>
              <div style={{
                position:"absolute", top:-8, right:-4,
                background:"#22C55E", color:"#fff", borderRadius:10,
                fontSize:8, fontWeight:800, padding:"2px 6px", whiteSpace:"nowrap", letterSpacing:".03em"
              }}>AI Recipe</div>
            </div>
          )}

          {/* ── Floating Cart ── */}
          {totalItemCount > 0 && !showCart && (
            <div className="slide-up" style={{
              position:"fixed", bottom:`calc(env(safe-area-inset-bottom,0px) + 76px)`,
              left:"50%", transform:"translateX(-50%)",
              zIndex:100, width:"calc(100% - 40px)", maxWidth:440
            }}>
              <button onClick={() => setShowCart(true)} style={{
                width:"100%", padding:"15px 24px", borderRadius:18,
                background:"linear-gradient(135deg,#166534,#22C55E)",
                color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
                boxShadow:"0 8px 32px rgba(22,101,52,.38)", fontSize:15, fontWeight:700
              }}>
                <span><Ic n="basket-shopping" style={{marginRight:6}} />Basket ({totalItemCount} item{totalItemCount>1?"s":""})</span>
                <span style={{ fontSize:16, fontWeight:800 }}>~{fmt(subtotal + customEstTotal)}</span>
              </button>
            </div>
          )}

          {/* ── Custom List Drawer ── */}
          {showCustomList && (
            <div style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,.55)", backdropFilter:"blur(4px)" }}
              onClick={() => setShowCustomList(false)}>
              <div className="slide-in" onClick={e => e.stopPropagation()} style={{
                position:"absolute", right:0, top:0, bottom:0,
                width:"100%", maxWidth:400, background:"#FAFAFA",
                display:"flex", flexDirection:"column"
              }}>
                <div style={{ padding:"20px 24px", borderBottom:"1px solid #E5E7EB", background:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <div>
                    <h2 style={{ fontSize:19, fontWeight:800 }}><Ic n="list-check" style={{marginRight:6}} />Custom List</h2>
                    <p style={{ fontSize:12, color:"#888", marginTop:2 }}>Items na hindi nasa catalog</p>
                  </div>
                  <button onClick={() => setShowCustomList(false)} style={{ width:36, height:36, borderRadius:10, background:"#F3F4F6", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="xmark" /></button>
                </div>

                {/* Add Item Form */}
                <div style={{ padding:"16px 24px", borderBottom:"1px solid #E5E7EB", background:"#F9FAFB" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#555", marginBottom:10 }}>Magdagdag ng Item</div>
                  <input
                    placeholder="Pangalan ng item (hal. Bagoong, Sukang Iloko...)"
                    value={newItemName} onChange={e => setNewItemName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addCustom()}
                    style={{ width:"100%", padding:"11px 14px", borderRadius:10, border:"1.5px solid #E5E7EB", fontSize:13, marginBottom:8, outline:"none", background:"#fff" }}
                  />
                  <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                    <input
                      placeholder="Quantity (hal. 1 kilo, 2 piraso)"

    function OrdersPage({ orders, onTrack }) {
      const active    = orders.filter(o => o.status !== "delivered");
      const completed = orders.filter(o => o.status === "delivered");

      const ST_COLOR = {
        pending:   { bg:"#F3F4F6", color:"#555",    label:"Pending",   icon:"hourglass-half" },
        buying:    { bg:"#FEF3C7", color:"#92400E", label:"Buying",    icon:"cart-shopping" },
        otw:       { bg:"#DBEAFE", color:"#1D4ED8", label:"OTW",       icon:"motorcycle" },
        delivered: { bg:"#DCFCE7", color:"#166534", label:"Delivered", icon:"circle-check" },
      };

      const OrderCard = ({ o }) => {
        const st = ST_COLOR[o.status] || ST_COLOR.pending;
        const ts = o.createdAt ? (o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt)) : new Date();
        const idx = ORDER_STATUSES.findIndex(s => s.key === o.status);
        return (
          <button onClick={() => onTrack(o)} style={{
            width:"100%", textAlign:"left", background:"#fff", borderRadius:18,
            padding:"16px", marginBottom:12, border:"1px solid #F0F0F0",
            boxShadow:"0 2px 8px rgba(0,0,0,.05)", display:"block",
          }}>
            {/* Top row */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
              <div style={{ flex:1, marginRight:12 }}>
                <div style={{ fontSize:13, fontWeight:800, color:"#111", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {o.items?.map(i=>i.name).join(", ") || "—"}
                </div>
                <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>
                  {ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                </div>
              </div>
              <div style={{ padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:700, whiteSpace:"nowrap", background:st.bg, color:st.color, display:"flex", alignItems:"center", gap:5 }}>
                <Ic n={st.icon} />{st.label}
              </div>
            </div>

            {/* Progress bar */}
            <div style={{ display:"flex", gap:4, marginBottom:12 }}>
              {ORDER_STATUSES.map((s, i) => (
                <div key={s.key} style={{
                  flex:1, height:4, borderRadius:4,
                  background: i <= idx ? "#22C55E" : "#E5E7EB",
                  transition:"background .3s",
                }} />
              ))}
            </div>

            {/* Steps */}
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              {ORDER_STATUSES.map((s, i) => (
                <div key={s.key} style={{ textAlign:"center", flex:1 }}>
                  <div style={{ fontSize:16, opacity: i <= idx ? 1 : 0.25 }}><Ic n={s.icon} /></div>
                  <div style={{ fontSize:9, fontWeight:700, color: i <= idx ? "#166534" : "#ccc", marginTop:2 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Footer */}
            <div style={{ marginTop:12, paddingTop:10, borderTop:"1px dashed #E5E7EB", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:12, color:"#888" }}>{o.customer?.address}</div>
              <div style={{ fontSize:14, fontWeight:800, color:"#166534" }}>~{fmt(o.total)}</div>
            </div>
          </button>
        );
      };

      return (
        <div style={{ padding:"0 0 20px" }}>
          {/* Header */}
          <div style={{
            background:"linear-gradient(145deg,#0D5C2E,#166534)",
            padding:"env(safe-area-inset-top, 0px) 24px 24px",
            paddingTop:`calc(env(safe-area-inset-top, 0px) + 28px)`,
            color:"#fff",
          }}>
            <div style={{ fontSize:11, opacity:.7, letterSpacing:".1em", textTransform:"uppercase", marginBottom:4 }}>BayanGo</div>
            <h1 style={{ fontSize:28, fontWeight:800, letterSpacing:"-.02em" }}><Ic n="box" style={{marginRight:8}} />Ang Orders Ko</h1>
            <p style={{ fontSize:13, opacity:.75, marginTop:4 }}>I-tap ang order para makita ang detalye</p>
          </div>

          <div style={{ padding:"20px 20px 0" }}>
            {orders.length === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"#ccc" }}>
                <Ic n="envelope-open" size={56} style={{ color:"#ccc", marginBottom:12, display:"block" }} />
                <div style={{ fontSize:16, fontWeight:700, color:"#555" }}>Wala pang orders</div>
                <div style={{ fontSize:13, marginTop:6, color:"#aaa" }}>Pumunta sa Tindahan para mag-order!</div>
              </div>
            ) : (
              <>
                {active.length > 0 && (
                  <>
                    <div style={{ fontSize:12, fontWeight:700, color:"#166534", marginBottom:10, textTransform:"uppercase", letterSpacing:".08em" }}>
                      <Ic n="circle" style={{color:"#EF4444",marginRight:4}} />Active ({active.length})
                    </div>
                    {active.map(o => <OrderCard key={o.id} o={o} />)}
                  </>
                )}
                {completed.length > 0 && (
                  <>
                    <div style={{ fontSize:12, fontWeight:700, color:"#94A3B8", margin:`${active.length>0?16:0}px 0 10px`, textTransform:"uppercase", letterSpacing:".08em" }}>
                      <Ic n="circle-check" style={{marginRight:4}} />Na-deliver na ({completed.length})
                    </div>
                    {completed.map(o => <OrderCard key={o.id} o={o} />)}
                  </>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    /* ══════════════════ AI RECIPE MODAL ══════════════════ */
    function AIRecipeModal({ cartItems, onClose }) {
      const [loading,  setLoading]  = useState(false);
      const [recipes,  setRecipes]  = useState(null);
      const [error,    setError]    = useState(null);
      const [selected, setSelected] = useState(null);

      const generate = async () => {
        setLoading(true); setError(null); setRecipes(null); setSelected(null);
        try {
          const itemList = cartItems.map(i => `${i.name} (${i.qty} ${i.unit})`).join(", ");
          const system = `Ikaw ay isang expert na Filipino chef na taga-Rizal.
Magbibigay ka ng tatlong (3) putahe na recipe gamit ang mga sangkap na nasa basket ng customer.
Sumagot LAMANG ng valid JSON, walang markdown, walang backtick, walang text bago o pagkatapos.
Format:
[{"name":"Pangalan","emoji":"🍳","difficulty":"Madali|Katamtaman|Mahirap","time":"XX minuto","description":"1-2 sentence sa Tagalog","steps":["Hakbang 1","Hakbang 2"],"tip":"Pro tip sa Tagalog"}]`;
          const raw = await askClaude(system, `Mga sangkap: ${itemList}. Mag-suggest ng 3 putahe.`);
          setRecipes(JSON.parse(raw.replace(/```json|```/g,"").trim()));
        } catch(e) {
          setError("May error sa AI. Subukan ulit!");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.7)", backdropFilter:"blur(8px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
          <div className="slide-up" style={{ width:"100%", maxWidth:480, background:"#fff", borderRadius:"24px 24px 0 0", padding:"26px 22px 40px", maxHeight:"90vh", overflowY:"auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <div>
                <h2 style={{ fontSize:21, fontWeight:800 }}><Ic n="robot" style={{marginRight:6}} />Ano Lulutuin?</h2>
                <p style={{ fontSize:12, color:"#aaa", marginTop:2 }}>AI-powered recipe suggestions</p>
              </div>
              <button onClick={onClose} style={{ width:36, height:36, borderRadius:10, background:"#F3F4F6", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="xmark" /></button>
            </div>

            <div style={{ background:"#F0FDF4", borderRadius:14, padding:"12px 14px", marginBottom:18, border:"1px solid #BBF7D0" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#166534", marginBottom:8 }}><Ic n="basket-shopping" style={{marginRight:4}} />Mga sangkap sa basket:</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {cartItems.map(i => (
                  <span key={i.id} style={{ background:"#fff", border:"1px solid #D1FAE5", borderRadius:20, padding:"4px 10px", fontSize:11, fontWeight:700, color:"#166534" }}>
                    {i.name}
                  </span>
                ))}
              </div>
            </div>

            {!recipes && (
              <button onClick={generate} disabled={loading} style={{
                width:"100%", padding:"16px", borderRadius:16,
                background:loading?"#E5E7EB":"linear-gradient(135deg,#7C3AED,#A855F7)",
                color:loading?"#aaa":"#fff", fontSize:15, fontWeight:700,
                boxShadow:loading?"none":"0 4px 20px rgba(124,58,237,.35)",
                display:"flex", alignItems:"center", justifyContent:"center", gap:10
              }}>
                {loading ? (<><Ic n="gear" className="spin" size={18} style={{marginRight:6}} /><span className="ai-pulse">Nag-iisip si AI...</span></>) : (<><Ic n="wand-magic-sparkles" style={{marginRight:6}} />Mag-suggest ng Recipe</>)}
              </button>
            )}

            {error && (
              <div style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:12, padding:"12px 14px", marginTop:14, fontSize:13, color:"#DC2626", fontWeight:500 }}>
                <Ic n="triangle-exclamation" style={{marginRight:4}} />{error} <button onClick={generate} style={{ marginLeft:8, color:"#DC2626", textDecoration:"underline", fontWeight:700 }}>Ulit</button>
              </div>
            )}

            {recipes && !selected && (
              <div style={{ marginTop:8 }}>
                <p style={{ fontSize:12, color:"#aaa", marginBottom:12, textAlign:"center" }}>Piliin ang gusto mong lutuin:</p>
                {recipes.map((r,i) => (
                  <button key={i} onClick={() => setSelected(r)} className="fade-up" style={{
                    width:"100%", textAlign:"left", background:"#fff", borderRadius:16,
                    padding:"16px", marginBottom:10, border:"1px solid #E5E7EB",
                    boxShadow:"0 2px 8px rgba(0,0,0,.04)", animationDelay:`${i*.1}s`
                  }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
                      <span style={{ fontSize:34 }}>{r.emoji}</span>
                      <div>
                        <div style={{ fontSize:15, fontWeight:800, color:"#111" }}>{r.name}</div>
                        <div style={{ display:"flex", gap:6, marginTop:4 }}>
                          <span style={{ fontSize:10, fontWeight:700, background:"#F0FDF4", color:"#166534", padding:"2px 8px", borderRadius:6 }}><Ic n="clock" style={{marginRight:3}} />{r.time}</span>
                          <span style={{ fontSize:10, fontWeight:700, background:"#FEF3C7", color:"#92400E", padding:"2px 8px", borderRadius:6 }}><Ic n="fire" style={{marginRight:3}} />{r.difficulty}</span>
                        </div>
                      </div>
                    </div>
                    <p style={{ fontSize:12, color:"#777", lineHeight:1.55 }}>{r.description}</p>
                  </button>
                ))}
                <button onClick={() => { setRecipes(null); generate(); }} style={{
                  width:"100%", padding:"12px", borderRadius:12, background:"#F9FAFB",
                  border:"1px solid #E5E7EB", fontSize:13, fontWeight:600, color:"#888"
                }}><Ic n="rotate" style={{marginRight:6}} />Ibang suggestions</button>
              </div>
            )}

            {selected && (
              <div className="fade-up">
                <button onClick={() => setSelected(null)} style={{ color:"#7C3AED", fontWeight:700, fontSize:13, marginBottom:16, display:"flex", alignItems:"center", gap:4 }}><Ic n="arrow-left" style={{marginRight:4}} />Bumalik</button>
                <div style={{ textAlign:"center", marginBottom:20 }}>
                  <div style={{ fontSize:60 }}>{selected.emoji}</div>
                  <h3 style={{ fontSize:21, fontWeight:800, marginTop:8 }}>{selected.name}</h3>
                  <div style={{ display:"flex", gap:8, justifyContent:"center", marginTop:8 }}>
                    <span style={{ fontSize:11, fontWeight:700, background:"#F0FDF4", color:"#166534", padding:"4px 12px", borderRadius:20 }}><Ic n="clock" style={{marginRight:3}} />{selected.time}</span>
                    <span style={{ fontSize:11, fontWeight:700, background:"#FEF3C7", color:"#92400E", padding:"4px 12px", borderRadius:20 }}><Ic n="fire" style={{marginRight:3}} />{selected.difficulty}</span>
                  </div>
                  <p style={{ fontSize:13, color:"#777", lineHeight:1.6, marginTop:12 }}>{selected.description}</p>
                </div>
                <div style={{ background:"#F9FAFB", borderRadius:16, padding:"16px", marginBottom:14, border:"1px solid #E5E7EB" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#444", marginBottom:12 }}><Ic n="list-ol" style={{marginRight:4}} />Paraan ng Pagluto:</div>
                  {selected.steps.map((step,i) => (
                    <div key={i} style={{ display:"flex", gap:12, marginBottom:12, alignItems:"flex-start" }}>
                      <div style={{ width:26, height:26, borderRadius:8, background:"#7C3AED", color:"#fff", fontSize:11, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{i+1}</div>
                      <p style={{ fontSize:13, color:"#555", lineHeight:1.55, margin:0, paddingTop:3 }}>{step}</p>
                    </div>
                  ))}
                </div>
                <div style={{ background:"#FFF7ED", borderRadius:14, padding:"14px 16px", border:"1px solid #FED7AA", display:"flex", gap:10 }}>
                  <Ic n="lightbulb" size={18} style={{ color:"#EA580C" }} />
                  <div>
                    <div style={{ fontSize:11, fontWeight:800, color:"#EA580C", marginBottom:4 }}>Pro Tip</div>
                    <p style={{ fontSize:12, color:"#9A3412", lineHeight:1.55, margin:0 }}>{selected.tip}</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
