    /* ══════════════════ PRODUCTS PANEL ══════════════════ */
    function ProductsPanel({ products, onAdd, onUpdate, onDelete, marketPricing, onUpdateMarketPricing }) {
      const [catFilter, setCatFilter] = useState("all");
      const [searchQ, setSearchQ] = useState("");
      const [showModal, setShowModal] = useState(false);
      const [editProd, setEditProd] = useState(null);
      const [delProd, setDelProd] = useState(null);
      const [delBusy, setDelBusy] = useState(false);
      const [saving, setSaving] = useState(false);
      const [deleteAllBusy, setDeleteAllBusy] = useState(false);
      const [savingFactor, setSavingFactor] = useState(null);

      const handleDeleteAll = async () => {
        if (deleteAllBusy) return;
        if (!window.confirm(`Delete all ${products.length} products? This cannot be undone.`)) return;
        setDeleteAllBusy(true);
        try { await Promise.all(products.map(p => onDelete(p.id))); toast.success("All products deleted."); }
        catch (err) { toast.error("Error deleting: " + (err.message || "unknown")); }
        finally { setDeleteAllBusy(false); }
      };

      const ALL_CATS = [{ id: "all", label: "All", icon: "border-all", color: "#555" }, ...CATEGORIES];
      const filtered = products.filter(p => { if (catFilter !== "all" && p.cat !== catFilter) return false; if (searchQ) return p.name.toLowerCase().includes(searchQ.toLowerCase()); return true; });
      const openAdd = () => { setEditProd(null); setShowModal(true); };
      const openEdit = (p) => { setEditProd(p); setShowModal(true); };
      const closeModal = () => { setShowModal(false); setEditProd(null); };

      const handleSave = async (data) => {
        setSaving(true);
        try { if (editProd?.id) await onUpdate(editProd.id, data); else await onAdd(data); closeModal(); toast.success(editProd ? "Product updated!" : "Product added!"); }
        catch (err) { toast.error("Save failed: " + (err.message || "unknown")); }
        finally { setSaving(false); }
      };

      const handleDelete = async () => {
        if (!delProd || delBusy) return;
        setDelBusy(true);
        try { await onDelete(delProd.id); setDelProd(null); toast.success("Product deleted."); }
        catch (err) { toast.error("Delete failed: " + (err.message || "unknown")); }
        finally { setDelBusy(false); }
      };

      return (
        <div style={{ padding: "20px 24px", paddingBottom: 80 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800 }}>Products</h2>
            <div style={{ display: "flex", gap: 8 }}>
              {products.length > 0 && <button onClick={handleDeleteAll} disabled={deleteAllBusy} className="btn btn-danger" style={{ opacity: deleteAllBusy ? .7 : 1 }}><Ic n={deleteAllBusy ? "spinner" : "trash"} className={deleteAllBusy ? "spin" : ""} />{deleteAllBusy ? "Deleting..." : "Delete All"}</button>}
              <button onClick={openAdd} className="btn btn-brand"><Ic n="plus" />Add Product</button>
            </div>
          </div>

          <div className="card" style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "var(--brand)", marginBottom: 8 }}><Ic n="chart-line" style={{ marginRight: 6 }} />Market Multiplier per Category</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 8 }}>
              {CATEGORIES.map(c => (
                <label key={c.id} style={{ background: "var(--surface-alt)", border: "1px solid var(--border)", borderRadius: 10, padding: "8px 10px" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: c.color, marginBottom: 4 }}><Ic n={c.icon} style={{ marginRight: 4 }} />{c.label}</div>
                  <input type="number" step="0.01" min="0.1" value={marketPricing?.[c.id] ?? DEFAULT_MARKET_FACTOR}
                    onChange={async (e) => { const next = Number(e.target.value); if (!Number.isFinite(next) || next <= 0) return; setSavingFactor(c.id); try { await onUpdateMarketPricing(c.id, next); } finally { setSavingFactor(null); } }}
                    className="input" style={{ padding: "6px 8px", fontSize: 12 }} />
                </label>
              ))}
            </div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 8 }}>{savingFactor ? "Saving..." : "1.00 = normal, 1.10 = +10%, 0.90 = -10%"}</div>
          </div>

          <div style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "center" }}>
            <div style={{ flex: 1, position: "relative" }}>
              <Ic n="magnifying-glass" style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "var(--text-muted)", fontSize: 14 }} />
              <input placeholder="Search products..." value={searchQ} onChange={e => setSearchQ(e.target.value)} className="input" style={{ paddingLeft: 34 }} />
            </div>
          </div>

          <div style={{ display: "flex", gap: 6, marginBottom: 14, overflowX: "auto", paddingBottom: 4 }}>
            {ALL_CATS.map(c => (
              <button key={c.id} onClick={() => setCatFilter(c.id)} className="btn" style={{
                padding: "7px 14px", borderRadius: 20, whiteSpace: "nowrap", fontSize: 12,
                background: catFilter === c.id ? (c.color || "var(--brand)") : "var(--surface)",
                color: catFilter === c.id ? "#fff" : "var(--text-secondary)",
                border: `1px solid ${catFilter === c.id ? "transparent" : "var(--border)"}`,
              }}>
                <Ic n={c.icon} size={11} style={{ marginRight: 4 }} />{c.label}
                {c.id !== "all" && <span style={{ marginLeft: 4, opacity: .7 }}>{products.filter(p => p.cat === c.id).length}</span>}
              </button>
            ))}
          </div>

          <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 10 }}>{filtered.length} products</div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
            {filtered.length === 0 ? (
              <div style={{ textAlign: "center", padding: 60, color: "var(--text-muted)", gridColumn: "1 / -1" }}>
                <Ic n="box-open" size={40} style={{ marginBottom: 10 }} /><div style={{ fontSize: 14, fontWeight: 600 }}>No products found</div>
              </div>
            ) : filtered.map(p => {
              const cat = CATEGORIES.find(c => c.id === p.cat);
              const isUrl = typeof p.img === "string" && (p.img.startsWith("http") || p.img.startsWith("/"));
              return (
                <div key={p.id || p.name} className="card fade-up" style={{ padding: 0, overflow: "hidden" }}>
                  <div style={{ width: "100%", aspectRatio: "1 / 1", overflow: "hidden", background: cat ? `linear-gradient(135deg,${cat.color}15,${cat.color}05)` : "#F3F4F6", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {isUrl ? <img src={p.img} alt={p.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <Ic n="image" size={24} style={{ color: "var(--border)" }} />}
                  </div>
                  <div style={{ padding: "10px 12px" }}>
                    <div style={{ fontSize: 13, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
                      {cat && <><Ic n={cat.icon} size={10} style={{ color: cat.color }} /><span>{cat.label}</span><span>·</span></>}
                      <span style={{ fontWeight: 700, color: "var(--brand)" }}>{fmt(computeLivePrice(p, marketPricing))}</span>
                      <span>/ {p.unit}</span>
                      {p.autoPriceEnabled !== false && <span style={{ fontSize: 9, fontWeight: 800, color: "var(--blue)", marginLeft: 2 }}>AUTO</span>}
                    </div>
                    <div style={{ marginTop: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span className="status-badge" style={{ background: p.stock ? "#DCFCE7" : "#FEE2E2", color: p.stock ? "#166534" : "#DC2626", fontSize: 10 }}>
                        <Ic n={p.stock ? "circle-check" : "circle-xmark"} size={9} />{p.stock ? "In Stock" : "Out of Stock"}
                      </span>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => openEdit(p)} style={{ width: 30, height: 30, borderRadius: 8, background: "var(--blue-bg)", color: "var(--blue)", display: "flex", alignItems: "center", justifyContent: "center" }}><Ic n="pen-to-square" size={12} /></button>
                        <button onClick={() => setDelProd(p)} style={{ width: 30, height: 30, borderRadius: 8, background: "var(--red-bg)", color: "var(--red)", display: "flex", alignItems: "center", justifyContent: "center" }}><Ic n="trash" size={12} /></button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {showModal && <ProductModal product={editProd} onSave={handleSave} onClose={closeModal} saving={saving} />}

          {delProd && (
            <div style={{ position: "fixed", inset: 0, zIndex: 400, background: "rgba(0,0,0,.5)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => !delBusy && setDelProd(null)}>
              <div className="pop" onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 340, background: "var(--surface)", borderRadius: 20, padding: "26px 22px" }}>
                <div style={{ textAlign: "center", marginBottom: 20 }}>
                  <Ic n="trash-can" size={36} style={{ color: "var(--red)", marginBottom: 10 }} />
                  <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 6 }}>Delete product?</h3>
                  <p style={{ fontSize: 13, color: "var(--text-muted)" }}><strong>{delProd.name}</strong> will be permanently removed.</p>
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setDelProd(null)} disabled={delBusy} className="btn btn-outline" style={{ flex: 1, padding: 12 }}>Cancel</button>
                  <button onClick={handleDelete} disabled={delBusy} className="btn btn-danger" style={{ flex: 1, padding: 12 }}>{delBusy ? "Deleting..." : "Delete"}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }


    function BGMartPanel({ products, onAdd, onUpdate, onDelete, mode = "bgmart" }) {
      const isSeasonal = mode === "seasonal";
      const sourceKey = isSeasonal ? "seasonal_listing" : "bg_mart";
      const settingsPath = isSeasonal ? "settings/seasonalBanner" : "settings/bgMartPromoBanner";
      const panelTitle = isSeasonal ? "Seasonal Listings" : "BG Mart Listings";
      const bannerTitle = isSeasonal ? "Seasonal Banner (1783x567)" : "Promotional Banner";
      const itemLabel = isSeasonal ? "Seasonal" : "BG Mart";
      const bgMartProducts = useMemo(() => products.filter((p) => p.source === sourceKey), [products, sourceKey]);
      const [quickName, setQuickName] = useState("");
      const [quickCat, setQuickCat] = useState("food_staples");
      const [quickUnit, setQuickUnit] = useState("pc");
      const [quickPrice, setQuickPrice] = useState("");
      const [quickImage, setQuickImage] = useState("");
      const [quickRibbon, setQuickRibbon] = useState("");
      const [quickRibbonPlacement, setQuickRibbonPlacement] = useState("top-right");
      const [quickVariation, setQuickVariation] = useState("");
      const [quickPreOrder, setQuickPreOrder] = useState(false);
      const [quickReceiveBy, setQuickReceiveBy] = useState("");
      const [quickImageUploading, setQuickImageUploading] = useState(false);
      const [quickRibbonUploading, setQuickRibbonUploading] = useState(false);
      const [seasonalPageTitle, setSeasonalPageTitle] = useState("Seasonal Listings");
      const [seasonalTitleSaving, setSeasonalTitleSaving] = useState(false);
      const [saving, setSaving] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [editProd, setEditProd] = useState(null);
      const [modalSaving, setModalSaving] = useState(false);
      const [promoBannerUrl, setPromoBannerUrl] = useState("");
      const [seasonalCarousel, setSeasonalCarousel] = useState([]);
      const [bannerEnabled, setBannerEnabled] = useState(false);
      const [bannerSaving, setBannerSaving] = useState(false);
      const [bannerUploading, setBannerUploading] = useState(false);
      const savedRibbons = useMemo(() => {
        const unique = new Set();
        products.forEach((p) => {
          if (p.source !== sourceKey) return;
          const url = typeof p.promoRibbon === "string" ? p.promoRibbon.trim() : "";
          if (url) unique.add(url);
        });
        return Array.from(unique);
      }, [products, sourceKey]);

      useEffect(() => {
        let active = true;
        (async () => {
          try {
            const { db, fns } = await initFirebase();
            const snap = await fns.get(fns.ref(db, settingsPath));
            const raw = snap.val() || {};
            if (active) {
              setPromoBannerUrl(typeof raw.imageUrl === "string" ? raw.imageUrl : "");
              setSeasonalCarousel(Array.isArray(raw.carouselImages) ? raw.carouselImages.filter((u) => typeof u === "string" && u.trim()) : []);
              setBannerEnabled(raw.enabled === true);
            }
            if (isSeasonal) {
              const titleSnap = await fns.get(fns.ref(db, "settings/seasonalPage"));
              const titleRaw = titleSnap.val() || {};
              if (active) setSeasonalPageTitle(typeof titleRaw.title === "string" && titleRaw.title.trim() ? titleRaw.title.trim() : "Seasonal Listings");
            }
          } catch (err) {
            console.error("Failed to load promo banner:", err);
          }
        })();
        return () => { active = false; };
      }, [settingsPath]);

      const savePromoBanner = async (nextUrl, enabled = true, carouselOverride = null) => {
        setBannerSaving(true);
        try {
          const { db, fns } = await initFirebase();
          const cleanUrl = String(nextUrl || "").trim();
          if (cleanUrl) {
            await fns.update(fns.ref(db, settingsPath), {
              imageUrl: cleanUrl,
              enabled: enabled === true,
              ...(isSeasonal ? { carouselImages: Array.isArray(carouselOverride) ? carouselOverride : seasonalCarousel } : {}),
              updatedAt: Date.now(),
            });
          } else {
            await fns.remove(fns.ref(db, settingsPath));
          }
          setPromoBannerUrl(cleanUrl);
          setBannerEnabled(cleanUrl ? enabled === true : false);
          toast.success(cleanUrl ? "Promo banner saved." : "Promo banner removed.");
        } catch (err) {
          toast.error("Banner save failed: " + (err.message || "unknown"));
        } finally {
          setBannerSaving(false);
        }
      };

      const uploadPromoBanner = async (file) => {
        if (!file || !String(file.type || "").startsWith("image/")) return toast.error("Please upload an image file.");
        if (file.size > 6 * 1024 * 1024) return toast.error("Image must be below 6MB.");
        setBannerUploading(true);
        try {
          const st = await initStorage();
          const safeName = (file.name || "promo-banner.jpg").replace(/[^\w.\-]/g, "_");
          const storageRef = st.ref(st.storage, `${isSeasonal ? "seasonal_banners" : "bgmart_banners"}/${Date.now()}_${safeName}`);
          await st.uploadBytes(storageRef, file);
          const url = await st.getDownloadURL(storageRef);
          const nextCarousel = isSeasonal ? [...seasonalCarousel, url] : null;
          if (isSeasonal) setSeasonalCarousel(nextCarousel);
          await savePromoBanner(url, true, nextCarousel);
        } catch (err) {
          toast.error("Upload failed: " + (err.message || "unknown"));
        } finally {
          setBannerUploading(false);
        }
      };



      const removeCarouselImage = async (url) => {
        if (!isSeasonal) return;
        const nextCarousel = seasonalCarousel.filter((item) => item !== url);
        setSeasonalCarousel(nextCarousel);
        setBannerSaving(true);
        try {
          const { db, fns } = await initFirebase();
          await fns.update(fns.ref(db, settingsPath), {
            imageUrl: nextCarousel[0] || promoBannerUrl || "",
            carouselImages: nextCarousel,
            enabled: nextCarousel.length > 0 ? bannerEnabled : false,
            updatedAt: Date.now(),
          });
          if (!nextCarousel.length) setPromoBannerUrl("");
          toast.success("Carousel image removed.");
        } catch (err) {
          toast.error("Failed to remove image: " + (err.message || "unknown"));
        } finally {
          setBannerSaving(false);
        }
      };

      const addListing = async () => {
        const name = quickName.trim();
        const price = Number(quickPrice);
        if (!name) return toast.error("Listing name is required.");
        if (!Number.isFinite(price) || price < 0) return toast.error("Enter valid price.");
        setSaving(true);
        try {
          await onAdd({ name, cat: quickCat, unit: quickUnit || "pc", basePrice: roundPrice(price), price: roundPrice(price), img: quickImage.trim(), promoRibbon: quickRibbon.trim(), promoRibbonPlacement: quickRibbonPlacement, variation: quickVariation.trim(), preOrder: Boolean(quickPreOrder), receiveBy: quickPreOrder ? quickReceiveBy.trim() : "", stock: true, autoPriceEnabled: true, source: sourceKey });
          setQuickName(""); setQuickPrice(""); setQuickImage(""); setQuickRibbon(""); setQuickRibbonPlacement("top-right"); setQuickVariation(""); setQuickPreOrder(false); setQuickReceiveBy("");
          toast.success(`${itemLabel} listing added.`);
        } catch (err) {
          toast.error("Failed: " + (err.message || "unknown"));
        } finally {
          setSaving(false);
        }
      };

      const uploadQuickImage = async (file) => {
        if (!file || !String(file.type || "").startsWith("image/")) return toast.error("Please upload an image file.");
        if (file.size > 5 * 1024 * 1024) return toast.error("Image must be < 5MB.");
        setQuickImageUploading(true);
        try {
          const st = await initStorage();
          const safeName = (file.name || "seasonal-product.jpg").replace(/[^\w.\-]/g, "_");
          const storageRef = st.ref(st.storage, `product_images/${isSeasonal ? "seasonal" : "bgmart"}/${Date.now()}_${safeName}`);
          await st.uploadBytes(storageRef, file);
          setQuickImage(await st.getDownloadURL(storageRef));
          toast.success("Image uploaded.");
        } catch (err) {
          toast.error("Upload failed: " + (err.message || err));
        } finally {
          setQuickImageUploading(false);
        }
      };


      const uploadQuickRibbon = async (file) => {
        if (!file || !String(file.type || "").startsWith("image/")) return toast.error("Please upload an image file.");
        if (file.size > 5 * 1024 * 1024) return toast.error("Image must be < 5MB.");
        setQuickRibbonUploading(true);
        try {
          const st = await initStorage();
          const safeName = (file.name || "promo-ribbon.jpg").replace(/[^\w.\-]/g, "_");
          const storageRef = st.ref(st.storage, `product_ribbons/${isSeasonal ? "seasonal" : "bgmart"}/${Date.now()}_${safeName}`);
          await st.uploadBytes(storageRef, file);
          setQuickRibbon(await st.getDownloadURL(storageRef));
          toast.success("Promo ribbon uploaded.");
        } catch (err) {
          toast.error("Ribbon upload failed: " + (err.message || err));
        } finally {
          setQuickRibbonUploading(false);
        }
      };

      const saveSeasonalTitle = async () => {
        if (!isSeasonal) return;
        const cleanTitle = seasonalPageTitle.trim() || "Seasonal Listings";
        setSeasonalTitleSaving(true);
        try {
          const { db, fns } = await initFirebase();
          await fns.update(fns.ref(db, "settings/seasonalPage"), { title: cleanTitle, updatedAt: Date.now() });
          setSeasonalPageTitle(cleanTitle);
          toast.success("Seasonal page title updated.");
        } catch (err) {
          toast.error("Failed to save title: " + (err.message || "unknown"));
        } finally {
          setSeasonalTitleSaving(false);
        }
      };

      const saveEdit = async (data) => {
        setModalSaving(true);
        try {
          if (editProd?.id) await onUpdate(editProd.id, { ...data, source: sourceKey });
          setShowModal(false);
          setEditProd(null);
          toast.success(`${itemLabel} listing updated.`);
        } catch (err) {
          toast.error("Save failed: " + (err.message || "unknown"));
        } finally {
          setModalSaving(false);
        }
      };

      const deleteRow = async (row) => {
        if (!row?.id) return;
        if (!window.confirm(`Delete ${row.name} from BG Mart?`)) return;
        try { await onDelete(row.id); toast.success("Listing deleted."); }
        catch (err) { toast.error("Delete failed: " + (err.message || "unknown")); }
      };

      return (
        <div style={{ padding: "20px 24px", paddingBottom: 90 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 14 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800 }}>{panelTitle}</h2>
            <span className="status-badge" style={{ background: "#DCFCE7", color: "#166534" }}>{bgMartProducts.length} active listing{bgMartProducts.length !== 1 ? "s" : ""}</span>
          </div>

          <div className="card" style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: "var(--brand)", marginBottom: 8 }}><Ic n="image" style={{ marginRight: 6 }} />{bannerTitle}</div>
            {promoBannerUrl
              ? <img src={promoBannerUrl} alt={`${itemLabel} promotional banner`} style={{ width: "100%", maxHeight: 190, objectFit: "cover", borderRadius: 12, border: "1px solid var(--border)" }} />
              : <div style={{ border: "1.5px dashed var(--border)", borderRadius: 12, padding: "16px 12px", fontSize: 12, color: "var(--text-muted)", textAlign: "center" }}>No promotional banner yet.</div>}
            <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
              <label className="btn btn-outline" style={{ fontSize: 12, padding: "8px 12px", cursor: bannerUploading || bannerSaving ? "not-allowed" : "pointer", opacity: bannerUploading || bannerSaving ? 0.65 : 1 }}>
                <Ic n={bannerUploading ? "spinner" : "camera"} className={bannerUploading ? "spin" : ""} />
                {bannerUploading ? "Uploading..." : "Upload Banner"}
                <input type="file" accept="image/*" style={{ display: "none" }} disabled={bannerUploading || bannerSaving} onChange={e => { if (e.target.files?.[0]) uploadPromoBanner(e.target.files[0]); e.target.value = ""; }} />
              </label>
              <button onClick={() => savePromoBanner("")} disabled={!promoBannerUrl || bannerUploading || bannerSaving} className="btn btn-danger" style={{ fontSize: 12, padding: "8px 12px" }}>
                {bannerSaving ? "Saving..." : "Remove Banner"}
              </button>
              <button onClick={() => savePromoBanner(promoBannerUrl, !bannerEnabled)} disabled={!promoBannerUrl || bannerUploading || bannerSaving} className="btn btn-outline" style={{ fontSize: 12, padding: "8px 12px" }}>
                {bannerEnabled ? "Hide Banner" : "Show Banner"}
              </button>
            </div>

            {isSeasonal && seasonalCarousel.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", marginBottom: 6 }}>Carousel images ({seasonalCarousel.length})</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(110px,1fr))", gap: 8 }}>
                  {seasonalCarousel.map((url, idx) => (
                    <div key={`${url}_${idx}`} style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden", background: "#fff" }}>
                      <img src={url} alt={`Seasonal carousel ${idx + 1}`} style={{ width: "100%", height: 70, objectFit: "cover", display: "block" }} />
                      <button onClick={() => removeCarouselImage(url)} disabled={bannerSaving || bannerUploading} className="btn btn-danger" style={{ width: "100%", borderRadius: 0, fontSize: 11, padding: "6px 8px" }}>Remove</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 8 }}>This image appears on the {itemLabel} area in the user app. If none is uploaded, nothing is shown.</div>
          </div>

          <div className="card" style={{ marginBottom: 14 }}>
            {isSeasonal && (
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: "var(--brand)", marginBottom: 8 }}><Ic n="font" style={{ marginRight: 6 }} />Seasonal Page Title</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 8 }}>
                  <input value={seasonalPageTitle} onChange={e => setSeasonalPageTitle(e.target.value)} placeholder="Seasonal Listings" className="input" />
                  <button onClick={saveSeasonalTitle} disabled={seasonalTitleSaving} className="btn btn-outline" style={{ padding: "8px 12px", fontSize: 12 }}>{seasonalTitleSaving ? "Saving..." : "Save Title"}</button>
                </div>
              </div>
            )}
            <div style={{ fontSize: 13, fontWeight: 800, color: "var(--brand)", marginBottom: 8 }}><Ic n="plus" style={{ marginRight: 6 }} />Dedicated Add Listing</div>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 8, marginBottom: 8 }}>
              <input value={quickName} onChange={e => setQuickName(e.target.value)} placeholder="Item name (e.g., Eggplant)" className="input" />
              <input value={quickPrice} onChange={e => setQuickPrice(e.target.value)} type="number" min="0" step="0.01" placeholder="Price" className="input" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 2fr", gap: 8, marginBottom: 10 }}>
              <select value={quickCat} onChange={e => setQuickCat(e.target.value)} className="input">{BG_MART_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>
              <input value={quickUnit} onChange={e => setQuickUnit(e.target.value)} placeholder="Unit" className="input" />
              <div style={{ border: "1px solid var(--border)", borderRadius: 10, padding: 8, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                <div style={{ minWidth: 0, fontSize: 11, color: quickImage ? "var(--text-secondary)" : "var(--text-muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                  {quickImage ? "Image uploaded" : "No image uploaded"}
                </div>
                <label className="btn btn-outline" style={{ fontSize: 11, padding: "6px 10px", cursor: quickImageUploading ? "not-allowed" : "pointer", opacity: quickImageUploading ? 0.65 : 1 }}>
                  <Ic n={quickImageUploading ? "spinner" : "image"} className={quickImageUploading ? "spin" : ""} />
                  {quickImageUploading ? "Uploading..." : (quickImage ? "Replace" : "Upload")}
                  <input type="file" accept="image/*" style={{ display: "none" }} disabled={quickImageUploading} onChange={e => { if (e.target.files?.[0]) uploadQuickImage(e.target.files[0]); e.target.value = ""; }} />
                </label>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 8, marginBottom: 10 }}>
              {savedRibbons.length > 0 && (
                <select value={quickRibbon} onChange={e => setQuickRibbon(e.target.value)} className="input">
                  <option value="">Choose saved promo ribbon</option>
                  {savedRibbons.map((url, idx) => <option key={`${idx}-${url}`} value={url}>Saved ribbon {idx + 1}</option>)}
                </select>
              )}
              <div style={{ border: "1px solid var(--border)", borderRadius: 10, padding: 8, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                <div style={{ minWidth: 0, fontSize: 11, color: quickRibbon ? "var(--text-secondary)" : "var(--text-muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                  {quickRibbon ? "Promo ribbon uploaded" : "No promo ribbon uploaded"}
                </div>
                <label className="btn btn-outline" style={{ fontSize: 11, padding: "6px 10px", cursor: quickRibbonUploading ? "not-allowed" : "pointer", opacity: quickRibbonUploading ? 0.65 : 1 }}>
                  <Ic n={quickRibbonUploading ? "spinner" : "image"} className={quickRibbonUploading ? "spin" : ""} />
                  {quickRibbonUploading ? "Uploading..." : (quickRibbon ? "Replace Ribbon" : "Upload Ribbon")}
                  <input type="file" accept="image/*" style={{ display: "none" }} disabled={quickRibbonUploading} onChange={e => { if (e.target.files?.[0]) uploadQuickRibbon(e.target.files[0]); e.target.value = ""; }} />
                </label>
              </div>
              <select value={quickRibbonPlacement} onChange={e => setQuickRibbonPlacement(e.target.value)} className="input">
                <option value="top-right">Ribbon: Top right</option>
                <option value="top-left">Ribbon: Top left</option>
                <option value="bottom-right">Ribbon: Bottom right</option>
                <option value="bottom-left">Ribbon: Bottom left</option>
              </select>

    function ProductModal({ product, onSave, onClose, saving, savedRibbons = [] }) {
      const [name, setName] = useState(product?.name || "");

      const [img, setImg] = useState(product?.img || "");
      const [promoRibbon, setPromoRibbon] = useState(product?.promoRibbon || "");

      const [stock, setStock] = useState(product?.stock !== false);
      const [autoPriceEnabled, setAutoPriceEnabled] = useState(product?.autoPriceEnabled !== false);
      const [variation, setVariation] = useState(normalizeVariationText(product?.variation));
      const [preOrder, setPreOrder] = useState(normalizePreOrderFlag(product));
      const [receiveBy, setReceiveBy] = useState(product?.receiveBy || "");
      useEffect(() => {
        setName(product?.name || "");
        setCat(product?.cat || "isda");
        setUnit(product?.unit || "kg");
        setBasePrice(Number.isFinite(Number(product?.basePrice)) ? String(Number(product.basePrice)) : Number.isFinite(Number(product?.price)) ? String(Number(product.price)) : "");
        setImg(product?.img || "");
        setPromoRibbon(product?.promoRibbon || "");
        setPromoRibbonPlacement(product?.promoRibbonPlacement || "top-right");

        setAutoPriceEnabled(product?.autoPriceEnabled !== false);
        setVariation(normalizeVariationText(product?.variation));
        setPreOrder(normalizePreOrderFlag(product));
        setReceiveBy(product?.receiveBy || "");
      }, [product]);
      const [imageUploading, setImageUploading] = useState(false);
      const [ribbonUploading, setRibbonUploading] = useState(false);

      const uploadProductImage = async (file) => {

        if (file.size > 5 * 1024 * 1024) return toast.error("Image must be < 5MB.");
        setImageUploading(true);
        try {
          const st = await initStorage();
          const safeName = (file.name || "product.jpg").replace(/[^\w.\-]/g, "_");
          const storageRef = st.ref(st.storage, `product_images/${Date.now()}_${safeName}`);
          await st.uploadBytes(storageRef, file);
          setImg(await st.getDownloadURL(storageRef));
        } catch (err) { toast.error("Upload failed: " + (err.message || err)); }
        finally { setImageUploading(false); }
      };



      const uploadPromoRibbon = async (file) => {
        if (!file || !String(file.type || "").startsWith("image/")) return toast.error("Please upload an image file.");
        if (file.size > 5 * 1024 * 1024) return toast.error("Image must be < 5MB.");
        setRibbonUploading(true);
        try {
          const st = await initStorage();
          const safeName = (file.name || "promo-ribbon.jpg").replace(/[^\w.\-]/g, "_");
          const storageRef = st.ref(st.storage, `product_ribbons/${Date.now()}_${safeName}`);
          await st.uploadBytes(storageRef, file);
          setPromoRibbon(await st.getDownloadURL(storageRef));

        await onSave({ name: cleanName, cat, unit: unit.trim() || "kg", basePrice: roundPrice(parsedPrice), price: roundPrice(parsedPrice), img: img.trim(), promoRibbon: promoRibbon.trim(), promoRibbonPlacement, variation: normalizeVariationText(variation), preOrder: normalizePreOrderFlag(preOrder), receiveBy: preOrder ? receiveBy.trim() : "", stock, autoPriceEnabled, source: (product?.source === "bg_mart" || product?.source === "seasonal_listing") ? product.source : "market" });

              <h3 style={{ fontSize: 17, fontWeight: 800 }}>{product ? "Edit Product" : "Add Product"}</h3>

            </div>
            <div style={{ display: "grid", gap: 10 }}>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Product name" required className="input" />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

                <input value={unit} onChange={e => setUnit(e.target.value)} placeholder="Unit (kg, pc)" className="input" />
              </div>
              <input type="number" min="0" step="1" value={basePrice} onChange={e => setBasePrice(e.target.value)} placeholder="Base price" className="input" />
              <div style={{ padding: 10, borderRadius: 12, border: "1px solid var(--border)", background: "var(--surface-alt)" }}>

                <label style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 12px", borderRadius: 8, border: "1px solid var(--border)", cursor: imageUploading ? "default" : "pointer", fontSize: 12, fontWeight: 700, background: "var(--surface)" }}>
                  <Ic n="image" size={13} />{imageUploading ? "Uploading..." : (img ? "Replace Image" : "Upload Image")}
                  <input type="file" accept="image/*" style={{ display: "none" }} disabled={imageUploading} onChange={e => { if (e.target.files?.[0]) uploadProductImage(e.target.files[0]); e.target.value = ""; }} />
                </label>
              </div>
              <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 12, color: "var(--text-muted)" }}>
                Promo ribbon image (optional)

                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <input value={promoRibbon} onChange={e => setPromoRibbon(e.target.value)} placeholder="Promo ribbon image URL" className="input" />
                  {savedRibbons.length > 0 && (
                    <select value={promoRibbon} onChange={e => setPromoRibbon(e.target.value)} className="input" style={{ minWidth: 170 }}>
                      <option value="">Choose saved ribbon</option>
                      {savedRibbons.map((url, idx) => <option key={`${idx}-${url}`} value={url}>Saved ribbon {idx + 1}</option>)}
                    </select>
                  )}
                  <label style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 12px", borderRadius: 8, border: "1px solid var(--border)", cursor: ribbonUploading ? "default" : "pointer", fontSize: 12, fontWeight: 700, background: "var(--surface)" }}>
                    <Ic n="image" size={13} />{ribbonUploading ? "Uploading..." : (promoRibbon ? "Replace Ribbon" : "Upload Ribbon")}
                    <input type="file" accept="image/*" style={{ display: "none" }} disabled={ribbonUploading} onChange={e => { if (e.target.files?.[0]) uploadPromoRibbon(e.target.files[0]); e.target.value = ""; }} />
                  </label>
                </div>
                <select value={promoRibbonPlacement} onChange={e => setPromoRibbonPlacement(e.target.value)} className="input">
                  <option value="top-right">Ribbon placement: Top right</option>
                  <option value="top-left">Ribbon placement: Top left</option>
                  <option value="bottom-right">Ribbon placement: Bottom right</option>
                  <option value="bottom-left">Ribbon placement: Bottom left</option>
                </select>
              </label>

              <input value={variation} onChange={e => setVariation(e.target.value)} placeholder="Variation (optional, e.g. 500ml / 1L)" className="input" />
              <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}><input type="checkbox" checked={preOrder} onChange={e => setPreOrder(e.target.checked)} /> Pre-order item</label>
              {preOrder && <input value={receiveBy} onChange={e => setReceiveBy(e.target.value)} placeholder="Receive by (e.g. 2-3 days)" className="input" />}
              <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}><input type="checkbox" checked={autoPriceEnabled} onChange={e => setAutoPriceEnabled(e.target.checked)} /> Auto pricing (base x market factor)</label>
              <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}><input type="checkbox" checked={stock} onChange={e => setStock(e.target.checked)} /> In stock</label>
            </div>
            <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
              <button type="button" onClick={() => !saving && onClose?.()} disabled={saving} className="btn btn-outline" style={{ flex: 1, padding: 12 }}>Cancel</button>
              <button type="submit" disabled={saving || imageUploading || ribbonUploading} className="btn btn-brand" style={{ flex: 1, padding: 12 }}>{saving ? "Saving..." : "Save Product"}</button>
            </div>
          </form>
        </div>
      );
    }

    /* ══════════════════ VOUCHERS PANEL ══════════════════ */
    function VouchersPanel({ vouchers, onAdd, onUpdate, onDelete }) {
      const [code, setCode] = useState(""); const [type, setType] = useState("fixed"); const [value, setValue] = useState(""); const [minOrder, setMinOrder] = useState(""); const [expiry, setExpiry] = useState(""); const [saving, setSaving] = useState(false);

      const handleAdd = async () => {
        if (!code.trim()) return toast.error("Voucher code is required.");
        const normalized = code.trim().toUpperCase();
        if (vouchers.some(v => v.code === normalized)) return toast.error("Voucher code already exists.");
        setSaving(true);
        try {
          await onAdd({ code: normalized, type, value: Number(value || 0), minOrder: Number(minOrder || 0), active: true, expiresAt: expiry ? new Date(expiry + "T23:59:59").getTime() : 0 });
          setCode(""); setType("fixed"); setValue(""); setMinOrder(""); setExpiry("");
          toast.success("Voucher created!");
        } catch (e) { toast.error("Failed: " + e.message); }
        finally { setSaving(false); }
      };

      return (
        <div style={{ padding: "20px 24px" }}>
          <h2 style={{ fontSize: 18, fontWeight: 800, marginBottom: 16 }}>Vouchers</h2>
          <div className="card" style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}><Ic n="ticket" style={{ marginRight: 6, color: "var(--brand)" }} />Create Voucher</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <input value={code} onChange={e => setCode(e.target.value.toUpperCase())} placeholder="Code (e.g. BAYAN20)" className="input" />
              <select value={type} onChange={e => setType(e.target.value)} className="input">
                <option value="fixed">Fixed Peso Off</option><option value="percent">Percent Off</option><option value="free_shipping">Free Shipping</option>
              </select>
              <input type="number" min="0" value={value} onChange={e => setValue(e.target.value)} placeholder={type === "percent" ? "Percent" : "Value"} className="input" />
              <input type="number" min="0" value={minOrder} onChange={e => setMinOrder(e.target.value)} placeholder="Min order" className="input" />
              <input type="date" value={expiry} onChange={e => setExpiry(e.target.value)} className="input" style={{ gridColumn: "span 2" }} />
            </div>
            <button onClick={handleAdd} disabled={saving} className="btn btn-brand" style={{ width: "100%", marginTop: 10, padding: 12 }}>{saving ? "Creating..." : "Create Voucher"}</button>
          </div>
          <div style={{ display: "grid", gap: 10 }}>
            {vouchers.length === 0 && <div style={{ fontSize: 13, color: "var(--text-muted)", textAlign: "center", padding: 30 }}>No vouchers yet.</div>}
            {vouchers.map(v => (
              <div key={v.id} className="card" style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center" }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                    <div style={{ fontSize: 15, fontWeight: 800 }}>{v.code}</div>
                    {v.assignedUserUid && (
                      <span style={{ fontSize: 9, fontWeight: 800, padding: "2px 6px", borderRadius: 999, background: "#EDE9FE", color: "#6D28D9", textTransform: "uppercase", letterSpacing: 0.3 }}>
                        <Ic n="user" style={{ marginRight: 3 }} />Personal
                      </span>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text-secondary)", marginTop: 3 }}>
                    {v.type === "percent" ? `${v.value}% off` : v.type === "free_shipping" ? "Free shipping" : `${fmt(v.value)} off`} · Min {fmt(v.minOrder || 0)}
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>{v.expiresAt ? `Expires: ${new Date(v.expiresAt).toLocaleDateString("en-PH")}` : "No expiry"}</div>
                  {v.assignedUserUid && (
                    <div style={{ fontSize: 11, color: "#6D28D9", marginTop: 3, fontWeight: 700, wordBreak: "break-all" }}>
                      Assigned to: {v.assignedUserName || "Unnamed"} <span style={{ color: "var(--text-muted)", fontWeight: 500 }}>({v.assignedUserUid})</span>
                    </div>
                  )}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-end" }}>
                  <button onClick={() => { onUpdate(v.id, { active: !v.active }); toast.info(v.active ? "Voucher deactivated" : "Voucher activated"); }} className="status-badge" style={{ background: v.active ? "#DCFCE7" : "#F3F4F6", color: v.active ? "#166534" : "#6B7280", cursor: "pointer", border: "none" }}>{v.active ? "Active" : "Inactive"}</button>
                  <button onClick={() => { onDelete(v.id); toast.success("Voucher deleted."); }} style={{ padding: "6px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, background: "var(--red-bg)", color: "var(--red)", cursor: "pointer" }}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════ REFUNDS PANEL ══════════════════ */
    function RefundsPanel({ refunds, orders, onCreateRefund }) {
      const [selectedOrderId, setSelectedOrderId] = useState("");
      const [amount, setAmount] = useState("");
      const [reason, setReason] = useState("");
      const [customReason, setCustomReason] = useState("");
      const REFUND_REASONS = [
        "Out of stock / Walang available",
        "Wrong item delivered / Mali ang item",
        "Damaged or spoiled item / Sira o panis",
        "Overcharged / Sobra ang singil",
        "Order cancelled / Na-cancel ang order",
        "Partial order only / Hindi kumpleto",
        "Late delivery / Natagalan ang delivery",
        "Customer request / Hiling ng customer",
        "Duplicate order / Doble ang order",
      ];
      const [saving, setSaving] = useState(false);
      const [searchQ, setSearchQ] = useState("");
      const [orderSearchQ, setOrderSearchQ] = useState("");
      const [showOrderPicker, setShowOrderPicker] = useState(false);

      const refundedOrderIds = new Set(refunds.map(r => r.orderId));
      const eligibleOrders = orders.filter(o => !refundedOrderIds.has(o.id));
      const filteredPickerOrders = eligibleOrders.filter(o => {
        if (!orderSearchQ) return true;
        const q = orderSearchQ.toLowerCase();
        return o.customer?.name?.toLowerCase().includes(q) || o.customer?.phone?.includes(q) || o.id?.toLowerCase().includes(q);
      }).slice(0, 20);

      const selectedOrder = orders.find(o => o.id === selectedOrderId);

      const selectOrder = (order) => {
        setSelectedOrderId(order.id);
        setAmount(String(Number(order.total || 0)));
        setShowOrderPicker(false);
        setOrderSearchQ("");
      };

      const effectiveReason = reason === "__custom__" ? customReason.trim() : reason;

      const handleCreate = async () => {
        if (!selectedOrderId) return toast.error("Pumili muna ng order.");
        if (!amount || Number(amount) <= 0) return toast.error("Lagyan ng valid amount.");
        if (!effectiveReason) return toast.error("Lagyan ng reason.");
        if (!selectedOrder) return toast.error("Order not found.");
        setSaving(true);
        try {
          const uid = selectedOrder.uid || selectedOrder.userId;
          await onCreateRefund(uid, selectedOrderId, Number(amount), effectiveReason);
          setSelectedOrderId(""); setAmount(""); setReason(""); setCustomReason("");
          toast.success("Refund created! User notified.");
        } catch (e) {
          const msg = e.message || "Failed";
          if (msg.includes("refund_already_exists")) toast.error("May refund na ang order na ito.");
          else if (msg.includes("refund_exceeds_order_total")) toast.error("Refund amount exceeds order total.");
          else toast.error("Failed: " + msg);
        }
        finally { setSaving(false); }
      };

      const filteredRefunds = refunds.filter(r => {
        if (!searchQ) return true;
        const q = searchQ.toLowerCase();
        const matchedOrder = orders.find(o => o.id === r.orderId);
        return r.orderId?.toLowerCase().includes(q) || r.reason?.toLowerCase().includes(q) || matchedOrder?.customer?.name?.toLowerCase().includes(q);
      });

      const REFUND_STATUS_STYLE = {
        completed: { bg: "#DCFCE7", color: "#166534", label: "Completed" },
        pending:   { bg: "#FEF3C7", color: "#92400E", label: "Pending" },
        rejected:  { bg: "#FEE2E2", color: "#B91C1C", label: "Rejected" },
      };

      return (
        React.createElement("div", { style: { padding: "20px 24px" } },
          React.createElement("h2", { style: { fontSize: 18, fontWeight: 800, marginBottom: 16 } }, "Refunds"),

          /* Create Refund Card */
          React.createElement("div", { className: "card", style: { marginBottom: 16 } },
            React.createElement("div", { style: { fontSize: 14, fontWeight: 700, marginBottom: 10 } },
              React.createElement(Ic, { n: "money-bill-transfer", style: { marginRight: 6, color: "var(--brand)" } }),
              "Issue Refund"
            ),

            /* Order Picker */
            React.createElement("div", { style: { marginBottom: 8, position: "relative" } },
              selectedOrder
                ? React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", borderRadius: 10, background: "#F0FDF4", border: "1px solid #BBF7D0" } },
                    React.createElement("div", { style: { flex: 1 } },
                      React.createElement("div", { style: { fontSize: 13, fontWeight: 700 } }, selectedOrder.customer?.name || "Customer"),
                      React.createElement("div", { style: { fontSize: 11, color: "#64748B" } }, "Order #", selectedOrder.id?.slice(-6), " \u00b7 ", fmt(selectedOrder.total || 0))
                    ),
                    React.createElement("button", { onClick: () => { setSelectedOrderId(""); setAmount(""); }, style: { padding: "4px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, background: "#FEE2E2", color: "#B91C1C", cursor: "pointer" } }, "Change")
                  )
                : React.createElement("div", null,
                    React.createElement("button", { onClick: () => setShowOrderPicker(!showOrderPicker), className: "input", style: { width: "100%", textAlign: "left", cursor: "pointer", color: "#94A3B8" } }, "Select an order to refund..."),
                    showOrderPicker && React.createElement("div", { style: { position: "absolute", top: "100%", left: 0, right: 0, zIndex: 50, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, boxShadow: "0 8px 24px rgba(0,0,0,.15)", maxHeight: 260, overflow: "hidden", display: "flex", flexDirection: "column" } },
                      React.createElement("input", { autoFocus: true, value: orderSearchQ, onChange: e => setOrderSearchQ(e.target.value), placeholder: "Search by name, phone, or order ID...", className: "input", style: { margin: 8, width: "calc(100% - 16px)" } }),
                      React.createElement("div", { style: { overflowY: "auto", flex: 1 } },
                        filteredPickerOrders.length === 0
                          ? React.createElement("div", { style: { padding: 16, textAlign: "center", fontSize: 12, color: "#94A3B8" } }, "No orders found.")
