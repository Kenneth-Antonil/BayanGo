        });
        Object.entries(appUsageMap || {}).forEach(([uid, usage]) => {
          if (!bucket[uid]) bucket[uid] = { uid, name: usage?.userName || "", phone: usage?.phone || "", address: "", orderCount: 0, deliveredCount: 0, spent: 0, lastOrderAt: Number(usage?.lastSeenAt || 0) };
          bucket[uid].downloaded = Number(usage?.installedAt || 0) > 0;
          bucket[uid].activeNow = Number(usage?.activeWindowUntil || 0) >= Date.now();
          if (!bucket[uid].name && usage?.userName) bucket[uid].name = usage.userName;
        });
        return bucket;
      })();
      const usersList = Object.values(userStatsMap).sort((a, b) => Number(b.spent || 0) - Number(a.spent || 0));
      const filteredUsersList = usersList.filter(u => { const q = userSearch.trim().toLowerCase(); if (!q) return true; return (String(u.name || "").toLowerCase().includes(q) || String(u.phone || "").toLowerCase().includes(q) || String(u.uid || "").toLowerCase().includes(q)); });

      const sendDirectToUser = async (target) => {
        if (!target?.uid) return toast.error("Missing user UID.");
        if (!directTitle.trim() || !directMessage.trim()) return toast.error("Fill in title and message.");
        setDirectBusyUid(target.uid);
        try { await sendAdminDirectNotification(target.uid, directTitle.trim(), directMessage.trim()); toast.success(`Notification sent to ${target.name || target.uid}`); }
        catch (err) { toast.error("Failed: " + err.message); }
        finally { setDirectBusyUid(""); }
      };

      const giveTopSpenderVoucher = async (target) => {
        if (!target?.uid) return toast.error("Missing user UID.");
        setVoucherBusyUid(target.uid);
        try {
          const code = `VIP${String((target.name || target.uid).replace(/\W/g, "").toUpperCase()).slice(0, 4)}${String(Date.now()).slice(-4)}`;
          await onAddVoucher({ code, type: "fixed", value: 100, minOrder: 500, active: true, expiresAt: Date.now() + 1000 * 60 * 60 * 24 * 30, assignedUserUid: target.uid, assignedUserName: target.name || "", customReason: "top_spender_reward" });
          toast.success(`Voucher ${code} created for ${target.name || target.uid}`);
        } catch (err) { toast.error("Failed: " + err.message); }
        finally { setVoucherBusyUid(""); }
      };

      return (
        <div style={{ display: "flex", minHeight: "100vh" }}>
          <Sidebar user={user} tab={tab} setTab={setTab} onLogout={onLogout} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} pendingPartners={pendingPartners} />
          <div className="content-area" style={{ flex: 1, minWidth: 0 }}>
            {/* Mobile Header */}
            <div style={{ position: "sticky", top: 0, zIndex: 20, background: "var(--surface)", borderBottom: "1px solid var(--border)", padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => setSidebarOpen(true)} style={{ width: 36, height: 36, borderRadius: 8, background: "var(--surface-alt)", border: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Ic n="bars" style={{ color: "var(--text-secondary)" }} />
                </button>
                <div><div style={{ fontSize: 14, fontWeight: 800 }}>BayanGo Admin</div><div style={{ fontSize: 10, color: "var(--text-muted)" }}>Command Center</div></div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#22C55E" }} />
                <span style={{ fontSize: 11, color: "var(--text-muted)", fontWeight: 600 }}>Live</span>
              </div>
            </div>

            {!!authzError && (
              <div style={{ margin: "12px 20px", padding: "10px 14px", borderRadius: 10, background: "#FEF2F2", border: "1px solid #FECACA", color: "#991B1B", fontSize: 12, fontWeight: 700 }}><Ic n="triangle-exclamation" style={{ marginRight: 6 }} />{authzError}</div>
            )}

            {tab === "dashboard" && <DashboardOverview orders={orders} appUsageStats={appUsageStats} products={products} />}
            {tab === "grocery" && <GroceryTab orders={dashboardOrders} />}
            {tab === "partners" && <PartnersPanel applications={partnerApplications} merchants={partnerMerchants} storeRecords={partnerStoreRecords} onDecide={onDecidePartnerApplication} onToggleFeatured={onToggleFeaturedPartnerMerchant} onModerateMerchant={onModeratePartnerMerchant} dataLoaded={partnerDataLoaded} authzError={authzError} adminUid={user?.uid} />}
            {tab === "products" && <ProductsPanel products={products} onAdd={onAddProduct} onUpdate={onUpdateProduct} onDelete={onDeleteProduct} marketPricing={marketPricing} onUpdateMarketPricing={onUpdateMarketPricing} />}
            {tab === "bgmart" && <BGMartPanel products={products} onAdd={onAddProduct} onUpdate={onUpdateProduct} onDelete={onDeleteProduct} />}
            {tab === "seasonal" && <BGMartPanel mode="seasonal" products={products} onAdd={onAddProduct} onUpdate={onUpdateProduct} onDelete={onDeleteProduct} />}
            {tab === "data" && <DataTab orders={orders} />}
            {tab === "vouchers" && <VouchersPanel vouchers={vouchers} onAdd={onAddVoucher} onUpdate={onUpdateVoucher} onDelete={onDeleteVoucher} />}
            {tab === "refunds" && <RefundsPanel refunds={refunds} orders={orders} onCreateRefund={onCreateRefund} />}

            {tab === "settings" && (
              <div style={{ padding: "20px 24px" }}>
                <h2 style={{ fontSize: 18, fontWeight: 800, marginBottom: 16 }}>Settings</h2>

                {/* Push Notifications */}
                <div className="card" style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "var(--brand)", marginBottom: 8 }}><Ic n="bell" style={{ marginRight: 6 }} />Push Notifications</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10 }}>Broadcast uses your admin session via Cloud Functions.</div>
                  <input value={bTitle} onChange={e => setBTitle(e.target.value)} placeholder="Broadcast title" className="input" style={{ marginBottom: 8 }} />
                  <textarea value={bMessage} onChange={e => setBMessage(e.target.value)} placeholder="Broadcast message" rows={2} className="input" style={{ marginBottom: 8, resize: "vertical" }} />
                  <button disabled={pushBusy || !bTitle.trim() || !bMessage.trim()} onClick={async () => {
                    setPushBusy(true);
                    try { await onBroadcast(bTitle.trim(), bMessage.trim()); setBMessage(""); toast.success("Broadcast sent!"); }
                    catch (err) { toast.error(err.message || "Failed"); }
                    finally { setPushBusy(false); }
                  }} className="btn btn-brand" style={{ width: "100%", padding: 12 }}>{pushBusy ? "Sending..." : "Send Broadcast"}</button>
                </div>

                {/* Customer List */}
                <div className="card" style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 4 }}><Ic n="users" style={{ marginRight: 6 }} />Customer List</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10 }}>Send direct notifications and create custom vouchers for top spenders.</div>
                  <input value={userSearch} onChange={e => setUserSearch(e.target.value)} placeholder="Search by name, phone, or UID" className="input" style={{ marginBottom: 8 }} />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                    <input value={directTitle} onChange={e => setDirectTitle(e.target.value)} placeholder="Notification title" className="input" />
                    <input value={directMessage} onChange={e => setDirectMessage(e.target.value)} placeholder="Notification message" className="input" />
                  </div>
                  <div style={{ maxHeight: 400, overflow: "auto", border: "1px solid var(--border)", borderRadius: 12 }}>
                    {filteredUsersList.length === 0 && <div style={{ padding: 16, fontSize: 12, color: "var(--text-muted)" }}>No users found.</div>}
                    {filteredUsersList.map((u, idx) => (
                      <div key={u.uid} style={{ padding: "10px 12px", borderTop: idx === 0 ? "none" : "1px solid var(--border-light)", background: idx < 3 ? "#FFFBEB" : "var(--surface)" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                          <div style={{ minWidth: 0 }}>
                            <div style={{ fontSize: 13, fontWeight: 800 }}>#{idx + 1} {u.name || "Unnamed"}</div>
                            <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>{u.phone || "No phone"} · UID: {u.uid}</div>
                            <div style={{ fontSize: 11, color: "var(--text-secondary)", marginTop: 3 }}>
                              Spent: <b>{fmt(u.spent || 0)}</b> · {u.deliveredCount || 0} delivered · {u.downloaded ? "Downloaded" : "No download"}
                              {u.activeNow && <span style={{ marginLeft: 6, fontSize: 9, fontWeight: 800, background: "#DCFCE7", color: "#166534", padding: "1px 5px", borderRadius: 4 }}>ONLINE</span>}
                            </div>
                          </div>
                          <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                            <button disabled={directBusyUid === u.uid} onClick={() => sendDirectToUser(u)} className="btn btn-blue" style={{ padding: "6px 10px", fontSize: 11 }}>{directBusyUid === u.uid ? "..." : "Notify"}</button>
                            <button disabled={voucherBusyUid === u.uid} onClick={() => giveTopSpenderVoucher(u)} className="btn" style={{ padding: "6px 10px", fontSize: 11, background: "var(--purple)", color: "#fff" }}>{voucherBusyUid === u.uid ? "..." : "Voucher"}</button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* App Availability */}
                <div className="card" style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: appAvailability.userAppEnabled ? "var(--brand)" : "var(--red)", marginBottom: 4 }}><Ic n="power-off" style={{ marginRight: 6 }} />User App Availability</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10 }}>Toggle this to show users that the app is currently unavailable.</div>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", cursor: "pointer" }}>
                    <input
                      type="checkbox"
                      checked={!appAvailability.userAppEnabled}
                      onChange={e => setAppAvailability(s => ({ ...s, userAppEnabled: !e.target.checked }))}
                    />
                    Mark user app as currently unavailable
                  </label>
                  <textarea
                    value={appAvailability.userAppMessage}
                    onChange={e => setAppAvailability(s => ({ ...s, userAppMessage: e.target.value }))}
                    placeholder="Optional advisory message for users (e.g. maintenance schedule)."
                    rows={3}
                    className="input"
                    style={{ marginBottom: 8, resize: "vertical" }}
                  />
                  <button onClick={saveAppAvailability} disabled={appAvailabilitySaving} className="btn btn-danger" style={{ width: "100%", padding: 10 }}>
                    {appAvailabilitySaving ? "Saving..." : "Save App Availability"}
                  </button>
                </div>

                {/* GCash Settings */}
                <div className="card">
                  <div style={{ fontSize: 14, fontWeight: 800, color: "var(--blue)", marginBottom: 4 }}><Ic n="qrcode" style={{ marginRight: 6 }} />GCash Payment Settings</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10 }}>Shown to customers ordering from island locations.</div>
                  <input value={gcashSettings.number} onChange={e => setGcashSettings(s => ({ ...s, number: e.target.value }))} placeholder="GCash Number" className="input" style={{ marginBottom: 8 }} />
                  <input value={gcashSettings.name} onChange={e => setGcashSettings(s => ({ ...s, name: e.target.value }))} placeholder="Account Name" className="input" style={{ marginBottom: 8 }} />
                  {gcashSettings.qrUrl ? <img src={gcashSettings.qrUrl} alt="QR" style={{ width: 130, height: 130, objectFit: "contain", display: "block", margin: "0 auto 10px", borderRadius: 10, border: "2px solid var(--blue-bg)" }} />
                  : <div style={{ textAlign: "center", marginBottom: 10, padding: 12, borderRadius: 10, border: "1.5px dashed var(--border)", color: "var(--text-muted)", fontSize: 12 }}>No QR uploaded</div>}
                  <label style={{ display: "block", width: "100%", marginBottom: 8 }}>
                    <div className="btn btn-outline" style={{ width: "100%", padding: 10, justifyContent: "center" }}>{qrUploading ? "Uploading..." : (gcashSettings.qrUrl ? "Replace QR" : "Upload QR Image")}</div>
                    <input type="file" accept="image/*" style={{ display: "none" }} disabled={qrUploading} onChange={e => { if (e.target.files?.[0]) uploadQrImage(e.target.files[0]); e.target.value = ""; }} />
                  </label>
                  <button onClick={saveGcashSettings} disabled={gcashSaving} className="btn btn-blue" style={{ width: "100%", padding: 10 }}>{gcashSaving ? "Saving..." : "Save GCash Settings"}</button>
                </div>
              </div>
            )}

            {tab === "orders" && (
              <div style={{ padding: "20px 24px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
                  <h2 style={{ fontSize: 18, fontWeight: 800 }}>Orders</h2>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => exportOrdersToExcel(filtered, "filtered")} className="btn btn-brand" style={{ fontSize: 11, padding: "7px 12px" }}><Ic n="file-excel" />Export Visible</button>
                    <button onClick={() => exportOrdersToExcel(viewFilteredOrders, ordersView)} className="btn btn-outline" style={{ fontSize: 11, padding: "7px 12px" }}><Ic n="table" />Export {ordersView === "archive" ? "Archive" : "Active"}</button>
                  </div>
                </div>

                {/* Status Filter Cards */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 14 }}>
                  {[
                    { key: "pending", label: "Pending", icon: "hourglass-half", color: "#D97706" },
                    { key: "buying", label: "Buying", icon: "cart-shopping", color: "var(--blue)" },
                    { key: "otw", label: "OTW", icon: "motorcycle", color: "var(--purple)" },
                    { key: "delivered", label: "Done", icon: "circle-check", color: "var(--brand-light)" },
                  ].map(s => (
                    <div key={s.key} className="card" style={{ textAlign: "center", padding: "10px 6px", cursor: "pointer", borderColor: filterStatus === s.key ? s.color : "var(--border)", borderWidth: filterStatus === s.key ? 2 : 1, transition: "all .15s" }} onClick={() => setFilterStatus(filterStatus === s.key ? "all" : s.key)}>
                      <Ic n={s.icon} size={18} style={{ color: s.color, marginBottom: 4 }} />
                      <div style={{ fontSize: 20, fontWeight: 900, color: s.color, lineHeight: 1 }}>{counts[s.key]}</div>
                      <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text-muted)" }}>{s.label}</div>
                    </div>
                  ))}
                </div>

                {/* Active/Archive Toggle + Search */}
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  <div style={{ display: "flex", background: "var(--surface-alt)", borderRadius: 10, border: "1px solid var(--border)", padding: 3, gap: 3 }}>
                    <button onClick={() => { setOrdersView("active"); if (filterStatus === "delivered") setFilterStatus("all"); }} className="btn" style={{ padding: "8px 14px", fontSize: 12, background: ordersView === "active" ? "var(--brand)" : "transparent", color: ordersView === "active" ? "#fff" : "var(--text-muted)", borderRadius: 8 }}>Active ({activeOrders.length})</button>
                    <button onClick={() => { setOrdersView("archive"); setFilterStatus("all"); }} className="btn" style={{ padding: "8px 14px", fontSize: 12, background: ordersView === "archive" ? "#1E293B" : "transparent", color: ordersView === "archive" ? "#fff" : "var(--text-muted)", borderRadius: 8 }}>Archive</button>
                  </div>
                  <div style={{ flex: 1, position: "relative" }}>
                    <Ic n="magnifying-glass" style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "var(--text-muted)", fontSize: 14 }} />
                    <input placeholder="Search orders..." value={searchQ} onChange={e => setSearchQ(e.target.value)} className="input" style={{ paddingLeft: 34 }} />
                  </div>
                </div>

                {/* Orders List */}
                <div style={{ display: "grid", gap: 8 }}>
                  {filtered.length === 0 ? (
                    <div style={{ textAlign: "center", padding: 60, color: "var(--text-muted)" }}>
                      <Ic n="inbox" size={40} style={{ marginBottom: 10 }} />
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{ordersView === "archive" ? "No archived orders" : "No active orders"}</div>
                    </div>
                  ) : filtered.map(order => {
                    const st = STATUS_INFO[order.status] || STATUS_INFO.pending;
                    const ts = order.createdAt?.toDate ? order.createdAt.toDate() : new Date(order.createdAt);
                    const regularItems = order.items?.filter(i => !i.isCustom) || [];
                    const customItems = order.items?.filter(i => i.isCustom) || [];
                    return (
                      <div key={order.id} className="card fade-up" style={{ padding: "14px 16px", borderLeft: `4px solid ${st.color}` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                          <div>
                            <div style={{ fontSize: 15, fontWeight: 800 }}>{order.customer?.name || "\u2014"}</div>
                            <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 1 }}>{order.customer?.phone} · {order.customer?.address}</div>
                            <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>{ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH", { hour: "2-digit", minute: "2-digit" })}</div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <span className="status-badge" style={{ background: st.bg, color: st.color }}><Ic n={st.icon} size={10} />{st.label}</span>
                            {order.riderName && <div style={{ fontSize: 11, fontWeight: 600, color: "var(--purple)", marginTop: 4 }}><Ic n="motorcycle" style={{ marginRight: 3 }} />{order.riderName}</div>}
                            <div style={{ fontSize: 14, fontWeight: 800, color: "var(--brand)", marginTop: 4 }}>~{fmt(order.total)}</div>
                          </div>
                        </div>

                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
                          {regularItems.slice(0, 6).map(i => {
                            const imgSrc = orderItemImage(i);
                            return (
                              <span key={i.id || `${i.name}-${i.qty}`} style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 8px", borderRadius: 20, background: "var(--surface-alt)", border: "1px solid var(--border)", fontSize: 11, color: "var(--text-secondary)" }}>
                                {imgSrc ? <img src={imgSrc} alt={i.name} style={{ width: 18, height: 18, borderRadius: 4, objectFit: "cover" }} /> : <Ic n="bag-shopping" style={{ color: "var(--text-muted)", fontSize: 10 }} />}
                                {i.name} x{i.qty}
                              </span>
                            );
                          })}
                          {regularItems.length > 6 && <span style={{ fontSize: 11, color: "var(--text-muted)", alignSelf: "center" }}>+{regularItems.length - 6} more</span>}
                          {customItems.length > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: "var(--brand)", alignSelf: "center" }}><Ic n="note-sticky" style={{ marginRight: 3 }} />{customItems.length} custom</span>}
                        </div>

                        <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10 }}>
                          <Ic n="location-dot" style={{ marginRight: 3 }} />{order.zone} · Del {fmt(order.deliveryFee)} + Svc {fmt(order.serviceFee)}
                          {(order.totalDiscount || 0) > 0 && <span style={{ color: "var(--brand)", marginLeft: 6 }}>· Disc {fmt(order.totalDiscount)}</span>}
                        </div>

                        {order.locationType === "Island" && order.status === "buying" && (
                          order.gcashPaymentConfirmed
                            ? <div style={{ marginBottom: 8, padding: "7px 12px", borderRadius: 8, background: "#DCFCE7", color: "#166534", fontSize: 12, fontWeight: 700 }}><Ic n="circle-check" style={{ marginRight: 4 }} />GCash Confirmed</div>
                            : <button onClick={() => confirmGcashPayment(order)} disabled={confirmingPay === order.id} className="btn btn-blue" style={{ width: "100%", marginBottom: 8, padding: 10 }}><Ic n="qrcode" />{confirmingPay === order.id ? "Confirming..." : "Confirm GCash"}</button>
                        )}

                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          <button onClick={() => { setSelected(order); setEditedPrices({}); setProofImages(order.proofImages || []); setAssignRiderId(order.riderId || ""); }} className="btn btn-outline" style={{ flex: "1 1 80px", padding: 9 }}><Ic n="clipboard" />Details</button>
                          <button onClick={() => printOrderReceipt(order)} className="btn btn-outline" style={{ flex: "1 1 100px", padding: 9 }}><Ic n="print" />Print</button>
                          {getNextLabel(order) && <button onClick={() => advance(order)} disabled={updating === order.id} className="btn btn-brand" style={{ flex: "2 1 120px", padding: 9 }}>{updating === order.id ? "Updating..." : `${getNextLabel(order)} \u2192`}</button>}
                          {canCancelOrder(order) && <button onClick={() => cancelOrder(order)} disabled={cancellingOrderId === order.id} className="btn" style={{ flex: "1 1 80px", padding: 9, background: "var(--red-bg)", color: "var(--red)", border: "1px solid #FECACA" }}><Ic n={cancellingOrderId === order.id ? "hourglass-half" : "ban"} />{cancellingOrderId === order.id ? "..." : "Cancel"}</button>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Order Detail Modal */}
            {selected && (
              <div style={{ position: "fixed", inset: 0, zIndex: 300, background: "rgba(0,0,0,.5)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => { setSelected(null); setAssignRiderId(""); }}>
                <div className="slide-up" onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 540, background: "var(--surface)", borderRadius: "20px 20px 0 0", padding: "22px 20px 32px", maxHeight: "88vh", overflowY: "auto" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <div><h3 style={{ fontSize: 18, fontWeight: 800 }}>Order Detail</h3><p style={{ fontSize: 11, color: "var(--text-muted)" }}>#{selected.id?.slice(0, 8)}</p></div>
                    <button onClick={() => { setSelected(null); setAssignRiderId(""); }} style={{ width: 32, height: 32, borderRadius: 8, background: "var(--surface-alt)", border: "1px solid var(--border)", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>x</button>
                  </div>

                  <div className="card" style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", marginBottom: 6, textTransform: "uppercase", letterSpacing: ".04em" }}>Customer</div>
                    <div style={{ fontSize: 15, fontWeight: 800 }}>{selected.customer?.name}</div>
                    <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 2 }}>{selected.customer?.phone}</div>
                    <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 2 }}><Ic n="location-dot" style={{ marginRight: 4 }} />{selected.customer?.address}</div>
                    <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 4 }}>Zone: {selected.zone}</div>
                  </div>

                  {selected.riderId && (
                    <div style={{ background: "var(--purple-bg)", borderRadius: "var(--radius)", padding: "12px 14px", marginBottom: 12, border: "1px solid #DDD6FE" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "var(--purple)", marginBottom: 6 }}>RIDER</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        {selected.riderPhoto && <img src={selected.riderPhoto} style={{ width: 34, height: 34, borderRadius: "50%", objectFit: "cover" }} />}
                        <div>
                          <div style={{ fontSize: 14, fontWeight: 800 }}>{selected.riderName || "\u2014"}</div>
                          {selected.acceptedAt && <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Accepted: {(selected.acceptedAt?.toDate ? selected.acceptedAt.toDate() : new Date(selected.acceptedAt)).toLocaleTimeString("en-PH", { hour: "2-digit", minute: "2-digit" })}</div>}
                        </div>
                      </div>
                    </div>
                  )}

                  {selected.status !== "delivered" && selected.status !== "cancelled" && (
                    <div style={{ background: "#EEF2FF", borderRadius: "var(--radius)", padding: "12px 14px", marginBottom: 12, border: "1px solid #C7D2FE" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#4338CA", marginBottom: 8 }}>ASSIGN RIDER</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <select value={assignRiderId || selected.riderId || ""} onChange={e => setAssignRiderId(e.target.value)} className="input" style={{ flex: 1 }}>
                          <option value="">Select rider...</option>
                          {riders.map(r => <option key={r.uid} value={r.uid}>{r.name}{r.email ? ` (${r.email})` : ""}</option>)}
                        </select>
                        <button onClick={() => assignOrderToRider(selected, assignRiderId || selected.riderId)} disabled={assigningOrderId === selected.id || riders.length === 0} className="btn btn-blue" style={{ minWidth: 90 }}>{assigningOrderId === selected.id ? "..." : (selected.riderId ? "Reassign" : "Assign")}</button>
                      </div>
                      {riders.length === 0 && <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 6 }}>No riders with active push tokens.</div>}
                    </div>
                  )}

                  {/* Items + Price Editor */}
                  {(() => {
                    const allItems = selected.items || [];
                    const liveItems = allItems.map((item, idx) => { const key = item.id || String(idx); const ep = editedPrices[key]; return { ...item, price: ep !== undefined ? Number(ep) : Number(item.price || 0), _key: key }; });
                    const { subtotal, serviceFee, smallOrderFee, total } = recomputeTotals(liveItems, selected.deliveryFee, selected.totalDiscount);
                    const hasEdits = Object.keys(editedPrices).length > 0 || proofImages.length !== (selected.proofImages || []).length;
                    return (
                      <div className="card" style={{ marginBottom: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase" }}>Items & Prices</div>
                          {selected.pricesUpdatedAt && <span style={{ fontSize: 10, color: "var(--brand-light)", fontWeight: 700 }}><Ic n="circle-check" style={{ marginRight: 3 }} />Updated</span>}
                        </div>
                        {liveItems.map((item, idx) => {
                          const ep = editedPrices[item._key];
                          const displayPrice = ep !== undefined ? ep : item.price;
                          const lineTotal = item.unit === "kg" ? Number(displayPrice) * Number(item.qty || 1) * Number(item.weightUnit || 1) : Number(displayPrice) * Number(item.qty || 1);
                          return (
                            <div key={item._key} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: "1px solid var(--border-light)" }}>
                              {orderItemImage(item) ? <img src={orderItemImage(item)} alt={item.name} style={{ width: 30, height: 30, borderRadius: 6, objectFit: "cover", flexShrink: 0 }} /> : <div style={{ width: 30, height: 30, borderRadius: 6, background: "var(--surface-alt)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Ic n={item.isCustom ? "note-sticky" : "bag-shopping"} style={{ color: "var(--text-muted)", fontSize: 12 }} /></div>}
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontSize: 12, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}{item.isCustom && <span style={{ fontSize: 9, color: "var(--brand)", marginLeft: 4, background: "var(--brand-bg)", padding: "1px 4px", borderRadius: 3 }}>custom</span>}</div>
                                <div style={{ fontSize: 11, color: "var(--text-muted)" }}>{item.unit === "kg" ? `${item.totalKg || Number(item.qty) * Number(item.weightUnit || 1)} kg` : `x${item.qty} ${item.unit || "pc"}`}</div>
                              </div>
                              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                                  <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{"\u20B1"}</span>
                                  <input type="number" min="0" step="1" value={ep !== undefined ? ep : item.price} onChange={e => setEditedPrices(prev => ({ ...prev, [item._key]: e.target.value }))} style={{ width: 64, padding: "3px 5px", border: `1px solid ${ep !== undefined ? "#FB923C" : "var(--border)"}`, borderRadius: 6, fontSize: 12, fontWeight: 700, textAlign: "right", background: ep !== undefined ? "#FFF7ED" : "var(--surface)" }} />
                                </div>
                                <div style={{ fontSize: 10, color: "var(--text-muted)" }}>= {fmt(lineTotal)}</div>
                              </div>
                            </div>
                          );
                        })}

                        <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid var(--border)" }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", marginBottom: 8 }}>PROOF PHOTOS</div>
                          {proofImages.length > 0 && (
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
                              {proofImages.map((url, i) => (
                                <div key={i} style={{ position: "relative" }}>
                                  <button onClick={() => setProofPreviewUrl(url)} style={{ padding: 0, border: "none", background: "transparent", cursor: "zoom-in" }}><img src={url} alt={`proof-${i}`} style={{ width: 56, height: 56, borderRadius: 8, objectFit: "cover", border: "1px solid var(--border)" }} /></button>
                                  <button onClick={() => setProofImages(prev => prev.filter((_, j) => j !== i))} style={{ position: "absolute", top: -4, right: -4, width: 16, height: 16, borderRadius: "50%", background: "var(--red)", color: "#fff", fontSize: 9, display: "flex", alignItems: "center", justifyContent: "center" }}>x</button>
                                </div>
                              ))}
                            </div>
                          )}
                          <label style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 12px", borderRadius: 8, border: "1.5px dashed var(--border)", cursor: "pointer", fontSize: 12, color: "var(--text-secondary)", background: "var(--surface)" }}>
                            <Ic n={uploadingProof ? "spinner" : "camera"} className={uploadingProof ? "spin" : ""} />{uploadingProof ? "Uploading..." : "Upload Receipt / Photo"}
                            <input type="file" accept="image/*" style={{ display: "none" }} onChange={async e => { if (e.target.files[0]) await uploadProofImage(e.target.files[0], selected.id); e.target.value = ""; }} />
                          </label>
                        </div>

                        <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--border)", fontSize: 13, color: "var(--text-secondary)" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}><span>Subtotal</span><span>{fmt(subtotal)}</span></div>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}><span>Delivery</span><span>{fmt(selected.deliveryFee)}</span></div>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}><span>Service Fee</span><span>{fmt(serviceFee)}</span></div>
                          {smallOrderFee > 0 && <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}><span>Small Order Fee</span><span>{fmt(smallOrderFee)}</span></div>}
                          {(selected.totalDiscount || 0) > 0 && <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3, color: "var(--brand)" }}><span>Discount</span><span>-{fmt(selected.totalDiscount)}</span></div>}
                          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, paddingTop: 8, borderTop: "2px dashed var(--border)", fontSize: 16, fontWeight: 800, color: hasEdits ? "#EA580C" : "var(--text-primary)" }}>
                            <span>TOTAL</span><span>{fmt(total)}{hasEdits && <span style={{ fontSize: 10, marginLeft: 4, color: "#EA580C" }}>*unsaved</span>}</span>
                          </div>
                        </div>

                        <button onClick={() => saveActualPrices(selected)} disabled={savingPrices || !hasEdits} className="btn" style={{ width: "100%", marginTop: 12, padding: 11, background: savingPrices ? "var(--border)" : (!hasEdits ? "var(--surface-alt)" : "linear-gradient(135deg,#EA580C,#F97316)"), color: !hasEdits || savingPrices ? "var(--text-muted)" : "#fff", border: `1px solid ${hasEdits ? "transparent" : "var(--border)"}` }}>
                          <Ic n={savingPrices ? "spinner" : "floppy-disk"} className={savingPrices ? "spin" : ""} />{savingPrices ? "Saving..." : "Save Actual Prices & Proof"}
                        </button>
                      </div>
                    );
                  })()}

                  {selected.locationType === "Island" && selected.status === "buying" && (
                    selected.gcashPaymentConfirmed
                      ? <div style={{ marginBottom: 12, padding: "12px 14px", borderRadius: "var(--radius)", background: "#DCFCE7", color: "#166534", fontSize: 13, fontWeight: 700 }}><Ic n="circle-check" style={{ marginRight: 6 }} />GCash Payment Confirmed</div>
                      : <button onClick={() => confirmGcashPayment(selected)} disabled={confirmingPay === selected.id} className="btn btn-blue" style={{ width: "100%", marginBottom: 12, padding: 12 }}><Ic n="qrcode" />{confirmingPay === selected.id ? "Confirming..." : "Confirm GCash Payment"}</button>
                  )}

                  <button onClick={() => { setMessageModalOrder(selected); setCustomerMessageDraft(""); }} className="btn" style={{ width: "100%", marginBottom: 8, padding: 12, background: "#FFF7ED", color: "#9A3412", border: "1px solid #FDBA74" }}><Ic n="message" style={{ marginRight: 5 }} />Message Customer</button>

                  {getNextLabel(selected) && <button onClick={() => advance(selected)} disabled={updating === selected.id} className="btn btn-brand" style={{ width: "100%", padding: 14, fontSize: 14 }}>{updating === selected.id ? "Updating..." : `${getNextLabel(selected)} \u2192`}</button>}
                  {canCancelOrder(selected) && <button onClick={() => cancelOrder(selected)} disabled={cancellingOrderId === selected.id} className="btn" style={{ width: "100%", marginTop: 8, padding: 12, background: "var(--red-bg)", color: "var(--red)", border: "1px solid #FECACA" }}><Ic n={cancellingOrderId === selected.id ? "hourglass-half" : "ban"} style={{ marginRight: 4 }} />{cancellingOrderId === selected.id ? "Cancelling..." : "Cancel Order"}</button>}
                  {selected.status === "delivered" && <div style={{ textAlign: "center", padding: 12, fontSize: 14, fontWeight: 700, color: "var(--brand)" }}><Ic n="circle-check" style={{ marginRight: 6 }} />Order delivered!</div>}
                </div>
              </div>
            )}

            {proofPreviewUrl && (
              <div onClick={() => setProofPreviewUrl("")} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.85)", zIndex: 9000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
                <img src={proofPreviewUrl} alt="Proof preview" onClick={e => e.stopPropagation()} style={{ maxWidth: "95vw", maxHeight: "90vh", borderRadius: 14, objectFit: "contain", background: "#fff" }} />
              </div>
            )}

            {messageModalOrder && (
              <div onClick={() => setMessageModalOrder(null)} style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,.6)", zIndex: 9500, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
                <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 440, background: "#fff", borderRadius: 16, border: "1px solid var(--border)", boxShadow: "0 20px 60px rgba(15,23,42,.35)", overflow: "hidden" }}>
                  <div style={{ padding: "14px 16px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 800, color: "var(--text-primary)" }}><Ic n="message" style={{ marginRight: 6 }} />Message Customer</div>
                    <button onClick={() => setMessageModalOrder(null)} className="btn" style={{ padding: "6px 10px", fontSize: 11 }}>Close</button>
                  </div>
                  <div style={{ padding: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8 }}>Order #{String(messageModalOrder.id || "").slice(0, 8)} • {messageModalOrder.customer?.name || "Customer"}</div>
                    <textarea value={customerMessageDraft} onChange={e => setCustomerMessageDraft(e.target.value)} placeholder="Type your message..." rows={4} style={{ width: "100%", resize: "vertical", padding: "10px 12px", borderRadius: 10, border: "1px solid var(--border)", fontSize: 13 }} />
                    <button onClick={() => sendCustomerMessage(messageModalOrder, customerMessageDraft)} className="btn btn-brand" style={{ width: "100%", marginTop: 10, padding: 11 }}><Ic n="paper-plane" style={{ marginRight: 6 }} />Send Message</button>
                  </div>
                </div>
              </div>
            )}

            <BottomNav tab={tab} setTab={setTab} pendingPartners={pendingPartners} />
          </div>
        </div>
      );
    }

    /* ══════════════════ ERROR BOUNDARY ══════════════════ */
    class AdminErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      render() {
        if (this.state.error) return (
          <div style={{ padding: 24, margin: 20, background: "#FEF2F2", borderRadius: 16, border: "1.5px solid #FCA5A5" }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: "#B91C1C", marginBottom: 6 }}>Something went wrong</div>
            <div style={{ fontSize: 12, color: "#7F1D1D", fontFamily: "monospace", wordBreak: "break-all" }}>{this.state.error.toString()}</div>
            <button onClick={() => window.location.reload()} style={{ marginTop: 12, padding: "8px 16px", borderRadius: 8, background: "#B91C1C", color: "#fff", fontWeight: 700, border: "none", cursor: "pointer" }}>Reload</button>
          </div>
        );
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <AdminErrorBoundary><App /></AdminErrorBoundary>
    );
  </script>
</body>
</html>
