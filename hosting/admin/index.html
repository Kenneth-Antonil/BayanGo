    input, textarea, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn  { from { transform:translateX(100%); } to { transform:translateX(0); } }
    @keyframes slideUp  { from { transform:translateY(100%); } to { transform:translateY(0); } }
    @keyframes pop      { 0%{transform:scale(.9);opacity:0;} 100%{transform:scale(1);opacity:1;} }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    @keyframes toastIn  { from{transform:translateX(120%);opacity:0;} to{transform:translateX(0);opacity:1;} }
    @keyframes toastOut { from{transform:translateX(0);opacity:1;} to{transform:translateX(120%);opacity:0;} }

    .fade-up  { animation: fadeUp .32s ease both; }
    .slide-in { animation: slideIn .28s cubic-bezier(.4,0,.2,1) both; }
    .slide-up { animation: slideUp .3s cubic-bezier(.4,0,.2,1) both; }
    .pop      { animation: pop .22s ease both; }
    .spin     { animation: spin 1s linear infinite; }

    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: #0F172A; z-index: 40; display: flex; flex-direction: column; transition: transform .25s ease; }
    .sidebar-overlay { display: none; }
    .content-area { margin-left: var(--sidebar-w); min-height: 100vh; }
    .bottom-nav { display: none; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 39; opacity: 0; pointer-events: none; transition: opacity .25s; }
      .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
      .content-area { margin-left: 0; padding-bottom: 72px; }
      .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: #FFFFFF; border-top: 1px solid var(--border); z-index: 35; align-items: center; justify-content: space-around; padding: 0 4px; box-shadow: 0 -2px 10px rgba(0,0,0,.06); }
    }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; transition: all .15s; }
    .btn-brand { background: var(--brand); color: #fff; }
    .btn-brand:hover { background: #14532D; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #B91C1C; }
    .btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); }

    .btn-blue { background: var(--blue); color: #fff; }

    .input:focus { border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(34,197,94,.1); }

    .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { pointer-events: auto; display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,.12); font-size: 13px; font-weight: 600; min-width: 280px; max-width: 420px; animation: toastIn .3s ease both; }

    .toast-success { border-left: 4px solid var(--brand-light); }
    .toast-error { border-left: 4px solid var(--red); }

    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }

    .metric-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .metric-delta { font-size: 11px; font-weight: 700; margin-top: 4px; display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 6px; }

    const SERVICE_FEE_RATE = 0.03;
    const DEFAULT_MARKET_FACTOR = 1;
    const fmt = n => "\u20B1" + Number(n).toLocaleString("en-PH", { minimumFractionDigits:0 });
    const roundPrice = (n) => Math.max(0, Math.round(Number(n) || 0));
    const normalizeVariationText = (value) => {
      if (Array.isArray(value)) return value.map(v => String(v || "").trim()).filter(Boolean).join(" / ");
      if (value == null) return "";
      return String(value).trim();
    };
    const normalizePreOrderFlag = (valueOrObject) => {
      const raw = valueOrObject && typeof valueOrObject === "object"
        ? (valueOrObject.preOrder ?? valueOrObject.preorder ?? valueOrObject.pre_order ?? valueOrObject.isPreOrder)
        : valueOrObject;
      if (typeof raw === "string") {
        const v = raw.trim().toLowerCase();
        if (!v) return false;
        if (["false", "0", "no", "off"].includes(v)) return false;
        if (["true", "1", "yes", "on"].includes(v)) return true;
      }
      return Boolean(raw);
    };
    const computeLivePrice = (product, marketPricing = {}) => {
      const manualPrice = Number(product?.basePrice ?? product?.price ?? 0);
      if (product?.autoPriceEnabled === false) return roundPrice(manualPrice);
      const factor = Number(marketPricing?.[product?.cat]) || DEFAULT_MARKET_FACTOR;
      return roundPrice(manualPrice * factor);
    };
    const isImageSrc = (value) => typeof value === "string" && /^(https?:\/\/|blob:|data:image\/)/i.test(value);

    /* ══════════════════ TOAST SYSTEM ══════════════════ */

      const id = ++_toastId;
      _toasts = [..._toasts, { id, message, type }];
      _toastListeners.forEach(fn => fn(_toasts));
      setTimeout(() => removeToast(id), 3500);
    };
    const removeToast = (id) => {
      _toasts = _toasts.filter(t => t.id !== id);
      _toastListeners.forEach(fn => fn(_toasts));
    };
    const toast = { success: (m) => addToast(m, "success"), error: (m) => addToast(m, "error"), info: (m) => addToast(m, "info") };

    function ToastContainer() {
      const [toasts, setToasts] = useState([]);

      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);

      _initPromise = (async () => {
        const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
        const { getDatabase, ref, push, set, update, remove, onValue, off, get, query: rtdbQuery, orderByChild, equalTo } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
        const { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
        _app  = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
        _db   = getDatabase(_app, FIREBASE_CONFIG.databaseURL);
        _auth = getAuth(_app);
        _fns = { ref, push, set, update, remove, onValue, off, get, rtdbQuery, orderByChild, equalTo };
        _authFns = { signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut };
        return { db: _db, fns: _fns, auth: _auth, authFns: _authFns };
      })();
      return _initPromise;
    }

    function sanitizeTokenKey(token) { return encodeURIComponent(String(token || "")).replace(/\./g, "%2E"); }

    async function enableAdminPush(user) {
      if (!user?.uid) return;
      if (!("serviceWorker" in navigator) || !("Notification" in window)) return;
      try {
        let permission = Notification.permission;
        if (permission !== "granted") permission = await Notification.requestPermission();
        if (permission !== "granted") return;
        const { getMessaging, getToken, onMessage } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js");
        const swReg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        await navigator.serviceWorker.ready;
        const messaging = getMessaging(_app);
        const getTokenOptions = { serviceWorkerRegistration: swReg };
        if (WEB_PUSH_VAPID_KEY) getTokenOptions.vapidKey = WEB_PUSH_VAPID_KEY;
        let token = null;
        try { token = await getToken(messaging, getTokenOptions); }
        catch (err) {
          const vapidErr = String(err?.code || "").includes("vapid") || String(err?.message || "").toLowerCase().includes("vapid");
          if (!vapidErr || !WEB_PUSH_VAPID_KEY) throw err;
          token = await getToken(messaging, { serviceWorkerRegistration: swReg });
        }
        if (!token) return;
        const { db, fns } = await initFirebase();
        const tokenKey = sanitizeTokenKey(token);
        await fns.set(fns.ref(db, `push_tokens/${user.uid}/${tokenKey}`), { token, uid: user.uid, userEmail: user.email || null, userName: user.displayName || null, role: "admin", platform: navigator.userAgent || "web", updatedAt: Date.now(), enabled: true });
        onMessage(messaging, (payload) => {
          const title = payload?.notification?.title || "BayanGo Admin";
          const body = payload?.notification?.body || "May bagong update.";
          if (Notification.permission === "granted") {
            const n = new Notification(title, { body, icon: "https://i.imgur.com/wL8wcBB.jpeg", data: payload?.data || {} });
            n.onclick = () => { window.focus(); n.close(); };
          }
        });
      } catch (err) { console.error("Admin push setup error:", err); }
    }

    async function initStorage() {
      if (!_app) await initFirebase();
      const mod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js");
      return { storage: mod.getStorage(_app), getStorage: mod.getStorage, ref: mod.ref, uploadBytes: mod.uploadBytes, getDownloadURL: mod.getDownloadURL };
    }

    async function normalizeStorageDownloadUrl(rawUrl) {
      if (!rawUrl || typeof rawUrl !== "string") return rawUrl || "";
      if (rawUrl.includes("token=")) return rawUrl;
      try {
        const parsed = new URL(rawUrl);
        if (!parsed.hostname.includes("firebasestorage.googleapis.com")) return rawUrl;
        if (!parsed.pathname.includes("/o")) return rawUrl;
        const objectName = parsed.searchParams.get("name");
        if (!objectName) return rawUrl;
        const st = await initStorage();
        const storageRef = st.ref(st.storage, decodeURIComponent(objectName));
        return await st.getDownloadURL(storageRef);
      } catch (_) { return rawUrl; }
    }

    async function uploadGcashQrViaFunction(file) {
      if (!_auth?.currentUser) throw new Error("Admin auth session expired.");
      const idToken = await _auth.currentUser.getIdToken();
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Failed to read selected file."));
        reader.readAsDataURL(file);
      });
      const res = await fetch(`https://us-central1-${FIREBASE_CONFIG.projectId}.cloudfunctions.net/uploadGcashQrImage`, {
        method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${idToken}` },
        body: JSON.stringify({ fileName: file.name || `qr_${Date.now()}.jpg`, contentType: file.type || "image/jpeg", dataUrl }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || !json?.ok || !json?.url) throw new Error(json?.error || `QR upload HTTP ${res.status}`);
      return json.url;
    }

            const marketPricingRef = fns.ref(db, "settings/marketPricing");

              setMarketPricing(normalized);
            }, err => console.error("Market pricing error:", err));
            unsubMarket = () => fns.off(marketPricingRef);

            const ordersQueryRef = fns.rtdbQuery(fns.ref(db, "orders"), fns.orderByChild("createdAt"));
            const ordersPlainRef = fns.ref(db, "orders");
            let usingOrdersFallback = false;
            const mapAndSortOrders = (snap) => {
              const list = [];
              snap.forEach(c => { const v = c.val() || {}; list.push({ id: c.key, ...v, status: v.status || "pending" }); });

            fns.onValue(ordersQueryRef, mapAndSortOrders, err => {
              const code = String(err?.code || "").toLowerCase();
              if ((code === "permission_denied" || code === "permission-denied") && !usingOrdersFallback) {
                usingOrdersFallback = true;
                fns.onValue(ordersPlainRef, mapAndSortOrders, plainErr => console.error("Orders fallback error:", plainErr));
              }
            });
            unsubOrders = () => { fns.off(ordersQueryRef); if (usingOrdersFallback) fns.off(ordersPlainRef); };

            const vouchersRef = fns.ref(db, "vouchers");
            fns.onValue(vouchersRef, snap => {
              const list = [];
              snap.forEach(c => { const v = c.val() || {}; list.push({ id: c.key, code: String(v.code || "").toUpperCase(), type: v.type || "fixed", value: Number(v.value || 0), minOrder: Number(v.minOrder || 0), active: v.active !== false, expiresAt: Number(v.expiresAt || 0), createdAt: Number(v.createdAt || 0), assignedUserUid: v.assignedUserUid || "", assignedUserName: v.assignedUserName || "", customReason: v.customReason || "" }); });
              list.sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));

            unsubVouchers = () => fns.off(vouchersRef);

            const refundsRef = fns.ref(db, "refunds");

              const list = [];

              setRefunds(list);
            }, err => console.error("Refunds error:", err));
            unsubRefunds = () => fns.off(refundsRef);

            const usageRef = fns.ref(db, "app_usage");
            fns.onValue(usageRef, snap => {
              const usage = snap.val() || {};
              setAppUsageMap(usage);
              const now = Date.now();
              const users = Object.values(usage || {}).filter(v => v && typeof v === "object");
              setAppUsageStats({ activeUsers: users.filter(v => Number(v.activeWindowUntil || 0) >= now).length, downloadedUsers: users.filter(v => Number(v.installedAt || 0) > 0).length });
            }, err => console.error("App usage error:", err));
            unsubAppUsage = () => fns.off(usageRef);

            // Partner applications: read from all 3 legacy paths and merge
            let partnerAppsFromPrimary = [];
            let partnerAppsFromMerchant = [];
            let partnerAppsFromLegacy = [];
            const normalizeApplicationStatus = (rawStatus) => {
              const n = String(rawStatus || "").trim().toLowerCase();
              if (!n) return "pending";
              if (n === "approved" || n === "rejected") return n;
              return "pending";
            };
            const collectApplicationsFromSnapshot = (snap, sourcePath) => {
              const list = [];
              snap.forEach(c => {
                const value = c.val() || {};
                const looksLikeApplication = typeof value === "object" && value !== null && (value.applicantUid || value.storeName || value.businessAddress || value.contactName || value.createdAt);
                if (looksLikeApplication) { list.push({ id: c.key, sourcePath, ...value }); return; }
                if (typeof value === "object" && value !== null) {
                  Object.entries(value).forEach(([nestedKey, nestedValue]) => {
                    if (nestedValue && typeof nestedValue === "object") list.push({ id: nestedKey, parentId: c.key, sourcePath, ...(nestedValue || {}) });
                  });
                }
              });
              return list;
            };
            const syncPartnerApplications = () => {
              const seen = new Set();
              const merged = [];
              [...partnerAppsFromPrimary, ...partnerAppsFromMerchant, ...partnerAppsFromLegacy].forEach(app => {
                const dedupeKey = app.applicantUid ? `uid:${app.applicantUid}|${app.id}` : app.id;
                if (seen.has(dedupeKey)) return;
                seen.add(dedupeKey);
                merged.push({ ...app, status: normalizeApplicationStatus(app.status) });
              });
              merged.sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
              console.log("[BayanGo Admin] Partner applications synced:", merged.length, "total from", partnerAppsFromPrimary.length, "+", partnerAppsFromMerchant.length, "+", partnerAppsFromLegacy.length);
              setPartnerApplications(merged);
              setPartnerDataLoaded(true);
            };

            const partnerAppsRef = fns.ref(db, "partner_applications");
            fns.onValue(partnerAppsRef, snap => {
              console.log("[BayanGo Admin] partner_applications snapshot:", snap.exists() ? "has data" : "empty", "children:", snap.size || 0);
              partnerAppsFromPrimary = collectApplicationsFromSnapshot(snap, "partner_applications"); syncPartnerApplications();
            }, err => {

          const existingSnapshot = await fns.get(fns.ref(db, "partner_merchants/" + merchantId));
          const existingMerchant = existingSnapshot.val() || {};

          await fns.update(fns.ref(db), {
            ["merchant_listings/" + merchantId]: null,
            ["partner_merchants/" + merchantId]: null,
            ["partner_store_records/" + merchantId]: {
              ...existingMerchant,
              moderation: moderationPayload,
              enforcementStatus: "deleted",
              deletedAt: now,
              deletedByUid: user?.uid || null,
              status: "deleted",
              approved: false,
              active: false,
              featuredInApp: false,
              storeOpen: false,
              merchantId,
              recordedAt: now,
            },
          });
          return;
        }
        await fns.update(fns.ref(db, "partner_merchants/" + merchantId), updates);
      }, [user?.email, user?.uid]);

      if (!ready) return (
        <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
          <Ic n="gear" size={40} className="spin" style={{ color: "var(--brand)" }} />
          <div style={{ fontSize: 15, fontWeight: 700, color: "var(--brand)" }}>Connecting to BayanGo...</div>

      );

      if (!user) return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #14532D 100%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div className="fade-up" style={{ background: "rgba(255,255,255,.06)", backdropFilter: "blur(20px)", borderRadius: 24, padding: "48px 40px", textAlign: "center", border: "1px solid rgba(255,255,255,.1)", maxWidth: 400, width: "100%" }}>
            <img src="https://i.imgur.com/h7HgGC0.png" style={{ height: 80, objectFit: "contain", marginBottom: 16, filter: "drop-shadow(0 4px 16px rgba(0,0,0,.3))" }} />
            <h1 style={{ color: "#F8FAFC", fontSize: 22, fontWeight: 800, marginBottom: 4 }}>BayanGo Admin</h1>
            <p style={{ color: "#94A3B8", fontSize: 13, marginBottom: 28 }}>Sign in to manage your operations</p>
            <button onClick={handleGoogleLogin} style={{ background: "#fff", padding: "14px 28px", borderRadius: 12, fontSize: 14, fontWeight: 700, color: "#1F2937", display: "flex", alignItems: "center", gap: 10, margin: "0 auto", border: "none", cursor: "pointer", boxShadow: "0 4px 12px rgba(0,0,0,.15)" }}>
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style={{ width: 20, height: 20 }} />
              Sign in with Google
            </button>
          </div>
        </div>
      );

      return (
        <>
          <ToastContainer />
          <AdminDashboard
            user={user} onLogout={handleLogout}
            orders={orders} onUpdateStatus={updateOrderStatus} onBroadcast={sendBroadcast}
            products={products} onAddProduct={addProduct} onUpdateProduct={updateProduct} onDeleteProduct={deleteProduct}
            marketPricing={marketPricing} onUpdateMarketPricing={updateMarketPricing}
            vouchers={vouchers} onAddVoucher={addVoucher} onUpdateVoucher={updateVoucher} onDeleteVoucher={deleteVoucher}
            refunds={refunds} onCreateRefund={submitRefund}
            appUsageStats={appUsageStats} appUsageMap={appUsageMap}
            partnerApplications={partnerApplications} partnerMerchants={partnerMerchants} partnerStoreRecords={partnerStoreRecords}
            onDecidePartnerApplication={decidePartnerApplication} onToggleFeaturedPartnerMerchant={toggleFeaturedPartnerMerchant} onModeratePartnerMerchant={moderatePartnerMerchant}
            authzError={authzError} partnerDataLoaded={partnerDataLoaded}
          />
        </>
      );
    }

    /* ══════════════════ DASHBOARD OVERVIEW ══════════════════ */
    function DashboardOverview({ orders, appUsageStats, products }) {
      const dashboardOrders = orders.filter(o => o.status !== "merchant_pending");
      const deliveredOrders = dashboardOrders.filter(o => o.status === "delivered");
      const activeOrders = dashboardOrders.filter(o => o.status !== "delivered" && o.status !== "cancelled");
      const totalSales = deliveredOrders.reduce((s, o) => s + Number(o.total || 0), 0);
      const totalServiceRevenue = deliveredOrders.reduce((s, o) => s + Number(o.serviceFee || 0), 0);
      const avgOrderValue = deliveredOrders.length > 0 ? Math.round(totalSales / deliveredOrders.length) : 0;

      const todayStr = new Date().toLocaleDateString("en-PH");
      const yesterdayDate = new Date(); yesterdayDate.setDate(yesterdayDate.getDate() - 1);
      const yesterdayStr = yesterdayDate.toLocaleDateString("en-PH");
      const getDateStr = (o) => { const d = o.createdAt?.toDate ? o.createdAt.toDate() : new Date(o.createdAt || 0); return d.toLocaleDateString("en-PH"); };

      const todayOrders = dashboardOrders.filter(o => getDateStr(o) === todayStr);
      const yesterdayOrders = dashboardOrders.filter(o => getDateStr(o) === yesterdayStr);
      const todaySales = todayOrders.filter(o => o.status === "delivered").reduce((s, o) => s + Number(o.total || 0), 0);
      const yesterdaySales = yesterdayOrders.filter(o => o.status === "delivered").reduce((s, o) => s + Number(o.total || 0), 0);
      const orderDelta = todayOrders.length - yesterdayOrders.length;

      const activeRiders = [...new Set(dashboardOrders.filter(o => (o.status === "otw" || o.status === "in_boat") && o.riderId).map(o => o.riderId))].length;

      const timeline = Array.from({ length: 7 }).map((_, idx) => {
        const d = new Date(); d.setDate(d.getDate() - (6 - idx));
        const key = d.toLocaleDateString("en-CA");
        const dayOrders = dashboardOrders.filter(o => { const ts = o.createdAt?.toDate ? o.createdAt.toDate() : new Date(o.createdAt || 0); return ts.toLocaleDateString("en-CA") === key; });
        return { key, label: d.toLocaleDateString("en-PH", { month: "short", day: "numeric" }), orders: dayOrders.length, sales: dayOrders.filter(o => o.status === "delivered").reduce((s, o) => s + Number(o.total || 0), 0) };
      });
      const maxSales = Math.max(...timeline.map(d => d.sales), 1);

      const recentOrders = dashboardOrders.slice(0, 5);

      return (
        <div style={{ padding: "20px 24px" }}>
          <div style={{ marginBottom: 20 }}>
            <h1 style={{ fontSize: 22, fontWeight: 800, color: "var(--text-primary)" }}>Dashboard</h1>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginTop: 2 }}>Real-time overview of your operations</p>
          </div>

          {/* KPI Cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 20 }}>
            {[
              { label: "Total Sales", value: fmt(totalSales), icon: "coins", iconBg: "#DCFCE7", iconColor: "#166534", delta: todaySales > 0 ? `${fmt(todaySales)} today` : null, deltaType: "success" },
              { label: "Service Revenue", value: fmt(totalServiceRevenue), icon: "peso-sign", iconBg: "#EDE9FE", iconColor: "#7C3AED" },
              { label: "Today's Orders", value: todayOrders.length, icon: "calendar-day", iconBg: "#DBEAFE", iconColor: "#1D4ED8", delta: orderDelta !== 0 ? `${orderDelta > 0 ? "+" : ""}${orderDelta} vs yesterday` : null, deltaType: orderDelta >= 0 ? "success" : "warning" },
              { label: "Active Orders", value: activeOrders.length, icon: "clock", iconBg: "#FEF3C7", iconColor: "#D97706" },
              { label: "Avg Order Value", value: fmt(avgOrderValue), icon: "chart-line", iconBg: "#FCE7F3", iconColor: "#DB2777" },
              { label: "Active Riders", value: activeRiders, icon: "motorcycle", iconBg: "#F0F9FF", iconColor: "#0369A1" },
              { label: "Active Users", value: appUsageStats?.activeUsers || 0, icon: "users", iconBg: "#EDE9FE", iconColor: "#7C3AED" },
              { label: "App Total Downloads", value: appUsageStats?.downloadedUsers || 0, icon: "download", iconBg: "#ECFDF5", iconColor: "#059669" },
            ].map(k => (
              <div key={k.label} className="metric-card">
                <div className="metric-icon" style={{ background: k.iconBg, color: k.iconColor }}><Ic n={k.icon} /></div>
                <div className="metric-value" style={{ color: "var(--text-primary)" }}>{k.value}</div>
                <div className="metric-label">{k.label}</div>
                {k.delta && <div className="metric-delta" style={{ background: k.deltaType === "success" ? "#F0FDF4" : "#FEF3C7", color: k.deltaType === "success" ? "#166534" : "#92400E" }}>{k.delta}</div>}
              </div>
            ))}
          </div>

          {/* Sales Chart + Recent Orders */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <div className="card" style={{ gridColumn: window.innerWidth < 768 ? "1 / -1" : undefined }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>Sales Trend (7 days)</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, alignItems: "end", height: 140 }}>
                {timeline.map(d => (
                  <div key={d.key} style={{ textAlign: "center", height: "100%", display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
                    <div style={{ flex: 1, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                      <div title={`${d.label}: ${fmt(d.sales)}`} style={{ width: "60%", background: "linear-gradient(180deg, #22C55E, #16A34A)", borderRadius: "4px 4px 0 0", height: `${Math.max(6, (d.sales / maxSales) * 120)}px`, transition: "height .3s" }} />
                    </div>
                    <div style={{ fontSize: 10, color: "var(--text-muted)", marginTop: 6 }}>{d.label}</div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-secondary)" }}>{d.orders}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card" style={{ gridColumn: window.innerWidth < 768 ? "1 / -1" : undefined }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>Recent Orders</div>
              <div style={{ display: "grid", gap: 0 }}>
                {recentOrders.length === 0 ? <div style={{ fontSize: 12, color: "var(--text-muted)", padding: 20, textAlign: "center" }}>No orders yet.</div>
                : recentOrders.map((o, idx) => {
                  const st = STATUS_INFO[o.status] || STATUS_INFO.pending;
                  const ts = o.createdAt?.toDate ? o.createdAt.toDate() : new Date(o.createdAt || 0);
                  return (
                    <div key={o.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderTop: idx > 0 ? "1px solid var(--border-light)" : "none" }}>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{o.customer?.name || "—"}</div>
                        <div style={{ fontSize: 11, color: "var(--text-muted)" }}>{ts.toLocaleTimeString("en-PH", { hour: "2-digit", minute: "2-digit" })} · {(o.items || []).length} items</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: 800, color: "var(--brand)" }}>{fmt(o.total)}</span>
                        <span className="status-badge" style={{ background: st.bg, color: st.color }}><Ic n={st.icon} size={10} />{st.label}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ GROCERY TAB ══════════════════ */
    function GroceryTab({ orders }) {
      const today = (() => {
        const ph = new Date(Date.now() + 8 * 60 * 60 * 1000);
        const pad = n => String(n).padStart(2, "0");
        return `${ph.getUTCFullYear()}-${pad(ph.getUTCMonth()+1)}-${pad(ph.getUTCDate())}`;
      })();
      const [filterDate, setFilterDate] = useState(today);
      const [filterBatch, setFilterBatch] = useState("AM");
      const DONE_STATUSES = ["delivered", "cancelled"];
      const allBatchOrders = orders.filter(o => o.deliveryDate === filterDate && o.deliveryBatch === filterBatch);
      const activeOrders = allBatchOrders.filter(o => !DONE_STATUSES.includes(o.status));
      const doneOrders = allBatchOrders.filter(o => DONE_STATUSES.includes(o.status));

      const fmtQty = (item) => {
        if (item.unit === "kg") { const kg = parseFloat((item.totalKg || 0).toFixed(2)); return `${kg} kg`; }
        return `${item.qty} ${(item.unit || "pc").toLowerCase()}`;
      };

      const totals = {};
      activeOrders.forEach(order => {
        (order.items || []).forEach(item => {
          if (item.isCustom) return;
          const key = item.name;
          if (!totals[key]) totals[key] = { name: item.name, cat: item.cat || "sari", unit: item.unit || "pc", qty: 0, totalKg: 0 };
          if (item.unit === "kg") totals[key].totalKg += Number(item.totalKg) || 0;
          else totals[key].qty += Number(item.qty) || 0;
        });
      });

      const customList = [];
      activeOrders.forEach(order => {
        (order.items || []).filter(i => i.isCustom).forEach(i => customList.push({ ...i, orderName: order.customer?.name || "?" }));
      });

      const aggregated = Object.values(totals).sort((a, b) => a.name.localeCompare(b.name));

      return (
        <div style={{ padding: "20px 24px", maxWidth: 680, margin: "0 auto" }}>
          <h2 style={{ fontSize: 18, fontWeight: 800, marginBottom: 16 }}><Ic n="basket-shopping" style={{ marginRight: 8, color: "var(--brand)" }} />Master Grocery List</h2>

          <div className="card" style={{ marginBottom: 16, display: "flex", gap: 12, alignItems: "end", flexWrap: "wrap" }}>
            <div style={{ flex: "1 1 160px" }}>
              <label style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>Delivery Date</label>
              <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} className="input" />
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>Batch</label>
              <div style={{ display: "flex", gap: 4 }}>
                {["AM", "PM"].map(b => (
                  <button key={b} onClick={() => setFilterBatch(b)} className="btn" style={{
                    background: filterBatch === b ? (b === "AM" ? "var(--blue)" : "#D97706") : "var(--surface-alt)",
                    color: filterBatch === b ? "#fff" : "var(--text-muted)", border: `1px solid ${filterBatch === b ? "transparent" : "var(--border)"}`, padding: "10px 20px",
                  }}>
                    <Ic n={b === "AM" ? "sun" : "cloud-sun"} />{b}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 16, fontSize: 13, fontWeight: 700, color: "var(--brand)", background: "var(--brand-bg)", borderRadius: 10, padding: "10px 14px", border: "1px solid var(--brand-border)" }}>
            <Ic n="clipboard-list" />
            {activeOrders.length} active · {doneOrders.length} done — {filterBatch} Batch {filterDate}
          </div>

          {allBatchOrders.length === 0 ? (
            <div style={{ textAlign: "center", padding: 60 }}>
              <Ic n="basket-shopping" size={40} style={{ color: "var(--text-muted)", marginBottom: 10 }} />
              <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text-muted)" }}>No orders for this batch.</div>
            </div>
          ) : activeOrders.length === 0 ? (
            <div className="card" style={{ textAlign: "center", padding: 30, background: "var(--brand-bg)", border: "1px solid var(--brand-border)" }}>
              <Ic n="circle-check" style={{ fontSize: 28, color: "var(--brand-light)", marginBottom: 8 }} />
              <div style={{ fontSize: 14, fontWeight: 700, color: "var(--brand)" }}>All orders are done!</div>
            </div>
          ) : (
            <>
              {aggregated.length > 0 && (
                <div className="card" style={{ padding: 0, overflow: "hidden", marginBottom: 14 }}>
                  <div style={{ padding: "12px 16px", background: "var(--brand)", color: "#fff", fontSize: 13, fontWeight: 800 }}>
                    <Ic n="cart-shopping" style={{ marginRight: 6 }} />Shopping List ({aggregated.length} items)
                  </div>
                  {aggregated.map((item, i) => (
                    <div key={item.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 16px", borderBottom: i < aggregated.length - 1 ? "1px solid var(--border-light)" : "none", background: i % 2 === 0 ? "#fff" : "var(--surface-alt)" }}>
                      <span style={{ fontSize: 13, fontWeight: 600 }}><Ic n="circle" size={6} style={{ marginRight: 8, color: "var(--brand-light)" }} />{item.name}</span>
                      <span style={{ fontSize: 13, fontWeight: 800, color: "var(--brand)", background: "var(--brand-bg)", padding: "4px 12px", borderRadius: 20 }}>{fmtQty(item)}</span>
                    </div>
                  ))}
                </div>
              )}
              {customList.length > 0 && (
                <div className="card" style={{ padding: 0, overflow: "hidden", marginBottom: 14 }}>
                  <div style={{ padding: "12px 16px", background: "#D97706", color: "#fff", fontSize: 13, fontWeight: 800 }}>
                    <Ic n="note-sticky" style={{ marginRight: 6 }} />Custom Requests ({customList.length})
                  </div>
                  {customList.map((item, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 16px", borderBottom: i < customList.length - 1 ? "1px solid var(--border-light)" : "none" }}>
                      <div><div style={{ fontSize: 13, fontWeight: 700 }}>{item.name}</div><div style={{ fontSize: 11, color: "var(--text-muted)" }}>order ni {item.orderName}</div></div>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#92400E", background: "#FEF3C7", padding: "3px 10px", borderRadius: 20 }}>custom</span>
                    </div>
                  ))}
                </div>
              )}
              <div className="card" style={{ background: "var(--surface-alt)" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".04em" }}>Active Orders in Batch</div>
                {activeOrders.map(o => (
                  <div key={o.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "var(--text-secondary)", padding: "5px 0", borderBottom: "1px solid var(--border-light)" }}>
                    <span><Ic n="user" style={{ marginRight: 4 }} />{o.customer?.name} — {o.customer?.address}</span>

                return (

                    <div><div style={{ fontSize: 13, fontWeight: 700 }}>{o.customer?.name}</div><div style={{ fontSize: 11, color: "var(--text-muted)" }}>{o.customer?.address}</div></div>
                    <span className="status-badge" style={{ background: st.bg, color: st.color }}>{st.label}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );

    /* ══════════════════ DATA / ANALYTICS TAB ══════════════════ */
    function DataTab({ orders }) {
      const dashboardOrders = orders.filter(o => o.status !== "merchant_pending");
      const timeline = Array.from({ length: 7 }).map((_, idx) => {
        const d = new Date(); d.setDate(d.getDate() - (6 - idx));
        const key = d.toLocaleDateString("en-CA");
        const label = d.toLocaleDateString("en-PH", { month: "short", day: "numeric" });
        const dayOrders = dashboardOrders.filter(o => { const ts = o.createdAt?.toDate ? o.createdAt.toDate() : new Date(o.createdAt || 0); return ts.toLocaleDateString("en-CA") === key; });
        return { key, label, orders: dayOrders.length, sales: dayOrders.filter(o => o.status === "delivered").reduce((s, o) => s + Number(o.total || 0), 0), service: dayOrders.reduce((s, o) => s + Number(o.serviceFee || 0), 0) };
      });
      const maxOrders = Math.max(...timeline.map(d => d.orders), 1);
      const maxSales = Math.max(...timeline.map(d => d.sales), 1);
      const delivered = dashboardOrders.filter(o => o.status === "delivered");
      const cancelled = dashboardOrders.filter(o => o.status === "cancelled");
      const pending = dashboardOrders.filter(o => o.status === "pending");
      const totalSales = delivered.reduce((s, o) => s + Number(o.total || 0), 0);
      const avgOrder = delivered.length > 0 ? Math.round(totalSales / delivered.length) : 0;

      const topProducts = useMemo(() => {
        const counts = {};
        dashboardOrders.forEach(o => (o.items || []).forEach(item => {
          if (item.isCustom) return;
          const key = item.name || "Unknown";
          if (!counts[key]) counts[key] = { name: key, qty: 0, revenue: 0 };
          counts[key].qty += Number(item.qty || 1);
          counts[key].revenue += Number(item.price || 0) * Number(item.qty || 1);
        }));
        return Object.values(counts).sort((a, b) => b.qty - a.qty).slice(0, 8);
      }, [dashboardOrders]);

      const riderStats = useMemo(() => {
        const map = {};
        dashboardOrders.forEach(o => {
          if (!o.riderId) return;
          if (!map[o.riderId]) map[o.riderId] = { name: o.riderName || o.riderId, deliveries: 0, active: false };
          if (o.status === "delivered") map[o.riderId].deliveries++;
          if (o.status === "otw" || o.status === "in_boat") map[o.riderId].active = true;
        });
        return Object.values(map).sort((a, b) => b.deliveries - a.deliveries);
      }, [dashboardOrders]);

      return (
        <div style={{ padding: "20px 24px" }}>
          <h2 style={{ fontSize: 18, fontWeight: 800, marginBottom: 16 }}>Analytics & Performance</h2>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 20 }}>
            {[
              { label: "Delivered", value: delivered.length, color: "var(--brand)" },
              { label: "Cancelled", value: cancelled.length, color: "var(--red)" },
              { label: "Pending", value: pending.length, color: "#D97706" },
              { label: "Total Sales", value: fmt(totalSales), color: "var(--brand)" },
              { label: "Avg Order", value: fmt(avgOrder), color: "var(--blue)" },
            ].map(m => (
              <div key={m.label} className="card" style={{ textAlign: "center", padding: "14px 10px" }}>
                <div style={{ fontSize: 24, fontWeight: 900, color: m.color }}>{m.value}</div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase" }}>{m.label}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 16, marginBottom: 20 }}>
            <div className="card">
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>Sales Trend (7 days)</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, alignItems: "end", height: 160 }}>
                {timeline.map(d => (
                  <div key={d.key} style={{ textAlign: "center", height: "100%", display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
                    <div style={{ flex: 1, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                      <div title={`${d.label}: ${fmt(d.sales)}`} style={{ width: "65%", background: "linear-gradient(180deg,#22C55E,#166534)", borderRadius: "4px 4px 0 0", height: `${Math.max(4, (d.sales / maxSales) * 140)}px` }} />
                    </div>
                    <div style={{ fontSize: 10, color: "var(--text-muted)", marginTop: 6 }}>{d.label}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card">
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>Order Volume (7 days)</div>
              <div style={{ display: "grid", gap: 6 }}>
                {timeline.map(d => (
                  <div key={d.key} style={{ display: "grid", gridTemplateColumns: "70px 1fr 30px", gap: 8, alignItems: "center", fontSize: 11 }}>
                    <span style={{ color: "var(--text-secondary)" }}>{d.label}</span>
                    <div style={{ height: 10, background: "var(--border-light)", borderRadius: 5, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${Math.max(4, (d.orders / maxOrders) * 100)}%`, background: "var(--blue)", borderRadius: 5 }} />
                    </div>
                    <b style={{ textAlign: "right", color: "var(--text-primary)" }}>{d.orders}</b>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 16 }}>
            <div className="card">
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>Top Products</div>
              {topProducts.length === 0 ? <div style={{ fontSize: 12, color: "var(--text-muted)" }}>No product data yet.</div> :
              topProducts.map((p, idx) => (
                <div key={p.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: idx > 0 ? "1px solid var(--border-light)" : "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ width: 22, height: 22, borderRadius: 6, background: "var(--brand-bg)", color: "var(--brand)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800 }}>{idx + 1}</span>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</span>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 12, fontWeight: 700 }}>{p.qty} sold</div>
                    <div style={{ fontSize: 11, color: "var(--text-muted)" }}>{fmt(p.revenue)}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="card">
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>Rider Performance</div>
              {riderStats.length === 0 ? <div style={{ fontSize: 12, color: "var(--text-muted)" }}>No rider data yet.</div> :
              riderStats.map((r, idx) => (
                <div key={r.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: idx > 0 ? "1px solid var(--border-light)" : "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <Ic n="motorcycle" style={{ color: r.active ? "var(--brand-light)" : "var(--text-muted)" }} />
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{r.name}</span>
                    {r.active && <span style={{ fontSize: 9, fontWeight: 800, background: "#DCFCE7", color: "#166534", padding: "2px 6px", borderRadius: 6 }}>ACTIVE</span>}
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 800, color: "var(--brand)" }}>{r.deliveries} deliveries</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ PARTNERS PANEL ══════════════════ */
    function PartnersPanel({ applications = [], merchants = [], storeRecords = [], onDecide, onToggleFeatured, onModerateMerchant, dataLoaded = true, authzError = "", adminUid = "" }) {
      const [partnerTab, setPartnerTab] = useState("pending");
      const [searchQ, setSearchQ] = useState("");
      const [rejectingId, setRejectingId] = useState("");
      const [rejectionMessage, setRejectionMessage] = useState("");
      const [expandedMerchant, setExpandedMerchant] = useState(null);
      const [viewingDoc, setViewingDoc] = useState(null); // {url, label}
      const knownMetaFields = new Set(["id", "parentId", "sourcePath", "status", "createdAt", "updatedAt", "reviewedAt", "reviewedByUid", "reviewedByEmail", "reviewMessage", "rejectionMessage"]);

      const pending = applications.filter(a => !["approved", "rejected"].includes(String(a.status || "").toLowerCase()));
      const rejected = applications.filter(a => String(a.status || "").toLowerCase() === "rejected");
      const approved = applications.filter(a => String(a.status || "").toLowerCase() === "approved");

      const normalizedMerchantStatus = (merchant) => {
        const s = String(merchant?.status || "").trim().toLowerCase();
        const a = String(merchant?.approved || "").trim().toLowerCase();
        if (merchant?.approved === true || merchant?.approved === 1 || a === "true" || a === "approved" || s === "approved") return "approved";
        if (s === "rejected") return "rejected";
        return s || "pending";
      };
      const normalizedEnforcementStatus = (merchant) => {
        const explicit = String(merchant?.enforcementStatus || merchant?.moderation?.action || "").trim().toLowerCase();
        if (["active", "suspended", "revoked", "deleted"].includes(explicit)) return explicit;
        if (merchant?.deletedAt) return "deleted";
        return "active";
      };
      const getEnforcementStatusMeta = (merchant) => {
        const enforcementStatus = normalizedEnforcementStatus(merchant);
        if (enforcementStatus === "suspended") return { label: "Suspended", dot: "#D97706", bg: "#FEF3C7", color: "#92400E" };
        if (enforcementStatus === "revoked") return { label: "Revoked", dot: "#DC2626", bg: "#FEE2E2", color: "#991B1B" };
        if (enforcementStatus === "deleted") return { label: "Deleted", dot: "#7F1D1D", bg: "#FEE2E2", color: "#7F1D1D" };
        return { label: "Active", dot: "#22C55E", bg: "#DCFCE7", color: "#166534" };
      };

      const mergedMerchants = useMemo(() => {
        const byKey = new Map();
        const deletedKeys = new Set();
        (storeRecords || []).forEach((record) => {
          const uid = String(record?.merchantId || record?.applicantUid || record?.uid || record?.id || "").trim();
          const store = String(record?.storeName || "").trim().toLowerCase();
          if (uid) {
            deletedKeys.add(`uid:${uid}`);
            if (store) deletedKeys.add(`uid:${uid}|store:${store}`);
          } else if (store) {
            deletedKeys.add(`fallback:${store}|${String(record?.contactName || "").trim().toLowerCase()}`);
          }
        });

        const makeKey = (entry = {}) => {
          const uid = String(entry.applicantUid || entry.uid || "").trim();
          const store = String(entry.storeName || "").trim().toLowerCase();
          const appId = String(entry.applicationId || entry.id || "").trim();
          if (uid && appId) return `uid:${uid}|app:${appId}`;
          if (uid && store) return `uid:${uid}|store:${store}`;
          if (uid) return `uid:${uid}`;
          return `fallback:${store}|${String(entry.contactName || "").trim().toLowerCase()}`;
        };
        merchants.forEach(m => { byKey.set(makeKey(m), { ...m, _merchantId: m.id || m.applicantUid || m.uid || "", _source: "partner_merchants" }); });
        applications.forEach(app => {
          if (String(app?.status || "").trim().toLowerCase() !== "approved") return;
          const candidate = { id: app.id, applicationId: app.id, applicantUid: app.applicantUid || app.uid || "", _merchantId: app.applicantUid || app.uid || "", contactName: app.contactName || "", contactPhone: app.contactPhone || "", storeName: app.storeName || "", category: app.category || app.storeCategory || "sari", description: app.description || "", logoUrl: app.logoUrl || "", status: "approved", approved: true, _source: "application_fallback" };
          const key = makeKey(candidate);
          if (deletedKeys.has(key) || deletedKeys.has(`uid:${candidate._merchantId}`)) return;
          if (!byKey.has(key)) byKey.set(key, candidate);
        });
        return Array.from(byKey.values()).sort((a, b) => String(a.storeName || "").localeCompare(String(b.storeName || "")));
      }, [applications, merchants, storeRecords]);

      const approvedMerchants = mergedMerchants.filter(m => normalizedMerchantStatus(m) === "approved");
      const filteredMerchants = useMemo(() => {
        if (!searchQ.trim()) return approvedMerchants;
        const q = searchQ.trim().toLowerCase();
        return approvedMerchants.filter(m =>
          String(m.storeName || "").toLowerCase().includes(q) ||
          String(m.contactName || "").toLowerCase().includes(q) ||
          String(m.contactPhone || "").includes(q)
        );
      }, [approvedMerchants, searchQ]);

      const extractAttachmentUrls = useCallback((application) => {
        const urls = [];
        const pushUrl = (urlValue, label) => {
          if (typeof urlValue !== "string") return;
          const trimmed = urlValue.trim();
          if (!/^https?:\/\//i.test(trimmed)) return;
          // Support Firebase Storage URLs even without common extensions
          if (!/\.(pdf|png|jpg|jpeg|webp|gif|heic|doc|docx)$/i.test(trimmed) && !trimmed.includes("firebasestorage")) return;
          urls.push({ label, url: trimmed });
        };
        
        // Check specific fields first
        if (application.permitUrl) pushUrl(application.permitUrl, "Business Permit");
        if (application.govIdUrl) pushUrl(application.govIdUrl, "Government ID");
        
        Object.entries(application || {}).forEach(([key, value]) => {
          if (key === 'permitUrl' || key === 'govIdUrl') return; // Already added
          if (typeof value === "string") { pushUrl(value, key); return; }
          if (Array.isArray(value)) { value.forEach((item, idx) => { if (typeof item === "string") pushUrl(item, `${key}[${idx}]`); if (item && typeof item === "object") Object.entries(item).forEach(([nk, nv]) => { if (typeof nv === "string") pushUrl(nv, `${key}[${idx}].${nk}`); }); }); return; }
          if (value && typeof value === "object") Object.entries(value).forEach(([nk, nv]) => { if (typeof nv === "string") pushUrl(nv, `${key}.${nk}`); });
        });
        return urls;
      }, []);

      const fmtDateTime = (value) => { const t = Number(value || 0); if (!t) return "\u2014"; try { return new Date(t).toLocaleString("en-PH", { dateStyle: "medium", timeStyle: "short" }); } catch (_) { return "\u2014"; } };

      const PARTNER_CATEGORIES = [
        { id: "sari", label: "General Goods", icon: "store", color: "#EC4899" },
        { id: "ulam", label: "Cooked Meals", icon: "bowl-food", color: "#A855F7" },
        { id: "gamot", label: "Medicine", icon: "pills", color: "#14B8A6" },
        { id: "hardware", label: "Hardware", icon: "screwdriver-wrench", color: "#F59E0B" },
        { id: "gulay", label: "Vegetables", icon: "leaf", color: "#22C55E" },
        { id: "isda", label: "Fish", icon: "fish", color: "#0EA5E9" },
        { id: "karne", label: "Meat", icon: "drumstick-bite", color: "#EF4444" },
        { id: "prutas", label: "Fruits", icon: "apple-whole", color: "#F97316" },
        { id: "bigas", label: "Rice", icon: "bowl-rice", color: "#EAB308" },
        { id: "bakery", label: "Bakery", icon: "bread-slice", color: "#D97706" },
        { id: "water", label: "Water Station", icon: "droplet", color: "#38BDF8" },
        { id: "laundry", label: "Laundry", icon: "shirt", color: "#818CF8" },
      ];
      const getCatMeta = (catId) => PARTNER_CATEGORIES.find(c => c.id === catId) || { label: catId || "General", icon: "tag", color: "#64748B" };

      return (
        <div style={{ padding: "20px 24px" }}>
          {/* Document Viewer Modal */}
          {viewingDoc && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.85)", zIndex: 9999, display: "flex", flexDirection: "column", padding: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", color: "#fff", marginBottom: 15 }}>
                <h3 style={{ fontSize: 16 }}>{viewingDoc.label}</h3>
                <button onClick={() => setViewingDoc(null)} style={{ color: "#fff", fontSize: 24 }}><Ic n="xmark" /></button>
              </div>
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                {viewingDoc.url.toLowerCase().endsWith('.pdf') ? (
                  <iframe src={viewingDoc.url} style={{ width: "100%", height: "100%", border: "none" }} />
                ) : (
                  <img src={viewingDoc.url} style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain" }} />
                )}
              </div>
              <div style={{ marginTop: 15, textAlign: "center" }}>
                <a href={viewingDoc.url} target="_blank" style={{ color: "#fff", fontSize: 13, textDecoration: "underline" }}>Open in new tab</a>
              </div>
            </div>
          )}

          {/* Header with stats */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800 }}>Partner Merchants</h2>
          </div>

          {/* Stats Row */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 16 }}>
            {[
              { label: "Total", value: applications.length, bg: "#F1F5F9", color: "#334155", icon: "file-lines" },
              { label: "Pending", value: pending.length, bg: "#FEF3C7", color: "#92400E", icon: "clock" },
              { label: "Approved", value: approvedMerchants.length, bg: "#DCFCE7", color: "#166534", icon: "circle-check" },
              { label: "Featured", value: approvedMerchants.filter(m => m.featuredInApp).length, bg: "#FEF9C3", color: "#854D0E", icon: "star" },
            ].map(stat => (
              <div key={stat.label} style={{ background: stat.bg, borderRadius: 12, padding: "14px 12px", textAlign: "center" }}>
                <Ic n={stat.icon} style={{ color: stat.color, fontSize: 16, marginBottom: 4, display: "block" }} />
                <div style={{ fontSize: 22, fontWeight: 800, color: stat.color }}>{stat.value}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: stat.color, opacity: .7, textTransform: "uppercase", letterSpacing: ".03em" }}>{stat.label}</div>
              </div>
            ))}
          </div>

          {!!authzError && (
            <div className="card" style={{ marginBottom: 16, background: "#FEF2F2", border: "1px solid #FECACA" }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                <Ic n="triangle-exclamation" style={{ color: "#DC2626", fontSize: 18, marginTop: 2, flexShrink: 0 }} />
                <div>
                  <div style={{ fontWeight: 800, fontSize: 14, color: "#991B1B", marginBottom: 4 }}>Permission Error</div>
                  <div style={{ fontSize: 12, color: "#7F1D1D" }}>{authzError}</div>
                  {adminUid && <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 6 }}>Your UID: <code style={{ background: "#FEE2E2", padding: "1px 6px", borderRadius: 4, fontFamily: "monospace", fontSize: 11 }}>{adminUid}</code></div>}
                </div>
              </div>
            </div>
          )}

          {!dataLoaded && !authzError && (
            <div className="card" style={{ marginBottom: 16, textAlign: "center", padding: "32px 16px" }}>
              <Ic n="spinner" className="spin" size={24} style={{ color: "var(--brand)", marginBottom: 8 }} />
              <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-secondary)" }}>Loading partner data...</div>
            </div>
          )}

          {/* Tab Navigation */}
          <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
            {[
              { key: "pending", label: "Pending", count: pending.length, color: "#F59E0B" },
              { key: "merchants", label: "Merchants", count: approvedMerchants.length, color: "#22C55E" },
              { key: "records", label: "Store Records", count: storeRecords.length, color: "#334155" },
              { key: "rejected", label: "Rejected", count: rejected.length, color: "#EF4444" },
            ].map(t => (
              <button key={t.key} onClick={() => setPartnerTab(t.key)} className="tab" style={{
                padding: "8px 14px", borderRadius: 999, fontSize: 12, fontWeight: 700, border: "1px solid",
                background: partnerTab === t.key ? "var(--text)" : "#fff",
                color: partnerTab === t.key ? "#fff" : "var(--muted)",
                borderColor: partnerTab === t.key ? "var(--text)" : "var(--border)",
                cursor: "pointer"
              }}>
                {t.label}
                {t.count > 0 && <span style={{ marginLeft: 5, background: partnerTab === t.key ? "rgba(255,255,255,.2)" : t.color + "20", color: partnerTab === t.key ? "#fff" : t.color, padding: "2px 7px", borderRadius: 20, fontSize: 10, fontWeight: 800 }}>{t.count}</span>}
              </button>
            ))}
          </div>

          {/* ── PENDING TAB ── */}
          {partnerTab === "pending" && (
            <div>
              {pending.length === 0 ? (
                <div className="card" style={{ textAlign: "center", padding: "32px 16px" }}>
                  <Ic n="inbox" size={28} style={{ color: "var(--muted)", opacity: .4, marginBottom: 8, display: "block" }} />
                  <div style={{ fontSize: 13, fontWeight: 700, color: "var(--muted)" }}>{dataLoaded ? "No pending applications" : "Loading..."}</div>
                </div>
              ) : pending.map(app => {
                const catMeta = getCatMeta(app.category || app.storeCategory);
                const attachments = extractAttachmentUrls(app);
                return (
                <div key={app.id} className="card" style={{ marginBottom: 12, borderLeft: "4px solid #F59E0B" }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                    <div style={{ width: 44, height: 44, borderRadius: 12, background: `${catMeta.color}15`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <Ic n={catMeta.icon} style={{ color: catMeta.color, fontSize: 18 }} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>

                          <Ic n={catMeta.icon} size={9} style={{ marginRight: 3 }} />{catMeta.label}
                        </span>
                        {app.businessPermitNo && <span style={{ padding: "2px 8px", borderRadius: 20, fontSize: 10, fontWeight: 700, background: "#EFF6FF", color: "#2563EB", border: "1px solid #BFDBFE" }}>Permit: {app.businessPermitNo}</span>}

                    <div style={{ marginTop: 8, fontSize: 11 }}>
                      {extractAttachmentUrls(app).length > 0 && (
                        <div style={{ marginBottom: 8 }}>

                          ))}
                        </div>

                      <div style={{ display: "grid", gridTemplateColumns: "minmax(100px,150px) 1fr", gap: "4px 10px" }}>

                          let display = value;

                    </div>
                  </details>

                  <div style={{ display: "flex", gap: 8, marginTop: 12 }}>

                            borderRadius: 10,

                          </div>
                        )}

                        {attachments.length > 0 && (
                          <div style={{ marginBottom: 16 }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 6 }}>Documents</div>
                            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                              {attachments.map((doc, idx) => (
                                <button key={idx} onClick={() => setViewingDoc(doc)} style={{ 
                                  padding: "6px 12px", borderRadius: 8, background: "#fff", border: "1px solid var(--border)",

                        )}

                        <div style={{ display: "flex", gap: 8 }}>
                          <button disabled={!m._merchantId} onClick={() => { onToggleFeatured?.(m._merchantId, m.featuredInApp !== true); toast.success(m.featuredInApp ? "Removed from featured" : "Marked as featured"); }} style={{
                            flex: 1, height: 40, borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer",
                            background: m.featuredInApp ? "#FEF9C3" : "#F1F5F9",
                            color: m.featuredInApp ? "#854D0E" : "#475569",
                            border: `1px solid ${m.featuredInApp ? "#FEF08A" : "#E2E8F0"}`,
                            opacity: m._merchantId ? 1 : 0.5
                          }}>
                            <Ic n="star" style={{ marginRight: 6 }} />{m.featuredInApp ? "Unfeature" : "Feature in App"}
                          </button>
                          <button onClick={() => window.open(`https://wa.me/${m.contactPhone?.replace(/\D/g, "")}`, "_blank")} style={{ flex: 1, height: 40, borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer", background: "#DCFCE7", color: "#166534", border: "1px solid #BBF7D0" }}>

                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0,1fr))", gap: 8, marginTop: 10 }}>
                          <button onClick={() => {
                            const reason = window.prompt("Reason for suspension (required):", enforcementReason || "");
                            if (reason === null) return;
                            if (!String(reason).trim()) { toast.error("Suspension reason is required."); return; }
                            onModerateMerchant?.(m._merchantId, "suspended", reason).then(() => toast.success("Merchant suspended. Partner will receive an email."));
                          }} style={{ height: 36, borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: "#FEF3C7", color: "#92400E", border: "1px solid #FDE68A" }}>
                            Suspend
                          </button>
                          <button onClick={() => {
                            const reason = window.prompt("Reason for revoking access (required):", enforcementReason || "");
                            if (reason === null) return;
                            if (!String(reason).trim()) { toast.error("Revocation reason is required."); return; }
                            onModerateMerchant?.(m._merchantId, "revoked", reason).then(() => toast.success("Access revoked. Partner will receive an email."));
                          }} style={{ height: 36, borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: "#FEE2E2", color: "#991B1B", border: "1px solid #FECACA" }}>
                            Revoke Access
                          </button>
                          <button onClick={() => {
                            const reason = window.prompt("Reason for deleting store (required):", enforcementReason || "");
                            if (reason === null) return;
                            if (!String(reason).trim()) { toast.error("Deletion reason is required."); return; }
                            if (!window.confirm(`Permanently delete ${m.storeName || "this merchant"} and remove all listing products?`)) return;

          {partnerTab === "rejected" && (

                  <Ic n="circle-xmark" size={28} style={{ color: "var(--muted)", opacity: .4, marginBottom: 8, display: "block" }} />

                <div key={app.id} className="card" style={{ marginBottom: 12, borderLeft: "4px solid #EF4444", opacity: .9 }}>

                  </div>
                  <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{app.contactName} • {app.contactPhone}</div>
                  {app.rejectionMessage && (
                    <div style={{ marginTop: 10, fontSize: 12, color: "#991B1B", background: "#FEF2F2", padding: "10px 12px", borderRadius: 8, border: "1px solid #FEE2E2" }}>
                      <div style={{ fontSize: 10, fontWeight: 800, textTransform: "uppercase", marginBottom: 4, opacity: .7 }}>Rejection Reason</div>

          {dataLoaded && (
            <div style={{ fontSize: 10, color: "var(--muted)", padding: "12px 0", display: "flex", flexWrap: "wrap", gap: 12, borderTop: "1px solid var(--border)", marginTop: 16 }}>

              <span>Pending: {pending.length}</span>

              <span>Rejected: {rejected.length}</span>
