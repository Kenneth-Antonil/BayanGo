<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BayanGo Offline</title>
  <meta name="theme-color" content="#166534" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 20px;
      text-align: center;
    }
    .card {
      width: min(460px, 100%);
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 26px rgba(15, 23, 42, .08);
    }
    h1 { margin: 0 0 8px; font-size: 22px; color: #166534; }
    p { margin: 0; font-size: 14px; line-height: 1.6; color: #475569; }
    .hint { margin-top: 12px; font-weight: 700; color: #0f766e; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Offline ka ngayon</h1>
    <p>Walang internet connection sa ngayon. Pwede mo pa ring gamitin ang mga naunang na-load na pages ng BayanGo at BayanGo Rider.</p>
    <p class="hint">Kapag bumalik ang internet, auto-refresh ulit ang live data.</p>
  </main>
</body>
</html>
