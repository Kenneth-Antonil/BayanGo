<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Apply as Partner Merchant</title>
  <style>
    :root{
      --bg:#f1f5f9;
      --card:#ffffff;
      --line:#dbe3ef;
      --text:#0f172a;
      --muted:#475569;
      --green:#166534;
      --green-strong:#14532d;
      --danger:#dc2626;
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top,#e2f5e9 0%,var(--bg) 50%);
    }
    .wrap{max-width:760px;margin:0 auto;padding:28px 16px 44px}
    .hero{margin-bottom:14px}
    .hero h1{margin:0 0 8px;font-size:clamp(1.5rem,2vw,2rem)}
    .hero p{margin:0;color:var(--muted)}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:0 10px 24px rgba(15,23,42,.06);
    }
    .section-title{font-size:14px;font-weight:700;letter-spacing:.03em;color:#334155;margin:14px 0 10px;text-transform:uppercase}
    label{font-weight:700;color:#1e293b;font-size:14px;display:block;margin-top:10px}
    .req{color:var(--danger)}
    input,textarea,select{
      width:100%;
      padding:11px 12px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      margin:7px 0 2px;
      font-size:14px;
      transition:border-color .2s, box-shadow .2s;
      background:#fff;
    }
    input:focus,textarea:focus,select:focus{outline:0;border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.15)}
    .note{font-size:13px;color:#334155;background:#eff6ff;border:1px solid #bfdbfe;padding:10px 12px;border-radius:10px;margin:12px 0}
    .check{display:flex;gap:10px;align-items:flex-start;margin:14px 0}
    .check input{width:auto;margin-top:3px}
    .btn{
      width:100%;
      padding:12px 14px;
      border:none;
      border-radius:11px;
      background:linear-gradient(135deg,var(--green),var(--green-strong));
      color:#fff;
      font-weight:700;
      cursor:pointer;
      margin-top:4px;
    }
    .btn:disabled{opacity:.65;cursor:not-allowed}
    #auth{margin:8px 0 14px}
    #msg{min-height:20px;font-size:14px;font-weight:600;margin-top:10px}
    .signed{background:#f8fafc;border:1px solid var(--line);padding:8px 10px;border-radius:10px;color:#334155}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Partner Merchant Application</h1>
      <p>Mag-apply para magkaroon ng access sa BayanGo merchant dashboard.</p>
    </div>

    <div class="card">
      <p class="note">Siguraduhin na kumpleto ang business details at valid ang permits bago i-submit ang application.</p>
      <div id="auth"></div>

      <div id="form" style="display:none">
        <div class="section-title">Store Information</div>
        <label for="storeName">Store name <span class="req">*</span></label>
        <input id="storeName" placeholder="Store name"/>

        <label for="storeCategory">Store category <span class="req">*</span></label>
        <select id="storeCategory">
          <option value="sari">General Goods</option>
          <option value="ulam">Cooked Meals</option>
          <option value="gamot">Medicine</option>
          <option value="hardware">Hardware</option>
          <option value="gulay">Vegetables</option>
        </select>

        <label for="businessAddress">Business address <span class="req">*</span></label>
        <input id="businessAddress" placeholder="Complete business address"/>

        <label for="businessPermitNo">Business permit number <span class="req">*</span></label>
        <input id="businessPermitNo" placeholder="City/Municipal business permit no."/>

        <div class="section-title">Owner Details</div>
        <label for="govIdType">Owner government ID type <span class="req">*</span></label>
        <select id="govIdType">
          <option value="">Select one</option>
          <option value="drivers_license">Driver's License</option>
          <option value="national_id">National ID</option>
          <option value="passport">Passport</option>
          <option value="postal_id">Postal ID</option>
        </select>

        <label for="contactName">Contact person <span class="req">*</span></label>
        <input id="contactName" placeholder="Contact person"/>

        <label for="contactPhone">Phone number <span class="req">*</span></label>
        <input id="contactPhone" placeholder="09XXXXXXXXX"/>

        <label for="operatingHours">Operating hours <span class="req">*</span></label>
        <input id="operatingHours" placeholder="e.g. 7:00 AM - 9:00 PM"/>

        <label for="description">Store description <span class="req">*</span></label>
        <textarea id="description" rows="4" placeholder="Store description"></textarea>

        <label class="check">
          <input type="checkbox" id="termsCheck"/>
          <span>Kinukumpirma ko na tama ang details na nilagay ko at may valid business documents ako para sa verification. <span class="req">*</span></span>
        </label>

        <button class="btn" id="submitBtn">Submit Application</button>
        <p id="msg"></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    const app=firebase.initializeApp({apiKey:"AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",authDomain:"bayango-315c6.firebaseapp.com",projectId:"bayango-315c6",storageBucket:"bayango-315c6.firebasestorage.app",messagingSenderId:"199013441811",appId:"1:199013441811:web:315a38f03ddc9b676e3ae6",databaseURL:"https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app"});
    const auth=firebase.auth(app), db=firebase.database(app);
    const authEl=document.getElementById('auth');
    const formEl=document.getElementById('form');
    const msgEl=document.getElementById('msg');

    auth.onAuthStateChanged(u=>{
      if(!u){
        authEl.innerHTML='<button class="btn" id="loginBtn">Sign in with Google</button>';
        document.getElementById('loginBtn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        formEl.style.display='none';
      } else {
        authEl.innerHTML='<p class="signed">Signed in as <b>'+(u.displayName||u.email)+'</b></p>';
        formEl.style.display='block';
      }
    });

    document.getElementById('submitBtn').onclick=async()=>{
      const u=auth.currentUser;
      if(!u) return;

      const payload={
        storeName:storeName.value.trim(),
        storeCategory:storeCategory.value,
        businessAddress:businessAddress.value.trim(),
        businessPermitNo:businessPermitNo.value.trim(),
        govIdType:govIdType.value,
        contactName:contactName.value.trim(),
        contactPhone:contactPhone.value.trim(),
        operatingHours:operatingHours.value.trim(),
        description:description.value.trim(),
        termsAccepted:termsCheck.checked,
        applicantUid:u.uid,
        applicantEmail:u.email||'',
        status:'pending',
        createdAt:Date.now()
      };

      if(!payload.storeName||!payload.storeCategory||!payload.businessAddress||!payload.businessPermitNo||!payload.govIdType||!payload.contactName||!payload.contactPhone||!payload.operatingHours||!payload.description){
        msgEl.style.color='#dc2626';
        msgEl.textContent='Please complete all required fields.';
        return;
      }

      if(!/^09\d{9}$/.test(payload.contactPhone)){
        msgEl.style.color='#dc2626';
        msgEl.textContent='Please enter a valid PH mobile number (09XXXXXXXXX).';
        return;
      }

      if(!payload.termsAccepted){
        msgEl.style.color='#dc2626';
        msgEl.textContent='Please confirm the declaration before submitting.';
        return;
      }

      const btn=document.getElementById('submitBtn');
      btn.disabled=true;
      btn.textContent='Submitting...';

      try{
        await db.ref('partner_applications').push(payload);
        msgEl.style.color='#166534';
        msgEl.textContent='Application submitted successfully! Hintayin ang approval sa admin dashboard.';
        btn.textContent='Submitted';
      }catch(e){
        console.error('Submission failed:',e);
        msgEl.style.color='#dc2626';
        msgEl.textContent='Failed to submit application: '+(e.message||'Unknown error')+'. Please try again.';
        btn.disabled=false;
        btn.textContent='Submit Application';
      }
    };
  </script>
</body>
</html>
