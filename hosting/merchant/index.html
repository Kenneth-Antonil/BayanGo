<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BayanGo Partner Merchant Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --line:#dbe4f0;
      --text:#0f172a;
      --muted:#475569;
      --brand:#166534;
      --brand-dark:#14532d;
      --chip:#f8fafc;
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#e4f4eb 0%,var(--bg) 45%);margin:0;color:var(--text)}
    #root{max-width:100%;margin:0 auto;padding:14px 12px 26px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 10px 24px rgba(15,23,42,.05)}
    .card h2,.card h3{margin:0 0 10px}
    .muted{color:var(--muted);margin:0}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .status-chip{background:#dcfce7;color:#166534;font-weight:700;padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid #86efac}
    .status-chip.closed{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
    .stack{display:grid;gap:10px}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;margin:0;font-size:14px;background:#fff}
    input:focus,select:focus,textarea:focus{outline:0;border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.15)}
    button{cursor:pointer;border:none;border-radius:10px;padding:10px 12px;font-weight:700;transition:.2s}
    button:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff}
    .btn-muted{background:#e2e8f0;color:#0f172a}
    .btn-warn{background:#fef3c7;color:#92400e}
    .btn-success{background:#16a34a;color:#fff}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .list-item{padding:12px 0;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;gap:10px;align-items:center}
    .list-item:first-of-type{border-top:none;padding-top:0}
    .price{font-weight:700}
    .listing-meta{display:flex;gap:10px;align-items:center;min-width:0}
    .listing-logo{width:34px;height:34px;border-radius:999px;object-fit:cover;border:2px solid #86efac;flex-shrink:0;background:#dcfce7}
    .listing-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .stock-chip{font-size:11px;font-weight:700;background:#ecfdf5;color:#166534;border:1px solid #bbf7d0;padding:3px 8px;border-radius:999px}
    .preview-box{width:88px;height:88px;border:1px dashed #94a3b8;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#f8fafc;overflow:hidden}
    .preview-box img{width:100%;height:100%;object-fit:cover}
    .order{border:1px solid var(--line);background:var(--chip);border-radius:12px;padding:12px;margin-bottom:10px}
    .order-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .order-status{font-size:12px;color:var(--muted);margin:4px 0 10px}
    .order-actions{display:flex;gap:8px;flex-wrap:wrap}
    .login{text-align:center;padding:24px}
    .logo{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid #bbf7d0}
    .menu-bar{display:flex;gap:8px;overflow:auto;padding-bottom:4px}
    .menu-btn{padding:9px 12px;border:1px solid #d1d5db;background:#fff;color:#334155;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}
    .menu-btn.active{background:#166534;color:#fff;border-color:#166534}
    .toggle-wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;border:1px solid #dcfce7;background:#f0fdf4;border-radius:12px}
    .switch{position:relative;width:52px;height:30px;display:inline-block}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;inset:0;background:#cbd5e1;border-radius:999px;transition:.2s}
    .slider:before{content:"";position:absolute;height:24px;width:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
    .switch input:checked + .slider{background:#16a34a}
    .switch input:checked + .slider:before{transform:translateX(22px)}
    .section-title{margin:0 0 10px;font-size:14px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.04em}
    @media (min-width:900px){#root{max-width:980px;padding:22px 14px 30px}}
    @media (max-width:640px){.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
const app=firebase.initializeApp({apiKey:"AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",authDomain:"bayango-315c6.firebaseapp.com",projectId:"bayango-315c6",storageBucket:"bayango-315c6.firebasestorage.app",messagingSenderId:"199013441811",appId:"1:199013441811:web:315a38f03ddc9b676e3ae6",databaseURL:"https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app"});
const db=firebase.database(app);const auth=firebase.auth(app);const storage=firebase.storage(app);
</script>
<script type="text/babel">
const CATEGORIES=["isda","karne","gulay","prutas","ulam","sari","gamot","hardware"];

function App(){
 const displayOrderStatus=(order)=>{
  if(order?.status==='delivered') return 'delivered';
  return order?.merchantStatus || order?.status || 'pending';
 };
 const isArchivedOrder=(order)=>order?.status==='delivered';

 const [user,setUser]=React.useState(null);
 const [merchant,setMerchant]=React.useState(null);
 const [listings,setListings]=React.useState([]);
 const [orders,setOrders]=React.useState([]);
 const [form,setForm]=React.useState({name:"",cat:"sari",price:"",unit:"pc",stock:"",img:""});
 const [listingImageFile,setListingImageFile]=React.useState(null);
 const [savingListing,setSavingListing]=React.useState(false);
 const [editingId,setEditingId]=React.useState(null);
 const [activeSection,setActiveSection]=React.useState("dashboard");
 const [updatingStoreStatus,setUpdatingStoreStatus]=React.useState(false);
 const [bannerForm,setBannerForm]=React.useState({title:"",imageUrl:"",linkUrl:"",active:true});
 const [bannerImageFile,setBannerImageFile]=React.useState(null);
 const [savingBanner,setSavingBanner]=React.useState(false);

 React.useEffect(()=>auth.onAuthStateChanged(setUser),[]);

 React.useEffect(()=>{
  if(!user){
    setMerchant(null);
    setListings([]);
    setOrders([]);
    return;
  }

  const merchantRef=db.ref("partner_merchants/"+user.uid);
  const listingsRef=db.ref("merchant_listings/"+user.uid);
  const ordersRef=db.ref("orders");

  const onMerchant=(s)=>setMerchant(s.val());
  const onListings=(s)=>{
    const a=[];
    s.forEach(c=>{
      const raw=c.val();
      if(!raw || typeof raw!=="object") return;
      a.push({id:c.key,...raw});
    });
    a.sort((x,y)=>(y.updatedAt||y.createdAt||0)-(x.updatedAt||x.createdAt||0));
    setListings(a);
  };
  const onOrders=(s)=>{
    const a=[];
    s.forEach(c=>{
      const v=c.val()||{};
      if(v.merchantId===user.uid) a.push({id:c.key,...v});
    });
    a.sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));
    setOrders(a);
  };

  merchantRef.on("value",onMerchant);
  listingsRef.on("value",onListings);
  ordersRef.on("value",onOrders);

  return ()=>{
    merchantRef.off("value",onMerchant);
    listingsRef.off("value",onListings);
    ordersRef.off("value",onOrders);
  };
 },[user?.uid]);

 const signIn=async()=>{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());};
 const storeOpen=merchant?.storeOpen!==false;
 const promoBanners=React.useMemo(()=>{
  const raw=merchant?.promoBanners;
  if(!raw) return [];
  const list=Array.isArray(raw)?raw:Object.entries(raw).map(([id,v])=>({id,...(v||{})}));
  return list.filter(Boolean).sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0));
 },[merchant?.promoBanners]);

 const setStoreOpen=async(nextOpen)=>{
  if(!user||updatingStoreStatus) return;
  setUpdatingStoreStatus(true);
  try{
    await db.ref("partner_merchants/"+user.uid).update({storeOpen:nextOpen,storeStatusUpdatedAt:Date.now()});
  }catch(err){
    alert("Hindi ma-update ang store status:\n" + (err?.message || err?.code || "Unknown error"));
  }finally{
    setUpdatingStoreStatus(false);
  }
 };

 const uploadLogo=async(file)=>{
  if(!user||!file) return;
  try{
    const ref=storage.ref(`merchant_logos/${user.uid}_${Date.now()}_${file.name}`);
    await ref.put(file);
    const logoUrl=await ref.getDownloadURL();
    await db.ref("partner_merchants/"+user.uid).update({logoUrl});
    const listSnap=await db.ref("merchant_listings/"+user.uid).once("value");
    const updates={};
    listSnap.forEach(c=>{updates[`${c.key}/merchantLogo`]=logoUrl;});
    if(Object.keys(updates).length) await db.ref("merchant_listings/"+user.uid).update(updates);
  }catch(err){
    alert("Hindi ma-upload ang merchant logo:\n" + (err?.message || err?.code || "Unknown error"));
  }
 };

 const saveBanner=async()=>{
  if(!user||savingBanner) return;
  if(!bannerForm.title.trim()) return alert("Lagyan ng banner title.");
  setSavingBanner(true);
  try{
    let imageUrl=bannerForm.imageUrl.trim();
    if(bannerImageFile){
      const ref=storage.ref(`merchant_banners/${user.uid}_${Date.now()}_${bannerImageFile.name}`);
      await ref.put(bannerImageFile);
      imageUrl=await ref.getDownloadURL();
    }
    if(!imageUrl) throw new Error("Please upload a banner image.");
    const id="bnr_"+Date.now();
    await db.ref(`partner_merchants/${user.uid}/promoBanners/${id}`).set({
      id,
      title:bannerForm.title.trim(),
      imageUrl,
      linkUrl:bannerForm.linkUrl.trim(),
      active:bannerForm.active!==false,
      createdAt:Date.now(),
      updatedAt:Date.now(),
    });
    setBannerForm({title:"",imageUrl:"",linkUrl:"",active:true});
    setBannerImageFile(null);
  }catch(err){
    alert("Hindi ma-save ang promotional banner:\n" + (err?.message || err?.code || "Unknown error"));
  }finally{
    setSavingBanner(false);
  }
 };

 const toggleBanner=async(bannerId,nextActive)=>{
  if(!user||!bannerId) return;
  await db.ref(`partner_merchants/${user.uid}/promoBanners/${bannerId}`).update({active:nextActive,updatedAt:Date.now()});
 };

 const removeBanner=async(bannerId)=>{
  if(!user||!bannerId) return;
  const ok=window.confirm("Delete this promotional banner?");
  if(!ok) return;
  await db.ref(`partner_merchants/${user.uid}/promoBanners/${bannerId}`).remove();
 };

 const addListing=async()=>{
  if(!user||!form.name||savingListing) return;
  setSavingListing(true);
  try{
    let img=form.img||"";
    if(listingImageFile){
      const ref=storage.ref(`merchant_listing_images/${user.uid}_${Date.now()}_${listingImageFile.name}`);
      await ref.put(listingImageFile);
      img=await ref.getDownloadURL();
    }
    const payload={...form,img,price:Number(form.price||0),stock:Number(form.stock||0),basePrice:Number(form.price||0),autoPriceEnabled:false,merchantId:user.uid,merchantLogo:merchant?.logoUrl||"",storeName:merchant?.storeName||"",active:true,approved:true,updatedAt:Date.now()};
    if(editingId){
      await db.ref("merchant_listings/"+user.uid+"/"+editingId).update(payload);
    }else{
      await db.ref("merchant_listings/"+user.uid).push({...payload,createdAt:Date.now()});
    }
    setForm({name:"",cat:"sari",price:"",unit:"pc",stock:"",img:""});
    setListingImageFile(null);
    setEditingId(null);
  }catch(err){
    alert("Hindi ma-save ang listing:\n" + (err?.message || err?.code || "Unknown error"));
  }finally{
    setSavingListing(false);
  }
 };

 const editListing=(l)=>{
  setEditingId(l.id);
  setListingImageFile(null);
  setForm({name:l.name||"",cat:l.cat||"sari",price:String(l.price??""),unit:l.unit||"pc",stock:String(l.stock??""),img:l.img||""});
 };

 const deleteListing=async(id)=>{
  if(!id) return;
  const ok=window.confirm("Delete this listing?");
  if(!ok) return;
  await db.ref("merchant_listings/"+user.uid+"/"+id).remove();
  if(editingId===id){
    setEditingId(null);
    setForm({name:"",cat:"sari",price:"",unit:"pc",stock:"",img:""});
    setListingImageFile(null);
  }
 };

 const updateOrder=async(id,status,merchantStatus)=>{
  await db.ref("orders/"+id).update({status,merchantStatus,merchantUpdatedAt:Date.now()});
 };

 if(!user) return (
  <div className="card login">
    <h2>Partner Merchant Dashboard</h2>
    <p className="muted">Mag sign in para ma-access ang iyong dashboard.</p>
    <br/>
    <button className="btn-primary" onClick={signIn}>Sign in with Google</button>
  </div>
 );

 if(!merchant?.approved) return (
  <div className="card">
    <h3>Waiting for admin approval</h3>
    <p className="muted">Wala ka pang access. Kapag approved na ang application mo sa admin dashboard saka pa lang bubukas ang dashboard na ito.</p>
  </div>
 );

 return (
  <div>
    <div className="card">
      <div className="toolbar">
        <div>
          <h2>{merchant.storeName || "Partner Merchant"}</h2>
          <p className="muted">Manage listings at orders in one place.</p>
        </div>
        <span className={`status-chip ${storeOpen ? "" : "closed"}`}>{storeOpen ? "Store Open" : "Store Closed"}</span>
      </div>
      <br/>
      <div className="menu-bar">
        <button className={`menu-btn ${activeSection==="dashboard"?"active":""}`} onClick={()=>setActiveSection("dashboard")}>Dashboard</button>
        <button className={`menu-btn ${activeSection==="listings"?"active":""}`} onClick={()=>setActiveSection("listings")}>Listings</button>
        <button className={`menu-btn ${activeSection==="orders"?"active":""}`} onClick={()=>setActiveSection("orders")}>Orders</button>
        <button className={`menu-btn ${activeSection==="settings"?"active":""}`} onClick={()=>setActiveSection("settings")}>Settings</button>
        <button className={`menu-btn ${activeSection==="promotions"?"active":""}`} onClick={()=>setActiveSection("promotions")}>Promotions</button>
      </div>
    </div>

    {activeSection==="dashboard" && (
    <div className="card stack">
      <h3>Quick Controls</h3>
      <div className="toggle-wrap">
        <div>
          <div style={{fontWeight:700,fontSize:14}}>Store status</div>
          <div className="muted" style={{fontSize:12}}>{storeOpen ? "Customers can order from your store." : "Listings are marked as Store Closed in customer app."}</div>
        </div>
        <label className="switch">
          <input type="checkbox" checked={storeOpen} onChange={e=>setStoreOpen(e.target.checked)} disabled={updatingStoreStatus}/>
          <span className="slider"></span>
        </label>
      </div>
      <input type="file" accept="image/*" onChange={e=>uploadLogo(e.target.files?.[0])}/>
      {merchant.logoUrl && <img src={merchant.logoUrl} className="logo" alt="Merchant logo"/>}
    </div>
    )}

    {activeSection==="listings" && (
    <>
    <div className="card stack">
      <h3>{editingId ? "Update Listing" : "Add Listing"}</h3>
      <div className="grid-2">
        <input placeholder="Item name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select>
      </div>
      <div className="grid-2">
        <input placeholder="Price" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}/>
        <input placeholder="Unit (pc/kg)" value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}/>
      </div>
      <div className="grid-2">
        <input placeholder="Stock (e.g. 20)" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/>
        <input type="file" accept="image/*" onChange={e=>setListingImageFile(e.target.files?.[0]||null)}/>
      </div>
      <div className="preview-box">
        {(listingImageFile || form.img)
          ? <img src={listingImageFile ? URL.createObjectURL(listingImageFile) : form.img} alt="Listing preview"/>
          : <span className="muted" style={{fontSize:12}}>No image</span>}
      </div>
      <div className="listing-actions" style={{justifyContent:"flex-start"}}>
        <button className="btn-primary" onClick={addListing}>{savingListing ? "Saving..." : (editingId ? "Update Listing" : "Save Listing")}</button>
        {editingId && <button className="btn-muted" onClick={()=>{setEditingId(null);setListingImageFile(null);setForm({name:"",cat:"sari",price:"",unit:"pc",stock:"",img:""});}}>Cancel Edit</button>}
      </div>
    </div>

    <div className="card">
      <h3>Your Listings ({listings.length})</h3>
      {listings.map(l=>(
        <div key={l.id} className="list-item">
          <div className="listing-meta">
            <img src={l.merchantLogo || merchant?.logoUrl || "https://via.placeholder.com/40?text=M"} className="listing-logo" alt="badge logo"/>
            <div>
              <div style={{fontWeight:700}}>{l.name}</div>
              <div className="muted" style={{fontSize:12}}>{l.unit} • <span className="stock-chip">Stock: {Number(l.stock||0)}</span></div>
            </div>
          </div>
          <div className="listing-actions">
            <span className="price">₱{Number(l.price||0)}</span>
            <button className="btn-muted" onClick={()=>editListing(l)}>Update</button>
            <button className="btn-warn" onClick={()=>deleteListing(l.id)}>Delete</button>
          </div>
        </div>
      ))}
    </div>
    </>
    )}

    {activeSection==="orders" && (
    <>
    <div className="card">
      <h3>Merchant Orders</h3>
      {orders.filter(o=>!isArchivedOrder(o)).map(o=>(
        <div key={o.id} className="order">
          <div className="order-head">
            <div style={{fontWeight:700}}>{o.customer?.name} • ₱{o.total}</div>
          </div>
          <div className="order-status">Status: {displayOrderStatus(o)}</div>
          <div className="order-actions">
            <button className="btn-muted" onClick={()=>updateOrder(o.id,'merchant_pending','accepted')}>Accept</button>
            <button className="btn-warn" onClick={()=>updateOrder(o.id,'merchant_pending','preparing')}>Preparing</button>
            <button className="btn-success" onClick={()=>updateOrder(o.id,'pending','ready')}>Ready</button>
          </div>
        </div>
      ))}
      {!orders.some(o=>!isArchivedOrder(o)) && <p className="muted">No active orders.</p>}
    </div>

    <div className="card">
      <h3>Archive</h3>
      {orders.filter(isArchivedOrder).map(o=>(
        <div key={o.id} className="order">
          <div className="order-head">
            <div style={{fontWeight:700}}>{o.customer?.name} • ₱{o.total}</div>
          </div>
          <div className="order-status">Status: {displayOrderStatus(o)}</div>
        </div>
      ))}
      {!orders.some(isArchivedOrder) && <p className="muted">No archived orders yet.</p>}
    </div>
    </>
    )}

    {activeSection==="settings" && (
    <div className="card stack">
      <h3>Settings</h3>
      <div className="toggle-wrap">
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{storeOpen ? "Store Open" : "Store Closed"}</div>
          <div className="muted" style={{fontSize:12}}>Turn this off to gray-out listings and show "Store Closed" in the user app.</div>
        </div>
        <label className="switch">
          <input type="checkbox" checked={storeOpen} onChange={e=>setStoreOpen(e.target.checked)} disabled={updatingStoreStatus}/>
          <span className="slider"></span>
        </label>
      </div>
      <button className="btn-muted" onClick={()=>auth.signOut()}>Sign out</button>
    </div>
    )}

    {activeSection==="promotions" && (
    <>
    <div className="card stack">
      <h3>Store Promotional Banners</h3>
      <p className="muted" style={{fontSize:12}}>These banners are shown on your store profile inside the user app.</p>
      <input placeholder="Banner title" value={bannerForm.title} onChange={e=>setBannerForm(f=>({...f,title:e.target.value}))}/>
      <div className="grid-2">
        <input placeholder="Optional link URL" value={bannerForm.linkUrl} onChange={e=>setBannerForm(f=>({...f,linkUrl:e.target.value}))}/>
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:700,color:"#334155"}}>
          <input type="checkbox" checked={bannerForm.active!==false} onChange={e=>setBannerForm(f=>({...f,active:e.target.checked}))} style={{width:16,height:16,padding:0,margin:0,border:"1px solid #cbd5e1"}}/>Active
        </label>
      </div>
      <input type="file" accept="image/*" onChange={e=>setBannerImageFile(e.target.files?.[0]||null)}/>
      <button className="btn-primary" onClick={saveBanner}>{savingBanner ? "Saving..." : "Save Banner"}</button>
    </div>

    <div className="card">
      <h3>Saved Banners ({promoBanners.length})</h3>
      {promoBanners.length===0 && <p className="muted">No promotional banners yet.</p>}
      {promoBanners.map((banner)=>(
        <div key={banner.id} className="list-item" style={{alignItems:"flex-start"}}>
          <div className="listing-meta">
            {banner.imageUrl ? <img src={banner.imageUrl} className="listing-logo" alt={banner.title || "banner"} /> : <div className="listing-logo"></div>}
            <div>
              <div style={{fontWeight:700}}>{banner.title || "Untitled banner"}</div>
              <div className="muted" style={{fontSize:11}}>{banner.active===false ? "Inactive" : "Active"} {banner.linkUrl ? `• ${banner.linkUrl}` : ""}</div>
            </div>
          </div>
          <div className="listing-actions">
            <button className="btn-muted" onClick={()=>toggleBanner(banner.id,banner.active===false)}>{banner.active===false ? "Activate" : "Deactivate"}</button>
            <button className="btn-warn" onClick={()=>removeBanner(banner.id)}>Delete</button>
          </div>
        </div>
      ))}
    </div>
    </>
    )}
  </div>
 );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
