    function normalizeVapidKey(rawValue) {
      if (!rawValue) return "";
      if (typeof rawValue === "string") return rawValue.trim();
      if (typeof rawValue === "object") {
        const candidate = rawValue.publicKey || rawValue.vapidKey || rawValue.key || "";
        return typeof candidate === "string" ? candidate.trim() : "";
      }

    const BAYANGO_HARDCODED_VAPID_KEY = "BMdJvRjBWkB8Ob6OOJNiaFVtKkTG4Ubd1BEM4z8VshMVO0WiGHYUEu3mfm1sQYlK25OloE9jjojJUWB12eMfLfA";

    let cachedWebPushVapidKey = STATIC_WEB_PUSH_VAPID_KEY;

    async function resolveWebPushVapidKey() {
      if (cachedWebPushVapidKey) return cachedWebPushVapidKey;
      try {
        const settingsPaths = ["settings/pushVapidKey", "app_settings/pushVapidKey"];
        for (const path of settingsPaths) {
          const snap = await _fbDb.ref(path).once("value");
          const value = normalizeVapidKey(snap.val());
          if (value) {
            cachedWebPushVapidKey = value;
            return value;
          }
        }
      } catch (err) {
        console.warn("Unable to load Web Push VAPID key from DB settings:", err);
      }
      return "";
    }

    async function normalizeStorageDownloadUrl(rawUrl) {
      if (!rawUrl || typeof rawUrl !== "string") return rawUrl || "";
      if (rawUrl.includes("token=")) return rawUrl;
      try {
        const parsed = new URL(rawUrl);
        if (!parsed.hostname.includes("firebasestorage.googleapis.com")) return rawUrl;
        if (!parsed.pathname.includes("/o")) return rawUrl;
        const objectName = parsed.searchParams.get("name");
        if (!objectName) return rawUrl;
        const storageRef = _fbStorage.ref(decodeURIComponent(objectName));
        return await storageRef.getDownloadURL();
      } catch (_) {
        return rawUrl;
      }
    }

      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    async function enablePushForUser(user, { requestPermission = true } = {}) {
      if (!user?.uid) return;
      if (!("serviceWorker" in navigator) || !("Notification" in window)) return;
      try {
        const supported = typeof firebase.messaging.isSupported === "function"
          ? await firebase.messaging.isSupported()
          : true;
        if (!supported) return;
      } catch (_) { return; }

      try {
        let permission = Notification.permission;
        if (permission !== "granted" && requestPermission) {
          permission = await Notification.requestPermission();
        }
        if (permission !== "granted") return;

        const swReg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        await navigator.serviceWorker.ready;
        const messaging = firebase.messaging(_fbApp);
        const webPushVapidKey = await resolveWebPushVapidKey();
        let token = null;
        const getTokenOptions = { serviceWorkerRegistration: swReg };
        if (webPushVapidKey) {
          getTokenOptions.vapidKey = webPushVapidKey;
        }
        try {
          token = await messaging.getToken(getTokenOptions);
        } catch (err) {
          const vapidErr = String(err?.code || "").includes("vapid") || String(err?.message || "").toLowerCase().includes("vapid");
          if (!vapidErr || !webPushVapidKey) throw err;
          console.warn("VAPID key rejected. Retrying getToken without explicit vapidKey.");
          token = await messaging.getToken({ serviceWorkerRegistration: swReg });
        }
        if (!token) return;

        // Save token to RTDB
        const saveToken = async (t) => {
          const tokenKey = sanitizeTokenKey(t);
          await _fbDb.ref(`push_tokens/${user.uid}/${tokenKey}`).set({
            token: t,
            uid: user.uid,
            userEmail: user.email || null,
            userName: user.displayName || null,
            role: "user",
            platform: navigator.userAgent || "web",
            updatedAt: Date.now(),
            enabled: true,
          });
        };
        const persistLatestToken = async (freshToken, { removeOld = true } = {}) => {
          if (!freshToken) return;
          if (removeOld && token && token !== freshToken) {
            const oldKey = sanitizeTokenKey(token);
            _fbDb.ref(`push_tokens/${user.uid}/${oldKey}`).remove().catch(() => {});
          }
          token = freshToken;
          await saveToken(freshToken);
        };
        await persistLatestToken(token, { removeOld: false });

        if (typeof messaging.onTokenRefresh === "function") {
          messaging.onTokenRefresh(async () => {
            try {
              const freshToken = await messaging.getToken(getTokenOptions);
              if (freshToken && freshToken !== token) {
                console.log("FCM token rotated (onTokenRefresh), updating...");
                await persistLatestToken(freshToken);
              }
            } catch (err) {
              console.warn("Token refresh listener error:", err);
            }
          });
        }

        // Handle token refresh — FCM may rotate tokens at any time
        messaging.onMessage((payload) => {
          // Re-fetch token on every foreground message to catch silent rotations
          messaging.getToken(getTokenOptions).then(freshToken => {
            if (freshToken && freshToken !== token) {
              console.log("FCM token rotated, updating...");
              persistLatestToken(freshToken).catch(err => console.error("Token refresh save error:", err));
            }
          }).catch(() => {});

          const title = payload?.notification?.title || payload?.data?.title || "BayanGo";
          const body = payload?.notification?.body || payload?.data?.body || "May bagong update ka.";
          if (Notification.permission === "granted") {
            const type = payload?.data?.type || "";
            const n = new Notification(title, {
              body,
              icon: "https://i.imgur.com/wL8wcBB.jpeg",
              data: payload?.data || {},
            });
            n.onclick = () => {
              window.focus();
              n.close();
              window.location.search = "?section=notifications";
            };
          }
        });

        // Periodically refresh token (every 30 min while app is open)
        setInterval(async () => {
          try {
            const freshToken = await messaging.getToken(getTokenOptions);
            if (freshToken && freshToken !== token) {
              console.log("FCM token rotated (interval check), updating...");
              await persistLatestToken(freshToken);
            }
          } catch (err) {
            console.warn("Token refresh interval error:", err);
          }
        }, 30 * 60 * 1000);
      } catch (err) {
        console.error("Push notification setup error:", err);
        if (String(err?.code || "").includes("vapid") || String(err?.message || "").toLowerCase().includes("vapid")) {
          console.error("Missing/invalid Web Push VAPID key. Set window.BAYANGO_WEB_PUSH_VAPID_KEY before loading the app.");
        }
      }
    }

            merchant?.moderation?.action
            || merchant?.enforcementStatus
            || ""
          ).trim().toLowerCase();
          if (["active", "suspended", "revoked", "deleted"].includes(explicitAction)) return explicitAction;
          if (merchant?.deletedAt) return "deleted";
          return "active";
        };
        const isApprovedMerchant = (merchant) => {
          const approvedValue = merchant?.approved;
          const normalizedApproved = String(approvedValue || "").trim().toLowerCase();
          const normalizedStatus = String(merchant?.status || "").trim().toLowerCase();
          return (
            approvedValue === true
            || approvedValue === 1
            || normalizedApproved === "true"
            || normalizedApproved === "approved"
            || normalizedStatus === "approved"
          );
        };
        const isMerchantVisibleInUserApp = (merchant) => {
          if (!isApprovedMerchant(merchant)) return false;
          const moderationAction = normalizeMerchantModerationAction(merchant);
          return moderationAction === "active";
        };
        const refreshMergedProducts = () => {
          const regularProducts = baseProductsRaw.map((entry) => ({
            ...entry,
            source: entry?.source === "bg_mart" ? "bg_mart" : "market",
          }));
          const partnerProducts = partnerListingsRaw
            .map((entry) => {
              const merchant = partnerMerchantsById[entry.merchantId] || {};
              if (!isMerchantVisibleInUserApp(merchant)) return null;
              return {
                ...entry,
                source: "partner",
                storeName: entry.storeName || merchant.storeName || "Partner Merchant",
                merchantLogo: entry.merchantLogo || merchant.logoUrl || "",
                storeOpen: merchant.storeOpen !== false,
                merchantFeatured: merchant.featuredInApp === true,
                storeDescription: merchant.description || "",
                storeCategory: merchant.category || merchant.storeCategory || entry.cat || "sari",
                storeBanners: merchant.promoBanners || null,
                storeCustomCategories: merchant.customCategories || [],
              };
            })
            .filter(Boolean)
            .filter((entry) => entry.active !== false);
          setProducts([...regularProducts, ...partnerProducts]);
        };

        const bindProducts = () => {
          if (!_fbDb) return;
          _fbDb.ref("products").off();
          unsubProducts = _fbDb.ref("products").on("value", snap => {
            const prods = [];
            snap.forEach(child => {
              const raw = child.val() || {};
              if (raw.active === false) return;
              const normalized = { id: child.key, ...raw };
              prods.push({
                ...normalized,
                basePrice: Number.isFinite(Number(raw.basePrice)) ? Number(raw.basePrice) : Number(raw.price || 0),
                autoPriceEnabled: raw.autoPriceEnabled !== false,
                price: computeLivePrice(normalized, currentMarketPricing),
              });
            });
            baseProductsRaw = prods;
            refreshMergedProducts();
          }, err => {
            console.error("Products listener error:", err.code);
          });
        };

        const bindPartnerListings = () => {
          if (!_fbDb) return;
          _fbDb.ref("merchant_listings").off();
          _fbDb.ref("merchant_listings").on("value", snap => {
            const rows = [];
            snap.forEach(merchantNode => {
              const merchantId = merchantNode.key;
              merchantNode.forEach(listingNode => {
                const raw = listingNode.val() || {};
                if (raw.active === false) return;
                if (raw.approved === false) return;
                const normalized = { id: listingNode.key, merchantId, ...raw };
                rows.push({
                  ...normalized,
                  basePrice: Number.isFinite(Number(raw.basePrice)) ? Number(raw.basePrice) : Number(raw.price || 0),
                  autoPriceEnabled: raw.autoPriceEnabled !== false,
                  price: computeLivePrice(normalized, currentMarketPricing),
                  unit: raw.unit || "pc",
                });
              });
            });
            partnerListingsRaw = rows;
            refreshMergedProducts();
          }, err => console.error("Partner listings listener error:", err.code));
        };

        const bindPartnerMerchants = () => {
          if (!_fbDb) return;
          _fbDb.ref("partner_merchants").off();
          _fbDb.ref("partner_merchants").on("value", snap => {
            const map = {};
            snap.forEach(child => {
              const raw = child.val() || {};
              if (!isMerchantVisibleInUserApp(raw)) return;
              map[child.key] = raw;
            });
            partnerMerchantsById = map;
            refreshMergedProducts();
          }, err => console.error("Partner merchants listener error:", err.code));
        };


        const bindMarketPricing = () => {
          if (!_fbDb) return;
          _fbDb.ref("settings/marketPricing").off();
          unsubMarketPricing = _fbDb.ref("settings/marketPricing").on("value", snap => {
            const raw = snap.val() || {};
            const next = {};
            CATEGORIES.filter(c => c.id !== "all").forEach(c => {
              const val = Number(raw?.[c.id]);
              next[c.id] = Number.isFinite(val) && val > 0 ? val : DEFAULT_MARKET_FACTOR;
            });
            currentMarketPricing = next;
            bindProducts();
          });
        };

        const loadGcashSettings = async () => {
          const snap = await _fbDb.ref("settings/gcash").once("value");
          if (!snap.exists()) return;
          const loaded = { number:"09618280589", name:"Kenneth Antonil", qrUrl:"", ...snap.val() };
          loaded.qrUrl = await normalizeStorageDownloadUrl(loaded.qrUrl);
          setGcashSettings(loaded);
        };

        const bindAppAvailability = () => {
          if (!_fbDb) return;
          _fbDb.ref("settings/appAvailability").off();
          unsubAppAvailability = _fbDb.ref("settings/appAvailability").on("value", snap => {
            const raw = snap.val() || {};
            setAppAvailability({
              userAppEnabled: raw.userAppEnabled !== false,
              userAppMessage: String(raw.userAppMessage || "").trim(),
            });
          });
        };
        const bindBgMartPromoBanner = () => {
          if (!_fbDb) return;
          _fbDb.ref("settings/bgMartPromoBanner").off();
          unsubBgMartBanner = _fbDb.ref("settings/bgMartPromoBanner").on("value", async snap => {
            const raw = snap.val() || {};
            const imageUrlRaw = typeof raw.imageUrl === "string" ? raw.imageUrl.trim() : "";
            const imageUrl = await normalizeStorageDownloadUrl(imageUrlRaw);
            setBgMartPromoBannerUrl(imageUrl);
          });
        };

        try {
          _fbAuth.getRedirectResult().catch(err => console.error("Redirect result error:", err));
          unsubAuth = _fbAuth.onAuthStateChanged(currentUser => {
            clearTimeout(timeout);
            setUser(currentUser);
            setLoading(false);

            // Clean up previous order listener
            if (unsubOrders) {
              _fbDb.ref("orders").off();
              unsubOrders = null;
            }
            if (activityIntervalId) {
              clearInterval(activityIntervalId);
              activityIntervalId = null;
            }
            if (visibilityHandler) {
              document.removeEventListener("visibilitychange", visibilityHandler);
              visibilityHandler = null;
            }
            usingOrdersFallback = false;

            if (currentUser && _fbDb) {
              bindMarketPricing();
              bindProducts();
              bindPartnerMerchants();
              bindPartnerListings();
              loadGcashSettings().catch(err => {
                console.error("Failed to load GCash settings:", err);
              });
              bindAppAvailability();
              bindBgMartPromoBanner();
              setPushPermission(typeof Notification !== "undefined" ? Notification.permission : "default");
              enablePushForUser(currentUser, { requestPermission: false });
              trackUserAppUsage(currentUser).catch(err => console.error("Usage tracking error:", err));

              visibilityHandler = () => {
                if (document.visibilityState === "visible") {
                  trackUserAppUsage(currentUser).catch(err => console.error("Usage visibility sync error:", err));
                }
              };
              document.addEventListener("visibilitychange", visibilityHandler);
              // Listen for this user's orders in RTDB
              const mapAndSort = (snap) => {
                const list = [];
                snap.forEach(child => {
                  const order = { id: child.key, ...child.val() };
                  const ownerUid = order?.uid || order?.userId || null;
                  if (usingOrdersFallback) {
                    if (ownerUid === currentUser.uid) list.push(order);
                  } else {
                    list.push(order);
                  }
                });
                setOrders(list.sort((a,b) => (b?.createdAt || 0) - (a?.createdAt || 0))); // newest first
              };

              const ordersQueryRef = _fbDb.ref("orders").orderByChild("uid").equalTo(currentUser.uid);
              const ordersPlainRef = _fbDb.ref("orders");

              unsubOrders = ordersQueryRef.on("value", mapAndSort, err => {
                console.error("Orders listener error:", err.code);
                if (usingOrdersFallback) return;
                usingOrdersFallback = true;
                _fbDb.ref("orders").off();
                unsubOrders = ordersPlainRef.on("value", mapAndSort, fullErr => {
                  console.error("Orders fallback listener error:", fullErr.code);
                });
              });

              const refundsQueryRef = _fbDb.ref("refunds").orderByChild("uid").equalTo(currentUser.uid);
              refundsQueryRef.on("value", snap => {
                const list = [];
                snap.forEach(c => list.push({ id: c.key, ...c.val() }));
                list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                setRefunds(list);
              }, err => console.error("Refunds listener error:", err.code));

              activityIntervalId = setInterval(() => {
                if (document.visibilityState === "visible") {
                  trackUserAppUsage(currentUser).catch(err => console.error("Usage interval sync error:", err));
                }
              }, 60 * 1000);

            } else {
              _fbDb.ref("products").off();
              _fbDb.ref("settings/marketPricing").off();
              _fbDb.ref("merchant_listings").off();
              _fbDb.ref("partner_merchants").off();
              _fbDb.ref("refunds").off();
              _fbDb.ref("settings/appAvailability").off();
              _fbDb.ref("settings/bgMartPromoBanner").off();
              baseProductsRaw = [];
              partnerListingsRaw = [];
              partnerMerchantsById = {};
              setProducts([]);
              setOrders([]);
              setRefunds([]);
              setBgMartPromoBannerUrl("");
              setPushError("");
              setPushBusy(false);
            }
          });
        } catch (err) {
          console.error("Firebase error:", err);
          clearTimeout(timeout);
          setLoading(false);
        }

        return () => {
          unsubAuth?.();
          if (_fbDb) {
            _fbDb.ref("orders").off();
            _fbDb.ref("products").off();
            _fbDb.ref("settings/marketPricing").off();
            _fbDb.ref("merchant_listings").off();
            _fbDb.ref("partner_merchants").off();
            _fbDb.ref("refunds").off();
            _fbDb.ref("settings/appAvailability").off();
            _fbDb.ref("settings/bgMartPromoBanner").off();
          }
          if (activityIntervalId) clearInterval(activityIntervalId);
          if (visibilityHandler) document.removeEventListener("visibilitychange", visibilityHandler);
          if (unsubMarketPricing && typeof unsubMarketPricing.off === "function") unsubMarketPricing.off();
        };
      }, []);

      const addOrder = useCallback(async (order) => {
        setSyncError(null);
        try {
          if (!_fbDb) throw new Error("RTDB not initialized");
          const uid = _fbAuth.currentUser?.uid || null;
          const savedOrder = {
            ...order,
            uid,
            userId: uid,
            userEmail: _fbAuth.currentUser?.email || null,
            status: order?.status || "pending",
            createdAt: order?.createdAt || Date.now(),
          };
          const orderRef = await _fbDb.ref("orders").push(savedOrder);
          const orderId = orderRef?.key;

          return orderId;

        } catch (err) {
          console.error("RTDB write failed:", err.code, err.message);
          setSyncError(err.code || err.message || "sync-failed");
          throw err;
        }
      }, []);

      const getFriendlyError = (code) => {
        const map = {
          'auth/user-not-found':     'No account found with this email.',
          'auth/wrong-password':     'Mali ang password.',
          'auth/invalid-credential': 'Mali ang email o password.',
          'auth/email-already-in-use': 'Ginagamit na ang email na ito.',
          'auth/weak-password':      'Masyadong mahina ang password (min. 6 characters).',
          'auth/invalid-email':      'Invalid email address.',
          'auth/too-many-requests':  'Napakaraming pagtatangka. Subukan ulit mamaya.',
          'auth/popup-blocked':      'Nablock ang popup. Subukan ulit.',
        };
        return map[code] || 'May error. Subukan ulit.';
      };

      const handleGoogleLogin = async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await _fbAuth.signInWithPopup(provider);
        } catch (error) {
          if (
            error.code === 'auth/popup-blocked' ||
            error.code === 'auth/popup-closed-by-user' ||
            error.code === 'auth/cancelled-popup-request'
          ) {
            try {
              const provider = new firebase.auth.GoogleAuthProvider();
              await _fbAuth.signInWithRedirect(provider);
            } catch (err2) {
              alert("Error sa pag-login: " + err2.message);
            }
          } else {
            alert("Error sa pag-login: " + error.message);
          }
        }
      };

      const handleEmailSignIn = async () => {
        setAuthError("");
        setAuthLoading(true);
        try {
          await _fbAuth.signInWithEmailAndPassword(authEmail, authPassword);
        } catch (error) {
          setAuthError(getFriendlyError(error.code));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleEmailSignUp = async () => {
        setAuthError("");
        const signupName = authName.trim();
        const signupPhone = authPhone.trim();
        const signupAddr = authAddr.trim();
        if (!signupName || !signupPhone || !signupAddr) {
          setAuthError("Complete your name, mobile number, and address.");
          return;
        }
        if (authPassword !== authConfirm) {
          setAuthError("Passwords do not match.");
          return;
        }
        setAuthLoading(true);
        try {
          const cred = await _fbAuth.createUserWithEmailAndPassword(authEmail, authPassword);
          if (_fbDb && cred?.user?.uid) {
            await _fbDb.ref("users/" + cred.user.uid + "/profile").set({
              name: signupName,
              phone: signupPhone,
              addr: signupAddr,
              locationType: authLocationType,
              lat: null,
              lng: null,
              updatedAt: Date.now(),
            });
          }
        } catch (error) {
          setAuthError(getFriendlyError(error.code));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = async () => {
        await _fbAuth.signOut();
      };

      const handleEnablePush = async () => {
        if (!user) return;
        setPushBusy(true);
        setPushError("");
        try {
          await enablePushForUser(user, { requestPermission: true });
          setPushPermission(typeof Notification !== "undefined" ? Notification.permission : "default");
          if (typeof Notification !== "undefined" && Notification.permission !== "granted") {
            setPushError("Notifications are not allowed. Check your browser/site settings.");
          }
        } catch (err) {
          setPushError(err?.message || "Unable to enable push notifications.");
        } finally {
          setPushBusy(false);
        }
      };

      useEffect(() => {
        if (!user || typeof Notification === "undefined") return;
        const syncPushPermission = () => setPushPermission(Notification.permission);
        syncPushPermission();
        window.addEventListener("focus", syncPushPermission);
        document.addEventListener("visibilitychange", syncPushPermission);
        return () => {
          window.removeEventListener("focus", syncPushPermission);
          document.removeEventListener("visibilitychange", syncPushPermission);
        };
      }, [user]);

      if (loading) return <SplashScreen message="Ina-activate ang iyong app..." />;

      if (!isStandalone) {
        return <InstallGate />;
      }

      if (!user) {
        const inputStyle = {
          border:"1px solid #E5E7EB", borderRadius:12, padding:"14px 16px",
          fontSize:15, outline:"none", background:"#fff", width:"100%",
        };
        return (
          <>
            <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:20, padding:"20px 24px" }}>
              <div className="fade-up" style={{ textAlign:"center" }}>
                <img src="https://i.imgur.com/1W159zD.png" style={{ height:108, maxWidth:"72vw", objectFit:"contain", marginBottom:12 }} />
                <p style={{ color:"#666", fontSize:15, marginTop:4 }}>Market shopping made easy. Sign in to place an order.</p>
              </div>

              {authMode === "options" && (
                <div className="fade-up" style={{ width:"100%", maxWidth:360, display:"flex", flexDirection:"column", gap:12, animationDelay:".1s" }}>
                  <button onClick={handleGoogleLogin} style={{
                    background:"#fff", border:"1px solid #E5E7EB", padding:"14px 20px", borderRadius:100,
                    fontSize:15, fontWeight:700, color:"#333", display:"flex", alignItems:"center", justifyContent:"center", gap:12,
                    boxShadow:"0 4px 12px rgba(0,0,0,0.05)",
                  }}>
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style={{width:22, height:22}} />
                    Sign in with Google
                  </button>
                  <button onClick={() => { setAuthMode("email-signin"); setAuthError(""); }} style={{
                    background:"#166534", border:"none", padding:"14px 20px", borderRadius:100,
                    fontSize:15, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", gap:10,
                    boxShadow:"0 4px 16px rgba(22,101,52,0.3)",
                  }}>
                    <Ic n="envelope" style={{marginRight:8}} />Sign in with Email
                  </button>
                  <div style={{ textAlign:"center", fontSize:13, color:"#888", marginTop:4 }}>
                    No account yet?{" "}
                    <button onClick={() => { setAuthMode("email-signup"); setAuthError(""); }} style={{ color:"#166534", fontWeight:700, textDecoration:"underline", fontSize:13 }}>
                      Sign up
                    </button>
                  </div>
                </div>
              )}

              {(authMode === "email-signin" || authMode === "email-signup") && (
                <div className="fade-up" style={{ width:"100%", maxWidth:360, display:"flex", flexDirection:"column", gap:12 }}>
                  <h2 style={{ textAlign:"center", fontSize:20, fontWeight:800, color:"#166534", marginBottom:4 }}>
                    {authMode === "email-signup" ? "Create Account" : "Sign in"}
                  </h2>

                {authError && (
                  <div style={{ background:"#FEF2F2", border:"1px solid #FCA5A5", borderRadius:12, padding:"10px 14px", fontSize:13, color:"#B91C1C" }}>
                    {authError}
                  </div>
                )}

                <input type="email" placeholder="Email address" value={authEmail}
                  onChange={e => setAuthEmail(e.target.value)} style={inputStyle} />
                {authMode === "email-signup" && (
                  <>
                    <input type="text" placeholder="Buong pangalan" value={authName}
                      onChange={e => setAuthName(e.target.value)} style={inputStyle} />
                    <input type="tel" placeholder="Mobile Number (09XXXXXXXXX)" value={authPhone}
                      onChange={e => setAuthPhone(e.target.value)} style={inputStyle} />
                    <textarea placeholder="Address (Bahay, Barangay, Lungsod)" value={authAddr}
                      onChange={e => setAuthAddr(e.target.value)}
                      style={{ ...inputStyle, minHeight:82, resize:"vertical", fontFamily:"inherit" }} />
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                      {["Mainland", "Island"].map(loc => (
                        <button key={loc} type="button" onClick={() => setAuthLocationType(loc)} style={{
                          border: authLocationType === loc ? "2px solid #166534" : "1px solid #D1D5DB",
                          background: authLocationType === loc ? "#F0FDF4" : "#fff",
                          borderRadius:10, padding:"10px 12px", fontSize:13, fontWeight:700,
                          color: authLocationType === loc ? "#166534" : "#4B5563",
                        }}>
                          {loc}
                        </button>
                      ))}
                    </div>
                  </>
                )}
                <input type="password" placeholder="Password" value={authPassword}
                  onChange={e => setAuthPassword(e.target.value)} style={inputStyle} />
                {authMode === "email-signup" && (
                  <input type="password" placeholder="Ulitin ang Password" value={authConfirm}
                    onChange={e => setAuthConfirm(e.target.value)} style={inputStyle} />
                )}

                <button
                  onClick={authMode === "email-signup" ? handleEmailSignUp : handleEmailSignIn}
                  disabled={authLoading}
                  style={{
                    background:"#166534", border:"none", padding:"14px", borderRadius:100,
                    fontSize:15, fontWeight:700, color:"#fff", opacity: authLoading ? 0.7 : 1, marginTop:4,
                  }}
                >
                  {authLoading ? "Loading..." : authMode === "email-signup" ? "Create Account" : "Sign in"}
                </button>

                <div style={{ textAlign:"center", fontSize:13, color:"#888" }}>
                  {authMode === "email-signup"
                    ? <>Already have an account? <button onClick={() => { setAuthMode("email-signin"); setAuthError(""); }} style={{ color:"#166534", fontWeight:700, textDecoration:"underline", fontSize:13 }}>Sign in</button></>
                    : <>No account yet? <button onClick={() => { setAuthMode("email-signup"); setAuthError(""); }} style={{ color:"#166534", fontWeight:700, textDecoration:"underline", fontSize:13 }}>Sign up</button></>
                  }
                </div>

                  <button onClick={() => { setAuthMode("options"); setAuthError(""); }} style={{ color:"#999", fontSize:13, textAlign:"center", marginTop:2 }}>
                    <Ic n="arrow-left" style={{marginRight:6}} />Bumalik sa ibang options
                  </button>
                </div>
              )}
            </div>
            <LegalModal docKey={openLegalDoc} onClose={() => setOpenLegalDoc(null)} />
          </>
        );
      }

      if (pushPermission !== "granted") {
        return (
          <>
            <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px 16px" }}>
              <div className="fade-up" style={{
                width:"100%", maxWidth:400, background:"#fff", border:"1px solid #D1FAE5", borderRadius:18,
                boxShadow:"0 12px 30px rgba(0,0,0,.12)", padding:"20px 16px", display:"flex", flexDirection:"column", gap:12,
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, color:"#166534", fontWeight:800, fontSize:18 }}>
                  <Ic n="bell" />
                  Enable Notifications
                </div>
                <div style={{ fontSize:14, color:"#374151", lineHeight:1.5 }}>
                  Kailangan naka-enable ang notifications bago magamit ang app para makatanggap ka ng real-time order updates.
                </div>
                {pushPermission === "denied" && (
                  <div style={{ fontSize:12, color:"#B91C1C", background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:10, padding:"10px 12px" }}>
                    Notifications are blocked. I-enable ito sa browser/site settings, tapos pindutin ulit ang button sa ibaba.
                  </div>
                )}
                {pushError && (
                  <div style={{ fontSize:12, color:"#B91C1C" }}>
                    {pushError}
                  </div>
                )}
                <button onClick={handleEnablePush} disabled={pushBusy} style={{
                  background: pushBusy ? "#9CA3AF" : "#166534", color:"#fff", borderRadius:12, padding:"12px 14px",
                  fontSize:14, fontWeight:700, border:"none",
                }}>
                  {pushBusy ? "Ina-activate..." : "Enable Notifications"}
                </button>
                <button onClick={handleLogout} style={{
                  background:"#fff", color:"#4B5563", borderRadius:12, padding:"10px 12px",
                  fontSize:13, fontWeight:700, border:"1px solid #D1D5DB",
                }}>
                  Sign out
                </button>
              </div>
            </div>
            <LegalModal docKey={openLegalDoc} onClose={() => setOpenLegalDoc(null)} />
          </>
        );
      }

      return (
        <>
          <UserApp products={products} orders={orders} refunds={refunds} onOrder={addOrder} user={user} onLogout={handleLogout} gcashSettings={gcashSettings} bgMartPromoBannerUrl={bgMartPromoBannerUrl} appAvailability={appAvailability} onOpenLegal={setOpenLegalDoc} />
          {syncError && (
            <div className="pop" style={{
              position:"fixed", top:"calc(env(safe-area-inset-top,0px) + 16px)", left:20, right:20, zIndex:9999,
              background:"#EF4444", color:"#fff", padding:"12px 16px", borderRadius:14,
              fontSize:13, fontWeight:700, boxShadow:"0 4px 20px rgba(0,0,0,.25)",
              display:"flex", alignItems:"center", gap:8,
            }}>
              <Ic n="triangle-exclamation" />
              <div>
                <div>Failed to sync order with admin</div>
                <div style={{ fontSize:11, fontWeight:400, opacity:0.85, marginTop:2 }}>Error: {syncError}</div>
              </div>
              <button onClick={() => setSyncError(null)} style={{ color:"#fff", opacity:.7, fontSize:16, marginLeft:8 }}><Ic n="xmark" /></button>
            </div>
          )}
          <LegalModal docKey={openLegalDoc} onClose={() => setOpenLegalDoc(null)} />
        </>
      );
    }

    /* ══════════════════ BATCH HELPERS ══════════════════ */
    function getDeliveryBatch() {
      const now = new Date();
      const phNow = new Date(now.getTime() + 8 * 60 * 60 * 1000); // UTC+8
      const h = phNow.getUTCHours(), m = phNow.getUTCMinutes(), s = phNow.getUTCSeconds();
      const totalSecs = h * 3600 + m * 60 + s;
      const pad = n => String(n).padStart(2, "0");
      const fmtDate = d => `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
      const todayStr    = fmtDate(phNow);
      const tomorrowStr = fmtDate(new Date(phNow.getTime() + 24 * 60 * 60 * 1000));
      const AM_CUTOFF = 10 * 3600;  // 10:00 AM
      const PM_CUTOFF = 15 * 3600;  // 3:00 PM
      if (totalSecs < AM_CUTOFF) {
        return { batch:"AM", date:todayStr, cutoffLabel:"10:00 AM", deliveryLabel:"11:00 AM", timeLabel:"11:00 AM Ngayon", secsToDeadline: AM_CUTOFF - totalSecs };
      } else if (totalSecs < PM_CUTOFF) {
        return { batch:"PM", date:todayStr, cutoffLabel:"3:00 PM",  deliveryLabel:"4:00 PM",  timeLabel:"4:00 PM Ngayon",  secsToDeadline: PM_CUTOFF - totalSecs };
      } else {
        return { batch:"AM", date:tomorrowStr, cutoffLabel:"10:00 AM", deliveryLabel:"11:00 AM", timeLabel:"11:00 AM Tomorrow", secsToDeadline: (24 * 3600 - totalSecs) + AM_CUTOFF };
      }
    }

      useEffect(() => {

        const ref = _fbDb.ref("user_notifications/" + user.uid).orderByChild("createdAt").limitToLast(50);
        const handler = ref.on("value", snap => {
          const arr = [];
          snap.forEach(child => {
            const id = child.key;
            if (deletedNotifIds[id]) return;
            arr.push({ id, ...child.val() });
          });
          arr.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
          setNotifications(arr);
        });
        return () => ref.off("value", handler);
      }, [deletedNotifIds, user?.uid]);

      const deleteNotification = useCallback((notifId) => {
        if (!notifId) return;
        setDeletedNotifIds(prev => {
          const next = { ...prev, [notifId]: Date.now() };
          try {
            if (user?.uid) localStorage.setItem(getDeletedNotifStorageKey(user.uid), JSON.stringify(next));

          return next;

        setNotifications(prev => prev.filter(n => n.id !== notifId));
        if (user?.uid && _fbDb) {
          _fbDb.ref("user_notifications/" + user.uid + "/" + notifId).remove().catch(err => {
            console.warn("Unable to delete notification in backend:", err?.message || err);

      }, [getDeletedNotifStorageKey, user?.uid]);

      const cartCount = Object.values(cart).reduce((s,v) => s+v, 0);
      const cartItems = Object.entries(cart)
        .filter(([,q]) => q > 0)
        .map(([id,qty]) => {
          const prod = products.find(p => p.id === id || p.id === +id);
          const weightUnit = prod?.unit === "kg" ? (cartWeightUnit[id] || 1) : 1;
          return { ...prod, qty, weightUnit };
        })
        .filter(i => i.name);

      const myOrders         = orders;
      const customEstTotal   = customItems.reduce((s,i) => s + (i.estPrice || 0), 0);
      const subtotal         = cartItems.reduce((s,i) => s + i.price * i.weightUnit * i.qty, 0);
      const itemsTotal       = subtotal + customEstTotal;
      const hasPinnedLocation = customerLat !== null && customerLng !== null &&
        Number.isFinite(Number(customerLat)) && Number.isFinite(Number(customerLng));
      const distanceKm = hasPinnedLocation
        ? haversineKm(
            BINANGONAN_PUBLIC_MARKET.lat,
            BINANGONAN_PUBLIC_MARKET.lng,
            Number(customerLat),
            Number(customerLng)
          )
        : null;
      const deliveryFee      = computeDeliveryFee(distanceKm, locationType === "Island" ? ISLAND_DELIVERY_FEE : BASE_DELIVERY_FEE);
      const deliveryMetaLabel = hasPinnedLocation
        ? `${distanceKm.toFixed(2)} km from ${BINANGONAN_PUBLIC_MARKET.label}`
        : `Base fee only (${fmt(locationType === "Island" ? ISLAND_DELIVERY_FEE : BASE_DELIVERY_FEE)}) until location is pinned`;
      const serviceFee       = 10 + Math.floor(itemsTotal / 1000) * 5;
      const smallOrderFee    = itemsTotal < 100 ? Math.round(itemsTotal * 0.05) : 0;
      const isFirstTimeUser  = myOrders.length === 0;
      const FIRST_ORDER_FREE_SHIPPING_MIN_ORDER = 500;
      const firstOrderFreeShippingGap = Math.max(0, FIRST_ORDER_FREE_SHIPPING_MIN_ORDER - itemsTotal);
      const isEligibleFirstOrderFreeShipping = isFirstTimeUser && itemsTotal >= FIRST_ORDER_FREE_SHIPPING_MIN_ORDER;
      const freeShipDiscount = isEligibleFirstOrderFreeShipping ? deliveryFee : 0;

      const computeVoucherDiscount = useCallback((voucher) => {
        if (!voucher || voucher.active === false) return 0;
        if (voucher.minOrder > 0 && itemsTotal < voucher.minOrder) return 0;
        if (voucher.expiresAt && Date.now() > voucher.expiresAt) return 0;
        if (voucher.type === "percent") return Math.round(itemsTotal * ((voucher.value || 0) / 100));
        if (voucher.type === "free_shipping") return deliveryFee;
        return Math.max(0, Number(voucher.value || 0));
      }, [deliveryFee, itemsTotal]);
      const getVoucherAvailability = useCallback((voucher) => {
        if (!voucher || voucher.active === false) return { canUse:false, reason:"Inactive" };
        if (voucher.expiresAt && Date.now() > voucher.expiresAt) return { canUse:false, reason:"Expired" };
        if (voucher.minOrder > 0 && itemsTotal < voucher.minOrder) {
          return { canUse:false, reason:`Need ${fmt(voucher.minOrder)} minimum order` };
        }
        const discount = computeVoucherDiscount(voucher);
        if (discount <= 0) return { canUse:false, reason:"Not applicable to your cart" };
        return { canUse:true, reason:`Pwede gamitin ngayon • save ${fmt(discount)}` };
      }, [computeVoucherDiscount, fmt, itemsTotal]);
      const describeVoucher = (voucher) => {
        if (!voucher) return "";
        if (voucher.type === "percent") return `${voucher.value || 0}% off`;
        if (voucher.type === "free_shipping") return "Free shipping";
        return `${fmt(voucher.value || 0)} off`;

      const totalItemCount = cartCount + customItems.length;

      const removeCustom = id => setCustomItems(prev => prev.filter(i => i.id !== id));

      const partnerStores = useMemo(() => {
        const map = {};
        products.forEach((p) => {
          if (p.source !== "partner" || !p.merchantId) return;

              merchantId: p.merchantId,
              storeName: p.storeName || "Partner Merchant",

              storeOpen: p.storeOpen !== false,
              storeDescription: p.storeDescription || "",
              storeCategory: p.category || p.storeCategory || "sari",
              merchantFeatured: p.merchantFeatured === true,

      const featuredMerchantId = useMemo(() => {

      const catalogProducts = useMemo(() => {

        const q = searchQ.trim().toLowerCase();
        const list = catalogProducts.filter((p) => {
          const byCat = activeCat === "all" ? true : p.cat === activeCat;
          if (!byCat) return false;
          if (!q) return true;
          return (
            String(p.name || "").toLowerCase().includes(q) ||
            String(p.storeName || "").toLowerCase().includes(q)

        if (activeService === "bgmart" || !featuredMerchantId) return list;
        const featuredProducts = list.filter((p) => p.merchantId === featuredMerchantId);
        const hasBuySignal = featuredProducts.some((p) => getProductBuyScore(p) > 0);
        if (!hasBuySignal) return list;

        return [...list].sort((a, b) => {
          const aFeatured = a.merchantId === featuredMerchantId;
          const bFeatured = b.merchantId === featuredMerchantId;
          if (aFeatured !== bFeatured) return aFeatured ? -1 : 1;
          if (aFeatured && bFeatured) {
            const scoreDiff = getProductBuyScore(b) - getProductBuyScore(a);
            if (scoreDiff !== 0) return scoreDiff;
          }
          return 0;
        });
      }, [activeCat, activeService, catalogProducts, featuredMerchantId, searchQ]);
      useEffect(() => {
        if (activeShopCategories.some((cat) => cat.id === activeCat)) return;

      const featuredStores = partnerStores.filter((store) => store.merchantFeatured);

          .filter(Boolean)

            const id = name.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");

            customMap[id] = { id, label: name, icon: "tag", color: "#64748B", isCustom: true };
          });
        return [...CATEGORIES, ...Object.values(customMap)];
      }, [activeStoreProfile?.storeCustomCategories]);
      const storeCategoryMap = useMemo(() => Object.fromEntries(storeListingCategories.map((cat) => [cat.id, cat])), [storeListingCategories]);
      const storeListings = useMemo(() => {
        if (!activeStoreProfile?.merchantId) return [];
        return products

          counts[p.cat] = (counts[p.cat] || 0) + 1;

          tabs.push({ ...cat, count });

            locationType,

          setCart({});

          setCustomItems([]);
          setVoucherCode("");

          setVoucherMsg("");
          setShowCart(false);
          if (paymentMethod === "QRPH" && newOrderId) {

                      ? { width:3, height:32, borderRadius:3, background:"#22C55E" }

                            backgroundSize:"100% 200%",

    /* ══════════════════ QR PH PAYMENT MODAL ══════════════════ */
    function QrPhModal({ orderId, total, existingQrImageUrl, onClose, onPaid }) {
      const [qrImageUrl, setQrImageUrl] = useState(existingQrImageUrl || null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");

      const fetchQrCode = async () => {
        setLoading(true);
        setError("");
        try {
          const res = await fetch(
            "https://us-central1-bayango-315c6.cloudfunctions.net/generatePaymongoQrphCode",
            { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ orderId }) }
          );
          const json = await res.json().catch(() => ({}));
          if (!res.ok || !json.qrImageUrl) {
            setError("Hindi ma-generate ang QR code. Subukan ulit.");
          } else {
            setQrImageUrl(json.qrImageUrl);
          }
        } catch {
          setError("May error sa pagkuha ng QR code. Subukan ulit.");
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        if (existingQrImageUrl) return;
        fetchQrCode();
      }, [existingQrImageUrl, orderId]);

      // Real-time listener — close modal automatically when payment is confirmed
      useEffect(() => {
        if (!orderId) return;
        const ref = _fbDb.ref(`orders/${orderId}`);
        const onSnap = (snap) => {
          const data = snap.val() || {};
          if (data.gcashPaymentConfirmed || data.paymentStatus === "paid") {
            onPaid?.();
          }
        };
        ref.on("value", onSnap);
        return () => ref.off("value", onSnap);
      }, [orderId]);

      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.65)", zIndex:13000, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>

              </div>
              <button onClick={onClose} style={{ width:32, height:32, borderRadius:"50%", background:"#F3F4F6", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#6B7280" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {/* Amount */}
            {!!total && (
              <div style={{ background:"#FEF3C7", borderRadius:12, padding:"10px 14px", marginBottom:16, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ fontSize:11, color:"#92400E", fontWeight:600 }}>Halaga ng Bayad</div>

    /* ══════════════════ NOTIFICATIONS PAGE ══════════════════ */
    function NotificationsPage({ notifications, onDelete, onMarkSeen }) {
      useEffect(() => { onMarkSeen(); }, []);
      const [openNotifId, setOpenNotifId] = useState(null);

      const NOTIF_ICON = {
        order_status: "box",
        order_cancelled: "ban",
        assigned_order: "user-check",
        new_order: "basket-shopping",
        gcash_payment_reminder: "money-bill",
        gcash_confirmed: "circle-check",
        order_bought_with_proof: "receipt",
        prices_updated: "tags",
        batch_reminder: "clock",
        batch_reminder_am_open: "sun",
        batch_reminder_am_warning: "clock",
        batch_reminder_pm_open: "cloud-sun",
        batch_reminder_pm_warning: "clock",
        batch_reminder_preorder: "moon",
        broadcast: "bullhorn",
        support_message_admin: "headset",
        support_ticket_new: "ticket",
        support_message_user: "comment",
        refund: "money-bill-transfer",
      };

      const NOTIF_COLOR = {
        order_status: "#3B82F6",
        order_cancelled: "#EF4444",
        assigned_order: "#22C55E",
        new_order: "#3B82F6",
        gcash_payment_reminder: "#F59E0B",
        gcash_confirmed: "#22C55E",
        order_bought_with_proof: "#166534",
        prices_updated: "#F97316",
        batch_reminder: "#F59E0B",
        batch_reminder_am_open: "#F59E0B",
        batch_reminder_am_warning: "#EF4444",
        batch_reminder_pm_open: "#F59E0B",
        batch_reminder_pm_warning: "#EF4444",
        batch_reminder_preorder: "#6366F1",
        broadcast: "#A855F7",
        refund: "#22C55E",
        support_message_admin: "#14B8A6",
        support_ticket_new: "#14B8A6",
        support_message_user: "#14B8A6",
      };

      const timeAgo = (ts) => {
        if (!ts) return "";
        const diff = Date.now() - ts;
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return "Ngayon lang";
        if (mins < 60) return mins + "m ago";
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + "h ago";
        const days = Math.floor(hrs / 24);
        if (days < 7) return days + "d ago";
        return new Date(ts).toLocaleDateString("en-PH", { month:"short", day:"numeric" });
      };

      function SwipeNotifCard({ notif, index }) {
        const MAX_SWIPE = 84;
        const SWIPE_OPEN_THRESHOLD = 42;
        const [dragX, setDragX] = useState(0);
        const [isDragging, setIsDragging] = useState(false);
        const dragRef = React.useRef({ startX: 0, startY: 0, startOffset: 0, lockedAxis: null });
        const isOpen = openNotifId === notif.id;

        useEffect(() => {
          if (!isDragging) {
            setDragX(isOpen ? MAX_SWIPE : 0);
          }
        }, [isOpen, isDragging]);

        const icon = NOTIF_ICON[notif.type] || "bell";
        const color = NOTIF_COLOR[notif.type] || "#166534";

        const onTouchStart = (e) => {
          const t = e.touches?.[0];
          if (!t) return;
          dragRef.current = {
            startX: t.clientX,
            startY: t.clientY,
            startOffset: isOpen ? MAX_SWIPE : 0,
            lockedAxis: null,
          };
          setIsDragging(true);
        };

        const onTouchMove = (e) => {
          if (!isDragging) return;
          const t = e.touches?.[0];
          if (!t) return;
          const dx = t.clientX - dragRef.current.startX;
          const dy = t.clientY - dragRef.current.startY;

          if (!dragRef.current.lockedAxis) {
            if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
            dragRef.current.lockedAxis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
          }
          if (dragRef.current.lockedAxis !== "x") return;

          e.preventDefault();
          const next = Math.max(0, Math.min(MAX_SWIPE, dragRef.current.startOffset - dx));
          setDragX(next);
        };

        const finishSwipe = () => {
          if (!isDragging) return;
          setIsDragging(false);
          const shouldOpen = dragX >= SWIPE_OPEN_THRESHOLD;
          setOpenNotifId(shouldOpen ? notif.id : null);
          setDragX(shouldOpen ? MAX_SWIPE : 0);
        };

        return (
          <div key={notif.id} className="fade-up" style={{
            position:"relative",
            marginBottom:8,
            borderRadius:14,
            overflow:"hidden",
            animationDelay: (index * 0.04) + "s",
          }}>
            <div style={{
              position:"absolute",
              inset:0,
              display:"flex",
              justifyContent:"flex-end",
              alignItems:"stretch",
              background:"#EF4444",
            }}>
              <button
                onClick={() => onDelete?.(notif.id)}
                aria-label="Delete notification"
                title="Delete"
                style={{
                  width:MAX_SWIPE,
                  border:"none",
                  background:"transparent",
                  color:"#fff",
                  display:"flex",
                  alignItems:"center",
                  justifyContent:"center",
                  gap:6,
                  fontSize:11,
                  fontWeight:700,
                  cursor:"pointer",
                }}
              >
                <Ic n="trash" size={14} /> Delete
              </button>
            </div>

            <div
              onTouchStart={onTouchStart}
              onTouchMove={onTouchMove}
              onTouchEnd={finishSwipe}
              onTouchCancel={finishSwipe}
              style={{
                display:"flex", gap:12, padding:"14px 12px",
                background:"#fff",
                boxShadow:"0 1px 4px rgba(0,0,0,.05)",
                border:"1px solid #F0F0F0",
                transform:`translateX(-${dragX}px)`,
                transition: isDragging ? "none" : "transform .2s ease",
                touchAction:"pan-y",
              }}
            >
              <div style={{
                width:42, height:42, borderRadius:12, flexShrink:0,
                display:"flex", alignItems:"center", justifyContent:"center",
                background: color + "18",
              }}>
                <Ic n={icon} size={18} style={{ color }} />
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:"#111", marginBottom:2 }}>{notif.title || "BayanGo"}</div>
                </div>
                <div style={{ fontSize:12, color:"#666", lineHeight:"1.4" }}>{notif.body}</div>
                <div style={{ fontSize:10, color:"#bbb", marginTop:4, fontWeight:600 }}>{timeAgo(notif.createdAt)}</div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ padding:"16px 16px 20px" }}>
          <h2 style={{ fontSize:20, fontWeight:800, color:"#111", marginBottom:4 }}>
            <Ic n="bell" style={{ marginRight:8, color:"#166534" }} />Notifications
          </h2>
