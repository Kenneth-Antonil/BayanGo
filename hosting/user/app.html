    /* ══════════════════ MINI MAP THUMBNAIL ══════════════════ */
    function MiniMapThumbnail({ lat, lng, height = 150 }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        if (lat == null || lng == null) return;
        if (typeof L === "undefined" || !L?.map) return;

        const map = L.map(mapRef.current, {
          center: [lat, lng],
          zoom: 16,
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          doubleClickZoom: false,
          scrollWheelZoom: false,
          touchZoom: false,
          boxZoom: false,
          keyboard: false,
          tap: false,
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
        const pinIcon = L.divIcon({
          html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#166534,#22C55E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;box-shadow:0 4px 14px rgba(22,101,52,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div><div style="width:3px;height:8px;background:#166534;margin-top:-2px;border-radius:0 0 2px 2px;"></div></div>',
          className: '',
          iconSize: [32, 42],
          iconAnchor: [16, 42],
        });
        L.marker([lat, lng], { icon: pinIcon }).addTo(map);
        mapInstanceRef.current = map;
        setTimeout(() => map.invalidateSize(), 60);
        setTimeout(() => map.invalidateSize(), 260);

        return () => {
          map.remove();
          mapInstanceRef.current = null;
        };
      }, [lat, lng]);

      return (
        <div
          ref={mapRef}
          style={{
            width:"100%",
            height,
            background:"#E5E7EB",
            pointerEvents:"none",
            position:"relative",
            zIndex:0,
            isolation:"isolate",
            overflow:"hidden",
            contain:"layout paint",
          }}
        />
      );
    }

    /* ══════════════════ LOCATION PICKER ══════════════════ */
    function LocationPicker({ lat, lng, onPick, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markerRef = useRef(null);
      const [detecting, setDetecting] = useState(false);

      const BINANG_CENTER = [14.4584, 121.1971];
      const initialPos = (lat && lng) ? [lat, lng] : BINANG_CENTER;

      const pinIcon = L.divIcon({
        html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#166534,#22C55E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 4px 16px rgba(22,101,52,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div><div style="width:3px;height:10px;background:#166534;margin-top:-2px;border-radius:0 0 2px 2px;"></div></div>',
        className: '',
        iconSize: [36, 48],
        iconAnchor: [18, 48],
      });

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;

        const map = L.map(mapRef.current, {
          center: initialPos,
          zoom: (lat && lng) ? 17 : 15,
          zoomControl: false,
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);

        const marker = L.marker(initialPos, { icon: pinIcon, draggable: true }).addTo(map);
        marker.bindPopup("I-drag ako sa tamang lokasyon!").openPopup();
        markerRef.current = marker;
        mapInstanceRef.current = map;

        // Tap on map to move pin
        map.on("click", (e) => {
          marker.setLatLng(e.latlng);
        });

        setTimeout(() => map.invalidateSize(), 200);

        return () => {
          map.remove();
          mapInstanceRef.current = null;
          markerRef.current = null;
        };
      }, []);

      const detectLocation = () => {
        if (!navigator.geolocation) return;
        setDetecting(true);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const latlng = [pos.coords.latitude, pos.coords.longitude];
            if (markerRef.current && mapInstanceRef.current) {
              markerRef.current.setLatLng(latlng);
              mapInstanceRef.current.setView(latlng, 17);
            }
            setDetecting(false);
          },
          (err) => {
            alert("Hindi ma-detect ang location: " + err.message);
            setDetecting(false);
          },
          { enableHighAccuracy: true, timeout: 15000 }
        );
      };

      const confirmPin = () => {
        if (markerRef.current) {
          const pos = markerRef.current.getLatLng();
          onPick(pos.lat, pos.lng);
        }
        onClose();
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,.7)", backdropFilter:"blur(6px)", display:"flex", flexDirection:"column" }}>
          <div style={{ flex:1, display:"flex", flexDirection:"column", maxWidth:480, width:"100%", margin:"0 auto" }}>
            {/* Header */}
            <div style={{
              background:"linear-gradient(135deg,#166534,#22C55E)",
              padding:"calc(env(safe-area-inset-top,0px) + 14px) 20px 14px",
              color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div>
                <div style={{ fontSize:16, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
                  <Ic n="map-pin" /> I-pin ang Lokasyon Mo
                </div>
                <div style={{ fontSize:12, opacity:.8, marginTop:3 }}>I-drag ang pin o i-tap ang mapa</div>
              </div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {/* Map */}
            <div ref={mapRef} style={{ flex:1, minHeight:300, background:"#E5E7EB" }} />

            {/* Bottom controls */}
            <div style={{
              background:"#fff", padding:"16px 20px", paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 16px)",
              display:"flex", flexDirection:"column", gap:10,
            }}>
              <button onClick={detectLocation} disabled={detecting} style={{
                width:"100%", padding:"13px", borderRadius:12,
                background:"#F0FDF4", border:"2px solid #BBF7D0",
                color:"#166534", fontSize:14, fontWeight:700,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
              }}>
                {detecting
                  ? <><Ic n="spinner" className="spin" /> Finding your location...</>
                  : <><Ic n="crosshairs" /> Gamitin ang GPS Ko</>
                }
              </button>
              <button onClick={confirmPin} style={{
                width:"100%", padding:"15px", borderRadius:14,
                background:"linear-gradient(135deg,#166534,#22C55E)", color:"#fff",
                fontSize:15, fontWeight:800,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                boxShadow:"0 4px 16px rgba(22,101,52,.35)",
              }}>
                <Ic n="circle-check" /> I-confirm ang Location
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ RIDER MAP MODAL ══════════════════ */
    function RiderMapModal({ order, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const riderMarkerRef = useRef(null);
      const routeLineRef = useRef(null);
      const [riderLoc, setRiderLoc] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [mapError, setMapError] = useState("");
      const ST_COLOR = ORDER_STATUS_COLORS;

      // Binangonan center as default
      const BINANG_CENTER = [14.4584, 121.1971];
      const toNum = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      };

      useEffect(() => {
        if (!order?.riderId) return;
        const locRef = _fbDb.ref("rider_locations/" + order.riderId);
        locRef.on("value", snap => {
          const val = snap.val();
          if (val && val.lat && val.lng) {
            setRiderLoc(val);
            setLastUpdate(val.updatedAt);
          }
        });
        return () => locRef.off();
      }, [order?.riderId]);

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        if (typeof L === "undefined" || !L?.map) {
          setMapError("Map is currently unavailable. Please try again later.");
          return;
        }

        const map = L.map(mapRef.current, {
          center: BINANG_CENTER,
          zoom: 15,
          zoomControl: false,
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);
        mapInstanceRef.current = map;

        // Add customer pin if available
        const custLat = toNum(order?.customer?.lat);
        const custLng = toNum(order?.customer?.lng);
        if (custLat != null && custLng != null) {
          const custIcon = L.divIcon({
            html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#166534,#22C55E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 4px 16px rgba(22,101,52,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div><div style="width:3px;height:10px;background:#166534;margin-top:-2px;border-radius:0 0 2px 2px;"></div></div>',
            className: '',
            iconSize: [36, 48],
            iconAnchor: [18, 48],
          });
          L.marker([custLat, custLng], { icon: custIcon }).addTo(map)
            .bindPopup(`<b>${order.customer?.name || "Customer"}</b><br/>${order.customer?.address || ""}`);
          map.setView([custLat, custLng], 16);
        }

        setTimeout(() => map.invalidateSize(), 50);
        setTimeout(() => map.invalidateSize(), 250);
        setTimeout(() => map.invalidateSize(), 600);

        return () => {
          map.remove();
          mapInstanceRef.current = null;
          riderMarkerRef.current = null;
          routeLineRef.current = null;
        };
      }, []);

      // Update rider marker when location changes
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map || !riderLoc) return;

        const riderLat = toNum(riderLoc?.lat);
        const riderLng = toNum(riderLoc?.lng);
        if (riderLat == null || riderLng == null) return;
        const pos = [riderLat, riderLng];
        const custLat = toNum(order?.customer?.lat);
        const custLng = toNum(order?.customer?.lng);
        const custPos = custLat != null && custLng != null ? [custLat, custLng] : null;

        if (!riderMarkerRef.current) {
          const riderIcon = L.divIcon({
            html: '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1D4ED8,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(29,78,216,.5);border:3px solid #fff;"><i class="fa-solid fa-motorcycle"></i></div>',
            className: '',
            iconSize: [42, 42],
            iconAnchor: [21, 21],
          });
          riderMarkerRef.current = L.marker(pos, { icon: riderIcon }).addTo(map);
          riderMarkerRef.current.bindPopup(
            `<b>${order.riderName || "Rider"}</b><br/>Papunta sa'yo!`
          );

          // Fit bounds to show both rider and customer pin
          if (custPos) {
            map.fitBounds([pos, custPos], { padding: [50, 50] });
          } else {
            map.setView(pos, 16);
          }
        } else {
          riderMarkerRef.current.setLatLng(pos);
        }

        if (custPos) {
          if (!routeLineRef.current) {
            routeLineRef.current = L.polyline([pos, custPos], {
              color: "#2563EB",
              weight: 5,
              opacity: 0.85,
              lineCap: "round",
            }).addTo(map);
          } else {
            routeLineRef.current.setLatLngs([pos, custPos]);
          }
        }
      }, [riderLoc]);

      const secAgo = lastUpdate ? Math.round((Date.now() - lastUpdate) / 1000) : null;

      return (
        <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.7)", backdropFilter:"blur(6px)", display:"flex", flexDirection:"column" }}
          onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{
            flex:1, display:"flex", flexDirection:"column", maxWidth:480, width:"100%", margin:"0 auto",
          }}>
            {/* Header */}
            <div style={{
              background:"linear-gradient(135deg,#1D4ED8,#3B82F6)",
              padding:"calc(env(safe-area-inset-top,0px) + 14px) 20px 14px",
              color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div>
                <div style={{ fontSize:16, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
                  <Ic n="location-dot" /> Where is the Rider?
                </div>
                {order.riderName && (
                  <div style={{ fontSize:12, opacity:.8, marginTop:3, display:"flex", alignItems:"center", gap:6 }}>
                    {order.riderPhoto && <img src={order.riderPhoto} style={{ width:18, height:18, borderRadius:"50%", objectFit:"cover" }} />}
                    <Ic n="motorcycle" style={{marginRight:2}} />{order.riderName}
                  </div>
                )}
              </div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {/* Status bar */}
            <div style={{
              background:"#fff", padding:"10px 20px", borderBottom:"1px solid #E5E7EB",
              display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              {riderLoc ? (
                <>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:"#22C55E", boxShadow:"0 0 8px #22C55E" }} />
                    <span style={{ fontSize:13, fontWeight:700, color:"#166534" }}>Live Tracking</span>
                  </div>
                  <span style={{ fontSize:11, color:"#888" }}>
                    {secAgo != null && secAgo < 60
                      ? `${secAgo}s ago`
                      : secAgo != null
                        ? `${Math.round(secAgo/60)}m ago`
                        : ""}
                  </span>
                </>
              ) : (
                <>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <Ic n="satellite-dish" className="pulse" style={{ color:"#F59E0B" }} />
                    <span style={{ fontSize:13, fontWeight:600, color:"#92400E" }}>
                      {order.riderId ? "Hinihintay ang GPS ng rider..." : "Wala pang rider na nag-accept"}
                    </span>
                  </div>
                </>
              )}
            </div>
            <div style={{
              background:"#EFF6FF",
              borderBottom:"1px solid #DBEAFE",
              color:"#1D4ED8",
              fontSize:12,
              fontWeight:700,
              padding:"8px 20px",
              display:"flex",
              alignItems:"center",
              gap:8,
            }}>
              <Ic n="route" />
              Blue line = diretsong daan ng rider papunta sa'yo
            </div>

            {/* Map */}
            <div ref={mapRef} style={{ flex:1, minHeight:300, background:"#E5E7EB", position:"relative" }}>
              {mapError && (
                <div style={{
                  position:"absolute", inset:0, background:"#F8FAFC", zIndex:10,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  textAlign:"center", padding:"20px 24px", color:"#64748B", fontSize:13, fontWeight:600
                }}>
                  <div>
                    <div style={{ fontSize:20, marginBottom:6 }}><Ic n="triangle-exclamation" /></div>
                    {mapError}
                  </div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{
              background:"#fff", padding:"14px 20px", paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 14px)",
              borderTop:"1px solid #E5E7EB",
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{
                  width:40, height:40, borderRadius:12, flexShrink:0,
                  background: ST_COLOR[order.status]?.bg || "#FEF3C7",
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <Ic n={ST_COLOR[order.status]?.icon || "cart-shopping"} style={{ color: ST_COLOR[order.status]?.color || "#92400E" }} />
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:"#111" }}>
                    {getOrderStatuses(order).find(s => s.key === order.status)?.desc}
                  </div>
                  <div style={{ fontSize:12, color:"#888", marginTop:1 }}>{order.customer?.address}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    class OrdersErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      render() {
        if (this.state.error) return (
          <div style={{ padding:24, margin:20, background:"#FEF2F2", borderRadius:16, border:"1.5px solid #FCA5A5" }}>
            <div style={{ fontSize:13, fontWeight:800, color:"#B91C1C", marginBottom:6 }}>Error:</div>
            <div style={{ fontSize:11, color:"#7F1D1D", fontFamily:"monospace", wordBreak:"break-all" }}>{this.state.error.toString()}</div>
          </div>
        );
        return this.props.children;
      }
    }

    function OrdersPage({ orders, refunds, onTrack, onTrackRider, canCancelOrder, cancelCountdownText, onCancelOrder, gcashSettings, onRateOrder, onViewRiderProfile, ratedOrderIds, onPayQrPh }) {
      const active    = orders.filter(o => o.status !== "delivered" && o.status !== "cancelled");
      const completed = orders.filter(o => o.status === "delivered" || o.status === "cancelled");
      const [ordersView,  setOrdersView]  = useState("active");

      const ST_COLOR = ORDER_STATUS_COLORS;

      const refundsByOrderId = useMemo(() => {
        const map = {};
        (refunds || []).forEach(r => { map[r.orderId] = r; });
        return map;
      }, [refunds]);

      const OrderCard = ({ o }) => {
        const st = ST_COLOR[o.status] || ST_COLOR.pending;
        const orderRefund = refundsByOrderId[o.id];
        const ts = o.createdAt ? (o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt)) : new Date();
        const orderStatuses = getOrderStatuses(o);
        const idx = orderStatuses.findIndex(s => s.key === o.status);
        const canTrackRider = o.status === "buying" || o.status === "pickup" || o.status === "otw" || o.status === "in_boat";
        const hasQrPhBanner = o.paymentMethod === "QRPH" && o.status !== "delivered" && o.status !== "cancelled";
        const hasBottomAttachment = canTrackRider || hasQrPhBanner;
        return (
          <div style={{ marginBottom:12 }}>
            <button onClick={() => onTrack(o)} style={{
              width:"100%", textAlign:"left", background:"#fff",
              borderRadius: hasBottomAttachment ? "18px 18px 0 0" : 18,
              padding:"16px", border:"1px solid #F0F0F0",
              borderBottom: hasBottomAttachment ? "none" : undefined,
              boxShadow: hasBottomAttachment ? "none" : "0 2px 8px rgba(0,0,0,.05)", display:"block",
            }}>
              {/* Top row */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                <div style={{ flex:1, marginRight:12 }}>
                  <div style={{ fontSize:13, fontWeight:800, color:"#111", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {o.items?.map(i=>i.name).join(", ") || "—"}
                  </div>
                  <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>
                    {ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                  </div>
                </div>
                <div style={{ padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:700, whiteSpace:"nowrap", background:st.bg, color:st.color, display:"flex", alignItems:"center", gap:5 }}>
                  <Ic n={st.icon} />{st.label}
                </div>
              </div>

              {/* Progress bar */}
              <div style={{ display:"flex", gap:4, marginBottom:12 }}>
                {orderStatuses.map((s, i) => (
                  <div key={s.key} style={{
                    flex:1, height:4, borderRadius:4,
                    background: i <= idx ? "#22C55E" : "#E5E7EB",
                    transition:"background .3s",
                  }} />
                ))}
              </div>

              {/* Steps */}
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                {orderStatuses.map((s, i) => (
                  <div key={s.key} style={{ textAlign:"center", flex:1 }}>
                    <div style={{ fontSize:16, opacity: i <= idx ? 1 : 0.25 }}><Ic n={s.icon} /></div>
                    <div style={{ fontSize:9, fontWeight:700, color: i <= idx ? "#166534" : "#ccc", marginTop:2 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Footer */}
              <div style={{ marginTop:12, paddingTop:10, borderTop:"1px dashed #E5E7EB", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontSize:12, color:"#888" }}>{o.customer?.address}</div>
                <div style={{ fontSize:14, fontWeight:800, color:"#166534" }}>~{fmt(o.total)}</div>
              </div>

              {/* Refund badge */}
              {orderRefund && (
                <div style={{ marginTop:10, padding:"10px 14px", borderRadius:12, background:"#F0FDF4", border:"1px solid #BBF7D0", display:"flex", alignItems:"center", gap:8 }}>
                  <Ic n="money-bill-transfer" style={{ color:"#22C55E", fontSize:16 }} />
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:800, color:"#166534" }}>Refund: {fmt(orderRefund.amount)}</div>
                    <div style={{ fontSize:11, color:"#64748B", marginTop:1 }}>{orderRefund.reason}</div>
                  </div>
                </div>
              )}
            </button>

            {/* QR PH payment banner for QRPH orders */}
            {o.paymentMethod === "QRPH" && o.status !== "delivered" && o.status !== "cancelled" && (
              (o.gcashPaymentConfirmed || o.paymentStatus === "paid")
                ? <div style={{ padding:"10px 14px", background:"#DCFCE7", color:"#166534", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:6, borderTop:"1px solid #BBF7D0" }}>
                    <img src="https://i.imgur.com/AsLCstJ.png" alt="QR Ph" style={{width:16,height:16,objectFit:"contain",borderRadius:3}} /> QR PH Payment Confirmed — Handa na!
                  </div>
                : <div onClick={() => onPayQrPh?.(o.id)} style={{ padding:"10px 14px", background:"#EFF6FF", color:"#1D4ED8", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:6, borderTop:"1px solid #BFDBFE", cursor:"pointer" }}>
                    <img src="https://i.imgur.com/AsLCstJ.png" alt="QR Ph" style={{width:16,height:16,objectFit:"contain",borderRadius:3}} /> Bayad via QR PH — Pindutin para magbayad
                  </div>
            )}

            {/* Track Rider button */}
            {canTrackRider && (
              <button onClick={() => onTrackRider(o)} style={{
                width:"100%", padding:"12px", borderRadius:"0 0 18px 18px",
                background:"linear-gradient(135deg,#1D4ED8,#3B82F6)", color:"#fff",
                fontSize:13, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                boxShadow:"0 2px 8px rgba(29,78,216,.25)",
              }}>
                <Ic n="location-dot" />
                Where is the Rider?
                <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ADE80", boxShadow:"0 0 6px #4ADE80" }} />
              </button>
            )}
            {(o.status === "pending" && !o.riderId) && (
              canCancelOrder?.(o) ? (
                <button onClick={() => onCancelOrder?.(o)} style={{
                  width:"100%", marginTop:8, padding:"11px 12px", borderRadius:12,
                  background:"#FEF2F2", color:"#B91C1C", border:"1px solid #FCA5A5",
                  fontSize:12, fontWeight:800,
                }}>
                  Cancel order (15+ min na walang rider)
                </button>
              ) : (
                <div style={{
                  marginTop:8, padding:"9px 10px", borderRadius:12,
                  background:"#FFFBEB", color:"#92400E", border:"1px solid #FDE68A",
                  fontSize:11, fontWeight:700,
                }}>
                  {cancelCountdownText?.(o)}
                </div>
              )
            )}
            {/* Rate & Rider Profile buttons for delivered orders */}
            {o.status === "delivered" && o.riderId && (
              <div style={{ display:"flex", gap:8, marginTop:8 }}>
                {!ratedOrderIds?.has(o.id) && (
                  <button onClick={() => onRateOrder?.(o)} style={{
                    flex:1, padding:"11px 12px", borderRadius:12,
                    background:"linear-gradient(135deg,#F59E0B,#FBBF24)", color:"#fff",
                    fontSize:12, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                    boxShadow:"0 2px 8px rgba(245,158,11,.3)",
                  }}>
                    <Ic n="star" /> Rate Delivery
                  </button>
                )}
                <button onClick={() => onViewRiderProfile?.(o)} style={{
                  flex:1, padding:"11px 12px", borderRadius:12,
                  background:"#F0FDF4", color:"#166534", border:"1px solid #BBF7D0",
                  fontSize:12, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                }}>
                  <Ic n="user" /> Rider Profile
                </button>
              </div>
            )}
          </div>
        );
      };

      const totalOrders = orders.length;

      return (
        <div style={{ padding:"0 0 20px" }}>
          <div style={{ padding:"20px 20px 4px" }}>
            <h2 style={{ fontSize:18, fontWeight:800, color:"#111", margin:0 }}><Ic n="box" style={{marginRight:8,color:"#166534"}} />Ang Orders Ko</h2>
          </div>

          <div style={{ padding:"12px 20px 0" }}>
            {totalOrders === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"#ccc" }}>
                <Ic n="envelope-open" size={56} style={{ color:"#ccc", marginBottom:12, display:"block" }} />
                <div style={{ fontSize:16, fontWeight:700, color:"#555" }}>Wala pang orders</div>
                <div style={{ fontSize:13, marginTop:6, color:"#aaa" }}>Pumunta sa Tindahan para mag-order!</div>
              </div>
            ) : (
              /* ── Palengke orders view ── */
              <>
                <div style={{
                  display:"flex", gap:8, marginBottom:14, padding:4,
                  background:"#F1F5F9", borderRadius:14, border:"1px solid #E2E8F0",
                }}>
                  <button onClick={() => setOrdersView("active")} style={{
                    flex:1, padding:"10px 12px", borderRadius:10, fontSize:12, fontWeight:800,
                    background:ordersView==="active" ? "#166534" : "transparent",
                    color:ordersView==="active" ? "#fff" : "#475569",
                    boxShadow:ordersView==="active" ? "0 2px 8px rgba(22,101,52,.28)" : "none",
                  }}>
                    <Ic n="circle" style={{ marginRight:6, color:ordersView==="active" ? "#FCA5A5" : "#EF4444" }} />
                    Active ({active.length})
                  </button>
                  <button onClick={() => setOrdersView("previous")} style={{
                    flex:1, padding:"10px 12px", borderRadius:10, fontSize:12, fontWeight:800,
                    background:ordersView==="previous" ? "#1E293B" : "transparent",
                    color:ordersView==="previous" ? "#fff" : "#475569",
                    boxShadow:ordersView==="previous" ? "0 2px 8px rgba(30,41,59,.25)" : "none",
                  }}>
                    <Ic n="clock-rotate-left" style={{ marginRight:6 }} />
                    Previous ({completed.length})
                  </button>
                </div>

                {ordersView === "active" ? (
                  active.length > 0 ? (
                    active.map(o => <OrderCard key={o.id} o={o} />)
                  ) : (
                    <div style={{ textAlign:"center", padding:"44px 16px", border:"1px dashed #D1D5DB", borderRadius:16, background:"#fff" }}>
                      <Ic n="box-open" size={34} style={{ color:"#9CA3AF", marginBottom:10 }} />
                      <div style={{ fontSize:14, fontWeight:700, color:"#4B5563" }}>No active orders</div>
                      <div style={{ fontSize:12, marginTop:6, color:"#9CA3AF" }}>Kapag may ongoing order ka, dito ito lalabas.</div>
                    </div>
                  )
                ) : (
                  completed.length > 0 ? (
                    completed.map(o => <OrderCard key={o.id} o={o} />)
                  ) : (
                    <div style={{ textAlign:"center", padding:"44px 16px", border:"1px dashed #D1D5DB", borderRadius:16, background:"#fff" }}>
                      <Ic n="clock-rotate-left" size={34} style={{ color:"#9CA3AF", marginBottom:10 }} />
                      <div style={{ fontSize:14, fontWeight:700, color:"#4B5563" }}>Wala pang previous orders</div>
                      <div style={{ fontSize:12, marginTop:6, color:"#9CA3AF" }}>Dito mapupunta ang mga tapos na order mo.</div>
                    </div>
                  )
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script src="offline-mode.js"></script>
</body>
</html>
