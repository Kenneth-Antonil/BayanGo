<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Apply as Partner Merchant</title><style>body{font-family:Arial;background:#f8fafc;margin:0}.wrap{max-width:640px;margin:0 auto;padding:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px}input,textarea,select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;margin:6px 0 10px}button{padding:10px 14px;border:none;border-radius:10px;background:#166534;color:#fff;font-weight:700;cursor:pointer}</style></head>
<body><div class="wrap"><div class="card"><h2>Partner Merchant Application</h2><p>Mag-apply dito para magkaroon ng partner merchant dashboard access.</p><div id="auth"></div><div id="form" style="display:none"><input id="storeName" placeholder="Store name"/><select id="storeCategory"><option value="sari">General Goods</option><option value="ulam">Cooked Meals</option><option value="gamot">Medicine</option><option value="hardware">Hardware</option><option value="gulay">Vegetables</option></select><input id="contactName" placeholder="Contact person"/><input id="contactPhone" placeholder="Phone number"/><textarea id="description" rows="4" placeholder="Store description"></textarea><button id="submitBtn">Submit Application</button><p id="msg"></p></div></div></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const app=firebase.initializeApp({apiKey:"AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",authDomain:"bayango-315c6.firebaseapp.com",projectId:"bayango-315c6",storageBucket:"bayango-315c6.firebasestorage.app",messagingSenderId:"199013441811",appId:"1:199013441811:web:315a38f03ddc9b676e3ae6",databaseURL:"https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app"});
const auth=firebase.auth(app), db=firebase.database(app); const authEl=document.getElementById('auth'), formEl=document.getElementById('form'), msgEl=document.getElementById('msg');
auth.onAuthStateChanged(u=>{ if(!u){ authEl.innerHTML='<button id="loginBtn">Sign in with Google</button>'; document.getElementById('loginBtn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); formEl.style.display='none'; } else { authEl.innerHTML='<p>Signed in as <b>'+ (u.displayName||u.email) +'</b></p>'; formEl.style.display='block'; }});
document.getElementById('submitBtn').onclick=async()=>{const u=auth.currentUser;if(!u) return; const payload={storeName:storeName.value.trim(),storeCategory:storeCategory.value,contactName:contactName.value.trim(),contactPhone:contactPhone.value.trim(),description:description.value.trim(),applicantUid:u.uid,applicantEmail:u.email||'',status:'pending',createdAt:Date.now()}; if(!payload.storeName||!payload.contactName){msgEl.textContent='Please fill required fields.';return;} await db.ref('partner_applications').push(payload); msgEl.textContent='Application submitted. Hintayin ang approval sa admin dashboard.';};
</script></body></html>
