<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Apply as Partner Merchant</title><style>body{font-family:Arial;background:#f8fafc;margin:0}.wrap{max-width:640px;margin:0 auto;padding:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px}input,textarea,select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;margin:6px 0 10px}label{font-weight:700;color:#1e293b;font-size:14px;display:block;margin-top:8px}.req{color:#dc2626}.note{font-size:13px;color:#334155;margin:4px 0 10px}button{padding:10px 14px;border:none;border-radius:10px;background:#166534;color:#fff;font-weight:700;cursor:pointer}.check{display:flex;gap:8px;align-items:flex-start;margin:10px 0}.check input{width:auto;margin-top:3px}</style></head>
<body><div class="wrap"><div class="card"><h2>Partner Merchant Application</h2><p>Mag-apply dito para magkaroon ng partner merchant dashboard access.</p><p class="note">New requirements: kumpletong business details at confirmation na valid ang permits bago ma-review ang application.</p><div id="auth"></div><div id="form" style="display:none"><label for="storeName">Store name <span class="req">*</span></label><input id="storeName" placeholder="Store name"/><label for="storeCategory">Store category <span class="req">*</span></label><select id="storeCategory"><option value="sari">General Goods</option><option value="ulam">Cooked Meals</option><option value="gamot">Medicine</option><option value="hardware">Hardware</option><option value="gulay">Vegetables</option></select><label for="businessAddress">Business address <span class="req">*</span></label><input id="businessAddress" placeholder="Complete business address"/><label for="businessPermitNo">Business permit number <span class="req">*</span></label><input id="businessPermitNo" placeholder="City/Municipal business permit no."/><label for="govIdType">Owner government ID type <span class="req">*</span></label><select id="govIdType"><option value="">Select one</option><option value="drivers_license">Driver's License</option><option value="national_id">National ID</option><option value="passport">Passport</option><option value="postal_id">Postal ID</option></select><label for="contactName">Contact person <span class="req">*</span></label><input id="contactName" placeholder="Contact person"/><label for="contactPhone">Phone number <span class="req">*</span></label><input id="contactPhone" placeholder="09XXXXXXXXX"/><label for="operatingHours">Operating hours <span class="req">*</span></label><input id="operatingHours" placeholder="e.g. 7:00 AM - 9:00 PM"/><label for="description">Store description <span class="req">*</span></label><textarea id="description" rows="4" placeholder="Store description"></textarea><label class="check"><input type="checkbox" id="termsCheck"/><span>Kinukumpirma ko na tama ang details na nilagay ko at may valid business documents ako para sa verification. <span class="req">*</span></span></label><button id="submitBtn">Submit Application</button><p id="msg"></p></div></div></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const app=firebase.initializeApp({apiKey:"AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",authDomain:"bayango-315c6.firebaseapp.com",projectId:"bayango-315c6",storageBucket:"bayango-315c6.firebasestorage.app",messagingSenderId:"199013441811",appId:"1:199013441811:web:315a38f03ddc9b676e3ae6",databaseURL:"https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app"});
const auth=firebase.auth(app), db=firebase.database(app); const authEl=document.getElementById('auth'), formEl=document.getElementById('form'), msgEl=document.getElementById('msg');
auth.onAuthStateChanged(u=>{ if(!u){ authEl.innerHTML='<button id="loginBtn">Sign in with Google</button>'; document.getElementById('loginBtn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); formEl.style.display='none'; } else { authEl.innerHTML='<p>Signed in as <b>'+ (u.displayName||u.email) +'</b></p>'; formEl.style.display='block'; }});
document.getElementById('submitBtn').onclick=async()=>{const u=auth.currentUser;if(!u) return; const payload={storeName:storeName.value.trim(),storeCategory:storeCategory.value,businessAddress:businessAddress.value.trim(),businessPermitNo:businessPermitNo.value.trim(),govIdType:govIdType.value,contactName:contactName.value.trim(),contactPhone:contactPhone.value.trim(),operatingHours:operatingHours.value.trim(),description:description.value.trim(),termsAccepted:termsCheck.checked,applicantUid:u.uid,applicantEmail:u.email||'',status:'pending',createdAt:Date.now()}; if(!payload.storeName||!payload.storeCategory||!payload.businessAddress||!payload.businessPermitNo||!payload.govIdType||!payload.contactName||!payload.contactPhone||!payload.operatingHours||!payload.description){msgEl.textContent='Please complete all required fields.';return;} if(!/^09\d{9}$/.test(payload.contactPhone)){msgEl.textContent='Please enter a valid PH mobile number (09XXXXXXXXX).';return;} if(!payload.termsAccepted){msgEl.textContent='Please confirm the declaration before submitting.';return;} await db.ref('partner_applications').push(payload); msgEl.textContent='Application submitted. Hintayin ang approval sa admin dashboard.';};
</script></body></html>
