<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BayanGo Rider</title>
  <meta name="theme-color" content="#1D4ED8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BayanGo Rider" />
  <link rel="manifest" href="bayango-rider-manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #EFF6FF; font-family: 'Plus Jakarta Sans', sans-serif; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop     { 0%{transform:scale(.85);opacity:0;} 100%{transform:scale(1);opacity:1;} }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes pulse   { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    @keyframes dotBounce { 0%,80%,100%{transform:scale(.65);opacity:.35;} 40%{transform:scale(1.1);opacity:1;} }
    @keyframes splashFadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    .fade-up { animation: fadeUp .35s ease both; }
    .pop     { animation: pop .25s ease both; }
    .spin    { animation: spin 1s linear infinite; }
    .pulse   { animation: pulse 1.4s ease infinite; }
    .rider-splash-shell {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100vh; background:#fff; gap:0; padding:24px;
    }
    .rider-splash-logo { width:76px; height:76px; object-fit:contain; animation:splashFadeIn .5s ease both; }
    .rider-splash-wordmark {
      font-size:22px; font-weight:900; color:#1D4ED8; margin-top:18px; letter-spacing:-.3px;
      animation:splashFadeIn .5s .1s ease both;
    }
    .rider-splash-badge {
      margin-top:6px; padding:3px 12px; border-radius:20px;
      background:#DBEAFE; color:#1D4ED8; font-size:11px; font-weight:800; letter-spacing:.1em;
      animation:splashFadeIn .5s .15s ease both;
    }
    .rider-splash-dots {
      display:flex; gap:7px; margin-top:44px; animation:splashFadeIn .4s .25s ease both;
    }
    .rider-splash-dots span {
      width:8px; height:8px; border-radius:50%; background:#2563EB;
      animation:dotBounce 1.1s ease-in-out infinite;
    }
    .rider-splash-dots span:nth-child(2) { animation-delay:.15s; }
    .rider-splash-dots span:nth-child(3) { animation-delay:.3s; }
    .rider-splash-caption {
      font-size:12px; color:#9CA3AF; margin-top:10px; font-weight:600;
      animation:splashFadeIn .4s .3s ease both;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="rider-splash-shell">
      <img class="rider-splash-logo" src="https://i.imgur.com/1W159zD.png" alt="BayanGo Rider" />
      <div class="rider-splash-wordmark">BayanGo</div>
      <div class="rider-splash-badge">RIDER</div>
      <div class="rider-splash-dots"><span></span><span></span><span></span></div>
      <div class="rider-splash-caption">Naghahanda...</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const RIDER_FB_APP = firebase.initializeApp({
      apiKey:            "AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",
      authDomain:        "bayango-315c6.firebaseapp.com",
      projectId:         "bayango-315c6",
      storageBucket:     "bayango-315c6.firebasestorage.app",
      messagingSenderId: "199013441811",
      appId:             "1:199013441811:web:315a38f03ddc9b676e3ae6",
      measurementId:     "G-1EEGFZWB7E",
      databaseURL:       "https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app",
    }, "rider");
    const _fbAuth = firebase.auth(RIDER_FB_APP);
    const _fbDb   = firebase.database(RIDER_FB_APP);
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const Ic = ({ n, style, size, className }) => <i className={`fa-solid fa-${n}${className?' '+className:''}`} style={{ fontSize:size, lineHeight:1, ...style }} />;

    const fmt = n => "₱" + Number(n).toLocaleString("en-PH", { minimumFractionDigits: 0 });
    const isImageSrc = (value) =>
      typeof value === "string" &&
      /^(https?:\/\/|blob:|data:image\/)/i.test(value);
    const orderItemImage = (item) => {
      const possible = [item?.img, item?.image, item?.imageUrl, item?.photo, item?.photoURL];
      return possible.find(isImageSrc) || "";
    };
    const isToday = ts => {
      if (!ts) return false;
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const t = new Date();
      return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
    };
    function initRiderStorage() {
      const storage = firebase.storage(RIDER_FB_APP);
      return {
        ref: (path) => storage.ref(path),
        uploadBytes: (storageRef, file) => storageRef.put(file),
        getDownloadURL: (storageRef) => storageRef.getDownloadURL(),
      };
    }

    const RIDER_NOTIFICATION_SOUND_URL = "https://audio.com/kenneth-antonil/audio/universfield-new-notification-022-370046";
    async function getPushVapidKey() {
      try {
        const snap = await _fbDb.ref("settings/pushVapidKey").once("value");
        return String(snap.val() || "").trim();
      } catch (err) {
        console.error("Unable to read rider push vapid key:", err);
        return "";
      }
    }
    const sanitizeTokenKey = (token) => encodeURIComponent(String(token || "")).replace(/\./g, "%2E");

    async function enablePushForRider(user, onForegroundNotify) {
      if (!user?.uid) return;
      if (!("serviceWorker" in navigator) || !("Notification" in window) || !firebase.messaging) return;
      try {
        let permission = Notification.permission;
        if (permission !== "granted") {
          permission = await Notification.requestPermission();
        }
        if (permission !== "granted") return;

        const swReg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        await navigator.serviceWorker.ready;
        const messaging = firebase.messaging(RIDER_FB_APP);
        const vapidKey = await getPushVapidKey();
        if (!vapidKey) return;
        const token = await messaging.getToken({ vapidKey, serviceWorkerRegistration: swReg });
        if (!token) return;

        const tokenKey = sanitizeTokenKey(token);
        await _fbDb.ref(`push_tokens/${user.uid}/${tokenKey}`).set({
          token,
          uid: user.uid,
          riderEmail: user.email || null,
          riderName: user.displayName || null,
          role: "rider",
          platform: navigator.userAgent || "web",
          updatedAt: Date.now(),
          enabled: true,
        });

        messaging.onMessage((payload) => {
          const title = payload?.notification?.title || "BayanGo Rider";
          const body = payload?.notification?.body || "May bagong order.";
          if (typeof onForegroundNotify === "function") onForegroundNotify({ title, body, payload });
          if (Notification.permission === "granted") {
            new Notification(title, {
              body,
              icon: "https://i.imgur.com/wL8wcBB.jpeg",
              data: payload?.data || {},
            });
          }
        });
      } catch (err) {
        console.error("Rider push notification setup error:", err);
      }
    }
    async function showLocalRiderNotification({ title, body, data = {} }) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      const payload = {
        body,
        icon: "https://i.imgur.com/wL8wcBB.jpeg",
        data,
      };
      try {
        if ("serviceWorker" in navigator) {
          const reg = await navigator.serviceWorker.getRegistration("/firebase-messaging-sw.js");
          if (reg?.showNotification) {
            await reg.showNotification(title, payload);
            return;
          }
        }
      } catch (err) {
        console.warn("Rider local notification via service worker failed:", err);
      }
      try {
        new Notification(title, payload);
      } catch (err) {
        console.warn("Rider local notification failed:", err);
      }
    }

    /* ══════════════════ APP ══════════════════ */
    function RiderSplash({ message = "Naghahanda..." }) {
      return (
        <div className="rider-splash-shell">
          <img className="rider-splash-logo" src="https://i.imgur.com/1W159zD.png" alt="BayanGo Rider" />
          <div className="rider-splash-wordmark">BayanGo</div>
          <div className="rider-splash-badge">RIDER</div>
          <div className="rider-splash-dots"><span /><span /><span /></div>
          <div className="rider-splash-caption">{message}</div>
        </div>
      );
    }

    function App() {
      const [user,  setUser]  = useState(null);
      const [ready, setReady] = useState(false);

      useEffect(() => {
        // Handle redirect result (after signInWithRedirect)
        _fbAuth.getRedirectResult().catch(() => {});
        const unsub = _fbAuth.onAuthStateChanged(u => { setUser(u); setReady(true); });
        return () => unsub();
      }, []);

      const handleLogin = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          await _fbAuth.signInWithPopup(provider);
        } catch (err) {
          if (
            err.code === "auth/popup-blocked" ||
            err.code === "auth/popup-closed-by-user" ||
            err.code === "auth/cancelled-popup-request"
          ) {
            await _fbAuth.signInWithRedirect(provider);
          } else {
            console.error("Sign-in error:", err.code, err.message);
          }
        }
      };

      const handleLogout = async () => {
        await _fbAuth.signOut();
      };

      if (!ready) return <RiderSplash message="Kinokonekta ang rider account..." />;

      if (!user) return <LoginScreen onLogin={handleLogin} />;
      return <RiderApp user={user} onLogout={handleLogout} />;
    }

    /* ══════════════════ LOGIN ══════════════════ */
    function LoginScreen({ onLogin }) {
      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#1E3A8A,#1D4ED8,#3B82F6)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:28, padding:24 }}>
          <div className="fade-up" style={{ textAlign:"center", color:"#fff" }}>
            <img src="https://i.imgur.com/h7HgGC0.png" style={{ height:108, maxWidth:"72vw", objectFit:"contain", marginBottom:8, filter:"drop-shadow(0 6px 24px rgba(0,0,0,.35))" }} />
            <p style={{ fontSize:14, opacity:.75, marginTop:6 }}>Delivery Partner App</p>
          </div>
          <button className="fade-up" onClick={onLogin} style={{
            background:"#fff", border:"none", padding:"15px 28px", borderRadius:100,
            fontSize:16, fontWeight:700, color:"#1D4ED8", display:"flex", alignItems:"center", gap:12,
            boxShadow:"0 8px 32px rgba(0,0,0,.2)", animationDelay:".1s"
          }}>
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style={{width:22,height:22}} />
            Sign in with Google
          </button>
          <p className="fade-up" style={{ color:"rgba(255,255,255,.55)", fontSize:12, animationDelay:".2s", textAlign:"center", lineHeight:1.6 }}>
            Para sa mga BayanGo delivery riders lamang.
          </p>
        </div>
      );
    }

    /* ══════════════════ RIDER APP ══════════════════ */
    function RiderApp({ user, onLogout }) {
      const RIDER_SECTIONS = new Set(["available", "deliveries", "earnings"]);
      const normalizeRiderSection = (rawSection) => {
        const section = String(rawSection || "").toLowerCase();
        if (section === "orders") return "deliveries";
        return RIDER_SECTIONS.has(section) ? section : "available";
      };
      const getInitialRiderSection = () => {
        try {
          const url = new URL(window.location.href);
          const section = url.searchParams.get("section") || url.hash.replace("#", "");
          return normalizeRiderSection(section);
        } catch {}
        return "available";
      };
      const [tab,             setTab]             = useState(getInitialRiderSection);
      const switchTab = useCallback((nextTab) => {
        const normalized = normalizeRiderSection(nextTab);
        setTab(normalized);
        try {
          const url = new URL(window.location.href);
          url.searchParams.set("section", normalized);
          url.hash = normalized;
          window.history.replaceState({}, "", url.toString());
        } catch {}
      }, []);
      const [availableOrders, setAvailableOrders] = useState([]);
      const [myOrders,        setMyOrders]        = useState([]);
      const [claiming,        setClaiming]        = useState(null);
      const [delivering,      setDelivering]      = useState(null);
      const [markingOtw,      setMarkingOtw]      = useState(null);
      const [toast,           setToast]           = useState(null);
      const [availErr,        setAvailErr]        = useState(null);
      const [checklistOrder,  setChecklistOrder]  = useState(null);
      const [mapOrder,        setMapOrder]        = useState(null);
      const [priceEditOrder,  setPriceEditOrder]  = useState(null);
      const [riderEditedPrices, setRiderEditedPrices] = useState({});
      const [riderProofImages,  setRiderProofImages]  = useState([]);
      const [proofPreviewUrl,   setProofPreviewUrl]   = useState("");
      const [savingRiderPrices, setSavingRiderPrices] = useState(false);
      const [uploadingRiderProof, setUploadingRiderProof] = useState(false);
      const [riderCoords,     setRiderCoords]     = useState(null);
      const notificationAudioRef = useRef(null);
      const lastAvailableOrderIdsRef = useRef(new Set());
      const prevMyOrdersStatusRef = useRef({});
      const [notifPermission, setNotifPermission] = useState(
        typeof Notification === "undefined" ? "unsupported" : Notification.permission
      );

      const playNotificationSound = useCallback(() => {
        if (!notificationAudioRef.current) {
          notificationAudioRef.current = new Audio(RIDER_NOTIFICATION_SOUND_URL);
          notificationAudioRef.current.preload = "auto";
        }
        const audio = notificationAudioRef.current;
        audio.currentTime = 0;
        audio.play().catch((err) => {
          console.warn("Rider notification sound play failed:", err?.message || err);
        });
      }, []);

      const setupRiderPush = useCallback(async () => {
        if (typeof Notification !== "undefined") {
          setNotifPermission(Notification.permission);
        }
        await enablePushForRider(user, ({ title, body }) => {
          playNotificationSound();
          showToast(`${title}: ${body}`);
        });
        if (typeof Notification !== "undefined") {
          setNotifPermission(Notification.permission);
        }
      }, [user, playNotificationSound]);

      useEffect(() => {
        setupRiderPush();
      }, [setupRiderPush]);

      useEffect(() => {
        if (typeof document === "undefined" || typeof Notification === "undefined") return;
        const syncPermission = () => setNotifPermission(Notification.permission);
        document.addEventListener("visibilitychange", syncPermission);
        window.addEventListener("focus", syncPermission);
        return () => {
          document.removeEventListener("visibilitychange", syncPermission);
          window.removeEventListener("focus", syncPermission);
        };
      }, []);

      const handleForceEnableNotifications = async () => {
        if (typeof Notification === "undefined") return;
        if (Notification.permission !== "granted") {
          await Notification.requestPermission();
        }
        await setupRiderPush();
      };

      useEffect(() => {
        /* Available: treat missing status as pending (legacy orders) */
        const availRef = _fbDb.ref("orders");
        availRef.on("value",
            snap => {
              const list = [];
              snap.forEach(c => {
                const v = c.val() || {};
                const normalizedStatus = v.status || "pending";
                if (!v.riderId && normalizedStatus === "pending") list.push({ id:c.key, ...v, status: normalizedStatus });
              });
              const incomingOrderIds = new Set(list.map(o => o.id));
              if (lastAvailableOrderIdsRef.current.size > 0) {
                const hasNewOrder = [...incomingOrderIds].some(id => !lastAvailableOrderIdsRef.current.has(id));
                if (hasNewOrder) {
                  playNotificationSound();
                  showLocalRiderNotification({
                    title: "BayanGo Rider",
                    body: "May bagong order! Buksan ang Available tab.",
                    data: { type: "new_order" },
                  });
                  showToast("May bagong order! Buksan ang Available tab.");
                }
              }
              lastAvailableOrderIdsRef.current = incomingOrderIds;
              // Island orders first (para mahabol ang port), then Mainland
              list.sort((a, b) => {
                const aIsland = a.locationType === "Island" ? 0 : 1;
                const bIsland = b.locationType === "Island" ? 0 : 1;
                return aIsland - bIsland;
              });
              setAvailableOrders(list);
            },
          err => { console.error("Available orders error:", err.code); setAvailErr(err.code || "permission-denied"); }
        );

        /* My orders: assigned to this rider */
        const mineQueryRef = _fbDb.ref("orders").orderByChild("riderId").equalTo(user.uid);
        const minePlainRef = _fbDb.ref("orders");
        let usingMineFallback = false;

        mineQueryRef.on("value",
          snap => {
            const list = [];
            snap.forEach(c => { const v = c.val() || {}; list.push({ id:c.key, ...v, status: v.status || "pending" }); });
            setMyOrders(list);
          },
          err => {
            console.error("My orders error:", err.code);
            const code = String(err?.code || "").toLowerCase();
            if ((code === "permission_denied" || code === "permission-denied") && !usingMineFallback) {
              usingMineFallback = true;
              minePlainRef.on("value",
                fullSnap => {
                  const list = [];
                  fullSnap.forEach(c => {
                    const v = c.val() || {};
                    if (v.riderId === user.uid) list.push({ id:c.key, ...v, status: v.status || "pending" });
                  });
                  setMyOrders(list);
                },
                fullErr => console.error("My orders fallback error:", fullErr.code)
              );
            }
          }
        );

        return () => {
          availRef.off();
          mineQueryRef.off();
          if (usingMineFallback) minePlainRef.off();
        };
      }, [user.uid]);

      const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 3000); };

      const acceptOrder = async (orderId) => {
        setClaiming(orderId);
        try {
          await _fbDb.ref("orders/" + orderId).update({
            riderId:    user.uid,
            riderName:  user.displayName || user.email,
            riderPhoto: user.photoURL || null,
            status:     "buying",
            acceptedAt: Date.now(),
          });
          showToast("Na-accept! Pumunta ka na sa tindahan.");
          switchTab("deliveries");
        } catch (err) {
          showToast("Error: " + (err.code || err.message));
        } finally {
          setClaiming(null);
        }
      };

      const markOtw = async (order) => {
        const nextStatus = order.locationType === "Island" ? "in_boat" : "otw";
        const toast      = order.locationType === "Island" ? "Nakasakay na sa bangka! Ingat!" : "OTW na! Mag-ingat sa daan.";
        // Block island orders from going to in_boat without confirmed GCash payment
        if (order.locationType === "Island" && !order.gcashPaymentConfirmed) {
          showToast("Hindi pa na-confirm ang GCash payment. Hintayin ang confirmation mula sa admin.");
          return;
        }
        setMarkingOtw(order.id);
        try {
          await _fbDb.ref("orders/" + order.id).update({ status: nextStatus });
          showToast(toast);
        } catch (err) {
          showToast("Error: " + (err.code || err.message));
        } finally {
          setMarkingOtw(null);
        }
      };

      const markDelivered = async (orderId) => {
        setDelivering(orderId);
        try {
          await _fbDb.ref("orders/" + orderId).update({
            status:      "delivered",
            deliveredAt: Date.now(),
          });
          showToast("Na-deliver na! Good job!");
        } catch (err) {
          showToast("Error: " + (err.code || err.message));
        } finally {
          setDelivering(null);
        }
      };

      const recomputeTotals = (items, deliveryFee, totalDiscount) => {
        const subtotal = items.reduce((s, i) => {
          const p = Number(i.price || 0), q = Number(i.qty || 1);
          return s + (i.unit === "kg" ? p * q * Number(i.weightUnit || 1) : p * q);
        }, 0);
        const serviceFee    = Math.round(subtotal * 0.03);
        const smallOrderFee = subtotal < 100 ? Math.round(subtotal * 0.05) : 0;
        const total         = Math.max(0, subtotal + Number(deliveryFee || 0) + serviceFee + smallOrderFee - Number(totalDiscount || 0));
        return { subtotal, serviceFee, smallOrderFee, total };
      };

      const uploadRiderProofImage = async (file, orderId) => {
        setUploadingRiderProof(true);
        try {
          const st = initRiderStorage();
          const storageRef = st.ref(`order_proofs/${orderId}/${Date.now()}_${file.name}`);
          await st.uploadBytes(storageRef, file);
          const url = await st.getDownloadURL(storageRef);
          setRiderProofImages(prev => [...prev, url]);
        } catch (err) {
          showToast("Hindi ma-upload ang larawan: " + (err.message || err.code));
        } finally { setUploadingRiderProof(false); }
      };

      const saveRiderActualPrices = async (order) => {
        setSavingRiderPrices(true);
        try {
          const updatedItems = (order.items || []).map((item, idx) => {
            const key = item.id || String(idx);
            const np = riderEditedPrices[key];
            return np !== undefined ? { ...item, price: Number(np) } : item;
          });
          const { subtotal, serviceFee, smallOrderFee, total } = recomputeTotals(
            updatedItems, order.deliveryFee, order.totalDiscount
          );
          const updatedProof = riderProofImages.length > 0 ? riderProofImages : (order.proofImages || []);
          await _fbDb.ref("orders/" + order.id).update({
            items: updatedItems, subtotal, serviceFee, smallOrderFee, total,
            proofImages: updatedProof, pricesUpdatedAt: Date.now(),
          });
          // Send push notif to customer for island orders (needs GCash payment)
          const uid = order.uid || order.userId;
          if (uid && order.locationType === "Island") {
            try {
              await _fbDb.ref("notification_queue").push({
                uid,
                title: "BayanGo — Bayad na via GCash!",
                body: `Handa na ang iyong order (₱${total.toLocaleString("en-PH")}). Mag-bayad na via GCash para maipadala sa bangka!`,
                link: "https://bayango.ph/bayango-user.html?section=orders",
                createdAt: Date.now(),
              });
            } catch (notifErr) {
              console.warn("Notification queue write failed:", notifErr);
            }
          }
          showToast("Na-update na ang presyo! Total: ₱" + total.toLocaleString("en-PH"));
          setPriceEditOrder(null);
        } catch (err) {
          showToast("Error: " + (err.message || err.code));
        } finally { setSavingRiderPrices(false); }
      };

      const toggleChecklistItem = async (orderId, itemKey, checked) => {
        setChecklistOrder(prev => {
          if (!prev || prev.id !== orderId) return prev;
          return {
            ...prev,
            riderChecklist: {
              ...(prev.riderChecklist || {}),
              [itemKey]: checked,
            },
          };
        });
        try {
          await _fbDb.ref(`orders/${orderId}/riderChecklist/${itemKey}`).set(checked);
        } catch (err) {
          showToast("Hindi na-save ang checklist: " + (err.code || err.message));
        }
      };

      /* ── GPS Location Sharing ── */
      const [gpsActive, setGpsActive] = useState(false);
      const watchIdRef = useRef(null);

      useEffect(() => {
        const hasActiveDelivery = myOrders.some(o => o.status === "buying" || o.status === "otw" || o.status === "in_boat");

        if (hasActiveDelivery && !watchIdRef.current && navigator.geolocation) {
          setGpsActive(true);
          watchIdRef.current = navigator.geolocation.watchPosition(
            (pos) => {
              const nextCoords = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                updatedAt: Date.now(),
              };
              setRiderCoords(nextCoords);
              _fbDb.ref("rider_locations/" + user.uid).set({
                lat: nextCoords.lat,
                lng: nextCoords.lng,
                accuracy: pos.coords.accuracy,
                heading: pos.coords.heading,
                speed: pos.coords.speed,
                updatedAt: nextCoords.updatedAt,
                riderName: user.displayName || user.email,
                riderPhoto: user.photoURL || null,
              });
            },
            (err) => console.error("GPS error:", err.message),
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
          );
        } else if (!hasActiveDelivery && watchIdRef.current) {
          navigator.geolocation.clearWatch(watchIdRef.current);
          watchIdRef.current = null;
          setGpsActive(false);
          _fbDb.ref("rider_locations/" + user.uid).remove();
          setRiderCoords(null);
        }

        return () => {
          if (watchIdRef.current) {
            navigator.geolocation.clearWatch(watchIdRef.current);
            watchIdRef.current = null;
          }
        };
      }, [myOrders, user.uid]);

      useEffect(() => {
        const prev = prevMyOrdersStatusRef.current;
        const isFirstLoad = Object.keys(prev).length === 0;
        if (!isFirstLoad) {
          myOrders.forEach(o => {
            if (o.status === "cancelled" && prev[o.id] && prev[o.id] !== "cancelled") {
              const short = String(o.id).slice(-6);
              showToast(`Order #${short} ay na-cancel ng customer.`);
              showLocalRiderNotification({
                title: "BayanGo Rider",
                body: `Order #${short} ay na-cancel ng customer.`,
                data: { type: "order_cancelled", orderId: o.id },
              });
              playNotificationSound();
            }
          });
        }
        const newPrev = {};
        myOrders.forEach(o => { newPrev[o.id] = o.status; });
        prevMyOrdersStatusRef.current = newPrev;
      }, [myOrders]);

      useEffect(() => {
        const handleSectionSwitch = () => {
          try {
            const url = new URL(window.location.href);
            const section = url.searchParams.get("section") || url.hash.replace("#", "");
            setTab(normalizeRiderSection(section));
          } catch {}
        };
        window.addEventListener("popstate", handleSectionSwitch);
        window.addEventListener("hashchange", handleSectionSwitch);
        return () => {
          window.removeEventListener("popstate", handleSectionSwitch);
          window.removeEventListener("hashchange", handleSectionSwitch);
        };
      }, []);

      const buyingOrders    = myOrders.filter(o => o.status === "buying");
      const activeOrders    = myOrders.filter(o => o.status === "otw" || o.status === "in_boat");
      const deliveredOrders = myOrders.filter(o => o.status === "delivered");
      const completedOrders = myOrders.filter(o => o.status === "delivered" || o.status === "cancelled");
      const todayEarnings   = deliveredOrders.filter(o => isToday(o.deliveredAt)).reduce((s,o) => s + (o.deliveryFee||0), 0);
      const totalEarnings   = deliveredOrders.reduce((s,o) => s + (o.deliveryFee||0), 0);
      const weekEarnings    = deliveredOrders.filter(o => {
        if (!o.deliveredAt) return false;
        const d = o.deliveredAt.toDate ? o.deliveredAt.toDate() : new Date(o.deliveredAt);
        const diff = (new Date() - d) / 86400000;
        return diff <= 7;
      }).reduce((s,o) => s + (o.deliveryFee||0), 0);

      const shouldForceNotifEnable = notifPermission !== "unsupported" && notifPermission !== "granted";

      return (
        <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#EFF6FF", paddingBottom:74, position:"relative" }}>

          {/* ── Header ── */}
          <div style={{
            background:"linear-gradient(145deg,#1E3A8A,#1D4ED8,#2563EB)",
            padding:"env(safe-area-inset-top,0px) 20px 0",
            paddingTop:`calc(env(safe-area-inset-top,0px) + 18px)`,
            color:"#fff",
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <img src="https://i.imgur.com/h7HgGC0.png" style={{ height:40, objectFit:"contain" }} />
                <div style={{ fontSize:20, fontWeight:800, marginTop:2 }}>
                  <Ic n="motorcycle" style={{ marginRight:6 }} />{user.displayName?.split(" ")[0] || "Rider"}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {gpsActive && (
                  <div style={{ display:"flex", alignItems:"center", gap:5, background:"rgba(34,197,94,.2)", padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:700, color:"#4ADE80" }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ADE80", boxShadow:"0 0 6px #4ADE80" }} className="pulse" />
                    LIVE GPS
                  </div>
                )}
                <button onClick={onLogout} style={{ color:"#93C5FD", fontSize:12, fontWeight:700, textDecoration:"underline" }}>
                  Log Out
                </button>
              </div>
            </div>

            {/* Earnings stats */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, paddingBottom:18 }}>
              {[
                { label:"Ngayon",   value: fmt(todayEarnings),  icon:"calendar-day" },
                { label:"7 Araw",   value: fmt(weekEarnings),   icon:"calendar-week" },
                { label:"Kabuuan",  value: fmt(totalEarnings),  icon:"coins" },
              ].map(s => (
                <div key={s.label} style={{ background:"rgba(255,255,255,.13)", borderRadius:14, padding:"11px 10px", textAlign:"center", backdropFilter:"blur(6px)" }}>
                  <div style={{ fontSize:20, marginBottom:2 }}><Ic n={s.icon} /></div>
                  <div style={{ fontSize:15, fontWeight:800, lineHeight:1.1 }}>{s.value}</div>
                  <div style={{ fontSize:10, opacity:.75, marginTop:2 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* ── Tab Content ── */}
          <div style={{ filter: shouldForceNotifEnable ? "blur(3px)" : "none", pointerEvents: shouldForceNotifEnable ? "none" : "auto" }}>
            {tab === "available"  && <AvailableTab  orders={availableOrders} onAccept={acceptOrder} claiming={claiming} availErr={availErr} onOpenChecklist={setChecklistOrder} onOpenMap={setMapOrder} />}
            {tab === "deliveries" && <DeliveriesTab buying={buyingOrders} active={activeOrders} completed={completedOrders} onOtw={markOtw} markingOtw={markingOtw} onDeliver={markDelivered} delivering={delivering} onOpenChecklist={setChecklistOrder} onOpenMap={setMapOrder} onUpdatePrices={order => { setPriceEditOrder(order); setRiderEditedPrices({}); setRiderProofImages(order.proofImages || []); }} />}
            {tab === "earnings"   && <EarningsTab   completed={deliveredOrders} today={todayEarnings} week={weekEarnings} total={totalEarnings} />}
          </div>

          {/* ── Bottom Nav ── */}
          <div style={{
            position:"fixed", bottom:0, left:0, right:0,
            maxWidth:480, margin:"0 auto", background:"#fff",
            borderTop:"1px solid #E2E8F0",
            display:"flex",
            paddingBottom:"env(safe-area-inset-bottom,0px)",
            boxShadow:"0 -4px 20px rgba(0,0,0,.07)",
          }}>
            {[
              { key:"available",  icon:"box",        label:"Available",  badge: availableOrders.length },
              { key:"deliveries", icon:"motorcycle", label:"Deliveries", badge: buyingOrders.length + activeOrders.length },
              { key:"earnings",   icon:"coins",      label:"Earnings" },
            ].map(t => (
              <button key={t.key} onClick={() => switchTab(t.key)} style={{
                flex:1, padding:"10px 0 8px", display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                color: tab === t.key ? "#1D4ED8" : "#94A3B8",
                borderTop: tab === t.key ? "2px solid #1D4ED8" : "2px solid transparent",
                position:"relative", transition:"color .15s",
              }}>
                <Ic n={t.icon} size={22} />
                <span style={{ fontSize:10, fontWeight:700 }}>{t.label}</span>
                {t.badge > 0 && (
                  <span style={{
                    position:"absolute", top:6, right:"calc(50% - 18px)",
                    background:"#EF4444", color:"#fff", borderRadius:10,
                    fontSize:10, fontWeight:800, padding:"1px 6px", minWidth:17, textAlign:"center",
                  }}>{t.badge}</span>
                )}
              </button>
            ))}
          </div>

          {/* ── Toast ── */}
          {toast && (
            <div className="pop" style={{
              position:"fixed", top:`calc(env(safe-area-inset-top,0px) + 16px)`, left:20, right:20, zIndex:999,
              background:"#1E293B", color:"#fff", padding:"12px 20px", borderRadius:14,
              fontSize:13, fontWeight:700, boxShadow:"0 4px 20px rgba(0,0,0,.3)",
            }}>{toast}</div>
          )}

          {checklistOrder && (
            <OrderChecklistModal
              order={checklistOrder}
              onClose={() => setChecklistOrder(null)}
              onToggle={toggleChecklistItem}
            />
          )}

          {/* ── Price Update Modal ── */}
          {priceEditOrder && (() => {
            const order = myOrders.find(o => o.id === priceEditOrder.id) || priceEditOrder;
            const liveItems = (order.items || []).map((item, idx) => {
              const key = item.id || String(idx);
              const ep = riderEditedPrices[key];
              return { ...item, price: ep !== undefined ? Number(ep) : Number(item.price || 0), _key: key };
            });
            const subtotal = liveItems.reduce((s,i) => {
              const p = Number(i.price||0), q = Number(i.qty||1);
              return s + (i.unit==="kg" ? p*q*Number(i.weightUnit||1) : p*q);
            }, 0);
            const serviceFee    = Math.round(subtotal * 0.03);
            const smallOrderFee = subtotal < 100 ? Math.round(subtotal * 0.05) : 0;
            const total         = Math.max(0, subtotal + Number(order.deliveryFee||0) + serviceFee + smallOrderFee - Number(order.totalDiscount||0));
            const hasEdits = Object.keys(riderEditedPrices).length > 0 || riderProofImages.length !== (order.proofImages||[]).length;
            return (
              <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.6)", backdropFilter:"blur(4px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}
                onClick={() => setPriceEditOrder(null)}>
                <div onClick={e=>e.stopPropagation()} className="slide-up" style={{ width:"100%", maxWidth:480, background:"#fff", borderRadius:"24px 24px 0 0", padding:"22px 20px 36px", maxHeight:"90vh", overflowY:"auto" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                    <div>
                      <div style={{ fontSize:17, fontWeight:800 }}>Actual Presyo at Resibo</div>
                      <div style={{ fontSize:11, color:"#aaa" }}>#{order.id?.slice(0,8)} · {order.customer?.name}</div>
                    </div>
                    <button onClick={() => setPriceEditOrder(null)} style={{ width:34, height:34, borderRadius:10, background:"#F3F4F6", display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="xmark" /></button>
                  </div>

                  {/* Items with editable prices */}
                  <div style={{ marginBottom:14 }}>
                    {liveItems.map((item) => {
                      const ep = riderEditedPrices[item._key];
                      const displayPrice = ep !== undefined ? ep : item.price;
                      const lineTotal = item.unit==="kg"
                        ? Number(displayPrice)*Number(item.qty||1)*Number(item.weightUnit||1)
                        : Number(displayPrice)*Number(item.qty||1);
                      return (
                        <div key={item._key} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:"1px solid #F0F0F0" }}>
                          {orderItemImage(item)
                            ? <img src={orderItemImage(item)} alt={item.name} style={{ width:38, height:38, borderRadius:9, objectFit:"cover", border:"1px solid #E5E7EB", flexShrink:0 }} />
                            : <div style={{ width:38, height:38, borderRadius:9, background:"#F3F4F6", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><Ic n={item.isCustom?"note-sticky":"bag-shopping"} style={{ color:"#94A3B8" }} /></div>
                          }
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:13, fontWeight:700, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                              {item.name}{item.isCustom && <span style={{ fontSize:10, color:"#166534", marginLeft:4, background:"#F0FDF4", padding:"1px 4px", borderRadius:4 }}>custom</span>}
                            </div>
                            <div style={{ fontSize:11, color:"#94A3B8" }}>×{item.qty}{item.unit==="kg"?` (${item.totalKg||Number(item.qty)*Number(item.weightUnit||1)}kg)`:""}</div>
                          </div>
                          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:2 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                              <span style={{ fontSize:12, color:"#94A3B8" }}>₱</span>
                              <input
                                type="number" min="0" step="1"
                                value={ep !== undefined ? ep : item.price}
                                onChange={e => setRiderEditedPrices(prev => ({ ...prev, [item._key]: e.target.value }))}
                                style={{ width:72, padding:"5px 7px", border:"1.5px solid", borderColor: ep!==undefined?"#A855F7":"#D1D5DB", borderRadius:8, fontSize:14, fontWeight:700, textAlign:"right", background: ep!==undefined?"#FAF5FF":"#fff" }}
                              />
                            </div>
                            <div style={{ fontSize:10, color:"#94A3B8" }}>= {fmt(lineTotal)}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Proof Photos */}
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:12, fontWeight:700, color:"#555", marginBottom:8 }}><Ic n="camera" style={{ marginRight:5 }} />Resibo / Litrato ng mga Items</div>
                    {riderProofImages.length > 0 && (
                      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:8 }}>
                        {riderProofImages.map((url, i) => (
                          <div key={i} style={{ position:"relative" }}>
                            <button onClick={() => setProofPreviewUrl(url)} style={{ padding:0, border:"none", background:"transparent", cursor:"zoom-in" }}>
                              <img src={url} alt="" style={{ width:70, height:70, borderRadius:10, objectFit:"cover", border:"1px solid #E5E7EB" }} />
                            </button>
                            <button onClick={() => setRiderProofImages(prev=>prev.filter((_,j)=>j!==i))} style={{ position:"absolute", top:-5, right:-5, width:20, height:20, borderRadius:"50%", background:"#EF4444", color:"#fff", fontSize:11, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{ display:"flex", gap:8 }}>
                      <label style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:8, padding:"11px 10px", borderRadius:12, border:"1.5px dashed #D1D5DB", cursor:"pointer", fontSize:13, color:"#555", background:"#FAFAFA" }}>
                        <Ic n={uploadingRiderProof?"spinner":"camera"} className={uploadingRiderProof?"fa-spin":""} style={{ color:"#7C3AED" }} />
                        {uploadingRiderProof ? "Ina-upload..." : "Camera"}
                        <input type="file" accept="image/*" capture="environment" style={{ display:"none" }}
                          onChange={async e => { if(e.target.files[0]) await uploadRiderProofImage(e.target.files[0], order.id); e.target.value=""; }} />
                      </label>
                      <label style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:8, padding:"11px 10px", borderRadius:12, border:"1.5px dashed #D1D5DB", cursor:"pointer", fontSize:13, color:"#555", background:"#FAFAFA" }}>
                        <Ic n="image" style={{ color:"#7C3AED" }} />
                        Gallery
                        <input type="file" accept="image/*" style={{ display:"none" }}
                          onChange={async e => { if(e.target.files[0]) await uploadRiderProofImage(e.target.files[0], order.id); e.target.value=""; }} />
                      </label>
                    </div>
                  </div>

                  {/* Totals summary */}
                  <div style={{ background:"#F9FAFB", borderRadius:14, padding:"12px 14px", marginBottom:14, border:"1px solid #E5E7EB", fontSize:13 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, color:"#555" }}>
                      <span>Subtotal</span><span>{fmt(subtotal)}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, color:"#555" }}>
                      <span>Delivery</span><span>{fmt(order.deliveryFee)}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, color:"#555" }}>
                      <span>Service Fee (3%)</span><span>{fmt(serviceFee)}</span>
                    </div>
                    {smallOrderFee>0 && <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, color:"#555" }}>
                      <span>Small Order Fee</span><span>{fmt(smallOrderFee)}</span>
                    </div>}
                    {(order.totalDiscount||0)>0 && <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, color:"#166534" }}>
                      <span>Discount</span><span>-{fmt(order.totalDiscount)}</span>
                    </div>}
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, paddingTop:8, borderTop:"2px dashed #D1D5DB", fontSize:18, fontWeight:800, color: hasEdits?"#7C3AED":"#111" }}>
                      <span>TOTAL</span><span>{fmt(total)}</span>
                    </div>
                  </div>

                  <button onClick={() => saveRiderActualPrices(order)} disabled={savingRiderPrices || !hasEdits} style={{
                    width:"100%", padding:"15px", borderRadius:16,
                    background: savingRiderPrices ? "#E5E7EB" : (!hasEdits ? "#F3F4F6" : "linear-gradient(135deg,#7C3AED,#A855F7)"),
                    color: (!hasEdits||savingRiderPrices) ? "#aaa" : "#fff",
                    fontSize:15, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                  }}>
                    <Ic n={savingRiderPrices?"spinner":"floppy-disk"} className={savingRiderPrices?"fa-spin":""} />
                    {savingRiderPrices ? "Sine-save..." : "I-save at Ipadala sa Customer"}
                  </button>
                </div>
              </div>
            );
          })()}
          {mapOrder && (
            <RiderRouteMapModal
              order={mapOrder}
              riderCoords={riderCoords}
              onClose={() => setMapOrder(null)}
            />
          )}

          {proofPreviewUrl && (
            <div onClick={() => setProofPreviewUrl("")} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.8)", zIndex:13050, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <img src={proofPreviewUrl} alt="Proof preview" onClick={e => e.stopPropagation()} style={{ maxWidth:"95vw", maxHeight:"90vh", borderRadius:14, objectFit:"contain", boxShadow:"0 10px 40px rgba(0,0,0,.45)", background:"#fff" }} />
            </div>
          )}

          {shouldForceNotifEnable && (
            <div style={{
              position:"fixed",
              inset:0,
              background:"rgba(15,23,42,.72)",
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              padding:20,
              zIndex:9999
            }}>
              <div className="pop" style={{
                width:"100%",
                maxWidth:420,
                background:"#fff",
                borderRadius:22,
                padding:20,
                boxShadow:"0 16px 44px rgba(0,0,0,.24)"
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                  <div style={{ width:40, height:40, borderRadius:12, background:"#DBEAFE", display:"grid", placeItems:"center", color:"#1D4ED8" }}>
                    <Ic n="bell" size={18} />
                  </div>
                  <div style={{ fontSize:17, fontWeight:800, color:"#0F172A" }}>
                    I-enable ang Notifications
                  </div>
                </div>
                <p style={{ fontSize:13, lineHeight:1.6, color:"#334155", marginBottom:14 }}>
                  Kailangan naka-enable ang push notifications para makatanggap kaagad ng bagong orders.
                </p>
                {notifPermission === "denied" && (
                  <p style={{ fontSize:12, lineHeight:1.5, color:"#B91C1C", background:"#FEE2E2", borderRadius:12, padding:"10px 12px", marginBottom:12 }}>
                    Na-block ang notifications. Pumunta sa browser/site settings at i-Allow ang notifications, tapos pindutin ulit ang button sa ibaba.
                  </p>
                )}
                <button
                  onClick={handleForceEnableNotifications}
                  style={{
                    width:"100%",
                    border:"none",
                    borderRadius:14,
                    background:"#1D4ED8",
                    color:"#fff",
                    padding:"12px 14px",
                    fontSize:14,
                    fontWeight:800
                  }}
                >
                  Enable Notifications
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function itemChecklistKey(item, idx) {
      return item?.id || `${String(item?.name || "item").replace(/\s+/g, "_")}_${idx}`;
    }

    function OrderChecklistModal({ order, onClose, onToggle }) {
      const items = order?.items || [];
      const checkedMap = order?.riderChecklist || {};
      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:1000, background:"rgba(0,0,0,.48)", display:"flex", alignItems:"flex-end" }}>
          <div className="slide-up" onClick={e => e.stopPropagation()} style={{ width:"100%", maxHeight:"80vh", overflowY:"auto", background:"#fff", borderRadius:"24px 24px 0 0", padding:"20px 18px calc(env(safe-area-inset-bottom,0px) + 24px)" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
              <div>
                <div style={{ fontSize:18, fontWeight:800, color:"#1E293B" }}><Ic n="list-check" style={{ marginRight:6 }} />Shopping List</div>
                <div style={{ fontSize:12, color:"#64748B", marginTop:2 }}>{order.customer?.name || "Order"} • {items.length} item{items.length > 1 ? "s" : ""}</div>
              </div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"#F1F5F9", color:"#475569", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Ic n="xmark" />
              </button>
            </div>

            {items.map((it, idx) => {
              const key = itemChecklistKey(it, idx);
              const checked = !!checkedMap[key];
              return (

    function RiderRouteMapModal({ order, riderCoords, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const riderMarkerRef = useRef(null);
      const customerMarkerRef = useRef(null);
      const lineRef = useRef(null);
      const BINANG_CENTER = [14.4584, 121.1971];
      const toNum = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      };
      const custLat = toNum(order?.customer?.lat);
      const custLng = toNum(order?.customer?.lng);
      const customerPos = custLat != null && custLng != null ? [custLat, custLng] : null;

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current || typeof L === "undefined") return;
        const map = L.map(mapRef.current, { center: customerPos || BINANG_CENTER, zoom: 15, zoomControl: false });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: '&copy; OpenStreetMap', maxZoom: 19 }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);
        mapInstanceRef.current = map;

        if (customerPos) {
          const customerIcon = L.divIcon({
            html: '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#059669,#10B981);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 4px 16px rgba(5,150,105,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div>',
            className: "",
            iconSize: [42, 42],
            iconAnchor: [21, 21],
          });
          customerMarkerRef.current = L.marker(customerPos, { icon: customerIcon }).addTo(map);
        }
        setTimeout(() => map.invalidateSize(), 180);
        return () => {
          map.remove();
          mapInstanceRef.current = null;
          riderMarkerRef.current = null;
          customerMarkerRef.current = null;
          lineRef.current = null;
        };
      }, []);

      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map || !customerPos) return;
        const riderLat = toNum(riderCoords?.lat);
        const riderLng = toNum(riderCoords?.lng);
        if (riderLat == null || riderLng == null) {
          map.setView(customerPos, 16);
          return;
        }
        const riderPos = [riderLat, riderLng];
        if (!riderMarkerRef.current) {
          const riderIcon = L.divIcon({
            html: '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1D4ED8,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(29,78,216,.5);border:3px solid #fff;"><i class="fa-solid fa-motorcycle"></i></div>',
            className: "",
            iconSize: [42, 42],
            iconAnchor: [21, 21],
          });
          riderMarkerRef.current = L.marker(riderPos, { icon: riderIcon }).addTo(map);
        } else {
          riderMarkerRef.current.setLatLng(riderPos);
        }
        if (!lineRef.current) {
          lineRef.current = L.polyline([riderPos, customerPos], { color:"#1D4ED8", weight:5, opacity:.9 }).addTo(map);
        } else {
          lineRef.current.setLatLngs([riderPos, customerPos]);
        }
        map.fitBounds([riderPos, customerPos], { padding: [40, 40] });
      }, [riderCoords, order?.id]);

      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:1200, background:"rgba(2,6,23,.72)", display:"flex", flexDirection:"column" }}>
          <div onClick={e => e.stopPropagation()} style={{ flex:1, maxWidth:480, width:"100%", margin:"0 auto", display:"flex", flexDirection:"column" }}>
            <div style={{ background:"linear-gradient(135deg,#1D4ED8,#3B82F6)", color:"#fff", padding:"calc(env(safe-area-inset-top,0px) + 14px) 18px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:15, fontWeight:800 }}><Ic n="route" style={{ marginRight:8 }} />Route papunta kay {order.customer?.name || "Customer"}</div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="xmark" /></button>
            </div>
            <div style={{ background:"#EFF6FF", color:"#1D4ED8", fontSize:12, fontWeight:700, padding:"8px 18px", borderBottom:"1px solid #DBEAFE" }}>
              Blue line = diretsong daan mula sa'yo papunta sa customer
            </div>
            <div style={{ position:"relative", flex:1, minHeight:300 }}>
              <div ref={mapRef} style={{ position:"absolute", inset:0 }} />
            </div>
            <div style={{ background:"#fff", padding:"12px 18px calc(env(safe-area-inset-bottom,0px) + 12px)", borderTop:"1px solid #E2E8F0", fontSize:12, color:"#475569" }}>
              {order.customer?.address || "Walang address"}
            </div>
          </div>
        </div>
      );
    }

                            : gcashPending
                              ? <><Ic n="lock" style={{ marginRight:6 }} />Hindi pa pwede — GCash Hindi Pa Confirmed</>
                              : isIsland
                                ? <><Ic n="ship" style={{ marginRight:6 }} />Tapos na! Nakasakay na sa bangka!</>
                                : <><Ic n="motorcycle" style={{ marginRight:6 }} />Tapos na! OTW na ako!</>}
                        </button>
                      </>
                    }
                  />
                );
              })}
            </>
          )}

          {/* OTW / In the Boat deliveries */}
          {active.length > 0 && (
            <>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748B", marginBottom:10, marginTop: buying.length > 0 ? 16 : 0, textTransform:"uppercase", letterSpacing:".08em" }}>
                <Ic n="motorcycle" style={{ marginRight:6 }} />OTW / In the Boat ({active.length})
              </div>
              {active.map(order => {
                const isIsland = order.status === "in_boat";
                return (
                <OrderCard key={order.id} order={order}
                  statusBadge={isIsland ? <><Ic n="ship" style={{ marginRight:4 }} />In the Boat</> : <><Ic n="motorcycle" style={{ marginRight:4 }} />OTW</>}
                  badgeBg={isIsland ? "#EFF6FF" : "#DBEAFE"} badgeColor="#1D4ED8"
                  actionBtn={
                    <button onClick={() => onDeliver(order.id)} disabled={delivering === order.id} style={{
                      width:"100%", padding:"14px", borderRadius:14,
                      background: delivering === order.id ? "#E2E8F0" : "linear-gradient(135deg,#059669,#10B981)",
                      color: delivering === order.id ? "#94A3B8" : "#fff",
                      fontSize:15, fontWeight:800,
                      boxShadow: delivering ? "none" : "0 4px 16px rgba(5,150,105,.35)",
                    }}>
                      {delivering === order.id ? <span className="pulse">Ina-update...</span> : <><Ic n="circle-check" style={{ marginRight:6 }} />Na-deliver na!</>}
                    </button>
                  }
                />
                );
              })}
            </>
          )}

          {/* Completed deliveries */}
          {completed.length > 0 && (
            <>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748B", margin:"16px 0 10px", textTransform:"uppercase", letterSpacing:".08em" }}>
                <Ic n="circle-check" style={{ marginRight:6 }} />Natapos ({completed.length})
              </div>
              {completed.slice(0, 20).map(order => {
                const isCancelled = order.status === "cancelled";
                const ts = isCancelled
                  ? (order.cancelledAt ? new Date(order.cancelledAt) : new Date(order.createdAt || 0))
                  : (order.deliveredAt?.toDate ? order.deliveredAt.toDate() : new Date(order.deliveredAt || 0));
                return (
                  <div key={order.id} className="fade-up" style={{
                    background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:8,
                    border: isCancelled ? "1px solid #FCA5A5" : "1px solid #E2E8F0",
                    display:"flex", alignItems:"center", gap:12,
                  }}>
                    <div style={{ width:44, height:44, borderRadius:12, background: isCancelled ? "#FEE2E2" : "#DCFCE7", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      <Ic n={isCancelled ? "ban" : "circle-check"} size={20} style={{ color: isCancelled ? "#B91C1C" : "#059669" }} />
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#1E293B", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {order.customer?.name}
                      </div>
                      <div style={{ fontSize:12, color: isCancelled ? "#B91C1C" : "#94A3B8", marginTop:2 }}>
                        {isCancelled ? "Na-cancel ng customer" : `${ts.toLocaleDateString("en-PH")} ${ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}`}
                      </div>
                    </div>
                    {!isCancelled && <div style={{ fontSize:16, fontWeight:800, color:"#059669" }}>{fmt(order.deliveryFee || 0)}</div>}
                  </div>
                );
              })}
            </>
          )}

          {buying.length === 0 && active.length === 0 && completed.length === 0 && (
            <div style={{ textAlign:"center", padding:"60px 20px", color:"#94A3B8" }}>
              <Ic n="motorcycle" size={52} style={{ marginBottom:12, color:"#94A3B8" }} />
              <div style={{ fontSize:15, fontWeight:700, color:"#64748B" }}>Walang deliveries pa</div>
              <div style={{ fontSize:13, marginTop:6 }}>Pumunta sa Available tab para kumuha ng order</div>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════ EARNINGS TAB ══════════════════ */
    function EarningsTab({ completed, today, week, total }) {
      const byDate = completed.reduce((acc, o) => {
        const ts = o.deliveredAt?.toDate ? o.deliveredAt.toDate() : new Date(o.deliveredAt || 0);
        const key = ts.toLocaleDateString("en-PH", { month:"short", day:"numeric", year:"numeric" });
        if (!acc[key]) acc[key] = { date:key, orders:0, earnings:0 };
        acc[key].orders++;
        acc[key].earnings += o.deliveryFee || 0;
        return acc;
      }, {});
      const days = Object.values(byDate).sort((a,b) => new Date(b.date) - new Date(a.date));

      return (
        <div style={{ padding:"14px 16px" }}>
          {/* Summary cards */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
            {[
              { label:"Ngayon",       value: fmt(today),       icon:"calendar-day",  color:"#DBEAFE", tcolor:"#1D4ED8" },
              { label:"7 Araw",       value: fmt(week),        icon:"calendar-week", color:"#EDE9FE", tcolor:"#7C3AED" },
              { label:"Kabuuang Kita",value: fmt(total),       icon:"coins",         color:"#DCFCE7", tcolor:"#059669" },
              { label:"Deliveries",   value: completed.length, icon:"circle-check",  color:"#FEF3C7", tcolor:"#D97706" },
            ].map(s => (
              <div key={s.label} style={{ background:"#fff", borderRadius:18, padding:"16px", border:`1px solid ${s.color}`, boxShadow:"0 1px 4px rgba(0,0,0,.05)" }}>
                <div style={{ marginBottom:8 }}><Ic n={s.icon} size={24} style={{ color:s.tcolor }} /></div>
                <div style={{ fontSize:22, fontWeight:800, color:s.tcolor }}>{s.value}</div>
                <div style={{ fontSize:11, fontWeight:600, color:"#94A3B8", marginTop:4 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Daily breakdown */}
          {days.length > 0 && (
            <>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748B", marginBottom:10, textTransform:"uppercase", letterSpacing:".08em" }}>
                Breakdown per Araw
              </div>
              {days.map((d, i) => (
                <div key={d.date} className="fade-up" style={{
                  background:"#fff", borderRadius:14, padding:"14px 16px", marginBottom:8,
                  border:"1px solid #E2E8F0", display:"flex", justifyContent:"space-between", alignItems:"center",
                  animationDelay:`${i*.04}s`,
                }}>
                  <div>
                    <div style={{ fontSize:14, fontWeight:700, color:"#1E293B" }}>{d.date}</div>
                    <div style={{ fontSize:12, color:"#94A3B8", marginTop:2 }}>{d.orders} delivery{d.orders > 1 ? "ies" : ""}</div>
                  </div>
                  <div style={{ fontSize:18, fontWeight:800, color:"#1D4ED8" }}>{fmt(d.earnings)}</div>
                </div>
              ))}
            </>
          )}

          {completed.length === 0 && (
            <div style={{ textAlign:"center", padding:"40px 20px", color:"#94A3B8" }}>
              <Ic n="coins" size={52} style={{ marginBottom:12, color:"#94A3B8" }} />
              <div style={{ fontSize:15, fontWeight:700, color:"#64748B" }}>Wala pang kita</div>
              <div style={{ fontSize:13, marginTop:6 }}>Mag-deliver para magsimulang kumita!</div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script src="offline-mode.js"></script>
</body>
</html>
