<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BayanGo Rider</title>
  <meta name="theme-color" content="#1D4ED8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BayanGo Rider" />
  <link rel="manifest" href="bayango-rider-manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #EFF6FF; font-family: 'Plus Jakarta Sans', sans-serif; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop     { 0%{transform:scale(.85);opacity:0;} 100%{transform:scale(1);opacity:1;} }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes pulse   { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    @keyframes riderFloatY { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
    @keyframes riderRotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes riderShimmer { 0% { transform: translateX(-115%); } 100% { transform: translateX(220%); } }
    .fade-up { animation: fadeUp .35s ease both; }
    .pop     { animation: pop .25s ease both; }
    .spin    { animation: spin 1s linear infinite; }
    .pulse   { animation: pulse 1.4s ease infinite; }
    .rider-splash-shell {
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      height:100vh; background:radial-gradient(circle at 80% 12%, #DBEAFE 0%, #EFF6FF 45%, #E0E7FF 100%);
      position:relative; overflow:hidden; padding:24px;
    }
    .rider-splash-shell::before {
      content:""; position:absolute; width:240px; height:240px; border-radius:999px;
      background:linear-gradient(130deg, rgba(29,78,216,.14), rgba(59,130,246,.06));
      filter:blur(5px); top:6%; right:-72px;
    }
    .rider-splash-logo-wrap {
      width:156px; height:156px; border-radius:34px; background:#fff; display:flex; align-items:center; justify-content:center;
      box-shadow:0 14px 38px rgba(30,58,138,.2), inset 0 1px 0 rgba(255,255,255,.92);
      position:relative; animation:riderFloatY 2.2s ease-in-out infinite;
    }
    .rider-splash-logo-wrap::before {
      content:""; position:absolute; inset:-9px; border-radius:40px;
      border:2px solid rgba(37,99,235,.18); border-top-color:rgba(29,78,216,.5);
      animation:riderRotateGlow 3s linear infinite;
    }
    .rider-splash-logo { height:102px; object-fit:contain; }
    .rider-splash-caption {
      font-size:14px; font-weight:700; color:#1D4ED8; letter-spacing:.04em;
      position:relative; overflow:hidden; padding:8px 16px; border-radius:999px;
      background:rgba(255,255,255,.72); border:1px solid rgba(29,78,216,.13);
      backdrop-filter:blur(2px);
    }
    .rider-splash-caption::after {
      content:""; position:absolute; top:0; left:0; width:60%; height:100%;
      background:linear-gradient(100deg, transparent, rgba(255,255,255,.88), transparent);
      animation:riderShimmer 1.8s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="rider-splash-shell">
      <div class="rider-splash-logo-wrap">
        <img class="rider-splash-logo" src="https://i.imgur.com/tMk73Mg.png" alt="BayanGo Rider" />
      </div>
      <div class="rider-splash-caption">Naghahanda ng Rider app...</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const RIDER_FB_APP = firebase.initializeApp({
      apiKey:            "AIzaSyC0AQ3rkH-fhxlThobjDDtrvxttAfFLXTE",
      authDomain:        "bayango-315c6.firebaseapp.com",
      projectId:         "bayango-315c6",
      storageBucket:     "bayango-315c6.firebasestorage.app",
      messagingSenderId: "199013441811",
      appId:             "1:199013441811:web:315a38f03ddc9b676e3ae6",
      measurementId:     "G-1EEGFZWB7E",
      databaseURL:       "https://bayango-315c6-default-rtdb.asia-southeast1.firebasedatabase.app",
    }, "rider");
    const _fbAuth = firebase.auth(RIDER_FB_APP);
    const _fbDb   = firebase.database(RIDER_FB_APP);
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const Ic = ({ n, style, size, className }) => <i className={`fa-solid fa-${n}${className?' '+className:''}`} style={{ fontSize:size, lineHeight:1, ...style }} />;

    const fmt = n => "₱" + Number(n).toLocaleString("en-PH", { minimumFractionDigits: 0 });
    const isImageSrc = (value) =>
      typeof value === "string" &&
      /^(https?:\/\/|blob:|data:image\/)/i.test(value);
    const orderItemImage = (item) => {
      const possible = [item?.img, item?.image, item?.imageUrl, item?.photo, item?.photoURL];
      return possible.find(isImageSrc) || "";
    };
    const isToday = ts => {
      if (!ts) return false;
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const t = new Date();
      return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
    };
    const RIDER_NOTIFICATION_SOUND_URL = "https://audio.com/kenneth-antonil/audio/universfield-new-notification-022-370046";
    async function getPushVapidKey() {
      try {
        const snap = await _fbDb.ref("settings/pushVapidKey").once("value");
        return String(snap.val() || "").trim();
      } catch (err) {
        console.error("Unable to read rider push vapid key:", err);
        return "";
      }
    }
    const sanitizeTokenKey = (token) => encodeURIComponent(String(token || "")).replace(/\./g, "%2E");

    async function enablePushForRider(user, onForegroundNotify) {
      if (!user?.uid) return;
      if (!("serviceWorker" in navigator) || !("Notification" in window) || !firebase.messaging) return;
      try {
        let permission = Notification.permission;
        if (permission !== "granted") {
          permission = await Notification.requestPermission();
        }
        if (permission !== "granted") return;

        const swReg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        await navigator.serviceWorker.ready;
        const messaging = firebase.messaging(RIDER_FB_APP);
        const vapidKey = await getPushVapidKey();
        if (!vapidKey) return;
        const token = await messaging.getToken({ vapidKey, serviceWorkerRegistration: swReg });
        if (!token) return;

        const tokenKey = sanitizeTokenKey(token);
        await _fbDb.ref(`push_tokens/${user.uid}/${tokenKey}`).set({
          token,
          uid: user.uid,
          riderEmail: user.email || null,
          riderName: user.displayName || null,
          role: "rider",
          platform: navigator.userAgent || "web",
          updatedAt: Date.now(),
          enabled: true,
        });

        messaging.onMessage((payload) => {
          const title = payload?.notification?.title || "BayanGo Rider";
          const body = payload?.notification?.body || "May bagong order.";
          if (typeof onForegroundNotify === "function") onForegroundNotify({ title, body, payload });
          if (Notification.permission === "granted") {
            new Notification(title, {
              body,
              icon: "https://i.imgur.com/wL8wcBB.jpeg",
              data: payload?.data || {},
            });
          }
        });
      } catch (err) {
        console.error("Rider push notification setup error:", err);
      }
    }
    async function showLocalRiderNotification({ title, body, data = {} }) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      const payload = {
        body,
        icon: "https://i.imgur.com/wL8wcBB.jpeg",
        data,
      };
      try {
        if ("serviceWorker" in navigator) {
          const reg = await navigator.serviceWorker.getRegistration("/firebase-messaging-sw.js");
          if (reg?.showNotification) {
            await reg.showNotification(title, payload);
            return;
          }
        }
      } catch (err) {
        console.warn("Rider local notification via service worker failed:", err);
      }
      try {
        new Notification(title, payload);
      } catch (err) {
        console.warn("Rider local notification failed:", err);
      }
    }

    /* ══════════════════ APP ══════════════════ */
    function RiderSplash({ message = "Naghahanda ng Rider app..." }) {
      return (
        <div className="rider-splash-shell">
          <div className="rider-splash-logo-wrap">
            <img className="rider-splash-logo" src="https://i.imgur.com/tMk73Mg.png" alt="BayanGo Rider" />
          </div>
          <div className="rider-splash-caption">{message}</div>
        </div>
      );
    }

    function App() {
      const [user,  setUser]  = useState(null);
      const [ready, setReady] = useState(false);

      useEffect(() => {
        // Handle redirect result (after signInWithRedirect)
        _fbAuth.getRedirectResult().catch(() => {});
        const unsub = _fbAuth.onAuthStateChanged(u => { setUser(u); setReady(true); });
        return () => unsub();
      }, []);

      const handleLogin = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          await _fbAuth.signInWithPopup(provider);
        } catch (err) {
          if (
            err.code === "auth/popup-blocked" ||
            err.code === "auth/popup-closed-by-user" ||
            err.code === "auth/cancelled-popup-request"
          ) {
            await _fbAuth.signInWithRedirect(provider);
          } else {
            console.error("Sign-in error:", err.code, err.message);
          }
        }
      };

      const handleLogout = async () => {
        await _fbAuth.signOut();
      };

      if (!ready) return <RiderSplash message="Kinokonekta ang rider account..." />;

      if (!user) return <LoginScreen onLogin={handleLogin} />;
      return <RiderApp user={user} onLogout={handleLogout} />;
    }

    /* ══════════════════ LOGIN ══════════════════ */
    function LoginScreen({ onLogin }) {
      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#1E3A8A,#1D4ED8,#3B82F6)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:28, padding:24 }}>
          <div className="fade-up" style={{ textAlign:"center", color:"#fff" }}>
            <img src="https://i.imgur.com/tMk73Mg.png" style={{ height:180, objectFit:"contain", marginBottom:8, filter:"drop-shadow(0 6px 24px rgba(0,0,0,.35))" }} />
            <p style={{ fontSize:14, opacity:.75, marginTop:6 }}>Delivery Partner App</p>
          </div>
          <button className="fade-up" onClick={onLogin} style={{
            background:"#fff", border:"none", padding:"15px 28px", borderRadius:100,
            fontSize:16, fontWeight:700, color:"#1D4ED8", display:"flex", alignItems:"center", gap:12,
            boxShadow:"0 8px 32px rgba(0,0,0,.2)", animationDelay:".1s"
          }}>
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style={{width:22,height:22}} />
            Sign in with Google
          </button>
          <p className="fade-up" style={{ color:"rgba(255,255,255,.55)", fontSize:12, animationDelay:".2s", textAlign:"center", lineHeight:1.6 }}>
            Para sa mga BayanGo delivery riders lamang.
          </p>
        </div>
      );
    }

    /* ══════════════════ RIDER APP ══════════════════ */
    function RiderApp({ user, onLogout }) {
      const [tab,             setTab]             = useState("available");
      const [availableOrders, setAvailableOrders] = useState([]);
      const [myOrders,        setMyOrders]        = useState([]);
      const [claiming,        setClaiming]        = useState(null);
      const [delivering,      setDelivering]      = useState(null);
      const [markingOtw,      setMarkingOtw]      = useState(null);
      const [toast,           setToast]           = useState(null);
      const [availErr,        setAvailErr]        = useState(null);
      const [checklistOrder,  setChecklistOrder]  = useState(null);
      const [mapOrder,        setMapOrder]        = useState(null);
      const [riderCoords,     setRiderCoords]     = useState(null);
      const notificationAudioRef = useRef(null);
      const lastAvailableOrderIdsRef = useRef(new Set());
      const [notifPermission, setNotifPermission] = useState(
        typeof Notification === "undefined" ? "unsupported" : Notification.permission
      );

      const playNotificationSound = useCallback(() => {
        if (!notificationAudioRef.current) {
          notificationAudioRef.current = new Audio(RIDER_NOTIFICATION_SOUND_URL);
          notificationAudioRef.current.preload = "auto";
        }
        const audio = notificationAudioRef.current;
        audio.currentTime = 0;
        audio.play().catch((err) => {
          console.warn("Rider notification sound play failed:", err?.message || err);
        });
      }, []);

      const setupRiderPush = useCallback(async () => {
        if (typeof Notification !== "undefined") {
          setNotifPermission(Notification.permission);
        }
        await enablePushForRider(user, ({ title, body }) => {
          playNotificationSound();
          showToast(`${title}: ${body}`);
        });
        if (typeof Notification !== "undefined") {
          setNotifPermission(Notification.permission);
        }
      }, [user, playNotificationSound]);

      useEffect(() => {
        setupRiderPush();
      }, [setupRiderPush]);

      useEffect(() => {
        if (typeof document === "undefined" || typeof Notification === "undefined") return;
        const syncPermission = () => setNotifPermission(Notification.permission);
        document.addEventListener("visibilitychange", syncPermission);
        window.addEventListener("focus", syncPermission);
        return () => {
          document.removeEventListener("visibilitychange", syncPermission);
          window.removeEventListener("focus", syncPermission);
        };
      }, []);

      const handleForceEnableNotifications = async () => {
        if (typeof Notification === "undefined") return;
        if (Notification.permission !== "granted") {
          await Notification.requestPermission();
        }
        await setupRiderPush();
      };

      useEffect(() => {
        /* Available: treat missing status as pending (legacy orders) */
        const availRef = _fbDb.ref("orders");
        availRef.on("value",
            snap => {
              const list = [];
              snap.forEach(c => {
                const v = c.val() || {};
                const normalizedStatus = v.status || "pending";
                if (!v.riderId && normalizedStatus === "pending") list.push({ id:c.key, ...v, status: normalizedStatus });
              });
              const incomingOrderIds = new Set(list.map(o => o.id));
              if (lastAvailableOrderIdsRef.current.size > 0) {
                const hasNewOrder = [...incomingOrderIds].some(id => !lastAvailableOrderIdsRef.current.has(id));
                if (hasNewOrder) {
                  playNotificationSound();
                  showLocalRiderNotification({
                    title: "BayanGo Rider",
                    body: "May bagong order! Buksan ang Available tab.",
                    data: { type: "new_order" },
                  });
                  showToast("May bagong order! Buksan ang Available tab.");
                }
              }
              lastAvailableOrderIdsRef.current = incomingOrderIds;
              setAvailableOrders(list.reverse());
            },
          err => { console.error("Available orders error:", err.code); setAvailErr(err.code || "permission-denied"); }
        );

        /* My orders: assigned to this rider */
        const mineQueryRef = _fbDb.ref("orders").orderByChild("riderId").equalTo(user.uid);
        const minePlainRef = _fbDb.ref("orders");
        let usingMineFallback = false;

        mineQueryRef.on("value",
          snap => {
            const list = [];
            snap.forEach(c => { const v = c.val() || {}; list.push({ id:c.key, ...v, status: v.status || "pending" }); });
            setMyOrders(list);
          },
          err => {
            console.error("My orders error:", err.code);
            const code = String(err?.code || "").toLowerCase();
            if ((code === "permission_denied" || code === "permission-denied") && !usingMineFallback) {
              usingMineFallback = true;
              minePlainRef.on("value",
                fullSnap => {
                  const list = [];
                  fullSnap.forEach(c => {
                    const v = c.val() || {};
                    if (v.riderId === user.uid) list.push({ id:c.key, ...v, status: v.status || "pending" });
                  });
                  setMyOrders(list);
                },
                fullErr => console.error("My orders fallback error:", fullErr.code)
              );
            }
          }
        );

        return () => {
          availRef.off();
          mineQueryRef.off();
          if (usingMineFallback) minePlainRef.off();
        };
      }, [user.uid]);

      const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 3000); };

      const acceptOrder = async (orderId) => {
        setClaiming(orderId);
        try {
          await _fbDb.ref("orders/" + orderId).update({
            riderId:    user.uid,
            riderName:  user.displayName || user.email,
            riderPhoto: user.photoURL || null,
            status:     "buying",
            acceptedAt: Date.now(),
          });
          showToast("Na-accept! Pumunta ka na sa tindahan.");
          setTab("deliveries");
        } catch (err) {
          showToast("Error: " + (err.code || err.message));
        } finally {
          setClaiming(null);
        }
      };

      const markOtw = async (orderId) => {
        setMarkingOtw(orderId);
        try {
          await _fbDb.ref("orders/" + orderId).update({ status: "otw" });
          showToast("OTW na! Mag-ingat sa daan.");
        } catch (err) {
          showToast("Error: " + (err.code || err.message));
        } finally {
          setMarkingOtw(null);
        }
      };

      const markDelivered = async (orderId) => {
        setDelivering(orderId);
        try {
          await _fbDb.ref("orders/" + orderId).update({
            status:      "delivered",
            deliveredAt: Date.now(),
          });
          showToast("Na-deliver na! Good job!");
        } catch (err) {
          showToast("Error: " + (err.code || err.message));
        } finally {
          setDelivering(null);
        }
      };

      const toggleChecklistItem = async (orderId, itemKey, checked) => {
        setChecklistOrder(prev => {
          if (!prev || prev.id !== orderId) return prev;
          return {
            ...prev,
            riderChecklist: {
              ...(prev.riderChecklist || {}),
              [itemKey]: checked,
            },
          };
        });
        try {
          await _fbDb.ref(`orders/${orderId}/riderChecklist/${itemKey}`).set(checked);
        } catch (err) {
          showToast("Hindi na-save ang checklist: " + (err.code || err.message));
        }
      };

      /* ── GPS Location Sharing ── */
      const [gpsActive, setGpsActive] = useState(false);
      const watchIdRef = useRef(null);

      useEffect(() => {
        const hasActiveDelivery = myOrders.some(o => o.status === "buying" || o.status === "otw");

        if (hasActiveDelivery && !watchIdRef.current && navigator.geolocation) {
          setGpsActive(true);
          watchIdRef.current = navigator.geolocation.watchPosition(
            (pos) => {
              const nextCoords = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                updatedAt: Date.now(),
              };
              setRiderCoords(nextCoords);
              _fbDb.ref("rider_locations/" + user.uid).set({
                lat: nextCoords.lat,
                lng: nextCoords.lng,
                accuracy: pos.coords.accuracy,
                heading: pos.coords.heading,
                speed: pos.coords.speed,
                updatedAt: nextCoords.updatedAt,
                riderName: user.displayName || user.email,
                riderPhoto: user.photoURL || null,
              });
            },
            (err) => console.error("GPS error:", err.message),
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
          );
        } else if (!hasActiveDelivery && watchIdRef.current) {
          navigator.geolocation.clearWatch(watchIdRef.current);
          watchIdRef.current = null;
          setGpsActive(false);
          _fbDb.ref("rider_locations/" + user.uid).remove();
          setRiderCoords(null);
        }

        return () => {
          if (watchIdRef.current) {
            navigator.geolocation.clearWatch(watchIdRef.current);
            watchIdRef.current = null;
          }
        };
      }, [myOrders, user.uid]);

      const buyingOrders    = myOrders.filter(o => o.status === "buying");
      const activeOrders    = myOrders.filter(o => o.status === "otw");
      const completedOrders = myOrders.filter(o => o.status === "delivered");
      const todayEarnings   = completedOrders.filter(o => isToday(o.deliveredAt)).reduce((s,o) => s + (o.deliveryFee||0), 0);
      const totalEarnings   = completedOrders.reduce((s,o) => s + (o.deliveryFee||0), 0);
      const weekEarnings    = completedOrders.filter(o => {
        if (!o.deliveredAt) return false;
        const d = o.deliveredAt.toDate ? o.deliveredAt.toDate() : new Date(o.deliveredAt);
        const diff = (new Date() - d) / 86400000;
        return diff <= 7;
      }).reduce((s,o) => s + (o.deliveryFee||0), 0);

      const shouldForceNotifEnable = notifPermission !== "unsupported" && notifPermission !== "granted";

      return (
        <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#EFF6FF", paddingBottom:74, position:"relative" }}>

          {/* ── Header ── */}
          <div style={{
            background:"linear-gradient(145deg,#1E3A8A,#1D4ED8,#2563EB)",
            padding:"env(safe-area-inset-top,0px) 20px 0",
            paddingTop:`calc(env(safe-area-inset-top,0px) + 18px)`,
            color:"#fff",
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <img src="https://i.imgur.com/tMk73Mg.png" style={{ height:40, objectFit:"contain" }} />
                <div style={{ fontSize:20, fontWeight:800, marginTop:2 }}>
                  <Ic n="motorcycle" style={{ marginRight:6 }} />{user.displayName?.split(" ")[0] || "Rider"}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {gpsActive && (
                  <div style={{ display:"flex", alignItems:"center", gap:5, background:"rgba(34,197,94,.2)", padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:700, color:"#4ADE80" }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ADE80", boxShadow:"0 0 6px #4ADE80" }} className="pulse" />
                    LIVE GPS
                  </div>
                )}

    function RiderRouteMapModal({ order, riderCoords, onClose }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const riderMarkerRef = useRef(null);
      const customerMarkerRef = useRef(null);
      const lineRef = useRef(null);
      const BINANG_CENTER = [14.4584, 121.1971];
      const toNum = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      };
      const custLat = toNum(order?.customer?.lat);
      const custLng = toNum(order?.customer?.lng);
      const customerPos = custLat != null && custLng != null ? [custLat, custLng] : null;

      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current || typeof L === "undefined") return;
        const map = L.map(mapRef.current, { center: customerPos || BINANG_CENTER, zoom: 15, zoomControl: false });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: '&copy; OpenStreetMap', maxZoom: 19 }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);
        mapInstanceRef.current = map;

        if (customerPos) {
          const customerIcon = L.divIcon({
            html: '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#059669,#10B981);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 4px 16px rgba(5,150,105,.45);border:3px solid #fff;"><i class="fa-solid fa-house"></i></div>',
            className: "",
            iconSize: [42, 42],
            iconAnchor: [21, 21],
          });
          customerMarkerRef.current = L.marker(customerPos, { icon: customerIcon }).addTo(map);
        }
        setTimeout(() => map.invalidateSize(), 180);
        return () => {
          map.remove();
          mapInstanceRef.current = null;
          riderMarkerRef.current = null;
          customerMarkerRef.current = null;
          lineRef.current = null;
        };
      }, []);

      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map || !customerPos) return;
        const riderLat = toNum(riderCoords?.lat);
        const riderLng = toNum(riderCoords?.lng);
        if (riderLat == null || riderLng == null) {
          map.setView(customerPos, 16);
          return;
        }
        const riderPos = [riderLat, riderLng];
        if (!riderMarkerRef.current) {
          const riderIcon = L.divIcon({
            html: '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1D4ED8,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(29,78,216,.5);border:3px solid #fff;"><i class="fa-solid fa-motorcycle"></i></div>',
            className: "",
            iconSize: [42, 42],
            iconAnchor: [21, 21],
          });
          riderMarkerRef.current = L.marker(riderPos, { icon: riderIcon }).addTo(map);
        } else {
          riderMarkerRef.current.setLatLng(riderPos);
        }
        if (!lineRef.current) {
          lineRef.current = L.polyline([riderPos, customerPos], { color:"#1D4ED8", weight:5, opacity:.9 }).addTo(map);
        } else {
          lineRef.current.setLatLngs([riderPos, customerPos]);
        }
        map.fitBounds([riderPos, customerPos], { padding: [40, 40] });
      }, [riderCoords, order?.id]);

      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:1200, background:"rgba(2,6,23,.72)", display:"flex", flexDirection:"column" }}>
          <div onClick={e => e.stopPropagation()} style={{ flex:1, maxWidth:480, width:"100%", margin:"0 auto", display:"flex", flexDirection:"column" }}>
            <div style={{ background:"linear-gradient(135deg,#1D4ED8,#3B82F6)", color:"#fff", padding:"calc(env(safe-area-inset-top,0px) + 14px) 18px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:15, fontWeight:800 }}><Ic n="route" style={{ marginRight:8 }} />Route papunta kay {order.customer?.name || "Customer"}</div>
              <button onClick={onClose} style={{ width:34, height:34, borderRadius:10, background:"rgba(255,255,255,.2)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="xmark" /></button>
            </div>
            <div style={{ background:"#EFF6FF", color:"#1D4ED8", fontSize:12, fontWeight:700, padding:"8px 18px", borderBottom:"1px solid #DBEAFE" }}>
              Blue line = diretsong daan mula sa'yo papunta sa customer
            </div>
            <div style={{ position:"relative", flex:1, minHeight:300 }}>
              <div ref={mapRef} style={{ position:"absolute", inset:0 }} />
            </div>
            <div style={{ background:"#fff", padding:"12px 18px calc(env(safe-area-inset-bottom,0px) + 12px)", borderTop:"1px solid #E2E8F0", fontSize:12, color:"#475569" }}>
              {order.customer?.address || "Walang address"}
            </div>
          </div>
        </div>
      );
    }

          {buying.length > 0 && (
            <>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748B", marginBottom:10, textTransform:"uppercase", letterSpacing:".08em" }}>
                <Ic n="cart-shopping" style={{ marginRight:6 }} />Binibili ({buying.length})
              </div>
              {buying.map(order => (
                <OrderCard key={order.id} order={order}
                  statusBadge={<><Ic n="cart-shopping" style={{ marginRight:4 }} />Buying</>} badgeBg="#FEF3C7" badgeColor="#92400E"
                  actionBtn={
                    <button onClick={() => onOtw(order.id)} disabled={markingOtw === order.id} style={{
                      width:"100%", padding:"14px", borderRadius:14,
                      background: markingOtw === order.id ? "#E2E8F0" : "linear-gradient(135deg,#1D4ED8,#3B82F6)",
                      color: markingOtw === order.id ? "#94A3B8" : "#fff",
                      fontSize:15, fontWeight:800,
                    }}>
                      {markingOtw === order.id ? <span className="pulse">Ina-update...</span> : <><Ic n="motorcycle" style={{ marginRight:6 }} />Tapos na! OTW na ako!</>}
                    </button>
                  }
                />
              ))}
            </>
          )}

          {/* OTW deliveries */}
          {active.length > 0 && (
            <>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748B", marginBottom:10, marginTop: buying.length > 0 ? 16 : 0, textTransform:"uppercase", letterSpacing:".08em" }}>
                <Ic n="motorcycle" style={{ marginRight:6 }} />OTW ({active.length})
              </div>
              {active.map(order => (
                <OrderCard key={order.id} order={order}
                  statusBadge={<><Ic n="motorcycle" style={{ marginRight:4 }} />OTW</>} badgeBg="#DBEAFE" badgeColor="#1D4ED8"
                  actionBtn={
                    <button onClick={() => onDeliver(order.id)} disabled={delivering === order.id} style={{
                      width:"100%", padding:"14px", borderRadius:14,
                      background: delivering === order.id ? "#E2E8F0" : "linear-gradient(135deg,#059669,#10B981)",
                      color: delivering === order.id ? "#94A3B8" : "#fff",
                      fontSize:15, fontWeight:800,
                      boxShadow: delivering ? "none" : "0 4px 16px rgba(5,150,105,.35)",
                    }}>
                      {delivering === order.id ? <span className="pulse">Ina-update...</span> : <><Ic n="circle-check" style={{ marginRight:6 }} />Na-deliver na!</>}
                    </button>
                  }
                />
              ))}
            </>
          )}

          {/* Completed deliveries */}
          {completed.length > 0 && (
            <>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748B", margin:"16px 0 10px", textTransform:"uppercase", letterSpacing:".08em" }}>
                <Ic n="circle-check" style={{ marginRight:6 }} />Mga Na-deliver ({completed.length})
              </div>
              {completed.slice(0, 20).map(order => {
                const ts = order.deliveredAt?.toDate ? order.deliveredAt.toDate() : new Date(order.deliveredAt || 0);
                return (
                  <div key={order.id} className="fade-up" style={{
                    background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:8,
                    border:"1px solid #E2E8F0", display:"flex", alignItems:"center", gap:12,
                  }}>
                    <div style={{ width:44, height:44, borderRadius:12, background:"#DCFCE7", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><Ic n="circle-check" size={20} style={{ color:"#059669" }} /></div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#1E293B", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {order.customer?.name}
                      </div>
                      <div style={{ fontSize:12, color:"#94A3B8", marginTop:2 }}>
                        {ts.toLocaleDateString("en-PH")} {ts.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"})}
                      </div>
                    </div>
                    <div style={{ fontSize:16, fontWeight:800, color:"#059669" }}>{fmt(order.deliveryFee || 0)}</div>
                  </div>
                );
              })}
            </>
          )}

          {buying.length === 0 && active.length === 0 && completed.length === 0 && (
            <div style={{ textAlign:"center", padding:"60px 20px", color:"#94A3B8" }}>
              <Ic n="motorcycle" size={52} style={{ marginBottom:12, color:"#94A3B8" }} />
              <div style={{ fontSize:15, fontWeight:700, color:"#64748B" }}>Walang deliveries pa</div>
              <div style={{ fontSize:13, marginTop:6 }}>Pumunta sa Available tab para kumuha ng order</div>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════ EARNINGS TAB ══════════════════ */
    function EarningsTab({ completed, today, week, total }) {
      const byDate = completed.reduce((acc, o) => {
        const ts = o.deliveredAt?.toDate ? o.deliveredAt.toDate() : new Date(o.deliveredAt || 0);
        const key = ts.toLocaleDateString("en-PH", { month:"short", day:"numeric", year:"numeric" });
        if (!acc[key]) acc[key] = { date:key, orders:0, earnings:0 };
        acc[key].orders++;
        acc[key].earnings += o.deliveryFee || 0;
        return acc;
      }, {});
      const days = Object.values(byDate).sort((a,b) => new Date(b.date) - new Date(a.date));

      return (
        <div style={{ padding:"14px 16px" }}>
          {/* Summary cards */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
            {[
              { label:"Ngayon",       value: fmt(today),       icon:"calendar-day",  color:"#DBEAFE", tcolor:"#1D4ED8" },
              { label:"7 Araw",       value: fmt(week),        icon:"calendar-week", color:"#EDE9FE", tcolor:"#7C3AED" },
              { label:"Kabuuang Kita",value: fmt(total),       icon:"coins",         color:"#DCFCE7", tcolor:"#059669" },
              { label:"Deliveries",   value: completed.length, icon:"circle-check",  color:"#FEF3C7", tcolor:"#D97706" },
            ].map(s => (
              <div key={s.label} style={{ background:"#fff", borderRadius:18, padding:"16px", border:`1px solid ${s.color}`, boxShadow:"0 1px 4px rgba(0,0,0,.05)" }}>
                <div style={{ marginBottom:8 }}><Ic n={s.icon} size={24} style={{ color:s.tcolor }} /></div>
                <div style={{ fontSize:22, fontWeight:800, color:s.tcolor }}>{s.value}</div>
                <div style={{ fontSize:11, fontWeight:600, color:"#94A3B8", marginTop:4 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Daily breakdown */}
          {days.length > 0 && (
            <>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748B", marginBottom:10, textTransform:"uppercase", letterSpacing:".08em" }}>
                Breakdown per Araw
              </div>
              {days.map((d, i) => (
                <div key={d.date} className="fade-up" style={{
                  background:"#fff", borderRadius:14, padding:"14px 16px", marginBottom:8,
                  border:"1px solid #E2E8F0", display:"flex", justifyContent:"space-between", alignItems:"center",
                  animationDelay:`${i*.04}s`,
                }}>
                  <div>
                    <div style={{ fontSize:14, fontWeight:700, color:"#1E293B" }}>{d.date}</div>
                    <div style={{ fontSize:12, color:"#94A3B8", marginTop:2 }}>{d.orders} delivery{d.orders > 1 ? "ies" : ""}</div>
                  </div>
                  <div style={{ fontSize:18, fontWeight:800, color:"#1D4ED8" }}>{fmt(d.earnings)}</div>
                </div>
              ))}
            </>
          )}

          {completed.length === 0 && (
            <div style={{ textAlign:"center", padding:"40px 20px", color:"#94A3B8" }}>
              <Ic n="coins" size={52} style={{ marginBottom:12, color:"#94A3B8" }} />
              <div style={{ fontSize:15, fontWeight:700, color:"#64748B" }}>Wala pang kita</div>
              <div style={{ fontSize:13, marginTop:6 }}>Mag-deliver para magsimulang kumita!</div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
